###############################################################################
# FLYNN — UNIFIED ENGINE (v4.0.0 RC2)
# Canon-safe, no nested Jinja in service calls, fully HA-legal.
#
# Includes:
#   - RC1 Config (input_text helpers)
#   - Flynn Unified Engine (onboarding Q&A)
#   - Flynn Stepgate Sentinel (boot guard / installer / diagnostic)
#   - Flynn helper scripts (assign_labels, initialize_cabinets, bootstrap_content)
###############################################################################


###############################################################################
# RC1 CONFIG — 4 fields, settable via Settings > Helpers
# New users: fill these in after install, then restart HA.
# Flynn reads them at Gate 3 (bootstrap).
###############################################################################
input_text:
  zenos_conversation_agent:
    name: "ZenOS: Conversation Agent"
    icon: mdi:robot
    max: 255

  zenos_household_name:
    name: "ZenOS: Household Name"
    icon: mdi:home
    max: 255

  zenos_primary_user:
    name: "ZenOS: Primary User"
    icon: mdi:account
    max: 255

  zenos_persona_name:
    name: "ZenOS: Persona Name"
    icon: mdi:account-star
    max: 255

  zenos_reasoning_task:
    name: "ZenOS: Reasoning Task"
    icon: mdi:brain
    max: 255

  zenos_ai_task_entity:
    name: "ZenOS: AI Task Entity"
    icon: mdi:robot-outline
    max: 255

input_boolean:
  zen_squirrel:
    name: "ZenOS: Secret Squirrel Mode"
    icon: mdi:incognito


###############################################################################
# STEPGATE SENTINEL
# Triggers on HA start + all 3 health sensor changes.
# Walks gates top-down, stops at first non-green, takes corrective action.
# Idempotent. Re-engages on health regression.
###############################################################################
automation:
  - alias: "Flynn: Stepgate Sentinel"
    id: flynn_stepgate_sentinel
    mode: single
    triggers:
      - trigger: homeassistant
        event: start
      - trigger: state
        entity_id: sensor.zen_label_health
      - trigger: state
        entity_id: sensor.zen_cabinet_health
      - trigger: state
        entity_id: sensor.zen_monastery_health
    conditions: []
    actions:
      # Capture green state + OOBE state BEFORE delay
      - variables:
          was_green: "{{ is_state('binary_sensor.flynn_system_ready', 'on') }}"
          _oobe_ai_cab: >-
            {{ label_entities('zen_default_ai_user_cabinet')
               | select('match', 'sensor.') | list | first | default('') }}
          _oobe_cab_vars: >-
            {{ state_attr(_oobe_ai_cab, 'variables') | default({}, true)
               if _oobe_ai_cab != '' else {} }}
          _oobe_complete: "{{ '_oobe_complete' in _oobe_cab_vars }}"
          _oobe_essence_raw: "{{ _oobe_cab_vars.get('zenai_essence', {}) }}"
          _oobe_essence_val: >-
            {{ _oobe_essence_raw.get('value', _oobe_essence_raw)
               if _oobe_essence_raw is mapping else {} }}
          _oobe_name: >-
            {{ (_oobe_essence_val.get('identity', {}).get('name', '') | trim)
               if _oobe_essence_val is mapping else '' }}
          _oobe_pending: "{{ not _oobe_complete and (_oobe_name in ['', 'your AI']) }}"
      # Early exit: skip when all gates green (or monastery warn) AND oobe done.
      # warn = degraded-but-functional; no bootstrap needed, agent is usable.
      # If oobe is pending we must walk through to Gate 3.5 even on green systems.
      - if: >
          {{ was_green
             and states('sensor.zen_label_health')    == 'ok'
             and states('sensor.zen_cabinet_health')  == 'ok'
             and states('sensor.zen_monastery_health') in ['ok', 'warn']
             and not _oobe_pending
             and 'kfc_template' in (state_attr(states('sensor.zen_dojo_cabinet_resolved'), 'variables') or {})
             and 'zen_template'  in (state_attr(states('sensor.zen_kata_cabinet_resolved'), 'variables') or {}) }}
        then:
          - stop: "No-op: all gates green, schemas seeded"
      - delay: "00:00:10"
      - variables:
          label_health: "{{ states('sensor.zen_label_health') }}"
          cabinet_health: "{{ states('sensor.zen_cabinet_health') }}"
          monastery_health: "{{ states('sensor.zen_monastery_health') }}"

      #####################################################################
      # GATE 0: Labels missing — create them
      #####################################################################
      - choose:
          - conditions: "{{ label_health == 'critical' }}"
            sequence:
              - variables:
                  #raw_labels: "{{ state_attr('sensor.zen_label_health', 'required_labels') }}"
                  label_list: >-
                    {%- import 'zenos/zenos_health.jinja' as HEALTH -%}
                    {{ HEALTH.required_labels() | from_json([]) }}

              # ---------------------------------------------
              # @related homeassistant.create_label
              # ---------------------------------------------
              - alias: "Flynn: Create missing labels via DojoTools"
                action: script.zen_dojotools_labels
                data:
                  action_type: create
                  label_list: "{{ label_list }}"
                  confirm: true
              - action: persistent_notification.create
                data:
                  title: "ZenOS-AI: Labels Created — Restart Required"
                  message: >
                    Flynn here. I just created the Zen label set.
                    Restart Home Assistant for labels to fully propagate.
                    After that, I'll wire everything up.
                  notification_id: flynn_labels_created
              - stop: "Gate 0: Labels created, restart needed"

      #####################################################################
      # GATE 1: Labels exist but unassigned
      #####################################################################
      - choose:
          - conditions: "{{ label_health == 'warn' }}"
            sequence:
              - alias: "Flynn: Assign labels to cabinet entities"
                action: script.flynn_assign_labels
                data: {}
              - stop: "Gate 1: Labels assigned, waiting for health update"

      # Clear label notification if we got past gates 0-1
      - action: persistent_notification.dismiss
        data:
          notification_id: flynn_labels_created

      #####################################################################
      # GATE 2: Cabinets not ok
      #####################################################################
      - choose:
          - conditions: "{{ cabinet_health != 'ok' }}"
            sequence:
              - alias: "Flynn: Initialize required cabinets"
                action: script.flynn_initialize_cabinets
                data: {}
              - stop: "Gate 2: Cabinets initializing"

      #####################################################################
      # GATE 3: Monastery not ok
      # Resolvers must be settled before bootstrap is useful.
      # unknown = resolvers not ready (labels unassigned or sensors not loaded)
      # warn   = schema ok, agent usable — schema seed only, no content bootstrap
      # critical = content missing — full bootstrap
      #####################################################################
      - variables:
          _resolver_dojo: "{{ states('sensor.zen_dojo_cabinet_resolved') }}"
          _resolver_kata: "{{ states('sensor.zen_kata_cabinet_resolved') }}"
          _resolver_system: "{{ states('sensor.zen_system_cabinet_resolved') }}"
          _resolvers_ready: >-
            {{ [_resolver_dojo, _resolver_kata, _resolver_system]
               | select('in', ['unknown', 'unavailable', 'none', ''])
               | list | count == 0 }}
      - choose:
          - conditions: "{{ monastery_health == 'unknown' or not _resolvers_ready }}"
            sequence:
              - stop: >-
                  Gate 3: Resolvers not settled
                  (dojo={{ _resolver_dojo }}, kata={{ _resolver_kata }}, system={{ _resolver_system }}) —
                  waiting for label assignment to propagate

      # Schema gate — runs regardless of monastery state (warn or critical).
      # kfc_template and zen_template are infrastructure, not content.
      # reset_template is idempotent — safe on every boot.
      # bootstrap_content's internal check will skip if already pressed.
      - variables:
          _schema_ok: >-
            {{ 'kfc_template' in (state_attr(_resolver_dojo, 'variables') or {})
               and 'zen_template' in (state_attr(_resolver_kata, 'variables') or {}) }}
      - if: "{{ not _schema_ok }}"
        then:
          - alias: "Flynn: Seed schema templates"
            action: script.zen_admintools_reset_template
            data: {}

      - choose:
          - conditions: "{{ monastery_health == 'critical' }}"
            sequence:
              - alias: "Flynn: Bootstrap content"
                action: script.flynn_bootstrap_content
                data:
                  conversation_agent_entity: "{{ states('input_text.zenos_conversation_agent') }}"
                  household_name: "{{ states('input_text.zenos_household_name') }}"
                  primary_user: "{{ states('input_text.zenos_primary_user') }}"
                  persona_name: "{{ states('input_text.zenos_persona_name') }}"
              - stop: "Gate 3: Bootstrap in progress"

      #####################################################################
      # GATE 3.5: OOBE — system ready but persona not yet configured
      # _oobe_pending computed at top of action list (before early exit).
      # Fires on HA start and health sensor changes — same cadence as all gates.
      # Dismisses once _oobe_complete flag exists in AI user cab.
      #####################################################################
      - if: "{{ _oobe_pending }}"
        then:
          - action: persistent_notification.create
            data:
              title: "ZenOS-AI: Welcome — Let's name your AI"
              message: >
                Flynn here. Your system is ready but your AI doesn't have a
                name yet. Start a conversation with your AI and ask it to set
                up your profile — or run the Flynn Agent Builder
                (mode: oobe) to walk through setup.
              notification_id: flynn_oobe_pending
        else:
          - action: persistent_notification.dismiss
            data:
              notification_id: flynn_oobe_pending

      #####################################################################
      # GATE 4: All green — notify on transition only
      #####################################################################
      - choose:
          - conditions: "{{ not was_green }}"
            sequence:
              - action: persistent_notification.create
                data:
                  title: "ZenOS-AI: System Ready"
                  message: >
                    Everything's looking good. All gates green.
                    System is ready. Handing off to the real talent.
                  notification_id: flynn_system_ready


###############################################################################
# HELPER SCRIPTS
###############################################################################
script:

  #############################################################################
  # FLYNN: ASSIGN LABELS
  # Reads slot_to_label and slot_to_default_entity from cabinet health sensor.
  # Single source of truth — no independent mapping tables.
  # Assigns parent 'Zen Cabinet' + slot-specific label to each entity.
  # Also assigns broad labels (Zen Default Household, etc.) to cabinet entities.
  #############################################################################
  flynn_assign_labels:
    alias: "Flynn: Assign Labels to Cabinet Entities"
    mode: single
    sequence:
      - variables:
          slot_to_label: >
            {%- import 'zenos/zenos_health.jinja' as HEALTH -%}
            {{- HEALTH.slot_to_label() | from_json() -}}
          slot_to_entity: >
            {%- import 'zenos/zenos_health.jinja' as HEALTH -%}
            {{- HEALTH.slot_to_default_entity() | from_json() -}}


          parent_label: "Zen Cabinet"
          # Broad labels → default cabinet entity
          broad_labels:
            - label: "Zen Default Household"
              entity: "sensor.zenos_default_household_cabinet"
            - label: "Zen Default Family"
              entity: "sensor.zenos_default_family_cabinet"
            # Each default_* entity also carries its broad type label —
            # label_entities('zen_X_cabinet') must resolve on single-instance installs
            - label: "Zen Household Cabinet"
              entity: "sensor.zenos_default_household_cabinet"
            - label: "Zen Family Cabinet"
              entity: "sensor.zenos_default_family_cabinet"
            - label: "Zen User Cabinet"
              entity: "sensor.zenos_default_user_cabinet"
            - label: "Zen AI User Cabinet"
              entity: "sensor.zenos_default_ai_user_cabinet"

      # Step 1: Assign parent 'Zen Cabinet' label to all default entities
      - repeat:
          for_each: "{{ slot_to_entity.values() | list }}"
          sequence:
            - action: homeassistant.add_label_to_entity
              data:
                label_id: "{{ parent_label | slugify }}"
                entity_id: "{{ repeat.item }}"

      # Step 2: Assign slot-specific labels to their entities
      - repeat:
          for_each: "{{ slot_to_entity.keys() | list }}"
          sequence:
            - variables:
                slot: "{{ repeat.item }}"
                label_name: "{{ slot_to_label[slot] | default('') }}"
                entity_id: "{{ slot_to_entity[slot] }}"
            - choose:
                - conditions: "{{ label_name != '' }}"
                  sequence:
                    - action: homeassistant.add_label_to_entity
                      data:
                        label_id: "{{ label_name | slugify }}"
                        entity_id: "{{ entity_id }}"

      # Step 3: Assign broad labels to their default cabinet entities
      - repeat:
          for_each: "{{ broad_labels }}"
          sequence:
            - action: homeassistant.add_label_to_entity
              data:
                label_id: "{{ repeat.item.label | slugify }}"
                entity_id: "{{ repeat.item.entity }}"

      - event: flynn_stepgate_event
        event_data:
          gate: 1
          action: labels_assigned
          timestamp: "{{ now().isoformat() }}"

  #############################################################################
  # FLYNN: INITIALIZE CABINETS
  # Reads missing_cabinets from cabinet health sensor.
  # For each missing required slot, calls CabinetAdmin initialize.
  #############################################################################
  flynn_initialize_cabinets:
    alias: "Flynn: Initialize Required Cabinets"
    mode: single
    sequence:
      - variables:
          raw_missing: "{{ state_attr('sensor.zen_cabinet_health', 'missing_cabinets') }}"
          missing_list: >-
            {% if raw_missing is string and raw_missing != 'none' %}
              {{ raw_missing.split(', ') | map('trim') | list }}
            {% elif raw_missing is iterable and raw_missing is not string %}
              {{ raw_missing | list }}
            {% else %}
              []
            {% endif %}
          slot_to_entity_raw: "{{ state_attr('sensor.zen_cabinet_health', 'slot_to_default_entity') }}"
          slot_to_entity: "{{ slot_to_entity_raw if slot_to_entity_raw is mapping else (slot_to_entity_raw | from_json if slot_to_entity_raw is string else {}) }}"
          # Slot → CabinetAdmin cabinet_type mapping
          slot_to_type:
            system: "System Cabinet"
            dojo: "Dojo Cabinet"
            kata: "Kata Cabinet"
            default_household: "Household Cabinet"
            default_family: "Family Cabinet"
            default_user: "User Cabinet"
            default_ai_user: "AI User Cabinet"
            history: "History Cabinet"
            index: "Index Cabinet"

      - repeat:
          for_each: "{{ missing_list }}"
          sequence:
            - variables:
                slot: "{{ repeat.item | trim }}"
                entity_id: "{{ slot_to_entity.get(slot, '') }}"
                cabinet_type: "{{ slot_to_type.get(slot, 'AI Data Storage Cabinet') }}"
            - choose:
                - conditions: "{{ entity_id != '' }}"
                  sequence:
                    - action: script.zen_admintools_cabinetadmin
                      data:
                        mode: initialize
                        confirm_action: true
                        cabinet_entity: "{{ entity_id }}"
                        cabinet_type: "{{ cabinet_type }}"
                        skip_auto_init: true

      - event: flynn_stepgate_event
        event_data:
          gate: 2
          action: cabinets_initialized
          missing: "{{ missing_list }}"
          timestamp: "{{ now().isoformat() }}"

  #############################################################################
  # FLYNN: BOOTSTRAP CONTENT
  # Validates conversation agent FIRST — no partial bootstrap.
  # Stamps config values, triggers prompt loader, writes _onboarding flag.
  #############################################################################
  flynn_bootstrap_content:
    alias: "Flynn: Bootstrap Content"
    mode: single
    fields:
      conversation_agent_entity:
        name: Conversation Agent Entity
        description: "Entity ID of the conversation agent (e.g., conversation.xxx)"
        default: ""
        selector:
          entity:
            filter:
              domain: conversation
      household_name:
        name: Household Name
        default: ""
        selector:
          text:
      primary_user:
        name: Primary User
        default: ""
        selector:
          entity:
            filter:
              domain: person
      persona_name:
        name: Persona Name
        default: ""
        selector:
          text:
    sequence:
      - variables:
          agent: "{{ conversation_agent_entity | default('') }}"

      # VALIDATE CONVERSATION AGENT FIRST
      - choose:
          - conditions: "{{ agent == '' or states(agent) in ['unavailable', 'unknown'] or states[agent] is none }}"
            sequence:
              - action: persistent_notification.create
                data:
                  title: "ZenOS-AI: Conversation Agent Required"
                  message: >
                    Flynn here. I need a working conversation agent to finish
                    bootstrap. Go to Settings > Devices & Services > Helpers
                    and set the 'ZenOS: Conversation Agent' helper to your
                    conversation agent entity ID (e.g., conversation.your_agent).
                    The other 3 ZenOS helpers (Household Name, Primary User,
                    Persona Name) should be filled in too. Then restart HA.
                  notification_id: flynn_agent_required
              - stop: "Gate 3: Conversation agent invalid or missing"

      # Agent valid — dismiss any prior warning
      - action: persistent_notification.dismiss
        data:
          notification_id: flynn_agent_required

      # Resolve reasoning task entity — auto-select if unset
      # Uses validated agent as fallback; requires explicit config if multiple agents found
      - variables:
          _rt_current: "{{ states('input_text.zenos_reasoning_task') | trim }}"
          _rt_all: "{{ states.conversation | map(attribute='entity_id') | list }}"
          _rt_auto: "{{ _rt_all | first if _rt_all | count == 1 else '' }}"
          _rt_resolved: >-
            {{ _rt_current if _rt_current not in ['','unknown','unavailable']
               else (_rt_auto if _rt_auto != '' else agent) }}

      - if: "{{ _rt_current in ['','unknown','unavailable'] }}"
        then:
          - if: "{{ _rt_resolved == '' }}"
            then:
              - action: persistent_notification.create
                data:
                  title: "ZenOS-AI: Reasoning Task Required"
                  message: >
                    Flynn here. Multiple conversation agents found and none is
                    configured as the reasoning task. Go to Settings > Helpers
                    and set 'ZenOS: Reasoning Task' to your preferred
                    conversation agent entity ID, then restart HA.
                  notification_id: flynn_reasoning_task_required
              - stop: "Gate 3: Reasoning task unresolvable — multiple agents"
                error: true
            else:
              - action: input_text.set_value
                target:
                  entity_id: input_text.zenos_reasoning_task
                data:
                  value: "{{ _rt_resolved }}"
              - action: persistent_notification.dismiss
                data:
                  notification_id: flynn_reasoning_task_required

      # Resolve AI task entity — auto-select if unset
      # 0 found: warn (non-fatal — summarizer will fail gracefully)
      # 1 found: auto-write
      # multiple found: require explicit config, stop
      - variables:
          _at_current: "{{ states('input_text.zenos_ai_task_entity') | trim }}"
          _at_all: "{{ states.ai_task | map(attribute='entity_id') | list }}"
          _at_auto: "{{ _at_all | first if _at_all | count == 1 else '' }}"

      - if: "{{ _at_current in ['','unknown','unavailable'] }}"
        then:
          - if: "{{ _at_all | count == 0 }}"
            then:
              - action: persistent_notification.create
                data:
                  title: "ZenOS-AI: AI Task Entity Not Found"
                  message: >
                    Flynn here. No ai_task entities found on this system.
                    The AI summarizer requires one. Install an AI provider
                    integration (e.g. OpenAI, Google AI) that exposes an
                    ai_task entity, then restart HA.
                  notification_id: flynn_ai_task_missing
            else:
              - if: "{{ _at_auto == '' }}"
                then:
                  - action: persistent_notification.create
                    data:
                      title: "ZenOS-AI: AI Task Entity Required"
                      message: >
                        Flynn here. Multiple ai_task entities found and none is
                        configured. Go to Settings > Helpers and set
                        'ZenOS: AI Task Entity' to your preferred ai_task
                        entity ID, then restart HA.
                      notification_id: flynn_ai_task_required
                  - stop: "Gate 3: AI task entity ambiguous — multiple found"
                    error: true
                else:
                  - action: input_text.set_value
                    target:
                      entity_id: input_text.zenos_ai_task_entity
                    data:
                      value: "{{ _at_auto }}"
                  - action: persistent_notification.dismiss
                    data:
                      notification_id: flynn_ai_task_required
                  - action: persistent_notification.dismiss
                    data:
                      notification_id: flynn_ai_task_missing
        else:
          - action: persistent_notification.dismiss
            data:
              notification_id: flynn_ai_task_required
          - action: persistent_notification.dismiss
            data:
              notification_id: flynn_ai_task_missing

      # Stamp config values into cabinets via FileCabinet
      # force_action: false — only write if drawer is empty; never overwrite existing AI config
      - choose:
          - conditions: "{{ household_name | default('') != '' }}"
            sequence:
              - action: script.zen_dojotools_filecabinet
                data:
                  action_type: create
                  force_action: false
                  set_timestamp: true
                  show_hidden_volumes: false
                  volume_entity_id:
                    - "{{ label_entities('zen_default_household_cabinet') | select('match', 'sensor.') | first | default('') }}"
                  key: "_household_name"
                  value: "{{ household_name }}"

      - choose:
          - conditions: "{{ persona_name | default('') != '' }}"
            sequence:
              - action: script.zen_dojotools_filecabinet
                data:
                  action_type: create
                  force_action: false
                  set_timestamp: true
                  show_hidden_volumes: false
                  volume_entity_id:
                    - "{{ label_entities('zen_default_ai_user_cabinet') | select('match', 'sensor.') | first | default('') }}"
                  key: "zenai_essence"
                  value: >-
                    {% import 'zenos_ai/zen_os_1rc.jinja' as zen %}
                    {% set defaults = zen.essence_defaults() | from_json %}
                    {{ defaults | combine({'identity': defaults.get('identity',{}) | combine({'name': persona_name})}) | tojson }}

      # Write default essence seed if AI user cab has no persona name yet.
      # Uses essence_defaults() — name stays 'your AI' so Gate 3.5 OOBE fires.
      - variables:
          _seed_ai_cab: >-
            {{ label_entities('zen_default_ai_user_cabinet')
               | select('match', 'sensor.') | list | first | default('') }}
          _seed_cab_vars: >-
            {{ state_attr(_seed_ai_cab, 'variables') | default({}, true)
               if _seed_ai_cab != '' else {} }}
          _seed_essence_raw: "{{ _seed_cab_vars.get('zenai_essence', {}) }}"
          _seed_essence_val: >-
            {{ _seed_essence_raw.get('value', _seed_essence_raw)
               if _seed_essence_raw is mapping else {} }}
          _seed_name: >-
            {{ (_seed_essence_val.get('identity', {}).get('name', '') | trim)
               if _seed_essence_val is mapping else '' }}
      - choose:
          - conditions: "{{ _seed_ai_cab != '' and _seed_name == '' }}"
            sequence:
              - action: script.zen_dojotools_filecabinet
                data:
                  action_type: create
                  force_action: false
                  set_timestamp: true
                  show_hidden_volumes: false
                  volume_entity_id:
                    - "{{ _seed_ai_cab }}"
                  key: zenai_essence
                  value: >-
                    {% import 'zenos_ai/zen_os_1rc.jinja' as zen %}
                    {{ zen.essence_defaults() }}

      # Press zen_template (Kata) and kfc_template (Dojo) if either is missing
      - variables:
          _b3_kata_cab: >-
            {{ label_entities('Zen Kata Cabinet')
               | select('match', 'sensor.') | list | first | default('') }}
          _b3_dojo_cab: >-
            {{ label_entities('Zen Dojo Cabinet')
               | select('match', 'sensor.') | list | first | default('') }}
          _b3_has_zen_template: >-
            {{ 'zen_template' in (state_attr(_b3_kata_cab, 'variables') | default({}, true))
               if _b3_kata_cab != '' else false }}
          _b3_has_kfc_template: >-
            {{ 'kfc_template' in (state_attr(_b3_dojo_cab, 'variables') | default({}, true))
               if _b3_dojo_cab != '' else false }}
      - if: "{{ not _b3_has_zen_template or not _b3_has_kfc_template }}"
        then:
          - action: script.zen_admintools_reset_template
            data: {}

      # Trigger prompt loader to stamp purpose/directives/cortex
      - action: script.zen_admintools_zenos_prompt_loader
        data: {}

      # Write _onboarding flag
      - action: script.flynn_unified_engine
        data:
          action_type: flag_complete

      - event: flynn_stepgate_event
        event_data:
          gate: 3
          action: bootstrap_complete
          timestamp: "{{ now().isoformat() }}"


###############################################################################
# UNIFIED ENGINE (ONBOARDING Q&A)
###############################################################################
  flynn_unified_engine:
    alias: "Flynn: Unified Engine"
    mode: parallel
    max: 20

    fields:
      action_type:
        name: Flynn Action
        selector:
          select:
            options:
              - schema_new
              - schema_load
              - flag_complete
              - flag_reset
              - answer_store
              - answer_clear
              - drawer_set
              - drawer_get
        default: schema_load

      drawer:
        name: Drawer
        default: ""
      key:
        name: Key
        default: ""
      value:
        name: Value
        default: ""

    sequence:

      #########################################################################
      # 1 — STANDARD VARIABLE LOADING
      #########################################################################
      - variables:
          act: "{{ action_type }}"
          sys_cab: "{{ states('sensor.zen_default_user_cabinet') }}"
          onboarding_root: "{{ state_attr('sensor.flynn_onboarding','value') or {} }}"
          drawers: "{{ onboarding_root.get('drawers',{}) }}"
          now_ts: "{{ now().isoformat() }}"
          effective_drawer: "{{ drawer | default('global') }}"
          effective_key: "{{ key | default('value') }}"
          safe_value: "{{ value }}"

      #########################################################################
      # 2 — SCHEMA_NEW
      #########################################################################
      - choose:
          - conditions: "{{ act == 'schema_new' }}"
            sequence:
              - variables:
                  new_schema_json: >-
                    {{
                      {
                        "meta":{
                          "created": now_ts,
                          "version": 1
                        },
                        "tree": {
                          "intro": {
                            "required": true,
                            "next": "name"
                          },
                          "name": {
                            "required": true,
                            "next": "complete"
                          },
                          "complete": {
                            "required": false
                          }
                        }
                      } | tojson
                    }}

              - service: script.zen_dojotools_filecabinet
                data:
                  action_type: create
                  set_timestamp: true
                  show_hidden_volumes: false
                  force_action: true
                  volume_entity_id:
                    - "{{ sys_cab }}"
                  key: "_onboarding_schema"
                  value: "{{ new_schema_json }}"
                  label_input: "Flynn Onboarding Schema"

              - event: flynn_onboarding_updated
                event_data:
                  type: schema_new
                  timestamp: "{{ now_ts }}"

              - stop: "Schema created"

      #########################################################################
      # 3 — SCHEMA_LOAD
      #########################################################################
          - conditions: "{{ act == 'schema_load' }}"
            sequence:

              - variables:
                  schema: "{{ state_attr('sensor.flynn_onboarding_schema','value') or {} }}"
                  schema_json: >-
                    {{
                      dict(meta=schema.get('meta', {}))
                        | combine(schema.get('tree', {}), recursive=true)
                        | tojson
                    }}

              - choose:
                  - conditions: "{{ schema is mapping }}"
                    sequence:
                      - service: script.zen_dojotools_filecabinet
                        data:
                          action_type: create
                          set_timestamp: true
                          show_hidden_volumes: false
                          force_action: true
                          volume_entity_id:
                            - "{{ sys_cab }}"
                          key: "_onboarding"
                          value: "{{ schema_json }}"
                          label_input: "Flynn Onboarding"

              - stop: "Schema loaded"

      #########################################################################
      # 4 — FLAG_COMPLETE
      #########################################################################
          - conditions: "{{ act == 'flag_complete' }}"
            sequence:

              - variables:
                  updated: >-
                    {{
                      onboarding_root
                      | combine({"complete": now_ts}, recursive=True)
                      | tojson
                    }}

              - service: script.zen_dojotools_filecabinet
                data:
                  action_type: update
                  force_action: true
                  set_timestamp: true
                  show_hidden_volumes: false
                  volume_entity_id:
                    - "{{ sys_cab }}"
                  key: "_onboarding"
                  value: "{{ updated }}"
                  label_input: "Flynn Onboarding"

              - event: flynn_onboarding_updated
                event_data:
                  type: flag_complete
                  timestamp: "{{ now_ts }}"

              - stop: "Flagged complete"

      #########################################################################
      # 5 — FLAG_RESET
      #########################################################################
          - conditions: "{{ act == 'flag_reset' }}"
            sequence:

              - variables:
                  reset_payload: "{{ {'complete': None, 'drawers':{}} | tojson }}"

              - service: script.zen_dojotools_filecabinet
                data:
                  action_type: update
                  set_timestamp: true
                  force_action: true
                  show_hidden_volumes: false
                  volume_entity_id:
                    - "{{ sys_cab }}"
                  key: "_onboarding"
                  value: "{{ reset_payload }}"
                  label_input: "Flynn Onboarding"

              - event: flynn_onboarding_updated
                event_data:
                  type: flag_reset
                  timestamp: "{{ now_ts }}"

              - stop: "Onboarding reset"

      #########################################################################
      # 6 — ANSWER_STORE
      #########################################################################
          - conditions: "{{ act == 'answer_store' }}"
            sequence:

              - variables:
                  updated_json: >-
                    {{
                      onboarding_root
                      | combine({
                          "drawers":{
                            effective_drawer:{
                              effective_key: safe_value
                            }
                          }
                        }, recursive=True)
                      | tojson
                    }}

              - service: script.zen_dojotools_filecabinet
                data:
                  action_type: update
                  force_action: true
                  show_hidden_volumes: false
                  set_timestamp: true
                  volume_entity_id:
                    - "{{ sys_cab }}"
                  key: "_onboarding"
                  value: "{{ updated_json }}"
                  label_input: "Flynn Onboarding"

              - event: flynn_onboarding_updated
                event_data:
                  type: answer_store
                  drawer: "{{ effective_drawer }}"
                  key: "{{ effective_key }}"
                  timestamp: "{{ now_ts }}"

              - stop: "Answer stored"

      #########################################################################
      # 7 — ANSWER_CLEAR
      #########################################################################
          - conditions: "{{ act == 'answer_clear' }}"
            sequence:

              - variables:
                  cleared: >-
                    {{
                      onboarding_root
                      | combine({
                          "drawers":{
                            effective_drawer:{}
                          }
                        }, recursive=True)
                      | tojson
                    }}

              - service: script.zen_dojotools_filecabinet
                data:
                  action_type: update
                  set_timestamp: true
                  show_hidden_volumes: false
                  force_action: true
                  volume_entity_id:
                    - "{{ sys_cab }}"
                  key: "_onboarding"
                  value: "{{ cleared }}"
                  label_input: "Flynn Onboarding"

              - event: flynn_onboarding_updated
                event_data:
                  type: answer_clear
                  drawer: "{{ effective_drawer }}"
                  timestamp: "{{ now_ts }}"

              - stop: "Answer cleared"

      #########################################################################
      # 8 — DRAWER_SET
      #########################################################################
          - conditions: "{{ act == 'drawer_set' }}"
            sequence:

              - variables:
                  updated_json: >-
                    {{
                      onboarding_root
                      | combine({
                          "drawers":{
                            effective_drawer:{
                              effective_key: safe_value
                            }
                          }
                        }, recursive=True)
                      | tojson
                    }}

              - service: script.zen_dojotools_filecabinet
                data:
                  action_type: update
                  set_timestamp: true
                  show_hidden_volumes: false
                  force_action: true
                  volume_entity_id:
                    - "{{ sys_cab }}"
                  key: "_onboarding"
                  value: "{{ updated_json }}"
                  label_input: "Flynn Onboarding"

              - event: flynn_onboarding_updated
                event_data:
                  type: drawer_set
                  drawer: "{{ effective_drawer }}"
                  key: "{{ effective_key }}"
                  timestamp: "{{ now_ts }}"

              - stop: "Drawer updated"

      #########################################################################
      # 9 — DRAWER_GET (NOP — just return vars)
      #########################################################################
          - conditions: "{{ act == 'drawer_get' }}"
            sequence:
              - stop: "Drawer get complete"

      #########################################################################
      # DEFAULT / FALLBACK
      #########################################################################
      - stop: "Flynn: No matching action"


###############################################################################
# AGENT BUILDER — DojoTool pattern, semaphore-gated help
# Guides Flynn through initial household/agent configuration.
# First call always shows help (stamps _flynn_builder_ack) so it auto-fires
# exactly once. All writes are non-destructive: skip if already set.
###############################################################################
  flynn_build_agent:
    alias: "Flynn: Agent Builder"
    description: >
      Flynn Agent Builder (1.0.0). Configure household name, primary user, agent
      name, and family members into the AI user and household cabinets.
      First call always shows help with Flynn's user conversation script
      pre-filled with current state. All writes non-destructive.
    mode: queued
    max: 2

    fields:
      mode:
        name: Mode
        description: "help = setup instructions (auto on first call). build = write fields. status = show current state. oobe = full home onboarding protocol."
        default: help
        selector:
          select:
            options:
              - help
              - build
              - status
              - oobe

      household_name:
        name: Household Name
        description: "Your household name (e.g. 'The Curtis House'). Non-destructive."
        default: ""
        selector:
          text:

      persona_name:
        name: Agent Name
        description: "Your AI assistant's name. Written to essence identity.name. Non-destructive."
        default: ""
        selector:
          text:

      primary_user:
        name: Primary User
        description: "Primary household member display name. Written to essence identity.primary_user. Non-destructive."
        default: ""
        selector:
          text:

      family_members:
        name: Family Members (JSON)
        description: "JSON list e.g. [{\"name\": \"Kim\", \"role\": \"partner\"}]. Written to zenai_family. Skipped if key already exists."
        default: "[]"
        selector:
          text:

    sequence:

      #########################################################################
      # 1 — LOAD CURRENT STATE
      #########################################################################
      - variables:
          ai_cab: >-
            {{ label_entities('zen_default_ai_user_cabinet')
               | select('match', 'sensor.') | list | first | default('') }}
          hh_cab: >-
            {{ label_entities('zen_default_household_cabinet')
               | select('match', 'sensor.') | list | first | default('') }}
          ai_cab_vars: >-
            {{ state_attr(ai_cab, 'variables') | default({}, true)
               if ai_cab != '' else {} }}
          hh_cab_vars: >-
            {{ state_attr(hh_cab, 'variables') | default({}, true)
               if hh_cab != '' else {} }}
          essence_raw: "{{ ai_cab_vars.get('zenai_essence', {}) }}"
          essence_val: >-
            {{ essence_raw.get('value', essence_raw)
               if essence_raw is mapping else {} }}
          identity: "{{ essence_val.get('identity', {}) }}"
          has_ack: "{{ '_flynn_builder_ack' in ai_cab_vars }}"
          effective_mode: "{{ 'help' if (not has_ack and mode | default('help') != 'oobe') else mode | default('help') }}"
          cur_persona: "{{ identity.get('name', '') | trim }}"
          cur_hh_raw: "{{ hh_cab_vars.get('_household_name', '') }}"
          cur_household: >-
            {{ cur_hh_raw.get('value', cur_hh_raw) | trim
               if cur_hh_raw is mapping else cur_hh_raw | trim }}
          cur_primary_user: "{{ identity.get('primary_user', '') | trim }}"

      #########################################################################
      # 2 — DISPATCH
      #########################################################################
      - choose:

          #####################################################################
          # HELP — auto-fires on first call; stamps ack so it only fires once
          #####################################################################
          - conditions: "{{ effective_mode == 'help' }}"
            sequence:

              # Stamp the ack on first call so help doesn't auto-fire again.
              # Instructions for clearing this gate are ONLY in this help output.
              - choose:
                  - conditions: "{{ not has_ack }}"
                    sequence:
                      - action: script.zen_dojotools_filecabinet
                        data:
                          action_type: create
                          force_action: true
                          set_timestamp: true
                          show_hidden_volumes: false
                          volume_entity_id:
                            - "{{ ai_cab }}"
                          key: "_flynn_builder_ack"
                          value: "seen"

              - variables:
                  help_json: >-
                    {{
                      {
                        "status": "info",
                        "tool": "flynn_build_agent",
                        "version": "1.0.0",
                        "message": "Flynn Agent Builder. I've logged that you've read this briefing — it won't auto-fire again. Use mode: build to configure.",
                        "current_state": {
                          "persona_name": cur_persona if cur_persona != '' else "(not set)",
                          "household_name": cur_household if cur_household != '' else "(not set)",
                          "primary_user": cur_primary_user if cur_primary_user != '' else "(not set)"
                        },
                        "fields": {
                          "household_name": "Household name. Skipped if already set.",
                          "persona_name": "Agent name (essence identity.name). Skipped if already set.",
                          "primary_user": "Primary user name (essence identity.primary_user). Skipped if already set.",
                          "family_members": "JSON list [{\"name\": \"Kim\", \"role\": \"partner\"}]. Skipped if zenai_family key exists."
                        },
                        "user_script": {
                          "role": "You are Flynn. Walk the user through these questions, then call mode: build with their answers.",
                          "questions": [
                            "What would you like to call your home? (e.g. 'The Curtis House', 'Casa Garcia')",
                            "What's your name? You're the main person I'll be working with.",
                            "What do you want to name your AI assistant?",
                            "Who else lives here? Give me names and how they're connected — partner, kids, housemates, whatever applies."
                          ],
                          "when_done": "Call this tool with mode: build and the field values filled in. I'll only write what's missing and confirm what was set."
                        }
                      } | tojson
                    }}

              - stop: Return help
                response_variable: help_json

          #####################################################################
          # STATUS — read-only, no writes
          #####################################################################
          - conditions: "{{ effective_mode == 'status' }}"
            sequence:
              - variables:
                  status_json: >-
                    {{
                      {
                        "status": "ok",
                        "tool": "flynn_build_agent",
                        "current_state": {
                          "persona_name": cur_persona if cur_persona != '' else "(not set)",
                          "household_name": cur_household if cur_household != '' else "(not set)",
                          "primary_user": cur_primary_user if cur_primary_user != '' else "(not set)"
                        },
                        "ready": cur_persona != '' and cur_household != '' and cur_primary_user != ''
                      } | tojson
                    }}
              - stop: Return status
                response_variable: status_json

          #####################################################################
          # OOBE — relay full onboarding protocol from zen_flynn_oobe
          #####################################################################
          - conditions: "{{ effective_mode == 'oobe' }}"
            sequence:
              - action: script.zen_flynn_oobe
                data:
                  mode: run
                response_variable: _oobe_result
              - variables:
                  oobe_json: "{{ _oobe_result | tojson }}"
              - stop: Return OOBE protocol
                response_variable: oobe_json

          #####################################################################
          # BUILD — non-destructive field writes
          #####################################################################
          - conditions: "{{ effective_mode == 'build' }}"
            sequence:

              - variables:
                  in_hn: "{{ household_name | default('') | trim }}"
                  in_pn: "{{ persona_name | default('') | trim }}"
                  in_pu: "{{ primary_user | default('') | trim }}"
                  in_fam: "{{ family_members | default('[]') | trim }}"
                  do_household: "{{ in_hn != '' and cur_household == '' }}"
                  do_persona: "{{ in_pn != '' and cur_persona == '' }}"
                  do_primary_user: "{{ in_pu != '' and cur_primary_user == '' }}"
                  do_family: >-
                    {{ in_fam not in ['[]', '', 'null']
                       and 'zenai_family' not in ai_cab_vars }}
                  # Build merged identity and essence in one pass to avoid double-write
                  new_identity: >-
                    {{
                      identity
                      | combine({'name': in_pn} if (in_pn != '' and cur_persona == '') else {})
                      | combine({'primary_user': in_pu} if (in_pu != '' and cur_primary_user == '') else {})
                    }}
                  new_essence_json: >-
                    {{
                      (essence_val | combine({'identity': new_identity}) | tojson)
                      if (in_pn != '' and cur_persona == '') or (in_pu != '' and cur_primary_user == '')
                      else ''
                    }}

              # Household name → household cabinet
              - choose:
                  - conditions: "{{ do_household }}"
                    sequence:
                      - action: script.zen_dojotools_filecabinet
                        data:
                          action_type: create
                          force_action: true
                          set_timestamp: true
                          show_hidden_volumes: false
                          volume_entity_id:
                            - "{{ hh_cab }}"
                          key: "_household_name"
                          value: "{{ in_hn }}"

              # Persona name + primary user → AI user cabinet essence (one write, both fields)
              - choose:
                  - conditions: "{{ new_essence_json != '' }}"
                    sequence:
                      - action: script.zen_dojotools_filecabinet
                        data:
                          action_type: create
                          force_action: true
                          set_timestamp: true
                          show_hidden_volumes: false
                          volume_entity_id:
                            - "{{ ai_cab }}"
                          key: "zenai_essence"
                          value: "{{ new_essence_json }}"

              # Family members → AI user cabinet (only if zenai_family key absent)
              - choose:
                  - conditions: "{{ do_family }}"
                    sequence:
                      - action: script.zen_dojotools_filecabinet
                        data:
                          action_type: create
                          force_action: true
                          set_timestamp: true
                          show_hidden_volumes: false
                          volume_entity_id:
                            - "{{ ai_cab }}"
                          key: "zenai_family"
                          value: "{{ in_fam | from_json | tojson }}"

              - variables:
                  build_result: >-
                    {{
                      {
                        "status": "ok",
                        "tool": "flynn_build_agent",
                        "wrote": {
                          "household_name": do_household,
                          "persona_name": do_persona,
                          "primary_user": do_primary_user,
                          "family": do_family
                        },
                        "note": "Fields with wrote: false were already set or not provided."
                      } | tojson
                    }}

              - stop: Build complete
                response_variable: build_result

      #########################################################################
      # DEFAULT FALLBACK
      #########################################################################
      - stop: "Flynn Build Agent: no matching mode"
