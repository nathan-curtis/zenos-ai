template:
  - sensor:
      - name: "RoomState Living Room"
        unique_id: roomstate_living_room
        state: >
          {{ this.attributes.rollup | default('unknown') }}
        attributes:

          # --------------------------------------------------------------------
          # Motion driver entities (label intersect)
          # --------------------------------------------------------------------
          motion_entities: >
            {{ expand(label_entities('living_room')
              | select('in', label_entities('motion_detection')))
              | map(attribute='entity_id') | list }}

          occupancy_entities: >
            {{ expand(label_entities('living_room')
              | select('in', label_entities('occupancy')))
              | map(attribute='entity_id') | list }}

          sleep_entities: >
            {{ expand(label_entities('living_room')
              | select('in', label_entities('asleep')))
              | map(attribute='entity_id') | list }}

          door_entities: >
            {{ expand(label_entities('living_room')
              | select('in', label_entities('door')))
              | map(attribute='entity_id') | list }}

          window_entities: >
            {{ expand(label_entities('living_room')
              | select('in', label_entities('window')))
              | map(attribute='entity_id') | list }}

          climate_entities: >
            {{ expand(label_entities('living_room')
              | select('in', label_entities('climate')))
              | map(attribute='entity_id') | list }}

          # --------------------------------------------------------------------
          # Derived motion signals
          # --------------------------------------------------------------------
          motion_active: >
            {{
              states
              | selectattr('entity_id','in', this.attributes.motion_entities)
              | selectattr('state','eq','on')
              | list
              | count > 0
            }}

          last_motion_age: >
            {% set ents = this.attributes.motion_entities %}
            {% set oldest = 999999 %}
            {% for e in ents %}
              {% if states[e] is defined and states[e].last_changed %}
                {% set age = (now() - states[e].last_changed).total_seconds() %}
                {% if age < oldest %}
                  {% set oldest = age %}
                {% endif %}
              {% endif %}
            {% endfor %}
            {{ oldest }}

          # --------------------------------------------------------------------
          # Occupancy / sleep gating (also helper-free)
          # --------------------------------------------------------------------
          occupied: >
            {{
              states
              | selectattr('entity_id','in', this.attributes.occupancy_entities)
              | selectattr('state','eq','on')
              | list
              | count > 0
            }}

          asleep: >
            {{
              states
              | selectattr('entity_id','in', this.attributes.sleep_entities)
              | selectattr('state','eq','on')
              | list
              | count > 0
            }}

          # --------------------------------------------------------------------
          # Wasp heuristic (helper free)
          # --------------------------------------------------------------------
          wasp_flag: >
            {{
              (this.attributes.motion_active == false)
              and (this.attributes.last_motion_age > 1800)
              and (this.attributes.occupied == false)
            }}

          # --------------------------------------------------------------------
          # Override (only if it exists, safe evaluation)
          # --------------------------------------------------------------------
          override: >
            {{
              states('input_boolean.living_room_override')
              if 'input_boolean.living_room_override' in states
              else false
            }}

          # --------------------------------------------------------------------
          # Dark detection (exists in your system)
          # --------------------------------------------------------------------
          dark: >
            {{ states('sun.sun') == 'below_horizon' }}

          # --------------------------------------------------------------------
          # Final rollup state (pulled from rollup sensor)
          # --------------------------------------------------------------------
          rollup: "{{ state_attr('sensor.roomstate_living_room_rollup', 'state') }}"

  - sensor:
      - name: "RoomState Living Room Rollup"
        unique_id: roomstate_living_room_rollup
        state: >
          {% set a = states['sensor.roomstate_living_room'].attributes if states['sensor.roomstate_living_room'] is defined else {} %}
          {% if not a %} unknown
          {% elif a.override %} override
          {% elif a.asleep %} asleep
          {% elif a.occupied %} occupied
          {% elif a.motion_active %} active
          {% elif a.wasp_flag %} wasp
          {% elif a.dark %} idle_dark
          {% else %} inactive
          {% endif %}
