template:
  - trigger:
      - alias: "Update AI image on Zen image_generated event"
        trigger: event
        event_type: zen_event
        event_data:
          event:
            kind: image_generated

    image:
      - name: "Zen AI Generated Image"
        unique_id: zen_ai_generated_image
        url: >-
          {% set ms = trigger.event.data.event.metadata.media_source_id %}
          {{ "http://localhost:8123/ms," ~ ( ms | urlencode() ) }}