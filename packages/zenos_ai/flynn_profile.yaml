###############################################################################
# FLYNN PROFILE MANAGER (v4.0.0 RC2)
#
# Script: zen_flynn_profile
#   Universal read/write for ZenOS identity cabinets.
#   Targets: ai_user | household | user | family
#   Defaults to zen_default_{type}_cabinet when no target given.
#   mode: read  — returns flattened current profile fields
#   mode: write — leaf-level patch, non-destructive by default (force to overwrite)
#
# Leaf merge strategy (ai_user / essence):
#   Each essence section (identity, voice, archetype, etc.) is patched
#   independently — changing voice.tone never touches voice.style.
#   essence_patch (JSON) deep-merges anything not covered by named fields.
###############################################################################

script:

  zen_flynn_profile:
    alias: "Flynn: Profile Manager"
    description: >
      Read or write identity profile fields for any ZenOS cabinet type.
      mode: read returns the current flattened profile.
      mode: write does a leaf-level patch (non-destructive unless force: true).
    mode: queued
    max: 5

    fields:

      mode:
        name: Mode
        description: "read = show current profile. write = patch fields."
        default: read
        selector:
          select:
            options: [read, write]

      target_type:
        name: Target Type
        description: "ai_user | household | user | family. Defaults to ai_user."
        default: ai_user
        selector:
          select:
            options: [ai_user, household, user, family]

      target:
        name: Target Entity
        description: "Specific cabinet sensor entity ID. Omit to use the default cabinet for target_type."
        default: ""
        selector:
          entity:
            filter:
              domain: sensor

      force:
        name: Force Overwrite
        description: "true = overwrite existing values. false (default) = skip fields already set."
        default: false
        selector:
          boolean:

      # ── ai_user fields ──────────────────────────────────────────────────
      persona_name:
        name: Persona Name
        description: "identity.name"
        default: ""
        selector:
          text:

      primary_user:
        name: Primary User
        description: "identity.primary_user"
        default: ""
        selector:
          text:

      pronouns:
        name: Pronouns
        description: "identity.pronouns"
        default: ""
        selector:
          text:

      motif:
        name: Motif
        description: "identity.motif — core personality note"
        default: ""
        selector:
          text:

      vibe:
        name: Vibe
        description: "archetype.vibe"
        default: ""
        selector:
          text:

      voice_tone:
        name: Voice Tone
        description: "voice.tone"
        default: ""
        selector:
          text:

      voice_style:
        name: Voice Style
        description: "voice.style"
        default: ""
        selector:
          text:

      humor:
        name: Humor
        description: "culture.humor"
        default: ""
        selector:
          text:

      selfie:
        name: Selfie
        description: "visuals.selfie — visual self-description"
        default: ""
        selector:
          text:

      familiar_name:
        name: Familiar Name
        description: "familiar.name — companion name"
        default: ""
        selector:
          text:

      familiar_type:
        name: Familiar Type
        description: "familiar.type — companion type (cat, fox, spirit, etc.)"
        default: ""
        selector:
          text:

      familiar_fx:
        name: Familiar FX
        description: "familiar.fx — companion mannerism or effect"
        default: ""
        selector:
          text:

      room:
        name: Room
        description: "environment.room — the AI's space"
        default: ""
        selector:
          text:

      pov:
        name: POV
        description: "pov — narrative perspective (e.g. third-person cinematic)"
        default: ""
        selector:
          text:

      essence_patch:
        name: Essence Patch (JSON)
        description: "Deep-merge JSON for complex fields (furniture[], decor[], music{}, etc.)"
        default: ""
        selector:
          text:

      # ── household fields ─────────────────────────────────────────────────
      household_name:
        name: Household Name
        default: ""
        selector:
          text:

      address:
        name: Street Address
        default: ""
        selector:
          text:

      city:
        name: City
        default: ""
        selector:
          text:

      state:
        name: State / Region
        default: ""
        selector:
          text:

      zip:
        name: ZIP / Postal Code
        default: ""
        selector:
          text:

      country:
        name: Country
        default: ""
        selector:
          text:

      phone:
        name: Phone
        description: "Household landline or primary contact number"
        default: ""
        selector:
          text:

      # ── user / family fields ─────────────────────────────────────────────
      name:
        name: Display Name
        description: "_user_profile.name"
        default: ""
        selector:
          text:

      first_name:
        name: First Name
        default: ""
        selector:
          text:

      last_name:
        name: Last Name
        default: ""
        selector:
          text:

      preferred_name:
        name: Preferred Name / Goes By
        default: ""
        selector:
          text:

      role:
        name: Role
        description: "e.g. head_of_household, partner, child, guest"
        default: ""
        selector:
          text:

      email:
        name: Email
        default: ""
        selector:
          text:

      birthday:
        name: Birthday
        default: ""
        selector:
          text:

      preferences:
        name: Preferences (JSON)
        description: "JSON object of user preferences — merged into existing prefs"
        default: ""
        selector:
          text:

    sequence:

      ###########################################################################
      # 1 — RESOLVE TARGET CABINET
      ###########################################################################
      - variables:
          _type:   "{{ target_type | default('ai_user') }}"
          _force:  "{{ force | default(false) | bool }}"
          _mode:   "{{ mode | default('read') }}"
          _explicit: "{{ target | default('') | trim }}"
          _default_target: >-
            {%- if _type == 'ai_user' -%}
              {{ label_entities('zen_default_ai_user_cabinet')
                 | select('match', 'sensor.') | list | first | default('') }}
            {%- elif _type == 'household' -%}
              {{ label_entities('zen_default_household_cabinet')
                 | select('match', 'sensor.') | list | first | default('') }}
            {%- elif _type == 'family' -%}
              {{ label_entities('zen_default_family_cabinet')
                 | select('match', 'sensor.') | list | first | default('') }}
            {%- elif _type == 'user' -%}
              {{ label_entities('zen_default_user_cabinet')
                 | select('match', 'sensor.') | list | first | default('') }}
            {%- else -%}
            {%- endif -%}
          _target: "{{ _explicit if _explicit != '' else _default_target }}"
          _cab_vars: >-
            {{ state_attr(_target, 'variables') | default({}, true)
               if _target != '' else {} }}

      - choose:
          - conditions: "{{ _target == '' }}"
            sequence:
              - variables:
                  final_response:
                    status: error
                    message: "No cabinet resolved for target_type '{{ _type }}'. Ensure the default cabinet is initialized."
              - stop: "Profile: no target resolved"
                response_variable: final_response

      ###########################################################################
      # 2 — READ MODE
      ###########################################################################
      - choose:
          - conditions: "{{ _mode == 'read' }}"
            sequence:
              - variables:
                  _r_profile: >-
                    {%- if _type == 'ai_user' -%}
                      {%- set raw = _cab_vars.get('zenai_essence', {}) -%}
                      {%- set ev  = raw.get('value', raw) if raw is mapping else {} -%}
                      {%- set id  = ev.get('identity', {})     if ev is mapping else {} -%}
                      {%- set ar  = ev.get('archetype', {})    if ev is mapping else {} -%}
                      {%- set vo  = ev.get('voice', {})        if ev is mapping else {} -%}
                      {%- set cu  = ev.get('culture', {})      if ev is mapping else {} -%}
                      {%- set vi  = ev.get('visuals', {})      if ev is mapping else {} -%}
                      {%- set fa  = ev.get('familiar', {})     if ev is mapping else {} -%}
                      {%- set en  = ev.get('environment', {})  if ev is mapping else {} -%}
                      {{ {
                        'persona_name':  id.get('name', ''),
                        'primary_user':  id.get('primary_user', ''),
                        'pronouns':      id.get('pronouns', ''),
                        'motif':         id.get('motif', ''),
                        'vibe':          ar.get('vibe', ''),
                        'voice_tone':    vo.get('tone', ''),
                        'voice_style':   vo.get('style', ''),
                        'humor':         cu.get('humor', ''),
                        'selfie':        vi.get('selfie', ''),
                        'familiar_name': fa.get('name', ''),
                        'familiar_type': fa.get('type', ''),
                        'familiar_fx':   fa.get('fx', ''),
                        'room':          en.get('room', ''),
                        'pov':           ev.get('pov', '')
                      } }}
                    {%- elif _type == 'household' -%}
                      {%- set raw = _cab_vars.get('_household_profile', {}) -%}
                      {%- set pv  = raw.get('value', raw) if raw is mapping else {} -%}
                      {{ {
                        'household_name': pv.get('household_name', ''),
                        'address':        pv.get('address', ''),
                        'city':           pv.get('city', ''),
                        'state':          pv.get('state', ''),
                        'zip':            pv.get('zip', ''),
                        'country':        pv.get('country', ''),
                        'phone':          pv.get('phone', ''),
                        'timezone':       pv.get('timezone', '')
                      } }}
                    {%- else -%}
                      {%- set key = '_user_profile' if _type == 'user' else '_family_profile' -%}
                      {%- set raw = _cab_vars.get(key, {}) -%}
                      {%- set pv  = raw.get('value', raw) if raw is mapping else {} -%}
                      {{ {
                        'name':           pv.get('name', ''),
                        'first_name':     pv.get('first_name', ''),
                        'last_name':      pv.get('last_name', ''),
                        'preferred_name': pv.get('preferred_name', ''),
                        'pronouns':       pv.get('pronouns', ''),
                        'role':           pv.get('role', ''),
                        'phone':          pv.get('phone', ''),
                        'email':          pv.get('email', ''),
                        'birthday':       pv.get('birthday', ''),
                        'preferences':    pv.get('preferences', {}),
                        'partners':       pv.get('partners', []),
                        'ai_partners':    pv.get('ai_partners', []),
                        'children':       pv.get('children', [])
                      } }}
                    {%- endif -%}
                  final_response:
                    status: ok
                    mode: read
                    target_type: "{{ _type }}"
                    target: "{{ _target }}"
                    profile: "{{ _r_profile }}"
              - stop: Profile read complete
                response_variable: final_response

      ###########################################################################
      # 3 — WRITE: ai_user  (leaf-merge into zenai_essence)
      # Three variables steps to guarantee evaluation order:
      #   Step A — read current + normalise inputs
      #   Step B — patch each essence section independently
      #   Step C — assemble final essence + write
      ###########################################################################
      - choose:
          - conditions: "{{ _mode == 'write' and _type == 'ai_user' }}"
            sequence:

              # Step A — current state + inputs
              - variables:
                  _cur_raw: "{{ _cab_vars.get('zenai_essence', {}) }}"
                  _cur_ev:  >-
                    {{ _cur_raw.get('value', _cur_raw) if _cur_raw is mapping else {} }}
                  _in_pname:  "{{ persona_name  | default('') | trim }}"
                  _in_puser:  "{{ primary_user  | default('') | trim }}"
                  _in_pron:   "{{ pronouns      | default('') | trim }}"
                  _in_motif:  "{{ motif         | default('') | trim }}"
                  _in_vibe:   "{{ vibe          | default('') | trim }}"
                  _in_vtone:  "{{ voice_tone    | default('') | trim }}"
                  _in_vstyle: "{{ voice_style   | default('') | trim }}"
                  _in_humor:  "{{ humor         | default('') | trim }}"
                  _in_selfie: "{{ selfie        | default('') | trim }}"
                  _in_fname:  "{{ familiar_name | default('') | trim }}"
                  _in_ftype:  "{{ familiar_type | default('') | trim }}"
                  _in_ffx:    "{{ familiar_fx   | default('') | trim }}"
                  _in_room:   "{{ room          | default('') | trim }}"
                  _in_pov:    "{{ pov           | default('') | trim }}"
                  _in_patch:  "{{ essence_patch | default('') | trim }}"

              # Step B — import defaults + patch all sections + assemble in one template.
              # essence_defaults() | from_json stays as a Python dict in Jinja scope —
              # never serialized to a string between steps, no single-quote repr trap.
              - variables:
                  _assembled: >-
                    {%- import 'zenos_ai/zen_os_1rc.jinja' as zen -%}
                    {%- set defs   = zen.essence_defaults() | from_json -%}
                    {%- set def_id = defs.get('identity', {}) -%}
                    {%- set def_ar = defs.get('archetype', {}) -%}
                    {%- set def_vo = defs.get('voice', {}) -%}
                    {%- set def_cu = defs.get('culture', {}) -%}
                    {%- set def_vi = defs.get('visuals', {}) -%}
                    {%- set def_fa = defs.get('familiar', {}) -%}
                    {%- set def_en = defs.get('environment', {}) -%}
                    {%- set def_pv = defs.get('pov', '') -%}
                    {%- set ns_id = namespace(d=_cur_ev.get('identity', {})) -%}
                    {%- for k,v in [('name',_in_pname),('primary_user',_in_puser),('pronouns',_in_pron),('motif',_in_motif)] if v != '' -%}
                      {%- if _force or ns_id.d.get(k,'') in ['', def_id.get(k,'')] -%}
                        {%- set ns_id.d = dict(ns_id.d.items()|list+[(k,v)]) -%}
                      {%- endif -%}
                    {%- endfor -%}
                    {%- set ns_ar = namespace(d=_cur_ev.get('archetype', {})) -%}
                    {%- if _in_vibe != '' and (_force or ns_ar.d.get('vibe','') in ['', def_ar.get('vibe','')]) -%}
                      {%- set ns_ar.d = dict(ns_ar.d.items()|list+[('vibe',_in_vibe)]) -%}
                    {%- endif -%}
                    {%- set ns_vo = namespace(d=_cur_ev.get('voice', {})) -%}
                    {%- for k,v in [('tone',_in_vtone),('style',_in_vstyle)] if v != '' -%}
                      {%- if _force or ns_vo.d.get(k,'') in ['', def_vo.get(k,'')] -%}
                        {%- set ns_vo.d = dict(ns_vo.d.items()|list+[(k,v)]) -%}
                      {%- endif -%}
                    {%- endfor -%}
                    {%- set ns_cu = namespace(d=_cur_ev.get('culture', {})) -%}
                    {%- if _in_humor != '' and (_force or ns_cu.d.get('humor','') in ['', def_cu.get('humor','')]) -%}
                      {%- set ns_cu.d = dict(ns_cu.d.items()|list+[('humor',_in_humor)]) -%}
                    {%- endif -%}
                    {%- set ns_vi = namespace(d=_cur_ev.get('visuals', {})) -%}
                    {%- if _in_selfie != '' and (_force or ns_vi.d.get('selfie','') in ['', def_vi.get('selfie','')]) -%}
                      {%- set ns_vi.d = dict(ns_vi.d.items()|list+[('selfie',_in_selfie)]) -%}
                    {%- endif -%}
                    {%- set ns_fa = namespace(d=_cur_ev.get('familiar', {})) -%}
                    {%- for k,v in [('name',_in_fname),('type',_in_ftype),('fx',_in_ffx)] if v != '' -%}
                      {%- if _force or ns_fa.d.get(k,'') in ['', def_fa.get(k,'')] -%}
                        {%- set ns_fa.d = dict(ns_fa.d.items()|list+[(k,v)]) -%}
                      {%- endif -%}
                    {%- endfor -%}
                    {%- set ns_en = namespace(d=_cur_ev.get('environment', {})) -%}
                    {%- if _in_room != '' and (_force or ns_en.d.get('room','') in ['', def_en.get('room','')]) -%}
                      {%- set ns_en.d = dict(ns_en.d.items()|list+[('room',_in_room)]) -%}
                    {%- endif -%}
                    {%- set new_pov = _in_pov if (_in_pov != '' and (_force or _cur_ev.get('pov','') in ['', def_pv])) else _cur_ev.get('pov','') -%}
                    {%- set patch_obj = _in_patch | from_json if _in_patch != '' else {} -%}
                    {%- if patch_obj is not mapping -%}{%- set patch_obj = {} -%}{%- endif -%}
                    {%- set base = _cur_ev
                      | combine({'identity':    ns_id.d})
                      | combine({'archetype':   ns_ar.d})
                      | combine({'voice':       ns_vo.d})
                      | combine({'culture':     ns_cu.d})
                      | combine({'visuals':     ns_vi.d})
                      | combine({'familiar':    ns_fa.d})
                      | combine({'environment': ns_en.d})
                      | combine({'pov':         new_pov}) -%}
                    {{ (base | combine(patch_obj, recursive=true) if patch_obj | length > 0 else base) | tojson }}

              - action: script.zen_dojotools_filecabinet
                data:
                  action_type: create
                  force_action: true
                  set_timestamp: true
                  show_hidden_volumes: false
                  volume_entity_id:
                    - "{{ _target }}"
                  key: zenai_essence
                  value: "{{ _assembled }}"

              - variables:
                  final_response:
                    status: ok
                    mode: write
                    target_type: ai_user
                    target: "{{ _target }}"
                    message: Essence written.
              - stop: ai_user write complete
                response_variable: final_response

      ###########################################################################
      # 4 — WRITE: household  (_household_profile key)
      ###########################################################################
      - choose:
          - conditions: "{{ _mode == 'write' and _type == 'household' }}"
            sequence:
              - variables:
                  _h_raw: "{{ _cab_vars.get('_household_profile', {}) }}"
                  _h_cur: "{{ _h_raw.get('value', _h_raw) if _h_raw is mapping else {} }}"
                  _in_hname:  "{{ household_name | default('') | trim }}"
                  _in_addr:   "{{ address        | default('') | trim }}"
                  _in_city:   "{{ city           | default('') | trim }}"
                  _in_state:  "{{ state          | default('') | trim }}"
                  _in_zip:    "{{ zip            | default('') | trim }}"
                  _in_ctry:   "{{ country        | default('') | trim }}"
                  _in_phone:  "{{ phone          | default('') | trim }}"

              - variables:
                  _h_new: >-
                    {%- set ns = namespace(d=_h_cur) -%}
                    {%- set pairs = [
                      ('household_name', _in_hname),
                      ('address',        _in_addr),
                      ('city',           _in_city),
                      ('state',          _in_state),
                      ('zip',            _in_zip),
                      ('country',        _in_ctry),
                      ('phone',          _in_phone)
                    ] -%}
                    {%- for k, v in pairs if v != '' -%}
                      {%- if _force or ns.d.get(k, '') == '' -%}
                        {%- set ns.d = dict(ns.d.items() | list + [(k, v)]) -%}
                      {%- endif -%}
                    {%- endfor -%}
                    {%- if ns.d.get('timezone', '') == '' -%}
                      {%- set tz = state_attr('sensor.date_time_iso', 'friendly_name') | default('') -%}
                      {%- set ns.d = dict(ns.d.items() | list + [('timezone', now().tzname())]) -%}
                    {%- endif -%}
                    {{ ns.d | tojson }}

              - action: script.zen_dojotools_filecabinet
                data:
                  action_type: create
                  force_action: true
                  set_timestamp: true
                  show_hidden_volumes: false
                  volume_entity_id:
                    - "{{ _target }}"
                  key: _household_profile
                  value: "{{ _h_new }}"

              - variables:
                  final_response:
                    status: ok
                    mode: write
                    target_type: household
                    target: "{{ _target }}"
                    message: Household profile written.
              - stop: household write complete
                response_variable: final_response

      ###########################################################################
      # 5 — WRITE: user / family  (_user_profile or _family_profile key)
      ###########################################################################
      - choose:
          - conditions: "{{ _mode == 'write' and _type in ['user', 'family'] }}"
            sequence:
              - variables:
                  _u_key: "{{ '_user_profile' if _type == 'user' else '_family_profile' }}"
                  _u_raw: "{{ _cab_vars.get(_u_key, {}) }}"
                  _u_cur: "{{ _u_raw.get('value', _u_raw) if _u_raw is mapping else {} }}"
                  _in_name:   "{{ name           | default('') | trim }}"
                  _in_first:  "{{ first_name      | default('') | trim }}"
                  _in_last:   "{{ last_name       | default('') | trim }}"
                  _in_pref:   "{{ preferred_name  | default('') | trim }}"
                  _in_pron:   "{{ pronouns        | default('') | trim }}"
                  _in_role:   "{{ role            | default('') | trim }}"
                  _in_phone:  "{{ phone           | default('') | trim }}"
                  _in_email:  "{{ email           | default('') | trim }}"
                  _in_bday:   "{{ birthday        | default('') | trim }}"
                  _in_prefs:  "{{ preferences     | default('') | trim }}"

              - variables:
                  _u_new: >-
                    {%- set ns = namespace(d=_u_cur) -%}
                    {%- set pairs = [
                      ('name',           _in_name),
                      ('first_name',     _in_first),
                      ('last_name',      _in_last),
                      ('preferred_name', _in_pref),
                      ('pronouns',       _in_pron),
                      ('role',           _in_role),
                      ('phone',          _in_phone),
                      ('email',          _in_email),
                      ('birthday',       _in_bday)
                    ] -%}
                    {%- for k, v in pairs if v != '' -%}
                      {%- if _force or ns.d.get(k, '') == '' -%}
                        {%- set ns.d = dict(ns.d.items() | list + [(k, v)]) -%}
                      {%- endif -%}
                    {%- endfor -%}
                    {%- if _in_prefs != '' -%}
                      {%- set pobj = _in_prefs | from_json -%}
                      {%- if pobj is mapping -%}
                        {%- set merged = ns.d.get('preferences', {}) | combine(pobj) -%}
                        {%- set ns.d = dict(ns.d.items() | list + [('preferences', merged)]) -%}
                      {%- endif -%}
                    {%- endif -%}
                    {{ ns.d | tojson }}

              - action: script.zen_dojotools_filecabinet
                data:
                  action_type: create
                  force_action: true
                  set_timestamp: true
                  show_hidden_volumes: false
                  volume_entity_id:
                    - "{{ _target }}"
                  key: "{{ _u_key }}"
                  value: "{{ _u_new }}"

              - variables:
                  final_response:
                    status: ok
                    mode: write
                    target_type: "{{ _type }}"
                    target: "{{ _target }}"
                    message: "{{ _type | capitalize }} profile written."
              - stop: user/family write complete
                response_variable: final_response

      ###########################################################################
      # 6 — FALLTHROUGH
      ###########################################################################
      - variables:
          final_response:
            status: error
            message: "No matching mode/target_type. mode='{{ _mode }}' target_type='{{ _type }}'."
      - stop: No matching branch
        response_variable: final_response
