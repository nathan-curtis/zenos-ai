rest_command:
  wikijs_graphql:
    url: "http://iona.home.curtisplace.net:3001/graphql"
    method: POST
    headers:
      Content-Type: "application/json"
      Authorization: !secret wikijs_token_bearer
    payload: >
      {
        "query": {{ query | tojson }},
        {% if variables is defined %}
        "variables": {{ variables | tojson }}
        {% endif %}
      }
    verify_ssl: false
