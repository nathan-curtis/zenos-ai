          %}\n  {% if list_in is not none %}\n    {{ {\"list_id\": (list_in | int)}
          }}\n  {% else %}\n    {{ {} }}\n  {% endif %}  \n{% elif case_norm == 'units_add'
          %}\n  {{\n    {\n      \"name\": unit_norm,\n      \"name_plural\": unit_norm,\n
          \     \"description\": (note_in if has_note else none)\n    }\n  }}\n{% elif
          case_norm == 'units_update' %}\n  {{\n    {\n      \"name\": (unit_norm if
          has_unit_name else none),\n      \"description\": (note_in if has_note else
          none)\n    }\n  }}\n{% elif case_norm in ['shopping_add_product','shopping_remove_product'] %}\n  {{\n    {\n      \"product_id\": product_id_resolved,\n      \"product_amount\": amt_in,\n      \"shopping_list_id\": (list_in | int if list_in is not none else none)\n    }\n  }}\n{% elif case_norm == 'shopping_clear_list' %}\n  {{\n    {\n      \"done_only\": done_only_in,\n      \"shopping_list_id\": (list_in | int if list_in is not none else none)\n    }\n  }}\n{% elif case_norm == 'recipes_add_to_shopping' %}\n  {{\n    {\n      \"shopping_list_id\": (list_in | int if list_in is not none else none)\n    }\n  }}\n{% elif case_norm == 'stock_open_item' %}\n  {{\n    {\n      \"amount\": amt_in,\n      \"best_before_date\": (bbd_in if bbd_in is not none else none),\n      \"allow_subproduct_substitution\": false\n    }\n  }}\n{% elif case_norm == 'stock_entry_update' %}\n  {% if current_entry_base is mapping %}\n    {% set ns = namespace(o={}) %}\n    {% if has_explicit_amount %}{% set ns.o = ns.o | combine({\"amount\": amt_in}) %}{% endif %}\n    {% if bbd_in is not none %}{% set ns.o = ns.o | combine({\"best_before_date\": bbd_in}) %}{% endif %}\n    {% if location_id_resolved is not none %}{% set ns.o = ns.o | combine({\"location_id\": location_id_resolved}) %}{% endif %}\n    {% if price_in is not none %}{% set ns.o = ns.o | combine({\"price\": price_in}) %}{% endif %}\n    {% if note_in | trim != '' %}{% set ns.o = ns.o | combine({\"note\": note_in}) %}{% endif %}\n    {{ current_entry_base | combine(ns.o) }}\n  {% else %}\n    {{ none }}\n  {% endif %}\n{% elif case_norm == 'stock_add_by_barcode' %}\n  {{\n    {\n      \"amount\": amt_in,\n      \"best_before_date\": (bbd_in if bbd_in is not none else none),\n      \"transaction_type\": \"purchase\",\n      \"price\": (price_in if price_in is not none else none),\n      \"location_id\": (location_id_resolved if location_id_resolved is not none else none)\n    }\n  }}\n{% elif case_norm == 'stock_consume_by_barcode' %}\n  {{ {\"amount\": amt_in} }}\n{% elif case_norm == 'batteries_charge' %}\n  {{ {\"tracked_time\": none, \"amount\": (amt_in | int(1))} }}\n{% else %}\n  {{ payload_obj }}\n{% endif %}"
    - variables:
        payload_data: "{{\n  {\n    \"action_type\": action_type,\n    \"endpoint\":
          final_endpoint\n  }\n  | combine(\n      {\"payload\": effective_payload}\n
          \     if effective_payload is not none else {}\n    )\n}}"
    - alias: Endpoint Resolution Check
      choose:
      - conditions:
        - alias: 'Error: Endpoint not Resolved'
          condition: template
          value_template: "{{\n  (final_endpoint is none)\n  and case_norm != 'catalog_find_product'\n}}\n"
        sequence:
        - variables:
            final_response:
              status: error
              message: Unable to resolve endpoint for case
              case: '{{ case_norm }}'
              item: '{{ item_norm }}'
              location: '{{ loc_norm }}'
              resolved:
                product_id: '{{ product_id_resolved }}'
                location_id: '{{ location_id_resolved }}'
                shopping_location_id: '{{ shopping_location_id_resolved }}'
                chore_id: '{{ chore_id_resolved }}'
                task_id: '{{ task_id_resolved }}'
              coaching:
              - If this is an item question, pass item or product_id.
              - If this is a location question, pass location or location_id.
              - For purchases, provide item or product_id and amount.
        - stop: Resolution Failed
          response_variable: final_response
    - alias: Call Grocy API (if not barred by endpoint)
      choose:
      - conditions:
        - condition: template
          value_template: '{{ case_norm != ''catalog_find_product'' }}'
          alias: Not 'catalog_find_product'
        sequence:
        - action: script.zen_dojotools_grocy_advanced
          response_variable: grocy_response
          data: '{{ payload_data }}'
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ case_norm == ''locations_add'' }}'
          alias: Capture new location id
        sequence:
        - variables:
            location_id_resolved: "{% if grocy_response is mapping and 'result' in grocy_response
              and grocy_response['result'] is mapping and 'content' in grocy_response['result']
              and grocy_response['result']['content'] is mapping %}\n  {% if 'created_object_id'
              in grocy_response['result']['content'] %}\n    {{ grocy_response['result']['content']['created_object_id']
              }}\n  {% elif 'id' in grocy_response['result']['content'] %}\n    {{ grocy_response['result']['content']['id']
              }}\n  {% else %}\n    {{ none }}\n  {% endif %}\n{% else %}\n  {{ none }}\n{% endif %}"
      alias: Resolve new Location ID
    - alias: Add Location Metadata if necessary
      choose:
      - conditions:
        - alias: locations_add → apply metadata
          condition: template
          value_template: "{{ case_norm == 'locations_add'\n   and location_id_resolved
            is not none\n   and (\n     parent_lid_resolved is not none\n     or has_area_id\n
            \    or placement_priority_in is not none\n     or has_note\n   ) }}"
        sequence:
        - action: script.zen_dojotools_grocy_advanced
          response_variable: metadata_response
          data:
            action_type: update
            endpoint: /userfields/locations/{{ location_id_resolved }}
            payload: "{{\n  dict(\n    (\n      [\n        ('grocy_parent_location_id',
              parent_lid_resolved),\n        ('homeassistant_area', area_id_norm if
              has_area_id else none),\n        ('grocy_location_subclass', loc_sub_norm),\n
              \       ('placement_priority', placement_priority_in),\n        ('note',
              note_in if has_note else none)\n      ]\n      | selectattr(1)\n      |
              list\n    )\n  )\n}}"
    - alias: Post Purchase inventory on 'Buy'
      choose:
      - conditions:
        - condition: template
          value_template: "{{ case_norm == 'stock_buy_product'\n   and (report_inventory_norm
            | default(true))\n   and (product_id_resolved is not none) }}"
          alias: 'Buy: Post-purchase inventory report'
        sequence:
        - action: script.zen_dojotools_grocy_advanced
          response_variable: post_entries
          data:
            action_type: read
            endpoint: /stock/products/{{ product_id_resolved }}/entries
        - variables:
            post_entries_list: "{{ post_entries['result']['content']\n   if post_entries is
              mapping and 'result' in post_entries\n   else [] }}"
            post_total_amount: "{{\n  (post_entries_list\n    | map(attribute='amount')\n
              \   | map('float')\n    | sum)\n  | default(0)\n}}"
            post_locations: "{{ post_entries_list | map(attribute='location_name') | unique | list }}"
            inventory_report: "{{\n  {\n    \"purchase\": {\n      \"item\": (item_norm if item_norm else (grocy_product.name if grocy_product is defined and grocy_product is mapping else none)),\n
              \     \"product_id\": product_id_resolved,\n      \"unit\": unit_norm,\n
              \     \"amount_added\": amt_in,\n      \"location\": (loc_norm if has_loc_name
              else none),\n      \"store\": (store_norm if has_store_name else none)\n
              \   },\n    \"result\": {\n      \"total_amount_now\": post_total_amount,\n
              \     \"locations_now\": post_locations,\n      \"humor\": (\n        \"There
              are now \" ~ (post_total_amount | string)\n        ~ \" \" ~ (item_norm if item_norm else (grocy_product.name if grocy_product is defined and grocy_product is mapping else 'item'))
              ~ \" in inventory, boss.\"\n      )\n    }\n  }\n}}"
    - variables:
        grocy_result: "{% if grocy_response is mapping and 'result' in grocy_response
          %}\n  {{ grocy_response['result'] }}\n{% else %}\n  {{ none }}\n{% endif %}"
        content: '{{ grocy_result["content"] if grocy_result is not none else [] }}'
        filtered_result: "{% if case_norm == 'catalog_find_product' %}\n  {% if product_matches
          is defined and product_matches | length > 0 %}\n    {{ product_matches }}\n
          \ {% elif grocy_product is not none %}\n    {{ [ grocy_product ] }}\n  {%
          else %}\n    []\n  {% endif %}\n{% elif case_norm == 'chores_find' and has_item_name
          %}\n  {{ content | selectattr('name','search','(?i)' ~ item_norm) | list }}\n{%
          elif case_norm == 'tasks_find' and has_item_name %}\n  {{ content | selectattr('name','search','(?i)'
          ~ item_norm) | list }}\n{% elif case_norm == 'locations_find' %}\n  {% if
          location_id_resolved is not none %}\n    {{ content | selectattr('id','equalto',
          location_id_resolved | int) | list }}\n  {% elif has_loc_name %}\n    {{ content
          | selectattr('name','search','(?i)' ~ loc_norm) | list }}\n  {% else %}\n
          \   {{ content }}\n  {% endif %}    \n{% elif case_norm == 'units_find' and
          has_unit_name %}\n  {{ content | selectattr('name','equalto', unit_norm) |
          list }}
{% elif case_norm == 'stock_list_volatile' %}
  {{ {
    'overdue_count':  (content.overdue_products  | default([])) | length,
    'due_soon_count': (content.due_dates          | default([])) | length,
    'expiring_count': (content.expiring_products  | default([])) | length,
    'overdue':  (content.overdue_products  | default([]))[:limit | int(25)],
    'due_soon': (content.due_dates          | default([]))[:limit | int(25)],
    'expiring': (content.expiring_products  | default([]))[:limit | int(25)]
  } }}
{% elif case_norm == 'stock_overview' %}
  {{ content[:limit | int(25)] }}
{% else %}\n  {{ content }}\n{% endif %}"
        error_result: "{% if\n  case_norm == 'stock_consume'\n  and product_id_resolved
          is not none\n  and location_id_resolved is not none\n  and stock_entries_for_product
          is defined\n  and (\n    stock_entries_for_product\n    | selectattr('location_id','equalto',
          location_id_resolved | int)\n    | list\n    | length == 0\n  )\n%}\n  {{\n
          \   {\n      \"code\": \"INVALID_CONSUME_LOCATION\",\n      \"message\": \"Cannot
          consume item from specified location\",\n      \"explanation\": (\n        \"The
          product exists, but no stock entry was found at the requested location. \"\n
          \       ~ \"Grocy requires the consume location to match an actual stock entry.\"\n
          \     ),\n      \"details\": {\n        \"product_id\": product_id_resolved,\n
          \       \"requested_location_id\": location_id_resolved,\n        \"available_location_ids\":\n
          \         stock_entries_for_product\n          | map(attribute='location_id')\n
          \         | list\n          | sort\n      },\n      \"suggested_fixes\": [\n
          \       \"consume_from_actual_location\",\n        \"transfer_then_consume\",\n
          \       \"omit_location_use_default\"\n      ],\n      \"confidence\": \"high\",\n
          \     \"blame\": \"none\"\n    }\n  }}\n{% else %}\n  {{ none }}\n{% endif
          %}"
        is_error: '{{ error_result is not none }}'
        result_payload: "{% if case_norm == 'products_merge' %}\n  {{\n    {\n      \"merged_into\":
          product_id_keep_resolved,\n      \"removed_product\": product_id_remove_resolved\n
          \   }\n  }}\n{% elif case_norm in ['rename_product','update_product_meta','set_default_location_for_product']
          %}\n  {{\n    {\n      \"product_id\": product_id_resolved,\n      \"product\":
          grocy_product.name if grocy_product is defined else none\n    }\n  }}\n{%
          else %}\n  {{ filtered_result }}\n{% endif %}"
        trace: "{% if show_trace or is_error %}\n  {{\n    {\n      \"endpoint\": endpoint
          | default(''),\n      \"action_type\": action_type | default(''),\n      \"resolved\":
          {\n        \"product_id\": product_id_resolved | default(none),\n        \"location_id\":
          location_id_resolved | default(none),\n        \"unit_resolution\": {\n          \"requested\":
          unit_norm,\n          \"resolved_unit_id\": unit_id_resolved,\n          \"created\":
          (\n            unit_norm == 'each'\n            and unit_created is defined\n
          \         )\n        },\n        \"shopping_location_id\": shopping_location_id_resolved
          | default(none),\n        \"chore_id\": chore_id_resolved | default(none),\n
          \       \"task_id\": task_id_resolved | default(none),\n        \"recipe_id\": recipe_id_resolved | default(none),\n        \"entry_id\": entry_id_in | default(none),\n        \"battery_id\": battery_id_in | default(none)\n      },\n      \"buy_flow\":
          (\n        inventory_report\n        if case_norm == 'stock_buy_product' and
          inventory_report is defined\n        else none\n      )\n    }\n  }}\n{% else\n          %}\n  {{ {\"debug\":\"off\"} }}\n{% endif %}"
        final_response: "{{\n  {\n    \"status\": (\"error\" if is_error else \"success\"),\n
          \   \"tool\": tool_name,\n    \"version\": tool_version,\n    \"case\": case_norm,\n\n
          \   \"result\": (none if is_error else result_payload),\n    \"error\": (error_result
          if is_error else none),\n\n    \"report\": (\n      inventory_report\n      if
          (not is_error)\n      and case_norm == 'stock_buy_product'\n      and inventory_report
          is defined\n      else none\n    ),\n\n    \"pagination\": {\n      \"supported\":
          supports_pagination | default(false),\n      \"applied\": (\n        supports_pagination\n
          \       and limit is not none\n        and offset is not none\n      ),\n
          \     \"page\": page_effective | default(none),\n      \"per_page\": limit
          | default(none),\n      \"offset\": offset | default(none),\n      \"source\":
          (\n        \"user\"\n        if (page_in is number or per_page_in is number)\n
          \       else \"default\"\n      )\n    },\n\n    \"endpoint\": final_endpoint
          | default(endpoint),\n\n    \"trace\": trace | default({})\n  }\n}}"
    - stop: Return Response
      response_variable: final_response

###############################################################################
# REST Sensors
###############################################################################

rest:
  # REST sensor for caching just the Grocy OpenAPI once per hr
  - resource_template: "{{ states('input_text.grocy_url') | trim('/') }}/openapi.json"
    method: GET
    headers:
      GROCY-API-KEY: !secret grocy_api_key
      accept: "application/json"
    scan_interval: 3600 # seconds (once/hr)
    sensor:
      - name:  Grocy_RESTful_OpenAPI_docs
        value_template: "{{ now() | as_local() }}" # last refresh time
        json_attributes: ['openapi', 'info', 'paths', 'components']
        force_update: true
        unique_id: 8cce6ae0-c940-4225-95fe-5e6b30f592cf
