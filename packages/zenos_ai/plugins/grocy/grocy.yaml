          %}\n  {% if has_note %}\n    {% set ns.o = ns.o | combine({'note': note_in})
          %}\n  {% endif %}\n  {{ ns.o }}\n{% elif case_norm == 'locations_rename' %}\n
          \ {{\n    {\n      \"name\": new_name_norm\n    }\n  }}\n{% elif case_norm
