de' and has_barcode %}\n  /stock/products/by-barcode/{{ barcode_norm }}/consume\n{% elif case_norm == 'batteries_list' %}\n  /batteries\n{% elif case_norm == 'batteries_get' and battery_id_in %}\n  /batteries/{{ battery_id_in }}\n{% elif case_norm == 'batteries_charge' and battery_id_in %}\n  /batteries/{{ battery_id_in }}/charge\n{% else %}\n  {{ none }}\n{% endif %}"
