              {\n        \"intent\": \"Reconcile inventory to a measured total amount.\",\n
              \       \"needs\": [\"item OR product_id\", \"amount\"],\n        \"writes\":
              \"POST /stock/products/{productId}/inventory\"\n      },\n\n      \"stock_transfer_location\":
              {\n        \"intent\": \"Transfer stock quantity between locations.\",\n
              \       \"needs\": [\n          \"item OR product_id\",\n          \"location
              OR location_id\",\n          \"to_location OR to_location_id\"\n        ],\n
              \       \"writes\": \"POST /stock/products/{productId}/transfer\",\n        \"blocked_conditions\":
              [\n          \"Tare-weight products are not supported for transfer\"\n
              \       ]\n      },\n\n      \"units_list\": {\n        \"intent\": \"List
              all quantity units defined in Grocy.\",\n        \"needs\": [],\n        \"reads\":
              \"GET /objects/quantity_units\"\n      },\n\n      \"units_find\": {\n
              \       \"intent\": \"Find a quantity unit by exact name.\",\n        \"needs\":
              [\"unit\"],\n        \"reads\": \"GET /objects/quantity_units (filtered
              locally by name)\",\n        \"constraints\": [\n          \"Exact match
              only\",\n          \"Multiple matches block execution\"\n        ]\n      },\n\n
              \     \"units_add\": {\n        \"intent\": \"Create a new quantity unit.\",\n
              \       \"needs\": [\"unit\"],\n        \"optional\": [\"note\"],\n        \"writes\":
              \"POST /objects/quantity_units\",\n        \"constraints\": [\n          \"Unit
              name must not already exist\",\n          \"Pluralization is not inferred\",\n
              \         \"No implicit conversions are created\"\n        ]\n      },\n\n
              \     \"units_update\": {\n        \"intent\": \"Update an existing quantity
              unit.\",\n        \"needs\": [\"unit_id\"],\n        \"optional\": [\"unit\",
              \"note\"],\n        \"writes\": \"PUT /objects/quantity_units/{unitId}\",\n
              \       \"constraints\": [\n          \"unit_id is required\",\n          \"Renames
              must differ from current name\",\n          \"No stock math is affected\"\n
              \       ]\n      },\n\n      \"shopping_add_product\": {\"intent\": \"Add a specific product to a shopping list.\", \"needs\": [\"item OR product_id\"], \"optional\": [\"amount\", \"list_id\"], \"writes\": \"POST /stock/shoppinglist/add-product\"},\n      \"shopping_remove_product\": {\"intent\": \"Remove a product from a shopping list.\", \"needs\": [\"item OR product_id\"], \"optional\": [\"amount\", \"list_id\"], \"writes\": \"POST /stock/shoppinglist/remove-product\"},\n      \"shopping_clear_list\": {\"intent\": \"Clear a shopping list.\", \"optional\": [\"list_id\", \"done_only\"], \"writes\": \"POST /stock/shoppinglist/clear\"},\n      \"recipes_list\": {\"intent\": \"List all Grocy recipes.\", \"reads\": \"GET /objects/recipes\"},\n      \"recipes_fulfillment\": {\"intent\": \"What recipes can I make with current stock?\", \"reads\": \"GET /recipes/fulfillment\"},\n      \"recipe_check_fulfillment\": {\"intent\": \"Can I make a specific recipe?\", \"needs\": [\"item OR recipe_id\"], \"reads\": \"GET /recipes/{recipeId}/fulfillment\"},\n      \"recipes_add_to_shopping\": {\"intent\": \"Add missing recipe ingredients to shopping list.\", \"needs\": [\"item OR recipe_id\"], \"optional\": [\"list_id\"], \"writes\": \"POST /recipes/{recipeId}/add-not-fulfilled-products-to-shoppinglist\"},\n      \"recipes_consume\": {\"intent\": \"Mark recipe as made and consume stock ingredients.\", \"needs\": [\"item OR recipe_id\"], \"writes\": \"POST /recipes/{recipeId}/consume\"},\n      \"recipes_copy\": {\"intent\": \"Duplicate a recipe.\", \"needs\": [\"item OR recipe_id\"], \"writes\": \"POST /recipes/{recipeId}/copy\"},\n      \"stock_overview\": {\"intent\": \"Overview of all products currently in stock.\", \"reads\": \"GET /stock\"},\n      \"stock_list_volatile\": {\"intent\": \"List products due soon, overdue, or expired.\", \"reads\": \"GET /stock/volatile\"},\n      \"stock_get_product_details\": {\"intent\": \"Get stock-context details for a product (amount, value, best_before).\", \"needs\": [\"item OR product_id\"], \"reads\": \"GET /stock/products/{productId}\"},\n      \"stock_open_item\": {\"intent\": \"Mark a product as opened.\", \"needs\": [\"item OR product_id\"], \"optional\": [\"amount\", \"best_before_date\"], \"writes\": \"POST /stock/products/{productId}/open\"},\n      \"stock_entry_update\": {\"intent\": \"Edit a specific stock entry (best_before_date, location, price).\", \"needs\": [\"entry_id\"], \"optional\": [\"amount\", \"best_before_date\", \"location\", \"price\"], \"writes\": \"PUT /stock/entry/{entryId}\", \"notes\": [\"Get entry_id via stock_entries_for_item\"]},\n      \"stock_undo_booking\": {\"intent\": \"Undo a stock booking.\", \"needs\": [\"booking_id\"], \"writes\": \"POST /stock/bookings/{bookingId}/undo\"},\n      \"tasks_undo\": {\"intent\": \"Undo a completed task.\", \"needs\": [\"item OR task_id\"], \"writes\": \"POST /tasks/{taskId}/undo\"},\n      \"chores_undo\": {\"intent\": \"Undo a chore execution.\", \"needs\": [\"execution_id\"], \"notes\": [\"execution_id is the execution ID, not the chore_id\"], \"writes\": \"POST /chores/executions/{executionId}/undo\"},\n      \"catalog_find_by_barcode\": {\"intent\": \"Find a product by barcode.\", \"needs\": [\"barcode\"], \"reads\": \"GET /stock/products/by-barcode/{barcode}\"},\n      \"stock_add_by_barcode\": {\"intent\": \"Purchase into stock by barcode.\", \"needs\": [\"barcode\"], \"optional\": [\"amount\", \"location\", \"price\", \"best_before_date\"], \"writes\": \"POST /stock/products/by-barcode/{barcode}/add\"},\n      \"stock_consume_by_barcode\": {\"intent\": \"Consume from stock by barcode.\", \"needs\": [\"barcode\"], \"optional\": [\"amount\"], \"writes\": \"POST /stock/products/by-barcode/{barcode}/consume\"},\n      \"batteries_list\": {\"intent\": \"List all tracked rechargeable batteries.\", \"reads\": \"GET /batteries\"},\n      \"batteries_get\": {\"intent\": \"Get details for a specific battery.\", \"needs\": [\"battery_id\"], \"reads\": \"GET /batteries/{batteryId}\"},\n      \"batteries_charge\": {\"intent\": \"Record a charge cycle for a battery.\", \"needs\": [\"battery_id\"], \"optional\": [\"amount\"], \"writes\": \"POST /batteries/{batteryId}/charge\"}\n    },\n\n    \"hints\": {\n      \"location_metadata\":
              \"Apply homeassistant metadata to grocy fields and grocy location id pointers
              to cabinet drawers, use labels liberally. These are the things that bind
              Grocy data to HA to become searchable by the Hyperindex.\",\n      \"unit_interop\":
              \"Grocy is the canonical authority for quantity units. External systems
              (e.g., Mealie) should reference Grocy unit IDs or normalized names. Unit
              reconciliation must be explicit and governed; this tool will not guess
              mappings.\"\n    },\n\n    \"why_operations_fail\": {\n      \"missing_required_fields\":
              \"Each case declares its own required inputs. If one is missing, execution
              stops.\",\n      \"ambiguous_matches\": \"If a name resolves to more than
              one object, the tool refuses to guess.\",\n      \"unit_errors\": \"Stock
              math requires a resolvable quantity unit. Units are governed objects in
              Grocy. If a unit does not exist or resolves ambiguously, the operation
              stops. Use units_list or units_add explicitly. 'each' must exist.\",\n
              \     \"location_constraints\": \"Grocy enforces location rules. This
              tool mirrors them exactly.\",\n      \"irreversible_actions\": \"Destructive
              operations (merge, consume, adjust) are guarded deliberately.\"\n    },\n\n
              \   \"examples\": {\n      \"check_inventory\": \"{'case':'stock_check_item','item':'coffee'}\",\n
              \     \"where_is_item\": \"{'case':'stock_where_is_item','item':'coffee'}\",\n
              \     \"list_items_in_location\": \"{'case':'stock_list_by_location','location':'Pantry'}\",\n
              \     \"purchase_existing_product\": \"{'case':'stock_add_purchase','item':'coffee','amount':1,'location':'Pantry'}\",\n
              \     \"create_and_purchase_new_product\": \"{'case':'stock_buy_product','item':'chickens','amount':87000,'location':'Garage','note':'no
              questions'}\",\n      \"consume_item\": \"{'case':'stock_consume','item':'coffee','amount':1}\",\n
              \     \"transfer_item\": \"{'case':'stock_transfer_location','item':'coffee','location':'Pantry','to_location':'Kitchen'}\",\n
              \     \"complete_task\": \"{'case':'tasks_complete','item':'Take out trash'}\",\n
              \     \"execute_chore\": \"{'case':'chores_execute','item':'Clean litter
              box'}\",\n      \"set_location_metadata\": \"{'case':'locations_metadata_set','location':'Coffee
              Drawer','parent_location':'Kitchen','area_id':'kitchen','location_subclass':'drawer','placement_priority':10}\",\n
              \     \"list_units\": \"{'case':'units_list'}\",\n      \"add_unit\":
              \"{'case':'units_add','unit':'can','note':'Standard grocery can'}\",\n
              \     \"find_unit\": \"{'case':'units_find','unit':'can'}\"\n    },\n\n
              \   \"final_note\": [\n      \"Strict by design — prevents silent data corruption.\",\n      \"Names resolve before writes. Ambiguous matches stop execution.\",\n      \"Errors coach you back — no need to re-read help to fix a mistake.\"\n    ]\n  }\n}}"
        - variables:
            help_json: "{{ help_json | combine({'cases': cases}) }}"
        - variables:
            final_response:
              status: help
              help: '{{ help_json }}'
        - stop: Help Mode
          response_variable: final_response
    - alias: Trap Early Preflight Errors
      choose:
      - conditions:
        - condition: template
          value_template: '{{ case_norm not in cases }}'
          alias: 'Error: Case Not Recognized'
        sequence:
        - variables:
            final_response:
              status: error
              message: Invalid case
              case: '{{ case_norm }}'
              hint: Call with mode=help to see valid cases.
        - stop: Invalid Case
          response_variable: final_response
      - conditions:
        - alias: 'Error: locations_add requires a name'
          condition: template
          value_template: "{{ case_norm == 'locations_add'\n and not has_loc_name }}"
        sequence:
        - variables:
            final_response:
              status: error
              message: locations_add requires a location name
              case: '{{ case_norm }}'
              coaching:
              - Provide a location name using the location field.
              - Example "{'case':'locations_add','location':'Coffee Drawer'}"
        - stop: Missing Location Name
          response_variable: final_response
    - variables:
        payload_obj: "{% if payload_in is none %}\n  {{ none }}\n{% elif payload_in
          is mapping %}\n  {{ payload_in }}\n{% else %}\n  {% set s = (payload_in |
          string | trim) %}\n  {% if s == '' %}\n    {{ none }}\n  {% else %}\n    {{
          s | from_json }}\n  {% endif %}\n{% endif %}"
    - variables:
        product_id_resolved: '{{ pid_in }}'
        product_id_keep_resolved: '{{ pid_keep_in }}'
        product_id_remove_resolved: '{{ pid_remove_in }}'
        location_id_resolved: '{{ lid_in }}'
        to_location_id_resolved: '{{ to_lid_in }}'
        shopping_location_id_resolved: '{{ slid_in }}'
        parent_lid_resolved: '{{ parent_lid_in }}'
        chore_id_resolved: '{{ cid_in }}'
        task_id_resolved: '{{ tid_in }}'
        unit_id_resolved: '{{ uid_in }}'
        grocy_product: '{{ none }}'
        product_matches: '{{ [] }}'
    - alias: Resolve Locations
      choose:
      - conditions:
        - alias: Resolve Locations
          condition: template
          value_template: "{{ location_id_resolved is none\n   and has_loc_name\n   and
            case_norm in [\n     'stock_list_by_location',\n     'locations_add',\n
            \    'stock_add_purchase',\n     'stock_buy_product',\n     'stock_transfer_location',\n
            \    'stock_add_by_barcode',\n     'stock_entry_update'\n
            \  ] }}"
        sequence:
        - action: script.zen_dojotools_grocy_advanced
          response_variable: locations_all
          data:
            action_type: read
            endpoint: /objects/locations
        - variables:
            locations_all_list: "{{ locations_all['result']['content'] if locations_all is mapping and 'result' in locations_all else [] }}"
            location_id_resolved: "{{\n  (locations_all_list\n    | selectattr('name','equalto',
              loc_norm)\n    | map(attribute='id')\n    | first)\n  | default(\n      (locations_all_list\n
              \       | selectattr('name','search','(?i)' ~ loc_norm)\n        | map(attribute='id')\n
              \       | first)\n    )\n  | default(location_id_resolved)\n}}"
    - alias: Resolve To Location
      choose:
      - conditions:
        - alias: Resolve To Location
          condition: template
          value_template: "{{ case_norm == 'stock_transfer_location'\n   and (to_location_id_resolved
            is none)\n   and (has_to_loc_name) }}"
        sequence:
        - action: script.zen_dojotools_grocy_advanced
          response_variable: locations_all
          data:
            action_type: read
            endpoint: /objects/locations
        - variables:
            locations_all_list: "{{ locations_all['result']['content'] if locations_all is mapping and 'result' in locations_all else [] }}"
            to_location_id_resolved: "{{\n  (locations_all_list\n    | selectattr('name','equalto',
              to_loc_norm)\n    | map(attribute='id') | first)\n  | default(\n      (locations_all_list\n
              \       | selectattr('name','search','(?i)' ~ to_loc_norm)\n        |
              map(attribute='id') | first)\n    )\n  | default(to_location_id_resolved)\n}}"
    - alias: Resolve Shopping Locations
      choose:
      - conditions:
        - alias: Resolve Shopping Locations
          condition: template
          value_template: "{{ case_norm in ['stock_add_purchase','stock_buy_product']\n
            \  and (shopping_location_id_resolved is none)\n   and (has_store_name)
            }}"
        sequence:
        - action: script.zen_dojotools_grocy_advanced
          response_variable: shopping_locations_all
          data:
            action_type: read
            endpoint: /objects/shopping_locations
        - variables:
            shopping_locations_all_list: "{{ shopping_locations_all['result']['content'] if shopping_locations_all is mapping and 'result' in shopping_locations_all else [] }}"
            shopping_location_id_resolved: "{{\n  (shopping_locations_all_list\n    |
              selectattr('name','equalto', store_norm)\n    | map(attribute='id') |
              first)\n  | default(\n      (shopping_locations_all_list\n        | selectattr('name','search','(?i)'
              ~ store_norm)\n        | map(attribute='id') | first)\n    )\n  | default(shopping_location_id_resolved)\n}}"
    - alias: Resolve Parent Location
      choose:
      - conditions:
        - alias: Resolve Parent Location
          condition: template
          value_template: "{{ case_norm == 'locations_metadata_set'\n   and parent_lid_in
            is none\n   and has_parent_loc_name }}"
        sequence:
        - action: script.zen_dojotools_grocy_advanced
          response_variable: parent_locations_all
          data:
            action_type: read
            endpoint: /objects/locations
        - variables:
            parent_locations_list: "{{ parent_locations_all['result']['content'] if parent_locations_all is mapping and 'result' in parent_locations_all else [] }}"
            parent_lid_resolved: "{{\n  (parent_locations_list\n    | selectattr('name','equalto',
              parent_loc_norm)\n    | map(attribute='id') | first)\n  | default(\n      parent_locations_list\n
              \       | selectattr('name','search','(?i)' ~ parent_loc_norm)\n        |
              map(attribute='id') | first\n    )\n}}"
    - alias: Resolve Product
      choose:
      - conditions:
        - alias: Resolve Product (canonical)
          condition: template
          value_template: "{{\n  case_norm in [\n                 'catalog_find_product','stock_check_item','stock_where_is_item',\n
            \                'stock_entries_for_item','stock_add_purchase','stock_buy_product',\n
            \                'stock_consume','stock_inventory_adjust','stock_transfer_location',\n
            \                'get_product_meta','rename_product',\n                 'update_product_meta','set_default_location_for_product',\n                 'stock_get_product_details','stock_open_item',\n                 'shopping_add_product','shopping_remove_product',\n                 'stock_entry_update'\n
            \               ]\n            and (product_id_resolved is none)\n            and
            (has_item_name)\n}}"
        sequence:
        - action: script.zen_dojotools_grocy_advanced
          response_variable: products_exact
          data:
            action_type: read
            endpoint: objects/products?query%5B%5D=name={{ item_norm }}
        - variables:
            exact_matches: "{{ products_exact['result']['content'] if products_exact is mapping and 'result' in products_exact else [] }}"
        - choose:
          - conditions:
            - condition: template
              value_template: '{{ exact_matches | length == 0 }}'
              alias: Fallback partial match
            sequence:
            - action: script.zen_dojotools_grocy_advanced
              response_variable: products_like
              data:
                action_type: read
                endpoint: objects/products?query%5B%5D=name~{{ item_norm }}
            - variables:
                product_matches: "{{ products_like['result']['content'] if products_like is mapping and 'result' in products_like else [] }}"
          - conditions:
            - condition: template
              value_template: '{{ exact_matches | length > 0 }}'
            sequence:
            - variables:
                product_matches: '{{ exact_matches }}'
        - variables:
            grocy_product: '{{ product_matches | first }}'
            product_id_resolved: '{{ grocy_product.id | default(product_id_resolved)
              }}'
    - alias: Resolve Recipe
      choose:
      - conditions:
        - alias: Resolve Recipe by name
          condition: template
          value_template: "{{ case_norm in [\n     'recipe_check_fulfillment',\n     'recipes_add_to_shopping',\n
            \    'recipes_consume',\n     'recipes_copy'\n   ]\n   and recipe_id_resolved
            is none\n   and has_item_name }}"
        sequence:
        - action: script.zen_dojotools_grocy_advanced
          response_variable: recipes_all
          data:
            action_type: read
            endpoint: /objects/recipes
        - variables:
            recipes_all_list: "{{ recipes_all['result']['content'] if recipes_all is mapping and 'result' in recipes_all else [] }}"
            recipe_id_resolved: "{{\n  (recipes_all_list\n    | selectattr('name','equalto',
              item_norm)\n    | map(attribute='id')\n    | first)\n  | default(\n      (recipes_all_list\n
              \       | selectattr('name','search','(?i)' ~ item_norm)\n        | map(attribute='id')\n
              \       | first)\n    )\n  | default(none)\n}}"
    - alias: Pre Auto-Change Case Guards
      choose:
      - conditions:
        - condition: template
          value_template: "{{ product_matches is defined\n   and product_matches | length
            > 1 }}"
          alias: 'Guard: ambiguous product match'
        sequence:
        - variables:
            matches_out: "{% set ns = namespace(items=[]) %}\n{% for p in (product_matches
              | sort(attribute='name'))[:10] %}\n  {% set ns.items = ns.items + [\n
              \   {\n      \"id\": p.id,\n      \"name\": p.name\n    }\n  ] %}\n{%
              endfor %}\n{{ ns.items }}"
            final_response:
              status: error
              message: Multiple possible matches for product name
              case: '{{ case_norm }}'
              details:
                item: '{{ item_norm }}'
                matches_total: '{{ product_matches | length }}'
                matches: '{{ matches_out }}'
              coaching:
              - Multiple products match this name
              - Re-run with product_id
              - Or be more specific (brand, type)
        - stop: Product Match Ambiguous
          response_variable: final_response
    - alias: Auto-Change Cases
      choose:
      - conditions:
        - alias: 'Auto-upgrade: purchase → buy_product'
          condition: template
          value_template: "{{ case_norm == 'stock_add_purchase'\n                and
            product_id_resolved is none\n                and has_item_name }}"
        sequence:
        - variables:
            case_norm: stock_buy_product
            case: stock_buy_product
            auto_upgraded: true
    - alias: Resolve Unit
      choose:
      - conditions:
        - alias: Resolve Unit
          condition: template
          value_template: "{{ case_norm in [\n      'stock_buy_product',\n      'stock_add_purchase',\n
            \     'stock_consume',\n      'stock_inventory_adjust',\n      'stock_transfer_location',\n
            \     'units_find',\n      'units_update'\n   ]\n   and unit_id_resolved
            is none\n   and (has_unit_name) }}\n"
        sequence:
        - action: script.zen_dojotools_grocy_advanced
          response_variable: units_all
          data:
            action_type: read
            endpoint: /objects/quantity_units
        - variables:
            units_all_list: "{{ units_all['result']['content'] if units_all is mapping and 'result' in units_all else [] }}"
            unit_id_resolved: "{{\n  (units_all_list\n    | selectattr('name','equalto',
              unit_norm)\n    | map(attribute='id')\n    | first)\n}}"
        alias: Resolve Unit (required for stock math)
    - choose:
      - conditions:
        - alias: Create default unit "each"
          condition: template
          value_template: "{{ unit_norm == 'each'\n   and unit_id_resolved is none\n   and case_norm in [\n     'stock_buy_product',\n     'stock_add_purchase',\n     'stock_consume',\n     'stock_inventory_adjust',\n     'stock_transfer_location'\n   ] }}"
        sequence:
        - action: script.zen_dojotools_grocy_advanced
          response_variable: unit_created
          data:
            action_type: post
            endpoint: /objects/quantity_units
            payload: "{{\n  {\n    \"name\": \"each\",\n    \"name_plural\": \"each\",\n
              \   \"description\": \"Default unit for countable items\"\n  }\n}}"
        - variables:
            unit_id_resolved: "{% if unit_created is mapping and 'result' in unit_created and unit_created['result'] is mapping and 'content' in unit_created['result'] %}\n  {{ unit_created['result']['content']['id'] | default(none) }}\n{% else %}\n  {{ none }}\n{% endif %}"
      alias: Create Default Unit 'each' if not present
    - choose:
      - conditions:
        - condition: template
          value_template: "{{ unit_norm == 'each'\n   and unit_id_resolved is none\n
            \  and case_norm == 'stock_buy_product' }}"
          alias: 'Error: Failed to create default unit'
        sequence:
        - variables:
            final_response:
              status: error
              message: Failed to create default quantity unit 'each'
              coaching:
              - Ensure Grocy allows unit creation
              - You may need to create the 'each' unit manually first
        - stop: Unit Creation Failed
          response_variable: final_response
      alias: 'Trap Error: Failed to create ''each'''
    - alias: Create Product if missing ('Buy It')
      choose:
      - conditions:
        - alias: 'Buy: Create product if missing'
          condition: template
          value_template: "{{ case_norm == 'stock_buy_product'\n   and (product_id_resolved
            is none)\n   and (has_item_name) }}"
        sequence:
        - choose:
          - conditions:
            - condition: template
              value_template: "{{ case_norm == 'stock_buy_product'\n   and product_id_resolved
                is none\n   and location_id_resolved is none }}"
              alias: 'Error: location required.'
            sequence:
            - variables:
                final_response:
                  status: error
                  message: 'Cannot create product: location is required by Grocy.'
                  case: '{{ case_norm }}'
                  item: '{{ item_norm }}'
                  coaching:
                  - Provide a location or location_id when buying a new product.
                  - Example: '{''case'':''stock_buy_product'',''item'':''{{ item_norm
                      }}'',''location'':''Pantry'',''amount'':1}'
                  - Grocy requires location_id when creating products.
            - stop: Product Create Blocked
              response_variable: final_response
          - conditions:
              condition: template
              value_template: "{{ case_norm in [\n      'stock_buy_product',\n      'stock_add_purchase',\n
                \     'stock_consume',\n      'stock_inventory_adjust',\n      'stock_transfer_location'\n
                \  ]\n   and unit_id_resolved is none }}"
            alias: 'Error: Unit required.'
            sequence:
            - variables:
                final_response:
                  status: error
                  message: 'Cannot perform stock operation: quantity unit is required.'
                  case: '{{ case_norm }}'
                  item: '{{ item_norm }}'
                  details:
                    unit:
                      name: '{{ unit_norm if has_unit_name else none }}'
                      id: '{{ unit_id_resolved }}'
                  coaching:
                  - Provide a unit or unit_id for this operation.
                  - 'Example: {''case'':''{{ case_norm }}'',''item'':''{{ item_norm
                    }}'',''unit'':''each'',''location'':''Pantry'',''amount'':1}'
                  - Unit name must exactly match a Grocy quantity unit.
            - stop: Unit Missing
              response_variable: final_response
        - action: script.zen_dojotools_grocy_advanced
          response_variable: product_created
          data:
            action_type: post
            endpoint: /objects/products
            payload: "{{\n  {\n    \"name\": item_norm,\n    \"location_id\": location_id_resolved,\n
              \   \"qu_id_stock\": unit_id_resolved,\n    \"qu_id_purchase\": unit_id_resolved,\n
              \   \"description\": (note_in if has_note else none)\n  }\n}}"
        - variables:
            product_id_resolved: "{% if product_created['result']['content']['id'] is defined
              %}\n  {{ product_created['result']['content']['id'] }}\n{% elif product_created['result']['content']['created_object_id']
              is defined %}\n  {{ product_created['result']['content']['created_object_id'] }}\n{%
              else %}\n  {{ none }}\n{% endif %}"
            grocy_product: '{{ product_created["result"]["content"] | default(none) }}'
        - choose:
          - conditions:
            - condition: template
              value_template: '{{ product_id_resolved is none }}'
              alias: 'Error: Buy blocked after create attempt'
            sequence:
            - variables:
                missing_location: '{{ (location_id_resolved is none) and not has_loc_name
                  }}'
                final_response:
                  status: error
                  message: "{% if missing_location %}\n  Purchase failed: a location
                    is required for stock_buy_product.\n{% else %}\n  Failed to create
                    product in catalog (no product id returned).\n{% endif %}"
                  case: '{{ case_norm }}'
                  item: '{{ item_norm }}'
                  details:
                    location:
                      name: '{{ loc_norm if has_loc_name else none }}'
                      id: '{{ location_id_resolved }}'
                    product_create_result: '{{ product_created["result"] | default(none)
                      }}'
                  coaching:
                  - "{% if missing_location %}\n  Provide a location (or location_id)
                    when buying a new product.\n  Example:\n  {'case':'stock_buy_product','item':'{{
                    item_norm }}','amount':1,'location':'Pantry'}\n{% else %}\n  Ensure
                    Grocy allows product creation and returns an id.\n{% endif %}"
                  - Grocy may enforce location_id on stock purchase writes.
                  - If the item name is unusual, try simplifying it.
            - stop: Buy Flow Failed
              response_variable: final_response
    - choose:
      - conditions:
        - condition: template
          value_template: "{{ case_norm == 'stock_transfer_location'\n   and grocy_product
            is mapping\n   and grocy_product.tare_weight_enabled | default(false) }}"
          alias: 'Error: Tare-weight transfer not allowed'
        sequence:
        - variables:
            final_response:
              status: error
              message: Transfer not supported for tare-weight products
              case: '{{ case_norm }}'
              product_id: '{{ product_id_resolved }}'
              coaching:
              - This product uses tare-weight handling.
              - Grocy does not support transfers for tare-weight products.
              - Physically move it, re-weigh, then use stock_inventory_adjust.
        - stop: Tare Transfer Blocked
          response_variable: final_response
      alias: 'Trap Error: Tare Weight Transfer Attempt'
    - alias: Resolve Chores
      choose:
      - conditions:
        - alias: Resolve Chores
          condition: template
          value_template: "{{ case_norm in ['chores_find','chores_execute']\n   and
            (chore_id_resolved is none)\n   and (has_item_name) }}"
        sequence:
        - action: script.zen_dojotools_grocy_advanced
          response_variable: chores_all
          data:
            action_type: read
            endpoint: /objects/chores
        - variables:
            chores_all_list: "{{ chores_all['result']['content'] if chores_all is mapping and 'result' in chores_all else [] }}"
            chore_id_resolved: "{{\n  (chores_all_list\n    | selectattr('name','equalto',
              item_norm)\n    | map(attribute='id') | first)\n  | default(\n      (chores_all_list\n
              \       | selectattr('name','search','(?i)' ~ item_norm)\n        | map(attribute='id')
              | first)\n    )\n  | default(chore_id_resolved)\n}}"
    - alias: Resolve Tasks
      choose:
      - conditions:
        - alias: Resolve Tasks
          condition: template
          value_template: "{{ case_norm in ['tasks_find','tasks_complete','tasks_undo']\n   and (task_id_resolved
            is none)\n   and (has_item_name) }}"
        sequence:
        - action: script.zen_dojotools_grocy_advanced
          response_variable: tasks_all
          data:
            action_type: read
            endpoint: /objects/tasks
        - variables:
            tasks_all_list: "{{ tasks_all['result']['content'] if tasks_all is mapping and 'result' in tasks_all else [] }}"
            task_id_resolved: "{{\n  (tasks_all_list\n    | selectattr('name','equalto',
              item_norm)\n    | map(attribute='id') | first)\n  | default(\n      (tasks_all_list\n
              \       | selectattr('name','search','(?i)' ~ item_norm)\n        | map(attribute='id')
              | first)\n    )\n  | default(task_id_resolved)\n}}"
    - variables:
        current_entry_base: "{{ none }}"
    - alias: Pre-fetch Entry for stock_entry_update
      choose:
      - conditions:
        - alias: Pre-fetch stock entry for read-modify-write
          condition: template
          value_template: "{{ case_norm == 'stock_entry_update'
            and entry_id_in is not none
            and product_id_resolved is not none }}"
        sequence:
        - action: script.zen_dojotools_grocy_advanced
          response_variable: entry_fetch_raw
          data:
            action_type: read
            endpoint: "stock/products/{{ product_id_resolved }}/entries"
        - variables:
            entry_fetch_list: "{{ entry_fetch_raw['result']['content'] | default([]) }}"
        - variables:
            current_entry_base: "{{ (entry_fetch_list
              | selectattr('id', 'equalto', entry_id_in | int)
              | list | first) | default(none) }}"
    - alias: Guards Before Endpoint Resolution
      choose:
      - conditions:
        - alias: 'Guard: invalid location rename'
          condition: template
          value_template: "{{ case_norm == 'locations_rename'\n   and (\n     not has_new_name\n
            \    or new_name_norm == loc_norm\n   ) }}\n"
        sequence:
        - variables:
            final_response:
              status: error
              message: Invalid rename request
              case: '{{ case_norm }}'
              details:
                current_name: '{{ loc_norm }}'
                requested_name: '{{ new_name_norm }}'
              coaching:
              - New name must be provided
              - New name must differ from the current name
        - stop: Rename Guard Failed
          response_variable: final_response
      - conditions:
        - condition: template
          value_template: "{{ case_norm == 'stock_add_purchase'\n   and product_id_resolved
            is none }}"
          alias: 'Guard: purchase requires existing product'
        sequence:
        - variables:
            final_response:
              status: error
              message: Product not found in catalog
              case: '{{ case_norm }}'
              details:
                item: '{{ item_norm }}'
                location: '{{ loc_norm }}'
                price: '{{ price_in }}'
              coaching:
              - stock_add_purchase requires an existing catalog product
              - Use stock_buy_product to create-and-purchase
              - Or provide an explicit product_id
        - stop: Purchase Guard Failed
          response_variable: final_response
      - conditions:
        - condition: template
          value_template: "{{ case_norm == 'products_merge'\n   and (\n     product_id_keep_resolved
            is none\n     or product_id_remove_resolved is none\n     or product_id_keep_resolved
            == product_id_remove_resolved\n   ) }}"
          alias: 'Guard: invalid product merge'
        sequence:
        - variables:
            final_response:
              status: error
              message: Invalid product merge request
              case: '{{ case_norm }}'
              details:
                product_id_keep: '{{ product_id_keep_resolved }}'
                product_id_remove: '{{ product_id_remove_resolved }}'
              coaching:
              - product_id_keep and product_id_remove are required
              - IDs must be different
              - This action is irreversible
        - stop: Product Merge Guard Failed
          response_variable: final_response
      - conditions:
        - alias: 'Guard: invalid product rename'
          condition: template
          value_template: "{{ case_norm == 'rename_product'\n   and (\n     not has_new_name\n
            \    or new_name_norm == grocy_product.name\n   ) }}\n"
        sequence:
        - variables:
            final_response:
              status: error
              message: Invalid product rename
              case: '{{ case_norm }}'
              details:
                current_name: '{{ grocy_product.name }}'
                requested_name: '{{ new_name_norm }}'
              coaching:
              - New name must be provided
              - New name must differ from current name
        - stop: Product Rename Guard Failed
          response_variable: final_response
      - conditions:
        - condition: template
          value_template: "{{ case_norm == 'set_default_location_for_product'\n   and
            location_id_resolved is none }}"
          alias: 'Guard: default location requires location'
        sequence:
        - variables:
            final_response:
              status: error
              message: Default location requires a valid location
              case: '{{ case_norm }}'
              coaching:
              - Provide location or location_id
              - Example:
                  case: set_default_location_for_product
                  item: Coffee
                  location: Pantry
        - stop: Default Location Guard Failed
          response_variable: final_response
      - conditions:
        - condition: template
          value_template: "{{ case_norm == 'units_update'\n   and unit_id_resolved is
            none }}"
          alias: 'Guard: unit must exist for unit_update'
        sequence:
        - variables:
            final_response:
              status: error
              message: Quantity unit not found
              case: units_update
              details:
                unit: '{{ unit_norm }}'
              coaching:
              - Provide a valid unit_id
              - Use units_list or units_find to discover unit IDs
        - stop: Unit Update Blocked
          response_variable: final_response
      - conditions:
        - alias: 'Guard: stock_entry_update entry not found'
          condition: template
          value_template: "{{ case_norm == 'stock_entry_update'
            and entry_id_in is not none
            and current_entry_base is none }}"
        sequence:
        - variables:
            final_response:
              status: error
              message: "Stock entry {{ entry_id_in }} not found"
              case: '{{ case_norm }}'
              coaching:
              - "Get valid entry IDs via: {'case':'stock_entries_for_item','item':'...'}"
              - "Pass the same item or product_id when calling stock_entry_update"
        - stop: Entry Not Found
          response_variable: final_response
    - variables:
