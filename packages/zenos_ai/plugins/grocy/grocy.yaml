              \       \"notes\": [\n          \"Product must already exist\",\n          \"Quantity
              unit must be resolvable\"\n        ]\n      },\n\n      \"stock_buy_product\":
              {\n        \"intent\": \"Create a product if missing, then purchase it
              into inventory.\",\n        \"needs\": [\"item OR product_id\"],\n        \"writes\":
              [\n          \"POST /objects/products (if missing)\",\n          \"POST
              /stock/products/{productId}/add\"\n        ],\n        \"notes\": [\n
              \         \"Location is required when creating a new product\",\n          \"Quantity
              unit must be resolvable\",\n          \"Optional post-purchase inventory
              report may be returned\"\n        ]\n      },\n\n      \"stock_consume\":
              {\n        \"intent\": \"Consume quantity of an item from inventory.\",\n
              \       \"needs\": [\"item OR product_id\"],\n        \"writes\": \"POST
