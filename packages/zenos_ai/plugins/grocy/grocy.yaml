###############################################################################
# ZenOS-AI Plugin: Grocy ERP Integration
# Version: 4.0.0 RC2
#
# UAT:     Critical path PASS — 2026-03-02
#          (locations_add, stock_buy_product, stock_check_item,
#           shopping_add/remove_product, recipes_list, recipes_fulfillment,
#           batteries_list, stock_list_volatile, stock_overview, stock_consume,
#           units_add, stock_get_product_details, recipe_check_fulfillment,
#           stock_entries_for_item, catalog_find_by_barcode,
#           recipes_add_to_shopping, chores_execute, recipes_copy,
#           stock_undo_booking, stock_open_item, stock_add_by_barcode,
#           stock_consume_by_barcode, stock_entry_update [read-modify-write]
#           — all verified against live Grocy instance)
# HALMark: PASS — 2026-03-02 (v0.9.10-draft)
#          (selectors, default(none), selectattr guards, no hardcoded IDs,
#           no initial: on input_text, filter ordering — all clean)
#
# SETUP
#
# 1. Add to secrets.yaml:
#      grocy_api_key: <your_api_key>   (no prefix — Grocy uses a bare key)
#
# 2. Set input_text.grocy_url in HA (Settings > Helpers, or Developer Tools):
#      https://<your-grocy-host>   (no trailing slash)
#    Must be set once after install — value persists across restarts.
#
#    *** USE HTTPS, NOT HTTP ***
#    If your Grocy is behind a reverse proxy (Caddy, nginx, Traefik) that
#    redirects HTTP → HTTPS, HA's HTTP client follows the 301 but converts
#    every POST to a GET per RFC. All write operations will silently fail.
#
# HOW TO GET YOUR GROCY API KEY:
#   1. Log in to Grocy
#   2. Go to Settings (top-right) > Manage API Keys
#   3. Click the key icon to copy your existing API key, or create a new one
#   4. Paste directly (no prefix needed):
#      grocy_api_key: XXXXXXXXXXXXXXXX
###############################################################################

input_text:
  grocy_url:
    name: "Grocy Base URL"
    max: 255
    mode: text
    icon: mdi:fridge-outline

rest_command:
  grocy_api_advanced_get:
    url: "{{ states('input_text.grocy_url') | trim('/') }}/api/{{ endpoint | replace('/api/', '') | replace('api/', '') | trim('/') }}{% if '?' not in (endpoint | string) %}?limit={{ perPage | int(20) }}&offset={{ (((pageNumber | int(1)) - 1) * (perPage | int(20))) }}{% if search is defined and search | trim != '' %}&query[]=name*={{ search }}{% endif %}{% if orderBy is defined and orderBy | trim != '' %}&order={{ orderBy }}%3A{{ orderDirection | default('asc') }}{% endif %}{% endif %}"
    method: GET
    headers:
      GROCY-API-KEY: !secret grocy_api_key
      content-type: application/json
    timeout: 30
  grocy_api_advanced_post:
    url: "{{ states('input_text.grocy_url') | trim('/') }}/api/{{ endpoint | replace('/api/', '') | replace('api/', '') | trim('/') }}"
    method: POST
    headers:
      GROCY-API-KEY: !secret grocy_api_key
      content-type: application/json
    payload: "{{ payload }}"
    timeout: 30
  grocy_api_advanced_put:
    url: "{{ states('input_text.grocy_url') | trim('/') }}/api/{{ endpoint | replace('/api/', '') | replace('api/', '') | trim('/') }}"
    method: PUT
    headers:
      GROCY-API-KEY: !secret grocy_api_key
      content-type: application/json
    payload: "{{ payload }}"
    timeout: 30
  grocy_api_advanced_delete:
    url: "{{ states('input_text.grocy_url') | trim('/') }}/api/{{ endpoint | replace('/api/', '') | replace('api/', '') | trim('/') }}"
    method: DELETE
    headers:
      GROCY-API-KEY: !secret grocy_api_key
      content-type: application/json
    payload: "{{ payload | default('') }}"
    timeout: 30

script:
  zen_dojotools_grocy_advanced:
    #description: >-
    #  Internal Grocy REST dispatcher used by zen_dojotools_grocy_helper.
    #  Handles GET/POST/PUT/DELETE against the Grocy API with pagination,
    #  search, and payload routing. Not intended for direct invocation.
    #icon: mdi:api
    sequence:
    - variables:
        inv_action_type: "{% set v = action_type | default('help') %} {% if v in ['post','create']
          %}\n  create\n{% elif v in ['get','read'] %}\n  read\n{% elif v in ['put','update']
          %}\n  update\n{% elif v in ['delete'] %}\n  delete\n{% elif v == 'help' %}\n
          \ help\n{% else %}\n  help\n{% endif %}"
        inv_endpoint: '{{ endpoint | default('''') }}'
        inv_payload: '{{ payload | default('''') }}'
        inv_search: '{{ search | default('''') }}'
        inv_extra_params: '{{ extra_params | default({}) }}'
        inv_page: '{{ pageNumber | default(1) }}'
        inv_limit: '{{ perPage | default(20) }}'
        inv_endpoint_path: "{% if '?' in inv_endpoint %}\n  {{ inv_endpoint.split('?',
          1)[0] }}\n{% else %}\n  {{ inv_endpoint }}\n{% endif %}"
        is_objects_endpoint: "{{\n  inv_endpoint_path[0:8] == 'objects/'\n  or inv_endpoint_path[0:9]
          == '/objects/'\n}}"
        is_objects_products: "{{ inv_endpoint_path == 'objects/products'\n   or inv_endpoint_path
          == '/objects/products' }}"
        is_get: '{{ inv_action_type == ''read'' }}'
        is_post: '{{ inv_action_type == ''create'' }}'
        is_put: '{{ inv_action_type == ''update'' }}'
        is_delete: '{{ inv_action_type == ''delete'' }}'
        is_help: '{{ inv_action_type == ''help'' }}'
        requires_payload: '{{ is_post or is_put or is_delete }}'
        has_endpoint: '{{ inv_endpoint not in ['''', None] }}'
        explicit_path_params: '{{ path_params is defined and path_params | count > 0
          }}'
        explicit_search: '{{ search is defined and search | trim != '''' }}'
        explicit_extra_params: '{{ extra_params is defined and extra_params | count
          > 0 }}'
        explicit_page: '{{ pageNumber is defined }}'
        explicit_limit: '{{ perPage is defined }}'
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ requires_payload and inv_payload | trim == '''' }}'
          alias: Error - Payload Required
        sequence:
        - variables:
            final_response:
              status: error
              message: This action requires a JSON payload, but none was provided.
        - stop: Missing Payload
          response_variable: final_response
      - conditions:
        - condition: template
          value_template: '{{ not has_endpoint and not is_help }}'
          alias: Error - Endpoint Required
        sequence:
        - variables:
            final_response:
              status: error
              message: A valid Grocy API endpoint is required.
        - stop: Missing Endpoint
          response_variable: final_response
      - conditions:
        - condition: template
          value_template: '{{ is_help }}'
          alias: HELP
        sequence:
        - variables:
            inv_docs: sensor.grocy_restful_openapi_docs
            inv_paths: "{% set attr = state_attr(inv_docs, 'paths') %} {% if attr is
              mapping %}\n  {{ attr }}\n{% else %}\n  {}\n{% endif %}"
            inv_tags: "{% set ns = namespace(tagset=[]) %}\n{% if inv_paths is mapping and inv_paths.items
              is defined %}\n  {% for path, methods in inv_paths.items() %}\n    {%
              if methods is mapping %}\n      {% for method, info in methods.items()
              %}\n        {% if info is mapping and info.tags is defined and info.tags
              is iterable %}\n          {% for tag in info.tags %}\n            {% if
              tag not in ns.tagset %}\n              {% set ns.tagset = ns.tagset + [tag] %}\n
              \           {% endif %}\n          {% endfor %}\n        {% endif %}\n
              \     {% endfor %}\n    {% endif %}\n  {% endfor %}\n{% endif %}\n{{ ns.tagset
              | to_json }}"
            help_response:
              status: info
              message: Zen Dojotools Grocy Advanced Help
              endpoint: '{{ inv_endpoint | default(''(none provided)'') }}'
              available_endpoints: '{{ inv_paths | list | to_json }}'
              available_tags: '{{ inv_tags }}'
              categories: '{{ inv_tags }}'
              cheatsheet:
                description: 'Common Generic entity interactions - exposed at these
                  endpoints for convenience. If you have a Grocy component,  Extended
                  help may be available in your Dojo. Note - START with /object/{entity}
                  before trying /{entity}
  
                  '
                methods:
                  more_info: "use File CRUD tool to read\n  dojo_cabinet/grocy_manager\n
                    \ dojo_cabinet/grocy_api_endpoints\ndrawers for detailed up to date
                    documentation.\n"
                  GET:
                  - /objects/{entity}: Returns all objects of the given entity (yes
                      objects first!)
                  - /objects/{entity}/{objectId}: Returns a single object of the given
                      entity
                  - /userfields/{entity}/{objectId}: Returns all userfields with their
                      values of the given object of the given entity
                  - /stock: Returns all products currently in stock incl. next due date.
                  - /stock/volatile: Returns all products due soon, overdue or expiring.
                  - /userfields/{entity}/{objectId}: Returns userfields with values.
                  POST:
                  - /objects/{entity}: Adds a single object of the given entity
                  PUT:
                  - /objects/{entity}/{objectId}: Edits the given object of the given
                      entity
                  - /userfields/{entity}/{objectId}: Edits the given userfields of the
                      given object of the given entity
                  DELETE:
                  - /objects/{entity}/{objectId}: Deletes a single object of the given
                      entity
                  available_grocy_entities:
                  - batteries
                  - chores
                  - equipment
                  - locations
                  - meal_plan
                  - meal_plan_sections
                  - product_barcodes
                  - product_groups
                  - products
                  - quantity_unit_conversions
                  - quantity_units
                  - recipes
                  - recipes_nestings
                  - recipes_pos
                  - shopping_list
                  - shopping_lists
                  - shopping_locations
                  - task_categories
                  - tasks
                  - userentities
                  - userfields
                  - userobjects
              tips:
              - Should you be using this tool? Always Prefer the Zen DojoTools Grocy
                Helper unless it referred you to use this 'Advanced' tool directly.
              - 'ALWAYS START WITH /objects/ GET/POST/PUT /objects/{entity} is where
                you find the interesting stuff ...your starting point. example: /objects/locations'
              - /objects/shopping_lists is a list of shopping lists while /objects/shopping_list
                are the items on the lists with each having attribute shopping_list_id
              - non-200 non-401 status returns on known endpoints may indicate the endpoint
                is not the correct or primary endpoint for your chosen method. Review
                paths to identify the correct path. A 405 means you are doing it wrong,
                it's not the setup.
              - Use path_params to replace dynamic tokens in endpoints like {product_id}.
              best_practices: 'Tool Choice: The Zen DojoTools Grocy Helper is a tool
                wrapper designed to work with this tool to remove complexity.
  
                PREFER ''Helper'' over ''Advanced'' (this) unless the ''Helper'' tool
                EXPLICITLY instricted you to refer to this tool directly.
  
                Usage Notes: - Specify valid API endpoints to avoid errors. - Use pagination
                (pageNumber and perPage) for large datasets. - Leverage filtering options
                for targeted queries. - Detailed item and product management is supported
                (e.g. quantity, expiry, location, and labels). - Integrates with household
                user/group systems for secure and collaborative use.
  
                Best Practices: - Always read current inventory data before updating
                to prevent overwrites. - Validate JSON payloads prior to submitting
                create or update operations. - Include all relevant parameters for consistent
                results. - Use metadata and labels to enhance filtering and organization.
  
                '
              version: v1.5.0
              next:
              - Planned: auto-label inventory → cabinet sync bridge
        - stop: Help Displayed
          response_variable: help_response
      - conditions:
        - condition: template
          value_template: '{{ is_get }}'
        sequence:
        - variables:
            read_data: "{% set d = {\"endpoint\": inv_endpoint, \"pageNumber\": inv_page,
              \"perPage\": inv_limit} %} {% if explicit_path_params %}\n  {% set d =
              d | combine({\"path_params\": path_params}) %}\n{% endif %} {% if explicit_search
              %}\n  {% set d = d | combine({\"search\": inv_search}) %}\n{% endif %}
              {% if explicit_extra_params %}\n  {% set d = d | combine({\"additional_params\":
              inv_extra_params}) %}\n{% endif %} {{ d }}"
            read_response: {}
        - data: '{{ read_data }}'
          response_variable: read_response
          action: rest_command.grocy_api_advanced_get
        - variables:
            status_code: '{{ read_response.status | int(0) }}'
            is_405: '{{ status_code == 405 }}'
            final_response: "{% if is_405 %}\n  {{\n    {\n      \"status\": \"error\",\n
              \     \"message\": \"405 Method Not Allowed. You may be using the wrong
              endpoint.\",\n      \"tip\": \"Most Grocy object actions excluding stock
              use /objects/{entity}. Try again with '/objects/{{ inv_endpoint }}'.\",\n
              \     \"endpoint\": inv_endpoint\n    }\n  }}\n{% else %}\n  {{\n    {\n
              \     \"status\": \"success\",\n      \"message\": \"GET to '\" ~ inv_endpoint
              ~ \"' succeeded.\",\n      \"result\": read_response\n    }\n  }}\n{%
              endif %}"
        alias: READ
      - conditions:
        - condition: template
          value_template: '{{ is_post }}'
        sequence:
        - data:
            endpoint: '{{ inv_endpoint }}'
            path_params: '{{ path_params | default({}) }}'
            payload: "{% if inv_payload is mapping %}\n  {{ inv_payload | to_json }}\n{%
              else %}\n  {{ inv_payload }}\n{% endif %}"
          response_variable: response
          action: rest_command.grocy_api_advanced_post
        - variables:
            status_code: '{{ response.status | int(0) }}'
            is_405: '{{ status_code == 405 }}'
            final_response: "{% if is_405 %}\n  {{\n    {\n      \"status\": \"error\",\n
              \     \"message\": \"405 Method Not Allowed. You may be using the wrong
              endpoint.\",\n      \"tip\": \"Most Grocy object actions use /objects/{entity}.
              Try again with '/objects/{{ inv_endpoint }}'.\",\n      \"endpoint\":
              inv_endpoint\n    }\n  }}\n{% else %}\n  {{\n    {\n      \"status\":
              \"success\",\n      \"message\": \"POST to '\" ~ inv_endpoint ~ \"' succeeded.\",\n
              \     \"result\": response\n    }\n  }}\n{% endif %}"
        alias: CREATE
      - conditions:
        - condition: template
          value_template: '{{ is_put }}'
        sequence:
        - data:
            endpoint: '{{ inv_endpoint }}'
            path_params: '{{ path_params | default({}) }}'
            payload: "{% if inv_payload is mapping %}\n  {{ inv_payload | to_json }}\n{%
              else %}\n  {{ inv_payload }}\n{% endif %}"
          response_variable: response
          action: rest_command.grocy_api_advanced_put
        - variables:
            status_code: '{{ response.status | int(0) }}'
            is_405: '{{ status_code == 405 }}'
            final_response: "{% if is_405 %}\n  {{\n    {\n      \"status\": \"error\",\n
              \     \"message\": \"405 Method Not Allowed. You may be using the wrong
              endpoint.\",\n      \"tip\": \"Most Grocy object actions excluding stock
              use /objects/{entity}. Try again with '/objects/{{ inv_endpoint }}'.\",\n
              \     \"endpoint\": inv_endpoint\n    }\n  }}\n{% else %}\n  {{\n    {\n
              \     \"status\": \"success\",\n      \"message\": \"PUT to '\" ~ inv_endpoint
              ~ \"' succeeded.\",\n      \"result\": response\n    }\n  }}\n{% endif
              %}"
        alias: UPDATE
      - conditions:
        - condition: template
          value_template: '{{ is_delete }}'
        sequence:
        - data:
            endpoint: '{{ inv_endpoint }}'
            path_params: '{{ path_params | default({}) }}'
            payload: "{% if inv_payload is mapping %}\n  {{ inv_payload | to_json }}\n{%
              else %}\n  {{ inv_payload }}\n{% endif %}"
          response_variable: response
          action: rest_command.grocy_api_advanced_delete
        - variables:
            status_code: '{{ response.status | int(0) }}'
            is_405: '{{ status_code == 405 }}'
            final_response: "{% if is_405 %}\n  {{\n    {\n      \"status\": \"error\",\n
              \     \"message\": \"405 Method Not Allowed. You may be using the wrong
              endpoint.\",\n      \"tip\": \"Most Grocy object actionsexcluding stock
              use /objects/{entity}. Try again with '/objects/{{ inv_endpoint }}'.\",\n
              \     \"endpoint\": inv_endpoint\n    }\n  }}\n{% else %}\n  {{\n    {\n
              \     \"status\": \"success\",\n      \"message\": \"DELETE to '\" ~ inv_endpoint
              ~ \"' succeeded.\",\n      \"result\": response\n    }\n  }}\n{% endif
              %}"
        alias: DELETE
    - variables:
        final_response: "{{ final_response if final_response is defined else {\n  \"status\":
          \"error\",\n  \"message\": \"Unknown failure or incomplete input.\"\n} }}\n"
    - stop: End
      response_variable: final_response
    alias: Zen DojoTools Grocy Advanced
    description: "Zen DojoTools Grocy Advanced (v. 1.7.0) USE Zen DojoTools Grocy Helper
      first, it is an easy to use passthrough to this tool. It will highlight WHEN to
      escalate to this modular controller for Grocy ERP. Supports inventory CRUD across
      all endpoints. Accepts action_type (create, read, update, delete, help), dynamic
      path_params, query filters, and JSON payloads. Use 'read' for GET operations (optionally
      with search and filters), 'create' (POST), 'update' (PUT), or 'delete' (DELETE)
      with appropriate payload.\nIf you get a 405 error \n  - should you be using this
      tool instead of Zen DojoTools Grocy Helper?\n  - it likely means your endpoint
      call is incorrect. Thats why the Grocy Helper exists.\n  - Use Help. \n\nFor a
      full list of supported endpoints, tags, usage patterns, and sample operations,
      pass 'help' as the action_type. Help returns OpenAPI path docs, tags, Grocy patterns,
      and best practices."
    fields:
      action_type:
        name: CRUD Action
        selector:
          select:
            options:
            - create
            - read
            - update
            - delete
            - help
        default: help
        required: true
      endpoint:
        name: API Endpoint
        description: API endpoint, e.g., 'stock', 'objects/products', 'objects/locations',
          'objects/tasks', etc.  See paths in HELP for list.
        selector:
          text:
      path_params:
        description: 'Optional token replacements like {"product_id": 4}.
  
          '
        selector:
          object:
      payload:
        name: Payload (JSON)
        description: 'JSON body for POST/PUT/DELETE requests. Required for those actions.
  
          '
        selector:
          text:
            multiline: true
      search:
        name: Search Term
        description: (GET only) Free-text search filter
        selector:
          text:
      extra_params:
        name: Extra Filters
        description: 'Additional GET query filters, e.g. {"spoiled": "false"}
  
          '
        selector:
          object:
      pageNumber:
        name: Page Number
        selector:
          number:
            min: 1
            max: 99
            step: 1
        default: 1
      perPage:
        name: Items Per Page
        selector:
          number:
            min: 1
            max: 100
            step: 1
        default: 20
    mode: single
    icon: mdi:cart

  zen_dojotools_grocy_helper:
    alias: Zen DojoTools Grocy Helper
    description: >-
      Grocy household ERP — 56 cases: stock, shopping, recipes, catalog, locations,
      tasks, chores, barcodes, batteries. item/location/unit names resolve to Grocy
      IDs automatically. Quick start: stock_check_item(item="coffee"),
      stock_buy_product(item="coffee", amount=2, location="Pantry"),
      recipes_fulfillment(). Run mode=help for full case catalogue with examples.
    mode: single
    icon: mdi:cart-variant
    fields:
      mode:
        name: Mode
        description: Execution mode. Use help to show full documentation or run to execute.
        selector:
          select:
            options:
            - run
            - help
        default: help
      case:
        description: 'Operation. 56 cases. Run mode=help for full catalogue with examples.'
        selector:
          select:
            options:
            - catalog_list_products
            - catalog_find_product
            - products_merge
            - get_product_meta
            - rename_product
            - update_product_meta
            - set_default_location_for_product
            - locations_add
            - locations_metadata_set
            - locations_rename
            - locations_list
            - locations_find
            - stock_list_by_location
            - stock_check_item
            - stock_where_is_item
            - stock_entries_for_item
            - stock_add_purchase
            - stock_buy_product
            - stock_consume
            - stock_inventory_adjust
            - stock_transfer_location
            - shopping_add_missing
            - shopping_add_overdue
            - shopping_add_expired
            - chores_list
            - chores_find
            - chores_execute
            - tasks_list
            - tasks_find
            - tasks_complete
            - units_list
            - units_find
            - units_add
            - units_update
            - shopping_add_product
            - shopping_remove_product
            - shopping_clear_list
            - recipes_list
            - recipes_fulfillment
            - recipe_check_fulfillment
            - recipes_add_to_shopping
            - recipes_consume
            - recipes_copy
            - stock_overview
            - stock_list_volatile
            - stock_get_product_details
            - stock_open_item
            - stock_entry_update
            - stock_undo_booking
            - tasks_undo
            - chores_undo
            - catalog_find_by_barcode
            - stock_add_by_barcode
            - stock_consume_by_barcode
            - batteries_list
            - batteries_get
            - batteries_charge
        default: stock_check_item
      item:
        name: Item
        description: 'Name resolved to Grocy ID. E.g. "coffee", "Pantry", "Clean litter box".'
        selector:
          text:
      brand:
        name: Brand
        description: Optional - Product meta - Brand of Product
        selector:
          text:
      sku:
        name: SKU
        description: Optional - Product meta - Product SKU
        selector:
          text:
      unit:
        name: Unit
        description: Quantity unit name (exact Grocy match, e.g. each, kg, l).
        selector:
          text:
      unit_id:
        name: Unit ID
        description: Explicit quantity unit ID. Skips unit name lookup.
        selector:
          number:
            min: 1
      location:
        name: Location
        description: Source or primary location name used by location-aware cases.
        selector:
          text:
      to_location:
        name: To Location
        description: Destination location name for transfer operations.
        selector:
          text:
      store:
        name: Store
        description: Shopping location name used for purchase-related cases only.
        selector:
          text:
      product_id:
        name: Product ID
        description: Explicit product ID. Skips product name resolution.
        selector:
          number:
            min: 1
      product_id_keep:
        name: Product ID to Keep
        description: Canonical product ID that will remain.
        selector:
          number:
            min: 1
      product_id_remove:
        name: Product ID to Remove
        description: Duplicate product ID that will be merged and deleted.
        selector:
          number:
            min: 1
      location_id:
        name: Location ID
        description: Explicit location ID. Skips location name resolution.
        selector:
          number:
            min: 1
      to_location_id:
        name: To Location ID
        description: Explicit destination location ID for transfers.
        selector:
          number:
            min: 1
      shopping_location_id:
        name: Shopping Location ID
        description: Explicit shopping location ID. Skips store name lookup.
        selector:
          number:
            min: 1
      parent_location:
        name: Parent Location
        description: Parent location name used when setting location metadata.
        selector:
          text:
      parent_location_id:
        name: Parent Location ID
        description: Explicit parent location ID used for location metadata.
        selector:
          number:
            min: 1
      location_subclass:
        selector:
          select:
            options:
            - suite
            - room
            - closet
            - workspace
            - container
            - furniture
            - shelf
            - drawer
            - cubby
            - storage
        description: What type of location / storage is this? (location metadata)
      homeassistant_area_id:
        name: Home Assistant Area
        description: Home Assistant area associated with this Grocy location.
        selector:
          text:
      placement_priority:
        name: Placement Priority
        description: Numeric semantic priority for resolving locations. Higher wins.
        selector:
          number:
            min: 0
            step: 1
      chore_id:
        name: Chore ID
        description: Explicit chore ID. Skips chore name lookup.
        selector:
          number:
            min: 1
      task_id:
        name: Task ID
        description: Explicit task ID. Skips task name lookup.
        selector:
          number:
            min: 1
      amount:
        name: Amount
        description: Quantity used for stock math such as buy, consume, or transfer.
        selector:
          number:
            min: 0
            step: 0.01
      price:
        name: Price
        description: Optional unit price used for purchase transactions.
        selector:
          number:
            min: 0
            step: 0.01
      best_before_date:
        name: Best Before
        description: Optional best-before or due date for inventory entries.
        selector:
          date:
      list_id:
        name: Shopping List ID
        description: Optional shopping list ID override for shopping list cases.
        selector:
          number:
            min: 1
      note:
        name: Note
        description: Optional human-readable note stored with the action.
        selector:
          text:
            multiline: true
      report_inventory:
        name: Report Inventory
        description: Return a post-purchase inventory summary after buying.
        selector:
          boolean:
        default: true
      new_name:
        name: New Name
        description: New name for the location.
        selector:
          text:
      page:
        name: Page
        description: Page number (1-based)
        selector:
          number:
            min: 1
        default: 1
      per_page:
        name: Items per page
        description: Number of items per page
        selector:
          number:
            min: 1
            max: 250
        default: 25
      show_trace:
        name: Show Debug Trace
        description: Include resolution details, IDs, and endpoint information.
        selector:
          boolean:
      barcode:
        name: Barcode
        description: Product barcode (EAN/UPC) for barcode-based stock operations.
        selector:
          text:
      recipe_id:
        name: Recipe ID
        description: Explicit Grocy recipe ID. Skips recipe name lookup.
        selector:
          number:
            min: 1
      entry_id:
        name: Stock Entry ID
        description: Specific stock entry ID for stock_entry_update. Get IDs via stock_entries_for_item.
        selector:
          number:
            min: 1
      execution_id:
        name: Chore Execution ID
        description: Execution ID to undo for chores_undo.
        selector:
          number:
            min: 1
      booking_id:
        name: Booking ID
        description: Booking ID to undo for stock_undo_booking.
        selector:
          number:
            min: 1
      battery_id:
        name: Battery ID
        description: Grocy battery ID for batteries_get and batteries_charge.
        selector:
          number:
            min: 1
      done_only:
        name: Done Only
        description: For shopping_clear_list — only clear items marked done (false clears all).
        selector:
          boolean:
        default: false
    sequence:
    - variables:
        show_trace: '{{ show_trace | default(false) }}'
        tool_name: Zen DojoTools Grocy Helper
        tool_version: 4.0.0 RC2
    - variables:
        grocy_response: {}
        mode_norm: '{{ (mode | default(''help'')) | string | lower }}'
        case_norm: '{{ (case | default(''stock_check_item'')) | string | lower }}'
        item_norm: '{{ (item | default('''')) ~ '''' | trim }}'
        unit_norm: "{{\n  (unit | default('each')) ~ ''\n  | trim\n  | lower\n}}"
        loc_norm: '{{ (location | default('''')) ~ '''' | trim }}'
        loc_sub_norm: '{{ ( location_subclass | default('''') ) }}'
        to_loc_norm: '{{ (to_location | default('''')) ~ '''' | trim }}'
        store_norm: '{{ (store | default('''')) ~ '''' | trim }}'
        report_inventory_norm: '{{ report_inventory | default(true) }}'
        parent_loc_norm: '{{ (parent_location | default('''')) ~ '''' | trim }}'
        parent_lid_in: '{{ parent_location_id | default(none) }}'
        area_id_norm: '{{ (homeassistant_area_id | default('''')) ~ '''' | trim }}'
        new_name_norm: '{{ (new_name | default('''')) ~ '''' | trim }}'
        placement_priority_in: '{{ placement_priority | default(none) }}'
        pid_keep_in: '{{ product_id_keep | default(none) }}'
        pid_remove_in: '{{ product_id_remove | default(none) }}'
        uid_in: '{{ unit_id | default(none) }}'
        pid_in: "{% set pid = product_id | default(none) %} {% if pid is not none %}\n
          \ {{ pid }}\n{% elif item is number %}\n  {{ item | int }}\n{% else %}\n  {{
          none }}\n{% endif %}"
        lid_in: "{% set lid = location_id | default(none) %}\n{% if lid is not none
          %}\n  {{ lid }}\n{% elif location is number %}\n  {{ location | int }}\n{%
          elif location is string and location | trim | regex_match('^\\\\d+$') %}\n
          \ {{ location | int }}\n{% else %}\n  {{ none }}\n{% endif %}"
        to_lid_in: "{% set lid = to_location_id | default(none) %}\n{% if lid is not
          none %}\n  {{ lid }}\n{% elif to_location is number %}\n  {{ to_location |
          int }}\n{% else %}\n  {{ none }}\n{% endif %}"
        slid_in: '{{ shopping_location_id | default(none) }}'
        cid_in: '{{ chore_id | default(none) }}'
        tid_in: '{{ task_id | default(none) }}'
        amt_in: '{{ amount | default(1) | float(0) }}'
        price_in: '{{ price | default(none) }}'
        bbd_in: '{{ best_before_date | default(none) }}'
        list_in: '{{ list_id | default(none) }}'
        note_in: '{{ note | default('''') | string | trim }}'
        payload_in: '{{ payload | default(none) }}'
        page_in: '{{ page | default(1) | int(1) }}'
        per_page_in: '{{ per_page | default(25) | int(25) }}'
        has_item_name: '{{ item_norm is string and item_norm | length > 0 }}'
        has_loc_name: '{{ loc_norm is string and loc_norm | length > 0 }}'
        has_to_loc_name: '{{ to_loc_norm is string and to_loc_norm | length > 0 }}'
        has_parent_loc_name: '{{ parent_loc_norm is string and parent_loc_norm | length
          > 0 }}'
        has_new_name: '{{ new_name_norm is string and new_name_norm | length > 0 }}'
        has_area_id: '{{ area_id_norm is string and area_id_norm | length > 0 }}'
        has_loc_subclass: '{{ loc_sub_norm is string and loc_sub_norm | length > 0 }}'
        has_store_name: '{{ store_norm is string and store_norm | length > 0 }}'
        has_unit_name: '{{ unit_norm is string and unit_norm | length > 0 }}'
        has_note: '{{ note_in is string and note_in | length > 0 }}'
        has_brand: '{{ brand is string and brand | length > 0 }}'
        has_sku: '{{ sku is string and sku | length > 0 }}'
        barcode_norm: '{{ (barcode | default("")) | string | trim }}'
        recipe_id_in: '{{ recipe_id | default(none) }}'
        entry_id_in: '{{ entry_id | default(none) }}'
        execution_id_in: '{{ execution_id | default(none) }}'
        booking_id_in: '{{ booking_id | default(none) }}'
        battery_id_in: '{{ battery_id | default(none) }}'
        done_only_in: '{{ done_only | default(false) }}'
        has_barcode: '{{ barcode_norm | length > 0 }}'
        has_explicit_amount: '{{ amount is defined and amount is not none }}'
        recipe_id_resolved: '{{ recipe_id | default(none) }}'
    - variables:
        cases:
          catalog_list_products:
            intent: List all products (catalog).
            needs: []
            does: GET /objects/products
            paging:
              required: true
              default:
                pageNumber: 1
                perPage: 25
            example: "{'case':'catalog_list_products','per_page':25}"
          catalog_find_product:
            intent: Find a product by name (catalog lookup).
            needs:
            - item
            does: GET /objects/products + local name match
            example: "{'case':'catalog_find_product','item':'coffee'}"
          get_product_meta:
            intent: Retrieve canonical product metadata.
            needs:
            - item OR product_id
            does: GET /objects/products/{productId}
            example: "{'case':'get_product_meta','item':'coffee'}"
          rename_product:
            intent: Rename a product (display name only).
            needs:
            - item OR product_id
            - new_name
            does: PUT /objects/products/{productId}
            notes:
            - Product ID remains stable
            - Stock and history are unaffected
            example: "{'case':'rename_product','item':'coffee','new_name':'Whole Bean Coffee'}"
          update_product_meta:
            intent: Update declarative product metadata.
            needs:
            - item OR product_id
            optional:
            - note
            does: PUT /objects/products/{productId}
            supported_fields:
            - description
            - note
            - brand (stored in description if present)
            - sku (stored in description if present)
            constraints:
            - No stock semantics are modified
            - No unit or serialization changes
            example: "{'case':'update_product_meta','item':'coffee','brand':'HEB','note':'Freshly roasted'}"
          set_default_location_for_product:
            intent: Set the default storage location for new purchases.
            needs:
            - item OR product_id
            - location OR location_id
            does: PUT /objects/products/{productId}
            example: "{'case':'set_default_location_for_product','item':'coffee','location':'Pantry'}"
          products_merge:
            intent: Merge two products into one canonical product.
            needs:
            - product_id_keep
            - product_id_remove
            does: POST /stock/products/{productIdToKeep}/merge/{productIdToRemove}
            notes:
            - Moves all stock, history, and references
            - Removes the source product
            - This action is irreversible
            example: "{'case':'products_merge','product_id_keep':42,'product_id_remove':99}"
          resolve_products_by_ids:
            intent: 'Internal: resolve product IDs to names'
            needs:
            - product_ids
            internal: true
            does: GET /objects/products/{productId}
            example: "internal — not for direct use"
          stock_list_by_location:
            intent: What is in a location.
            needs:
            - location OR location_id
            does: GET /stock/locations/{locationId}/entries
            example: "{'case':'stock_list_by_location','location':'Pantry'}"
          stock_check_item:
            intent: Do we have the item.
            needs:
            - item OR product_id
            does: GET /stock/products/{productId}/entries
            example: "{'case':'stock_check_item','item':'coffee'}"
          stock_where_is_item:
            intent: Where is the item stored.
            needs:
            - item OR product_id
            does: GET /stock/products/{productId}/locations
            example: "{'case':'stock_where_is_item','item':'coffee'}"
          stock_entries_for_item:
            intent: Detailed stock entries for an item.
            needs:
            - item OR product_id
            does: GET /stock/products/{productId}/entries
            example: "{'case':'stock_entries_for_item','item':'coffee'}"
          stock_add_purchase:
            intent: Purchase into inventory.
            needs:
            - item OR product_id
            does: POST /stock/products/{productId}/add
            example: "{'case':'stock_add_purchase','item':'coffee','amount':2,'location':'Pantry'}"
          stock_buy_product:
            intent: Create product if missing, then purchase into inventory.
            needs:
            - item OR product_id
            does: POST /objects/products (optional) + POST /stock/products/{productId}/add
            example: "{'case':'stock_buy_product','item':'coffee','amount':1,'location':'Pantry'}"
          stock_consume:
            intent: Consume from stock.
            needs:
            - item OR product_id
            does: POST /stock/products/{productId}/consume
            example: "{'case':'stock_consume','item':'coffee','amount':1}"
          stock_inventory_adjust:
            intent: Reconcile inventory to a measured total.
            needs:
            - item OR product_id
            - amount
            does: POST /stock/products/{productId}/inventory
            example: "{'case':'stock_inventory_adjust','item':'coffee','amount':5}"
          stock_transfer_location:
            intent: Move item between locations.
            needs:
            - item OR product_id
            - location OR location_id
            - to_location OR to_location_id
            does: POST /stock/products/{productId}/transfer
            example: "{'case':'stock_transfer_location','item':'coffee','location':'Pantry','to_location':'Kitchen'}"
          shopping_add_missing:
            intent: Add items below min stock to shopping list.
            needs:
            - optional list_id
            does: POST /stock/shoppinglist/add-missing-products
            example: "{'case':'shopping_add_missing'}"
          shopping_add_overdue:
            intent: Add overdue products to shopping list.
            needs:
            - optional list_id
            does: POST /stock/shoppinglist/add-overdue-products
            example: "{'case':'shopping_add_overdue'}"
          shopping_add_expired:
            intent: Add expired products to shopping list.
            needs:
            - optional list_id
            does: POST /stock/shoppinglist/add-expired-products
            example: "{'case':'shopping_add_expired'}"
          chores_list:
            intent: List all chores.
            needs: []
            does: GET /objects/chores
            example: "{'case':'chores_list'}"
          chores_find:
            intent: Find chores by name.
            needs:
            - item
            does: GET /objects/chores + local name match
            example: "{'case':'chores_find','item':'kitchen'}"
          chores_execute:
            intent: Execute a chore.
            needs:
            - chore_id OR item
            does: POST /chores/{choreId}/execute
            example: "{'case':'chores_execute','item':'Clean litter box'}"
          tasks_list:
            intent: List all tasks.
            needs: []
            does: GET /objects/tasks
            example: "{'case':'tasks_list'}"
          tasks_find:
            intent: Find tasks by name.
            needs:
            - item
            does: GET /objects/tasks + local name match
            example: "{'case':'tasks_find','item':'grocery'}"
          tasks_complete:
            intent: Complete a task.
            needs:
            - task_id OR item
            does: POST /tasks/{taskId}/complete
            example: "{'case':'tasks_complete','item':'Buy groceries'}"
          locations_add:
            intent: Create a new Grocy location.
            needs:
            - location
            optional:
            - parent_location
            - parent_location_id
            - location_subclass
            - area_id
            - placement_priority
            does:
            - POST /objects/locations
            - PUT /userfields/locations/{locationId} (if metadata provided)
            example: "{'case':'locations_add','location':'Coffee Drawer','parent_location':'Kitchen','location_subclass':'drawer'}"
          locations_list:
            intent: List all locations.
            needs: []
            does: GET /objects/locations
            example: "{'case':'locations_list'}"
          locations_find:
            intent: Find a location by name.
            needs:
            - location
            does: GET /objects/locations + local name match
            example: "{'case':'locations_find','location':'Pantry'}"
          locations_rename:
            intent: Rename a Grocy location.
            needs:
            - location OR location_id
            - new_name
            does: PUT /objects/locations/{locationId}
            example: "{'case':'locations_rename','location':'Coffee Drawer','new_name':'Coffee Station'}"
          locations_metadata_set:
            intent: Set governed semantic metadata for a location.
            needs:
            - location OR location_id
            - at least one of parent_location, parent_location_id, location_subclass,
              area_id, placement_priority
            does: PUT /userfields/locations/{locationId}
            example: "{'case':'locations_metadata_set','location':'Coffee Drawer','parent_location':'Kitchen','area_id':'kitchen','location_subclass':'drawer','placement_priority':10}"
          units_list:
            intent: List all quantity units.
            needs: []
            does: GET /objects/quantity_units
            example: "{'case':'units_list'}"
          units_find:
            intent: Find a quantity unit by exact name.
            needs:
            - unit
            does: GET /objects/quantity_units + exact local name match
            example: "{'case':'units_find','unit':'each'}"
          units_add:
            intent: Create a new quantity unit.
            needs:
            - unit
            optional:
            - note
            does: POST /objects/quantity_units
            constraints:
            - Unit name must not already exist
            - No fuzzy creation
            example: "{'case':'units_add','unit':'can','note':'Standard grocery can'}"
          units_update:
            intent: Update an existing quantity unit.
            needs:
            - unit_id
            optional:
            - unit
            - note
            does: PUT /objects/quantity_units/{unitId}
            constraints:
            - unit_id is required
            - Renames must differ from current name
            example: "{'case':'units_update','unit_id':5,'unit':'each'}"
          shopping_add_product:
            intent: Add a specific product to a shopping list.
            needs:
            - item OR product_id
            optional:
            - amount
            - list_id
            does: POST /stock/shoppinglist/add-product
            example: "{'case':'shopping_add_product','item':'coffee','amount':2}"
          shopping_remove_product:
            intent: Remove a specific product from a shopping list.
            needs:
            - item OR product_id
            optional:
            - amount
            - list_id
            does: POST /stock/shoppinglist/remove-product
            example: "{'case':'shopping_remove_product','item':'coffee'}"
          shopping_clear_list:
            intent: Clear a shopping list (all or done-only).
            needs: []
            optional:
            - list_id
            - done_only
            does: POST /stock/shoppinglist/clear
            example: "{'case':'shopping_clear_list'}"
          recipes_list:
            intent: List all Grocy recipes.
            needs: []
            does: GET /objects/recipes
            paging:
              required: true
              default:
                pageNumber: 1
                perPage: 25
            example: "{'case':'recipes_list'}"
          recipes_fulfillment:
            intent: What recipes can I make with current stock?
            needs: []
            does: GET /recipes/fulfillment
            example: "{'case':'recipes_fulfillment'}"
          recipe_check_fulfillment:
            intent: Can I make a specific recipe with current stock?
            needs:
            - item OR recipe_id
            does: GET /recipes/{recipeId}/fulfillment
            example: "{'case':'recipe_check_fulfillment','item':'House Blend Coffee'}"
          recipes_add_to_shopping:
            intent: Add missing recipe ingredients to a shopping list.
            needs:
            - item OR recipe_id
            optional:
            - list_id
            does: POST /recipes/{recipeId}/add-not-fulfilled-products-to-shoppinglist
            example: "{'case':'recipes_add_to_shopping','item':'House Blend Coffee'}"
          recipes_consume:
            intent: Mark a recipe as made — consumes ingredients from stock.
            needs:
            - item OR recipe_id
            does: POST /recipes/{recipeId}/consume
            example: "{'case':'recipes_consume','item':'House Blend Coffee'}"
          recipes_copy:
            intent: Duplicate a recipe.
            needs:
            - item OR recipe_id
            does: POST /recipes/{recipeId}/copy
            example: "{'case':'recipes_copy','item':'House Blend Coffee'}"
          stock_overview:
            intent: Overview of all products currently in stock.
            needs: []
            does: GET /stock
            example: "{'case':'stock_overview','per_page':25}"
          stock_list_volatile:
            intent: List products that are due soon, overdue, or expired.
            needs: []
            does: GET /stock/volatile
            example: "{'case':'stock_list_volatile'}"
          stock_get_product_details:
            intent: Get stock-context details for a product (amount, value, best_before).
            needs:
            - item OR product_id
            does: GET /stock/products/{productId}
            example: "{'case':'stock_get_product_details','item':'coffee'}"
          stock_open_item:
            intent: Mark a product as opened.
            needs:
            - item OR product_id
            optional:
            - amount
            - best_before_date
            does: POST /stock/products/{productId}/open
            example: "{'case':'stock_open_item','item':'coffee'}"
          stock_entry_update:
            intent: Edit a specific stock entry — pass only the fields to change.
            needs:
            - entry_id
            - item OR product_id
            optional:
            - amount
            - best_before_date
            - location
            - price
            - note
            does: PUT /stock/entry/{entryId}
            notes:
            - Get entry_id via stock_entries_for_item
            - Reads current entry first then merges your changes (safe partial update)
            example: "{'case':'stock_entry_update','item':'Nathan House Blend Coffee','entry_id':42,'best_before_date':'2026-12-31'}"
          stock_undo_booking:
            intent: Undo a stock booking by booking ID.
            needs:
            - booking_id
            does: POST /stock/bookings/{bookingId}/undo
            example: "{'case':'stock_undo_booking','booking_id':524}"
          tasks_undo:
            intent: Undo a completed task.
            needs:
            - item OR task_id
            does: POST /tasks/{taskId}/undo
            example: "{'case':'tasks_undo','item':'Buy groceries'}"
          chores_undo:
            intent: Undo a chore execution by execution ID.
            needs:
            - execution_id
            does: POST /chores/executions/{executionId}/undo
            notes:
            - execution_id is required (not chore_id)
            example: "{'case':'chores_undo','execution_id':42}"
          catalog_find_by_barcode:
            intent: Find a product by barcode.
            needs:
            - barcode
            does: GET /stock/products/by-barcode/{barcode}
            example: "{'case':'catalog_find_by_barcode','barcode':'012345678901'}"
          stock_add_by_barcode:
            intent: Purchase a product into stock using a barcode.
            needs:
            - barcode
            optional:
            - amount
            - location
            - price
            - best_before_date
            does: POST /stock/products/by-barcode/{barcode}/add
            example: "{'case':'stock_add_by_barcode','barcode':'012345678901','amount':2}"
          stock_consume_by_barcode:
            intent: Consume a product from stock using a barcode.
            needs:
            - barcode
            optional:
            - amount
            does: POST /stock/products/by-barcode/{barcode}/consume
            example: "{'case':'stock_consume_by_barcode','barcode':'012345678901'}"
          batteries_list:
            intent: List all tracked rechargeable batteries.
            needs: []
            does: GET /batteries
            example: "{'case':'batteries_list'}"
          batteries_get:
            intent: Get details for a specific rechargeable battery.
            needs:
            - battery_id
            does: GET /batteries/{batteryId}
            example: "{'case':'batteries_get','battery_id':1}"
          batteries_charge:
            intent: Record a charge cycle for a rechargeable battery.
            needs:
            - battery_id
            optional:
            - amount
            does: POST /batteries/{batteryId}/charge
            example: "{'case':'batteries_charge','battery_id':1}"
    - alias: 'Mode: Help'
      choose:
      - conditions:
        - condition: template
          value_template: '{{ mode_norm == ''help'' }}'
          alias: 'Mode: HELP'
        sequence:
        - variables:
            help_json: "{{\n  {\n    \"tool\": tool_name | default(''),\n    \"version\":
              tool_version | default(''),\n    \"overview\":\n      \"Zen DojoTools
              Grocy Helper is a deterministic, construct-safe intent router for Grocy.
              It converts explicit household intents into explicit Grocy API calls.
              All names are resolved to IDs, all writes are intentional, and no implicit
              mutation or inference is performed. Grocy is treated as the canonical
              authority for products, locations, and quantity units.\",\n\n    \"read_this_first\":
              [\n      \"This tool does exactly what you tell it to do—nothing more,
              nothing less.\",\n      \"Every write is intentional. Every ID is resolved
              before execution.\",\n      \"If an operation is blocked, it is because
              Grocy would reject it or the intent was ambiguous.\",\n      \"Errors
              include coaching because guessing would be irresponsible.\",\n      \"If
              you skipped help and hit an error, the help already explained it.\"\n
              \   ],\n    \n    \"operating_model\": {\n      \"resolution_rules\":
              [\n        \"Names are resolved to IDs before any operation\",\n        \"Exact
              matches are preferred; partial matches are fallback\",\n        \"Multiple
              matches cause the operation to stop\"\n      ],\n      \"write_rules\":
              [\n        \"All write operations require explicit case selection\",\n
              \       \"Required fields are enforced per case\",\n        \"No implicit
              create, merge, or delete ever occurs\"\n      ],\n      \"unit_governance\":
              [\n        \"Quantity units are treated as first-class objects\",\n        \"Stock
              operations require resolvable quantity units\",\n        \"Unit creation
              or modification must be explicit\",\n        \"This tool never invents,
              guesses, or normalizes units\"\n      ],\n      \"safety_guards\": [\n
              \       \"Ambiguous intent is rejected\",\n        \"Unsupported Grocy
              behaviors are blocked\",\n        \"This tool never fabricates state or
              guesses outcomes\"\n      ],\n      \"mental_model\": [\n        \"Think
              of this as a controlled command router, not a chat interface\",\n        \"If
              Grocy needs it, you must supply it\",\n        \"If Grocy forbids it,
              this tool will stop you first\"\n      ]\n    },\n\n    \"cases\": {\n\n
              \     \"catalog_list_products\": {\n        \"intent\": \"List all products
              in the Grocy catalog.\",\n        \"needs\": [],\n        \"reads\": \"GET
              /objects/products\"\n      },\n\n      \"catalog_find_product\": {\n        \"intent\":
              \"Find catalog products by name.\",\n        \"needs\": [\"item\"],\n
              \       \"reads\": \"GET /objects/products (filtered locally by name)\"\n
              \     },\n\n      \"get_product_meta\": {\n        \"intent\": \"Retrieve
              canonical product metadata.\",\n        \"needs\": [\"item OR product_id\"],\n
              \       \"reads\": \"GET /objects/products/{productId}\"\n      },\n\n
              \     \"rename_product\": {\n        \"intent\": \"Rename a product (display
              name only).\",\n        \"needs\": [\"item OR product_id\", \"new_name\"],\n
              \       \"writes\": \"PUT /objects/products/{productId}\",\n        \"notes\":
              [\"Product ID and stock are unaffected\"]\n      },\n\n      \"update_product_meta\":
              {\n        \"intent\": \"Update declarative product metadata.\",\n        \"needs\":
              [\"item OR product_id\"],\n        \"writes\": \"PUT /objects/products/{productId}\",\n
              \       \"supported_fields\": [\"note\", \"brand\", \"sku\"],\n        \"constraints\":
              [\"No stock semantics are modified\"]\n      },\n\n      \"set_default_location_for_product\":
              {\n        \"intent\": \"Set the default storage location for new purchases.\",\n
              \       \"needs\": [\"item OR product_id\", \"location OR location_id\"],\n
              \       \"writes\": \"PUT /objects/products/{productId}\"\n      },\n\n
              \     \"products_merge\": {\n        \"intent\": \"Merge two products
              into one canonical product.\",\n        \"needs\": [\"product_id_keep\",
