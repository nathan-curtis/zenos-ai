rest_command:

  firefly_api_advanced_post:
    url: >
      {%- set endpoint = endpoint | replace('/api/v1/', '') | replace('api/v1/', '') -%}
      {%- if endpoint and endpoint[0] == '/' -%}
        {%- set endpoint = endpoint[1:] -%}
      {%- endif -%}
      http://iona.home.curtisplace.net:9283/api/v1/{{ endpoint }}
    method: POST
    headers:
      Authorization: "{{ firefly_iii_bearer }}"
      Content-Type: application/json
      Accept: application/json
    payload: "{{ payload | default({}) }}"
    verify_ssl: false


  firefly_api_advanced_put:
    url: >
      {%- set endpoint = endpoint | replace('/api/v1/', '') | replace('api/v1/', '') -%}
      {%- if endpoint and endpoint[0] == '/' -%}
        {%- set endpoint = endpoint[1:] -%}
      {%- endif -%}
      http://iona.home.curtisplace.net:9283/api/v1/{{ endpoint }}
    method: PUT
    headers:
      Authorization: "{{ firefly_iii_bearer }}"
      Content-Type: application/json
      Accept: application/json
    payload: "{{ payload | default({}) }}"
    verify_ssl: false


  firefly_api_advanced_delete:
    url: >
      {%- set endpoint = endpoint | replace('/api/v1/', '') | replace('api/v1/', '') -%}
      {%- if endpoint and endpoint[0] == '/' -%}
        {%- set endpoint = endpoint[1:] -%}
      {%- endif -%}
      http://iona.home.curtisplace.net:9283/api/v1/{{ endpoint }}
    method: DELETE
    headers:
      Authorization: "{{ firefly_iii_bearer }}"
      Content-Type: application/json
      Accept: application/json
    payload: "{{ payload | default({}) }}"
    verify_ssl: false