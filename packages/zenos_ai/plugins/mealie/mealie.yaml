###############################################################################
# ZenOS-AI Plugin: Mealie Recipe/Kitchen Integration
# Version: 4.0.0 RC2
#
# SETUP
#
# 1. Add to secrets.yaml:
#      mealie_bearer: Bearer <your_long_lived_token>
#
# 2. Set input_text.mealie_url in HA (Settings > Helpers, or Developer Tools):
#      http://<your-mealie-host>:<port>   (no trailing slash)
#    Must be set once after install — value persists across restarts.
#
# HOW TO GET YOUR MEALIE TOKEN:
#   1. Log in to Mealie
#   2. Go to your Profile (top-right avatar) > API Tokens
#   3. Create a new Long-Lived Token
#   4. Copy the token and prefix it with "Bearer ":
#      mealie_bearer: Bearer eyJhbGci...
###############################################################################

input_text:
  mealie_url:
    name: "Mealie Base URL"
    max: 255
    mode: text
    icon: mdi:chef-hat

script:
  zen_dojotools_mealie_advanced:
    alias: Zen DojoTools Mealie Advanced
    description: '
  
      Zen DojoTools Mealie Advanced (1.1.0 Beta) is a deterministic, construct-safe
      controller for governed interaction with the Mealie API.
  
      This tool provides validated GET, POST, PUT, and DELETE operations with enforced
      payload requirements, pagination discipline, and structured HELP output. It is
      designed as a stable backend layer intended to be called by higher-level Zen DojoTools
      helpers and automation systems.
  
      The controller mirrors the safety, response structure, and execution model of
      Grocy Advanced, ensuring consistency across household data systems.
  
      This tool does NOT accept raw or implicit writes. All write operations must be
      explicit and fully specified.
  
      Use mode=help to view supported operations, endpoints, and usage guidance.
  
      '
    mode: single
    icon: mdi:chef-hat
    fields:
      mode:
        name: Mode
        description: Run controller or show help
        selector:
          select:
            options:
            - run
            - help
        default: help
      method:
        name: HTTP Method
        selector:
          select:
            options:
            - GET
            - POST
            - PUT
            - DELETE
        required: true
      endpoint:
        name: Mealie Endpoint
        description: API path (e.g., recipes, tags, users/self/ratings/{recipe_id})
        selector:
          text:
      path_params:
        name: Path Params
        description: Dictionary for token substitution in endpoint
        selector:
          object:
      payload:
        name: Payload (JSON)
        description: Required for POST, PUT, DELETE
        selector:
          text:
            multiline: true
      search:
        name: Search
        description: (GET only) Free-text search
        selector:
          text:
      orderDirection:
        name: Order Direction
        description: (GET only) asc or desc
        selector:
          text:
        default: desc
      additional_params:
        name: Extra Filters
        description: (GET only) Additional query parameters
        selector:
          object:
      pageNumber:
        name: Page Number
        selector:
          number:
            min: 1
            max: 100
        default: 1
      perPage:
        name: Items Per Page
        selector:
          number:
            min: 1
            max: 50
        default: 10
    sequence:
    - variables:
        tool_version: 4.0.0 RC2
        docs: sensor.mealie_restful_openapi_docs
        is_get: '{{ method == ''GET'' }}'
        is_write: '{{ method in [''POST'',''PUT'',''DELETE''] }}'
        has_endpoint: '{{ endpoint is string and endpoint | length > 0 }}'
        needs_payload: '{{ is_write }}'
        kitchen_paths: '{{ state_attr(docs, ''paths'') | default({}, true) }}'
        kitchen_tags: "{% set ns = namespace(tags=[]) %}\n{% for methods in kitchen_paths.values()
          %}\n  {% for info in methods.values() if info.tags is defined %}\n    {% for
          tag in info.tags if tag not in ns.tags %}\n      {% set ns.tags = ns.tags
          + [tag] %}\n    {% endfor %}\n  {% endfor %}\n{% endfor %}\n{{ ns.tags | to_json
          }}"
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ mode == ''help'' }}'
          alias: HELP
        sequence:
        - variables:
            help_json:
              status: info
              tool: Zen DojoTools Mealie Advanced
              version: '{{ tool_version }}'
              mode: help
              description: 'Deterministic, construct-safe controller for the Mealie
                API. Provides governed GET/POST/PUT/DELETE access and structured HELP.
  
                '
              supported_methods:
              - GET
              - POST
              - PUT
              - DELETE
              required_fields:
                common:
                - endpoint
                write_operations:
                - payload
              optional_fields:
                read_operations:
                - search
                - orderDirection
                - additional_params
                - pageNumber
                - perPage
              pagination:
                defaults:
                  pageNumber: 1
                  perPage: 10
                limits:
                  pageNumber_max: 100
                  perPage_max: 50
                guidance: 'Pagination is strongly recommended for large result sets
                  to avoid response size limits.
  
                  '
              available_endpoints: '{{ kitchen_paths.keys() | list | to_json }}'
              available_tags: '{{ kitchen_tags }}'
              usage_notes:
              - Payloads are mandatory for POST, PUT, and DELETE
              - Read before write to avoid unintended overwrites
              - Use path_params to replace tokens such as {recipe_id}
              - This controller is intended to be wrapped by helper tools
              safety_model:
              - Explicit writes only
              - No implicit defaults for destructive actions
              - Deterministic response envelope
              authored_by: Friday
              authored_on: '2025-06-09T00:00:00.000Z'
            status: Help
            message: Help File.
            method: HELP
            result: '{{ help_json }}'
            final_response: "{{\n  {\n    \"status\": status | default(''),\n    \"message\":
              message | default(''),\n    \"method\": method | default('ERROR'),\n    \"endpoint\":
              endpoint | default(),\n    \"result\": result | default({})\n  }\n}}"
        - stop: Help
          response_variable: help_json
      - conditions:
        - condition: template
          value_template: '{{ not has_endpoint }}'
          alias: 'Error: Could Not Resolve Endpoint'
        sequence:
        - variables:
            status: error
            message: Endpoint is required.
            method: '{{ method | default(''ERROR'') }}'
            endpoint: '{{ endpoint }}'
            result: '{{ response }}'
            final_response: "{{\n  {\n    \"status\": status | default(''),\n    \"message\":
              message | default(''),\n    \"method\": method | default('ERROR'),\n    \"endpoint\":
              endpoint | default(),\n    \"result\": result | default({})\n  }\n}}"
        - stop: return
          response_variable: final_response
      - conditions:
        - condition: template
          value_template: '{{ needs_payload and (payload | trim == '''') }}'
          alias: 'Error: Missing Required Payload'
        sequence:
        - variables:
            status: error
            message: Payload is required for write operations.
            method: '{{ method | default(''ERROR'') }}'
            endpoint: '{{ endpoint }}'
            result: '{{ response }}'
            final_response: "{{\n  {\n    \"status\": status | default(''),\n    \"message\":
              message | default(''),\n    \"method\": method | default('ERROR'),\n    \"endpoint\":
              endpoint | default(),\n    \"result\": result | default({})\n  }\n}}"
        - stop: return
          response_variable: final_response
      - conditions:
        - condition: template
          value_template: '{{ is_get }}'
          alias: GET
        sequence:
        - variables:
            read_data: "{% set d = {\"endpoint\": endpoint} %}\n\n{% if path_params
              is defined\n      and path_params is mapping\n      and path_params |
              length > 0 %}\n  {% set d = d | combine({\"path_params\": path_params})
              %}\n{% endif %}\n\n{% if search is defined\n      and search is string\n
              \     and search | trim != '' %}\n  {% set d = d | combine({\"search\":
              search | trim}) %}\n{% endif %}\n\n{% if orderDirection is defined\n      and
              orderDirection in ['asc', 'desc'] %}\n  {% set d = d | combine({\"orderDirection\":
              orderDirection}) %}\n{% endif %}\n\n{% if additional_params is defined\n
              \     and additional_params is mapping\n      and additional_params |
              length > 0 %}\n  {% set d = d | combine({\"additional_params\": additional_params})
              %}\n{% endif %}\n\n{% if pageNumber is defined\n      and pageNumber |
              int(0) > 0 %}\n  {% set d = d | combine({\"pageNumber\": pageNumber |
              int(0)}) %}\n{% endif %}\n\n{% if perPage is defined\n      and perPage |
              int(0) > 0 %}\n  {% set d = d | combine({\"perPage\": perPage | int(0)})
              %}\n{% endif %}\n\n{{ d }}"
            response: {}
        - action: rest_command.mealie_api_advanced_get
          data: '{{ read_data }}'
          response_variable: response
        - variables:
            status: success
            method: '{{ method | default(''ERROR'') }}'
            message: '{{ method }} Complete'
            endpoint: '{{ endpoint }}'
            result: '{{ response }}'
            final_response: "{{\n  {\n    \"status\": status | default(''),\n    \"method\":
              method | default('ERROR'),\n    \"endpoint\": endpoint | default(),\n
              \   \"result\": result | default({})\n  }\n}}"
        - stop: return
          response_variable: final_response
      - conditions:
        - condition: template
          value_template: '{{ method == ''POST'' }}'
          alias: POST
        sequence:
        - action: rest_command.mealie_api_advanced_post
          response_variable: response
          data:
            endpoint: '{{ endpoint }}'
            path_params: '{{ path_params | default({}) }}'
            payload: '{{ payload }}'
        - variables:
            status: success
            method: '{{ method | default(''ERROR'') }}'
            message: '{{ method }} Complete'
            endpoint: '{{ endpoint }}'
            result: '{{ response }}'
            final_response: "{{\n  {\n    \"status\": status | default(''),\n    \"method\":
              method | default('ERROR'),\n    \"endpoint\": endpoint | default(),\n
              \   \"result\": result | default({})\n  }\n}}"
        - stop: return
          response_variable: final_response
      - conditions:
        - condition: template
          value_template: '{{ method == ''PUT'' }}'
          alias: PUT
        sequence:
        - action: rest_command.mealie_api_advanced_put
          response_variable: response
          data:
            endpoint: '{{ endpoint }}'
            path_params: '{{ path_params | default({}) }}'
            payload: '{{ payload }}'
        - variables:
            status: success
            method: '{{ method | default(''ERROR'') }}'
            message: '{{ method }} Complete'
            endpoint: '{{ endpoint }}'
            result: '{{ response }}'
            final_response: "{{\n  {\n    \"status\": status | default(''),\n    \"method\":
              method | default('ERROR'),\n    \"endpoint\": endpoint | default(),\n
              \   \"result\": result | default({})\n  }\n}}"
        - stop: return
          response_variable: final_response
      - conditions:
        - condition: template
          value_template: '{{ method == ''DELETE'' }}'
          alias: DELETE
        sequence:
        - action: rest_command.mealie_api_advanced_delete
          response_variable: response
          data:
            endpoint: '{{ endpoint }}'
            path_params: '{{ path_params | default({}) }}'
            payload: '{{ payload }}'
        - variables:
            status: success
            method: '{{ method | default(''ERROR'') }}'
            message: '{{ method }} Complete'
            endpoint: '{{ endpoint }}'
            result: '{{ response }}'
            final_response: "{{\n  {\n    \"status\": status | default(''),\n    \"message\":
              message | default(''),\n    \"method\": method | default('ERROR'),\n    \"endpoint\":
              endpoint | default(),\n    \"result\": result |default({})\n  }\n}}"
        - stop: return
          response_variable: final_response
    - variables:
        status: error
        message: Unhandled execution path
        method: '{{ method | default(''ERROR'') }}'
        endpoint: '{{ endpoint }}'
        result: '{{ response }}'
        final_response: "{{\n  {\n    \"status\": status | default(''),\n    \"message\":
          message | default(''),\n    \"method\": method | default('ERROR'),\n    \"endpoint\":
          endpoint | default(),\n    \"result\": result | default({})\n  }\n}}"
    - stop: return
      response_variable: final_response

  zen_dojotools_mealie_helper:
    alias: Zen DojoTools Mealie Helper
    description: 'Zen DojoTools Mealie Helper (4.0.0 RC2) is a deterministic, construct-safe
      intent router for Mealie. It converts explicit, human-level kitchen intents into
      governed Mealie API calls via Zen DojoTools Mealie Advanced.
  
      This tool is designed for AI-mediated execution, not direct human use. It enforces
      strict intent clarity, exact-match resolution, and write-awareness to prevent
      ambiguous, implicit, or destructive actions.
  
      Supported domains include recipes, recipe metadata (tags, categories, tools),
      shopping lists, and meal planning. User, auth, rating, and system-level operations
      are explicitly out of scope.
  
      All operations are fail-closed. Reads are safe by default. Writes are classified
      (single | bulk | destructive) but not artificially blocked when intent is explicit.
  
      For full case list with payload and requirements, use mode: help.
  
      '
    mode: single
    icon: mdi:silverware-fork-knife
    fields:
      mode:
        name: Mode
        selector:
          select:
            options:
            - help
            - run
        default: help
      case:
        selector:
          select:
            options:
            - recipes_list
            - recipes_find
            - recipes_get
            - recipes_create
            - recipes_update
            - recipes_delete
            - recipes_get_stats
            - recipes_get_comments
            - recipes_add_comment
            - organizers_list
            - organizers_get
            - organizers_get_by_slug
            - organizers_create
            - organizers_update
            - organizers_delete
            - shopping_list_get
            - shopping_list_get_items
            - shopping_list_add_item
            - shopping_list_remove_item
            - shopping_list_clear_completed
            - shopping_list_generate_from_recipe
            - mealplan_list
            - mealplan_get_item
            - mealplan_add_recipe
            - mealplan_update_recipe
            - mealplan_delete_item
            - units_list
            - units_find
            - unit_get
            - unit_add
            - unit_update
            - unit_delete
            - foods_list
            - foods_find
            - food_get
            - food_add
            - food_update
            - food_delete
      recipe:
        name: Recipe Name
        selector:
          text:
      recipe_id:
        name: Recipe ID
        selector:
          text:
      title:
        name: Title
        selector:
          text:
      text:
        name: Text
        selector:
          text:
            multiline: true
      start_date:
        name: Start Date
        selector:
          date:
      end_date:
        name: End Date
        selector:
          date:
      page:
        name: Page
        selector:
          number:
            min: 1
        default: 1
      perPage:
        name: Per Page
        selector:
          number:
            min: 1
            max: 50
        default: 50
      orderDirection:
        name: Order Direction
        selector:
          select:
            options:
            - asc
            - desc
        default: desc
      item:
        name: Item
        selector:
          text:
      item_id:
        name: Item ID
        selector:
          text:
      quantity:
        name: Quantity
        selector:
          number:
            min: 0
      unit:
        name: Unit
        selector:
          text:
      date:
        name: Date
        selector:
          date:
      organizer_type:
        name: Organizer Type
        description: 'Choose one of the supported ''Organizer'' domains (categories,
          tags, tools).
  
          '
        selector:
          select:
            options:
            - categories
            - tags
            - tools
      entry_type:
        name: Entry Type
        selector:
          select:
            options:
            - breakfast
            - lunch
            - dinner
            - snack
        default: dinner
      slug:
        name: Slug
        description: Used when searching by 'slug' where supported.
        selector:
          text:
      search:
        name: Search
        selector:
          text:
      payload:
        name: Payload
        selector:
          text:
            multiline: true
      unit_plural:
        name: Unit Plural Name
        description: Optional plural form
        selector:
          text:
      unit_description:
        name: Unit Description
        selector:
          text:
      shopping_list:
        name: Shopping List
        description: Exact shopping list name to resolve to an ID
        selector:
          text:
      shopping_list_id:
        name: Shopping List ID
        description: Explicit shopping list ID (skips name resolution)
        selector:
          text:
    sequence:
    - variables:
        tool_version: 4.0.0 RC2
        tool_branch: RC2
    - variables:
        case_meta:
          recipes_list:
            description: List all recipes
            method: GET
            endpoint: recipes
            writes:
              level: none
            supports_search: true
          recipes_find:
            description: Search recipes by name or metadata
            method: GET
            endpoint: recipes
            writes:
              level: none
            supports_search: true
            requires:
            - search
          recipes_get:
            description: Get a recipe by ID
            method: GET
            endpoint: recipes/{id}
            writes:
              level: none
            requires:
            - recipe_id
          recipes_create:
            description: Create a new recipe
            method: POST
            endpoint: recipes
            writes:
              level: single
            requires:
            - payload
            payload_schema:
              description: Recipe creation payload
              required:
              - name
              optional:
              - description
              - ingredients
              - instructions
              - tags
              - categories
              - tools
              example:
                name: Spaghetti Carbonara
                description: Classic Roman pasta
                ingredients:
                - spaghetti
                - eggs
                - pancetta
                - pecorino
                instructions:
                - Boil pasta
                - Mix eggs and cheese
                - Combine with pancetta
          recipes_update:
            description: Update an existing recipe
            method: PUT
            endpoint: recipes/{id}
            writes:
              level: single
            requires:
            - recipe_id
            - payload
            payload_schema:
              description: Recipe update payload
              required: []
              optional:
              - name
              - description
              - ingredients
              - instructions
              - tags
              - categories
              - tools
          recipes_delete:
            description: Delete a recipe
            method: DELETE
            endpoint: recipes/{id}
            writes:
              level: destructive
            requires:
            - recipe_id
          recipes_get_stats:
            description: Get statistics for a recipe
            method: GET
            endpoint: recipes/{id}/stats
            writes:
              level: none
            requires:
            - recipe_id
          recipes_get_comments:
            description: Get comments for a recipe
            method: GET
            endpoint: recipes/{id}/comments
            writes:
              level: none
            requires:
            - recipe_id
          recipes_add_comment:
            description: Add a comment to a recipe
            method: POST
            endpoint: recipes/{id}/comments
            writes:
              level: single
            requires:
            - recipe_id
            - text
            payload_schema:
              description: Comment payload
              required:
              - text
          mealplan_list:
            description: List meal plan entries
            method: GET
            endpoint: households/mealplans
            writes:
              level: none
            optional:
            - start_date
            - end_date
            - orderBy
            - orderDirection
            - page
            - perPage
            - queryFilter
          mealplan_get_item:
            description: Get a meal plan entry by ID
            method: GET
            endpoint: households/mealplans/{item_id}
            writes:
              level: none
            requires:
            - item_id
          mealplan_add_recipe:
            description: Schedule a recipe or note in the meal plan
            method: POST
            endpoint: households/mealplans
            writes:
              level: bulk
            requires:
            - date
            - entry_type
            allowed_entry_types:
            - breakfast
            - lunch
            - dinner
            - snack
            payload_schema:
              description: Meal plan entry payload
              required:
              - date
              - entryType
              optional:
              - recipeId
              - title
              - text
              example:
                date: '2025-12-25'
                entryType: dinner
                title: ''
                text: ''
          mealplan_update_recipe:
            description: Update an existing meal plan entry
            method: PUT
            endpoint: households/mealplans/{item_id}
            writes:
              level: bulk
            requires:
            - item_id
            - date
            - entry_type
            allowed_entry_types:
            - breakfast
            - lunch
            - dinner
            - snack
            payload_schema:
              description: Meal plan update payload
              required:
              - id
              - date
              - entryType
              optional:
              - recipeId
              - title
              - text
              example:
                id: 42
                recipeId: abc123
                date: '2025-12-25'
                entryType: dinner
          mealplan_delete_item:
            description: Delete a meal plan entry
            method: DELETE
            endpoint: households/mealplans/{item_id}
            writes:
              level: destructive
            requires:
            - item_id
          shopping_list_get:
            description: List all shopping lists
            method: GET
            endpoint: households/shopping/lists
            writes:
              level: none
          shopping_list_get_items:
            description: Get all items in a shopping list
            method: GET
            endpoint: households/shopping/lists/{shopping_list_id}
            writes:
              level: none
            requires:
            - shopping_list_id
          shopping_list_add_item:
            description: Add an item to a shopping list
            method: POST
            endpoint: households/shopping/items
            writes:
              level: single
            requires:
            - item
            payload_schema:
              description: Shopping list item payload
              required:
              - name
              optional:
              - quantity
              - unit
              example:
                name: Milk
                quantity: 2
                unit: liters
          shopping_list_remove_item:
            description: Remove an item from a shopping list
            method: DELETE
            endpoint: households/shopping/items/{item_id}
            writes:
              level: destructive
            requires:
            - item_id
          shopping_list_clear_completed:
            description: Remove all completed items from shopping lists
            method: DELETE
            endpoint: households/shopping/items
            writes:
              level: bulk
            requires:
            - item_id
          shopping_list_generate_from_recipe:
            description: Generate shopping list items from a recipe
            method: POST
            endpoint: households/shopping/lists/{shopping_list_id}/recipe
            writes:
              level: bulk
            requires:
            - recipe_id
          units_list:
            description: List all measurement units
            method: GET
            endpoint: units
            writes:
              level: none
            supports_search: true
          units_find:
            description: Search measurement units by name
            method: GET
            endpoint: units
            writes:
              level: none
            supports_search: true
            requires:
            - search
          unit_get:
            description: Get a measurement unit by ID
            method: GET
            endpoint: units/{id}
            writes:
              level: none
            requires:
            - item_id
          unit_add:
            description: Create a new measurement unit
            method: POST
            endpoint: units
            writes:
              level: single
            requires:
            - unit
            payload_schema:
              description: Unit creation payload
              required:
              - name
              optional:
              - pluralName
              - description
          unit_update:
            description: Update a measurement unit
            method: PUT
            endpoint: units/{id}
            writes:
              level: single
            requires:
            - item_id
            - unit
            payload_schema:
              description: Unit update payload
              required:
              - id
              - name
              optional:
              - pluralName
              - description
          unit_delete:
            description: Delete a measurement unit
            method: DELETE
            endpoint: units/{id}
            writes:
              level: destructive
            requires:
            - item_id
          foods_list:
            description: List all foods
            method: GET
            endpoint: foods
            writes:
              level: none
            supports_search: false
          foods_find:
            description: Search foods by name
            method: GET
            endpoint: foods
            writes:
              level: none
            supports_search: true
            requires:
            - search
          food_get:
            description: Get a food by ID
            method: GET
            endpoint: foods/{id}
            writes:
              level: none
            requires:
            - item_id
          food_add:
            description: Create a new food
            method: POST
            endpoint: foods
            writes:
              level: single
            requires:
            - payload
            payload_schema:
              description: Food creation payload
              required:
              - name
              optional:
              - description
              - foodGroup
              - label
          food_update:
            description: Update a food
            method: PUT
            endpoint: foods/{id}
            writes:
              level: single
            requires:
            - item_id
            - payload
            payload_schema:
              description: Food update payload
              required: []
              optional:
              - name
              - description
              - foodGroup
              - label
          food_delete:
            description: Delete a food
            method: DELETE
            endpoint: foods/{id}
            writes:
              level: destructive
            requires:
            - item_id
          organizers_list:
            description: List all organizers of a given type
            method: GET
            endpoint: organizers/{organizer_type}
            writes:
              level: none
            supports_search: false
            requires:
            - organizer_type
          organizers_get:
            description: Get an organizer by ID
            method: GET
            endpoint: organizers/{organizer_type}/{item_id}
            writes:
              level: none
            requires:
            - organizer_type
            - item_id
          organizers_get_by_slug:
            description: Get an organizer by slug
            method: GET
            endpoint: organizers/{organizer_type}/slug/{slug}
            writes:
              level: none
            requires:
            - organizer_type
            - slug
          organizers_create:
            description: Create a new organizer
            method: POST
            endpoint: organizers/{organizer_type}
            writes:
              level: single
            requires:
            - organizer_type
            - payload
            payload_schema:
              description: Organizer creation payload
              required:
              - name
              optional:
              - description
              - slug
              - icon
              - color
              example:
                name: Italian
                description: Italian cuisine
                slug: italian
          organizers_update:
            description: Update an organizer
            method: PUT
            endpoint: organizers/{organizer_type}/{item_id}
            writes:
              level: single
            requires:
            - organizer_type
            - item_id
            - payload
            payload_schema:
              description: Organizer update payload
              required: []
              optional:
              - name
              - description
              - slug
              - icon
              - color
          organizers_delete:
            description: Delete an organizer
            method: DELETE
            endpoint: organizers/{organizer_type}/{item_id}
            writes:
              level: destructive
            requires:
            - organizer_type
            - item_id
    - variables:
        safe_item: '{{ item | default('''') }}'
        safe_quantity: '{{ quantity | default(1) }}'
        safe_unit: '{{ unit | default('''') }}'
        safe_search: '{{ search | default('''') }}'
        safe_recipe_id: '{{ recipe_id | default('''') }}'
        safe_title: '{{ title | default('''') }}'
        safe_text: '{{ text | default('''') }}'
        safe_item_id: '{{ item_id | default('''') }}'
        safe_date: '{{ date | default('''') }}'
        safe_entry_type: '{{ entry_type | default(''dinner'') }}'
        safe_payload: '{{ payload | default('''') }}'
        safe_unit_plural: '{{ unit_plural | default('''') }}'
        safe_unit_description: '{{ unit_description | default('''') }}'
        safe_shopping_list: '{{ shopping_list | default('''') }}'
        safe_shopping_list_id: '{{ shopping_list_id | default('''') }}'
        safe_organizer_type: '{{ organizer_type | default('''') | string | trim }}'
        safe_slug: '{{ slug | default('''') | string | trim }}'
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ mode == ''help'' }}'
        sequence:
        - variables:
            help_response:
              status: info
              tool: Zen DojoTools Mealie Helper
              version: '{{ tool_version |  default(None) }}'
              branch: '{{ tool_branch |  default('''') }}'
              notes: "This should be your FIRST choice for all Mealie operations. (Because
                it's THAT good!) \nThis helper translates explicit, safe intent only.
                Transport, retries, pagination strategy, permissions, observability,
                and batching are handled externally by Zen governance layers.    \n"
              philosophy:
              - Fail closed
              - Explicit intent only
              - Write-aware execution
              cases: "[ {% for name, meta in case_meta | dictsort %}\n  {\n    \"case\":
                \"{{ name }}\",\n    \"description\": {{\n      meta.description\n      |
                default(meta.payload_schema.description if meta.payload_schema is defined
                else None)\n      | to_json\n    }},\n    \"supports_search\": \"{{
                meta.supports_search | default(false) | tojson }}\",\n    \"writes\":
                \"{{ meta.writes.level }}\",\n    \"requires\": {{ meta.requires | default([])
                | to_json }},\n    \"payload_schema\": {{ meta.payload_schema | default(None)
                | to_json }}\n  }{% if not loop.last %},{% endif %}\n{% endfor %} ]"
        - stop: return
          response_variable: help_response
        alias: HELP
    - alias: Preflight Case validation
      choose:
      - conditions:
        - condition: template
          value_template: '{{ case not in case_meta }}'
          alias: 'Error: Unknown case.'
        sequence:
        - variables:
            error_response:
              status: error
              message: Unknown case.
        - stop: return
          response_variable: error_response
    - variables:
        resolved_shopping_list_id: '{{ safe_shopping_list_id | string | trim }}'
    - alias: Resolve Shopping List to Shopping List ID if necessary
      choose:
      - conditions:
        - alias: Must Resolve Shopping List to Shopping List ID
          condition: template
          value_template: "{{\n  case in [\n    'shopping_list_get_items',\n    'shopping_list_generate_from_recipe',\n
            \   'shopping_list_add_item'\n  ]\n  and resolved_shopping_list_id == ''\n
            \ and (safe_shopping_list | string | trim != '')\n}}\n\n"
        sequence:
        - action: script.zen_dojotools_mealie_advanced
          response_variable: shopping_lists_resp
          data:
            mode: run
            method: GET
            endpoint: households/shopping/lists
            payload: '{{ none }}'
            pageNumber: 1
            perPage: 200
        - choose:
          - conditions:
            - condition: template
              value_template: '{{ shopping_lists_resp.result.status | default(200) >=
                400 }}'
            sequence:
            - variables:
                error_response:
                  status: error
                  case: '{{ case }}'
                  message: 'Failed to fetch shopping lists for resolution.
  
                    '
            - stop: return
              response_variable: error_response
        - variables:
            lists_raw: "{{\n  shopping_lists_resp.result.content\n  | default([])\n}}"
            lists: "{{\n  (\n    (lists_raw['items'] if (lists_raw is mapping and 'items'
              in lists_raw) else lists_raw)\n    | default([])\n  )\n}}"
            matches: "{{\n  lists\n  | selectattr('name', 'equalto', (safe_shopping_list
              | string | trim))\n  | list\n}}"
        - choose:
          - conditions:
            - condition: template
              value_template: '{{ matches | length == 0 }}'
            sequence:
            - variables:
                error_response:
                  status: error
                  case: '{{ case }}'
                  message: 'Shopping list name did not match any list exactly: "{{ safe_shopping_list
                    }}".
  
                    '
            - stop: return
              response_variable: error_response
          - conditions:
            - condition: template
              value_template: '{{ matches | length > 1 }}'
            sequence:
            - variables:
                error_response:
                  status: error
                  case: '{{ case }}'
                  message: 'Shopping list name matched multiple lists exactly: "{{ safe_shopping_list
                    }}". Refuse to guess.
  
                    '
            - stop: return
              response_variable: error_response
        - variables:
            resolved_shopping_list_id: "{{\n  (matches[0].id | default('')) | string
              | trim\n}}"
        - choose:
          - conditions:
            - condition: template
              value_template: '{{ resolved_shopping_list_id == '''' }}'
            sequence:
            - variables:
                error_response:
                  status: error
                  case: '{{ case }}'
                  message: 'Shopping list resolved but had no id field. Cannot proceed.
  
                    '
            - stop: return
              response_variable: error_response
    - variables:
        required_fields: "{{\n  case in case_meta\n  and case_meta[case].requires\n
          \ or []\n}}\n"
        missing_fields: "{% set ns = namespace(out=[]) %}\n{% set p = safe_payload if
          safe_payload is mapping else {} %}\n\n{% for field in required_fields %}\n
          \ {% set v =\n    (field == 'recipe_id' and (safe_recipe_id or p.get('recipe_id')))\n
          \   or (field == 'item_id' and (safe_item_id or p.get('item_id')))\n    or
          (field == 'shopping_list_id' and resolved_shopping_list_id)\n    or (field
          == 'item' and (safe_item or p.get('item')))\n    or (field == 'date' and (safe_date
          or p.get('date')))\n    or (field == 'entry_type' and (safe_entry_type or
          p.get('entry_type')))\n    or (field == 'organizer_type' and safe_organizer_type)\n
          \   or (field == 'slug' and safe_slug)\n    or (field == 'search' and (safe_search
          or p.get('search')))\n    or (field == 'text' and safe_text)\n    or (field
          == 'unit' and safe_unit)\n    or (field == 'payload' and safe_payload)\n    or
          ''\n  %}\n\n  {% if v in [None, '', []] %}\n    {% set ns.out = ns.out + [field]
          %}\n  {% endif %}\n{% endfor %}\n{{ ns.out }}\n"
    - alias: Preflight Guards
      choose:
      - conditions:
        - condition: template
          value_template: '{{ missing_fields | length > 0 }}'
          alias: 'Error: Missing Fields'
        sequence:
        - variables:
            error_response:
              status: error
              case: '{{ case }}'
              message: 'Missing required fields: {{ missing_fields | join('', '') }}
  
                '
        - stop: return
          response_variable: error_response
      - conditions:
        - condition: template
          value_template: "{{\n  case_meta[case].allowed_entry_types is defined\n  and
            entry_type not in case_meta[case].allowed_entry_types\n}}\n"
          alias: 'Error: Invalid entry_type'
        sequence:
        - variables:
            error_response:
              status: error
              case: '{{ case }}'
              message: 'Invalid entry_type. Allowed: {{ case_meta[case].allowed_entry_types
                | join('', '') }}
  
                '
        - stop: return
          response_variable: error_response
      - conditions:
        - condition: template
          value_template: "{{\n  case in [\n    'mealplan_add_recipe',\n    'mealplan_update_recipe',\n
            \   'mealplan_add_or_update_recipe'\n  ]\n  and\n  (\n    (safe_recipe_id
            | default('') | string | trim == '')\n    and (safe_title | default('')
            | string | trim == '')\n    and (safe_text | default('') | string | trim
            == '')\n    and (\n      safe_payload is not mapping\n      or (\n        (safe_payload.get('recipe_id','')
            | string | trim == '')\n        and (safe_payload.get('recipeId','') | string
            | trim == '')\n        and (safe_payload.get('title','') | string | trim
            == '')\n        and (safe_payload.get('text','') | string | trim == '')\n
            \     )\n    )\n  )\n}}"
          alias: 'Error: Meal has no content'
        sequence:
        - variables:
            error_response:
              status: error
              case: '{{ case }}'
              message: 'Meal must include either a recipe or a title/text note.
  
                '
        - stop: return
          response_variable: error_response
      - conditions:
        - condition: template
          value_template: "{{\n  case in ['food_add','food_update']\n  and (\n    safe_payload
            is not mapping\n    or (safe_payload | count == 0)\n  )\n}}\n"
        alias: 'Error: Food payload empty'
        sequence:
        - variables:
            error_response:
              status: error
              case: '{{ case }}'
              message: Food operations require a non-empty payload.
        - stop: return
          response_variable: error_response
      - conditions:
        - condition: template
          value_template: "{{\n  case == 'shopping_list_generate_from_recipe'\n  and
            (safe_shopping_list_id | string | trim == '')\n  and (safe_shopping_list
            | string | trim == '')\n}}\n"
        alias: 'Error: Shopping list not specified'
        sequence:
        - variables:
            error_response:
              status: error
              case: '{{ case }}'
              message: 'shopping_list_id or shopping_list is required for shopping_list_generate_from_recipe.
  
                '
        - stop: return
          response_variable: error_response
      - conditions:
        - condition: template
          value_template: "{{\n  case.startswith('organizers_')\n  and safe_organizer_type
            not in ['categories','tags','tools']\n}}\n"
        alias: 'Error: Invalid organizer_type'
        sequence:
        - variables:
            error_response:
              status: error
              case: '{{ case }}'
              message: 'Invalid organizer_type. Allowed: categories, tags, tools.
  
                '
        - stop: return
          response_variable: error_response
    - variables:
        method: '{{ case_meta[case].method }}'
        endpoint: "{{\n  case_meta[case].endpoint\n  | replace('{shopping_list_id}',
          resolved_shopping_list_id | default('') | string)\n  | replace('{id}',\n      (\n
          \       (case in ['unit_get','unit_update','unit_delete','food_get','food_update','food_delete']\n
          \         and (safe_item_id | default('') | string))\n        or (safe_recipe_id
          | default('') | string)\n      )\n    )\n  | replace('{organizer_type}', safe_organizer_type)\n
          \ | replace('{item_id}', safe_item_id)\n  | replace('{slug}', safe_slug)\n}}"
        query_params: "{% set ns = namespace(q={}) %}\n\n{# --- mealplan_list: keep
          existing behavior (uses page/perPage + other filters) --- #}\n{% if case ==
          'mealplan_list' %}\n  {% if start_date is defined and (start_date | string
          | trim) != '' %}\n    {% set ns.q = ns.q | combine({'start_date': start_date})
          %}\n  {% endif %}\n  {% if end_date is defined and (end_date | string | trim)
          != '' %}\n    {% set ns.q = ns.q | combine({'end_date': end_date}) %}\n  {%
          endif %}\n  {% if orderBy is defined and (orderBy | string | trim) != '' %}\n
          \   {% set ns.q = ns.q | combine({'orderBy': orderBy}) %}\n  {% endif %}\n
          \ {% if orderDirection is defined and (orderDirection | string | trim) !=
          '' %}\n    {% set ns.q = ns.q | combine({'orderDirection': orderDirection})
          %}\n  {% endif %}\n  {% if page is defined and page %}\n    {% set ns.q =
          ns.q | combine({'page': page | int}) %}\n  {% endif %}\n  {% if perPage is
          defined and perPage %}\n    {% set ns.q = ns.q | combine({'perPage': perPage
          | int}) %}\n  {% endif %}\n  {% if queryFilter is defined and (queryFilter
          | string | trim) != '' %}\n    {% set ns.q = ns.q | combine({'queryFilter':
          queryFilter}) %}\n  {% endif %}\n{% endif %}\n\n{# --- list endpoints: add
          pagination only; don't invent other params --- #}\n{% if case in ['recipes_list','recipes_find','foods_list','foods_find']
          %}\n  {% if page is defined and page %}\n    {% set ns.q = ns.q | combine({'pageNumber':
          page | int}) %}\n  {% endif %}\n  {% if perPage is defined and perPage %}\n
          \   {% set ns.q = ns.q | combine({'perPage': perPage | int}) %}\n  {% endif
          %}\n{% endif %}\n\n{{ ns.q }}"
        final_payload: "{% if case in ['mealplan_list'] %}\n  {{ query_params }}\n\n{%
          elif case == 'units_list' %}\n  {{ none }}\n\n{% elif case == 'units_find'
          %}\n  {{ {\"search\": safe_search} | tojson }}\n\n{% elif case == 'unit_get'
          %}\n  {{ none }}\n\n{% elif case == 'unit_delete' %}\n  {{ none }}\n\n{% elif
          case == 'unit_add' %}\n  {{\n    {\n      \"name\": safe_unit,\n      \"pluralName\":
          (safe_unit_plural if (safe_unit_plural | string | trim) != '' else none),\n
          \     \"description\": (safe_unit_description if (safe_unit_description |
          string | trim) != '' else \"\")\n    } | tojson\n  }}\n\n{% elif case == 'unit_update'
          %}\n  {{\n    {\n      \"id\": (safe_item_id | int),\n      \"name\": safe_unit,\n
          \     \"pluralName\": (safe_unit_plural if (safe_unit_plural | string | trim)
          != '' else none),\n      \"description\": (safe_unit_description if (safe_unit_description
          | string | trim) != '' else \"\")\n    } | tojson\n  }}\n\n{% elif case in
          [\n  'recipes_list',\n  'recipes_get',\n  'recipe_tags_list',\n  'recipe_categories_list',\n
          \ 'recipe_tools_list',\n  'shopping_list_get',\n  'shopping_list_remove_item',\n
          \ 'recipes_delete'\n] %}\n  {{ none }}\n\n{% elif case == 'recipes_find' %}\n
          \ {{ {\"search\": safe_search} | tojson }}\n\n{% elif case in [\n  'recipes_get_stats',\n
          \ 'recipes_get_comments',\n  'shopping_list_get_items',\n  'shopping_list_clear_completed',\n
          \ 'mealplan_get_item',\n  'mealplan_delete_item'\n] %}\n  {{ none }}\n\n{%
          elif case in ['recipes_create', 'recipes_update'] %}\n  {{ safe_payload }}\n\n{%
          elif case == 'recipes_add_comment' %}\n  {{ {\"text\": safe_text} | tojson
          }}\n\n{% elif case == 'shopping_list_add_item' %}\n  {{\n    {\n      \"shoppingListId\":
          resolved_shopping_list_id,\n      \"quantity\": safe_quantity | default(1),\n
          \     \"checked\": false,\n      \"food\": { \"name\": safe_item }\n    }\n
          \   | combine(\n        { \"unit\": { \"name\": safe_unit } }\n        if
          (safe_unit | string | trim) != '' else {}\n      )\n    | tojson\n  }}\n\n{%
          elif case == 'shopping_list_generate_from_recipe' %}\n  {{ {\"recipeId\":
          safe_recipe_id} | tojson }}\n\n{% elif case == 'mealplan_add_recipe' %}\n  {{\n    {\n
          \     \"date\": safe_date,\n      \"entryType\": safe_entry_type,\n      \"recipeId\":
          (safe_recipe_id if (safe_recipe_id | string | trim) != '' else none),\n      \"title\":
          safe_title,\n      \"text\": safe_text\n    } | tojson\n  }}\n\n{% elif case
          == 'mealplan_update_recipe' %}\n  {{\n    {\n      \"id\": safe_item_id |
          int,\n      \"date\": safe_date,\n      \"entryType\": safe_entry_type,\n
          \     \"recipeId\": (safe_recipe_id if (safe_recipe_id | string | trim) !=
          '' else none),\n      \"title\": safe_title,\n      \"text\": safe_text\n
          \   } | tojson\n  }}\n\n{% elif case in ['foods_list','food_get','food_delete']
          %}\n  {{ none }}\n\n{% elif case == 'foods_find' %}\n  {{ {\"search\": safe_search}
          | tojson }}\n\n{% elif case in ['food_add','food_update'] %}\n  {{ safe_payload
          }}\n\n{% else %}\n  {{ none }}\n{% endif %}"
    - action: script.zen_dojotools_mealie_advanced
      response_variable: api_resp
      data:
        mode: run
        method: '{{ method }}'
        endpoint: '{{ endpoint }}'
        payload: '{{ final_payload }}'
        pageNumber: '{{ (query_params.pageNumber if (query_params is mapping and query_params.pageNumber
          is defined) else (page | default(1))) | int(1) }}'
        perPage: '{{ (query_params.perPage if (query_params is mapping and query_params.perPage
          is defined) else (perPage | default(50))) | int(50) }}'
        additional_params: "{{\n  (query_params if (query_params is mapping and query_params
          | length > 0) else {})\n}}"
    - alias: Post API Call Validation
      choose:
      - conditions:
        - condition: template
          value_template: '{{ api_resp.result.status | default(200) >= 400 }}'
          alias: HTTP Status > 200
        sequence:
        - variables:
            message: "{{\n  {\n    \"mealie_api_error\": {\n      \"http_status\": api_resp.result.status
              | default(''),\n      \"detail\": api_resp.result.content.detail | default(api_resp.result.content)
              |default('')\n    }\n  }\n}}"
            final_response: "{{\n  {\n    \"status\": \"error\",\n    \"case\": case
              | default('ERROR_UNDEFINED_CASE'),\n    \"message\": message | default({})\n
              \ }\n}}"
        - stop: return
          response_variable: final_response
    - variables:
        final_response:
          status: success
          case: '{{ case }}'
          writes:
            level: '{{ case_meta[case].writes.level }}'
          summary: "{{\n  case == 'food_add' and 'Food created.'\n  or case == 'food_update'
            and 'Food updated.'\n  or case == 'food_delete' and 'Food deleted.'\n  \n
            \ or case == 'mealplan_add_recipe' and 'Recipe scheduled.'\n  or case ==
            'mealplan_update_recipe' and 'Meal plan updated.'\n  or case == 'mealplan_delete_item'
            and 'Meal plan entry removed.'     \n\n  or case == 'recipes_create' and
            'Recipe created.'\n  or case == 'recipes_update' and 'Recipe updated.'\n
            \ or case == 'recipes_add_comment' and 'Comment added to recipe.'\n  or
            case == 'recipes_delete' and 'Recipe deleted.'\n\n  or case == 'shopping_list_add_item'
            and 'Item added.'\n  or case == 'shopping_list_remove_item' and 'Item removed.'\n
            \ or case == 'shopping_list_generate_from_recipe' and 'Shopping list generated.'\n
            \ \n  or case == 'unit_add' and 'Unit created.'\n  or case == 'unit_update'
            and 'Unit updated.'\n  or case == 'unit_delete' and 'Unit deleted.'\n  \n
            \ or 'Operation completed.'\n}}\n"
          raw:
            api: '{{ api_resp }}'
    - stop: return
      response_variable: final_response


###############################################################################
# REST Commands
###############################################################################

rest_command:
  mealie_recipe_search:
    url: >
      {{ states('input_text.mealie_url') | trim('/') }}/api/recipes?
      orderDirection=desc
      &page=1
      &perPage={{ perPage | default(10) }}
      {%- if search is defined -%}
        &search={{ search | urlencode }}
      {%- endif -%}
    method: GET
    headers:
      Authorization: !secret mealie_bearer
      accept: "application/json"
    verify_ssl: false

  mealie_api_advanced_openapi:
    url: "{{ states('input_text.mealie_url') | trim('/') }}/openapi.json"
    method: GET
    headers:
      Authorization: !secret mealie_bearer
      accept: 'application/json; charset=utf-8'
    verify_ssl: false

  mealie_api_advanced_get:
    url: >
      {%- if path_params is defined and path_params | length > 0 -%}
          {%- for key, value in path_params.items() -%}
              {%- set endpoint = endpoint | replace("{" ~ key ~ "}", value) -%}
          {%- endfor -%}
      {%- endif -%}
      {%- set endpoint = endpoint | replace('/api/', '') | replace('api/', '') %}
      {%- if endpoint[0] == '/' -%}
          {%- set endpoint = endpoint[1:] %}
      {%- endif -%}
      {{ states('input_text.mealie_url') | trim('/') }}/api/{{ endpoint }}?orderDirection={{ orderDirection | default("desc") }}
      {%- if search is defined and search not in ["", None] -%}
          &search={{ search | urlencode }}
      {%- endif %}
      {%- if additional_params is defined and additional_params | length > 0 and additional_params is mapping -%}
          {%- for key, value in additional_params.items() -%}
              &{{ key }}={{ value | urlencode }}
          {%- endfor -%}
      {%- endif %}
      {%- if pageNumber is defined and pageNumber > 0 -%}
          &page={{ pageNumber | default(1) }}
      {%- endif %}
      {%- if perPage is defined and perPage > 0 -%}
          &perPage={{ perPage | default(10) }}
      {%- endif %}
    method: GET
    headers:
      Authorization: !secret mealie_bearer
      accept: "application/json"
    verify_ssl: false

  mealie_api_advanced_post:
    url: >
      {%- set endpoint = endpoint | replace('/api/', '') | replace('api/', '') %}
      {%- if endpoint[0] == '/' -%}
          {%- set endpoint = endpoint[1:] %}
      {%- endif -%}
      {{ states('input_text.mealie_url') | trim('/') }}/api/ {{- endpoint }}
    method: POST
    headers:
      authorization: !secret mealie_bearer
      accept: 'application/json; charset=utf-8'
    payload: "{{- payload -}}"
    content_type: 'application/json; charset=utf-8'
    verify_ssl: false

  mealie_api_advanced_put:
    url: >
      {%- set endpoint = endpoint | replace('/api/', '') | replace('api/', '') %}
      {%- if endpoint[0] == '/' -%}
          {%- set endpoint = endpoint[1:] %}
      {%- endif -%}
      {{ states('input_text.mealie_url') | trim('/') }}/api/ {{- endpoint }}
    method: PUT
    headers:
      authorization: !secret mealie_bearer
      accept: 'application/json; charset=utf-8'
    payload: "{{- payload -}}"
    content_type: 'application/json; charset=utf-8'
    verify_ssl: false

  mealie_api_advanced_delete:
    url: >
      {%- set endpoint = endpoint | replace('/api/', '') | replace('api/', '') %}
      {%- if endpoint[0] == '/' -%}
          {%- set endpoint = endpoint[1:] %}
      {%- endif -%}
      {{ states('input_text.mealie_url') | trim('/') }}/api/ {{- endpoint }}
    method: DELETE
    headers:
      authorization: !secret mealie_bearer
      accept: 'application/json; charset=utf-8'
    payload: "{{- payload -}}"
    content_type: 'application/json; charset=utf-8'
    verify_ssl: false

  mealie_get_recipes:
    url: >
      {{ states('input_text.mealie_url') | trim('/') }}/api/recipes?
      orderDirection=desc
      {%- if search is defined -%}
