###############################################################################
# REST Sensors
###############################################################################

rest:
  # REST sensor for caching just the Mealie OpenAPI once per hr
  - resource_template: "{{ states('input_text.mealie_url') | trim('/') }}/openapi.json"
    method: GET
    headers:
      Authorization: !secret mealie_bearer
      accept: "application/json"
    scan_interval: 3600 # seconds (once/hr)
    sensor:
      - name:  Mealie_RESTful_OpenAPI_docs
        value_template: "{{ now() | as_local() }}" # last refresh time
        json_attributes: ['openapi', 'info', 'paths', 'components']
        force_update: true
        unique_id: ca23db00-5378-417b-9529-8ac6f46c084e

  - resource_template: "{{ states('input_text.mealie_url') | trim('/') }}/api/households/mealplans/today"
    method: GET
    headers:
      Authorization: !secret mealie_bearer
    scan_interval: 60
    sensor:
      - name: Mealie todays meal
        value_template: "{{ value_json[0]['recipe']['name'] }}"
        force_update: true
        unique_id: e3db4252-91cb-451c-aad7-8257e89ff298
      - name: Mealie todays meal ID
        value_template: "{{ value_json[0]['recipe']['id'] }}"
        force_update: true
        unique_id: 58153c8e-16ca-4334-a1b2-586505b28a6d
      - name: Mealie todays meal 0
        value_template: "{{ value_json[0]['recipe']['name'] if value_json[0]['recipe']['name'] is defined else value_json[0]['title']}}"
        json_attributes_path: "$.[0]"
        json_attributes:
          - date
          - entryType
          - title
          - text
          - recipeId
          - recipe.name
        force_update: true
        unique_id: 0d156697-aa96-4baf-9550-40d373c62a74
      - name: Mealie todays meal 1
        value_template: "{{ value_json[1]['recipe']['name'] if value_json[1]['recipe']['name'] is defined else value_json[1]['title']}}"
