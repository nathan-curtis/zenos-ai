###############################################################################
# ZenOS-AI DojoTools: FileCabinet
# Version: 4.0.0 RC2
#
# Scripts:
#   zen_dojotools_filecabinet — Cabinet volume K/V storage engine (v4.0.0 RC2)
#
# MIGRATED FROM: scripts.yaml (2026-03-06)
#
# FG-14 FIXED: boolean: {} selectors stripped on migration
###############################################################################

script:
  zen_dojotools_filecabinet:
    sequence:
    - variables:
        routing_status: init
        normalized_label_targets: '{{ [] }}'
        resolved_label_drawers: '{{ [] }}'
        resolved_label_entities: '{{ [] }}'
        label_input_list: '{{ [] }}'
        read_volume: '{{ {} }}'
        force_action: '{{ force_action | default(false) }}'
        action_type: '{{ action_type | default(''help'') }}'
        volume_entity: "{% set _veid = volume_entity_id | default('') %} {% if _veid
          is string %}\n  {{ _veid }}\n{% elif _veid is iterable and not _veid is string
          and _veid | length > 0 %}\n  {{ _veid[0] }}\n{% else %}\n  ''\n{% endif %}"
        key: '{{ key | default('''') | slugify }}'
        raw_value: '{{ value | default('''') }}'
        label_input: '{{ label_input | default('''') }}'
        label_targets: '{{ label_targets | default('''') }}'
        set_timestamp: '{{ set_timestamp | default(false) }}'
        protect_write: '{{ protect_write | default(true) }}'
        now_iso: '{{ now().isoformat() }}'
        expires_after: '{{ expires_after | default('''') | trim }}'
        no_autoexpire: '{{ no_autoexpire | default(false) }}'
        no_autorecycle: '{{ no_autorecycle | default(false) }}'
        drawer_acl: "{% set _acl = acl | default('') %}\n{% if _acl is mapping %}\n
          \ {{ _acl }}\n{% elif _acl is string and _acl | trim | length > 0 %}\n  {{
          _acl | from_json | default({}) }}\n{% else %}\n  {}\n{% endif %}"
        description: '{{ description | default('''') | truncate(255, True, '''', 0)
          | trim }}'
        is_create: '{{ action_type == ''create'' }}'
        is_update: '{{ action_type == ''update'' }}'
        is_read: '{{ action_type == ''read'' }}'
        is_delete: '{{ action_type == ''delete'' }}'
        is_help: '{{ action_type == ''help'' }}'
        initial_volume_raw: '{{ state_attr(volume_entity, ''variables'') | default({},
          true) }}'
        initial_volume: '{% if initial_volume_raw is mapping %}{{ initial_volume_raw
          }}{% else %}{}{% endif %}'
        key_exists_initial: '{{ (key != '''') and (key in initial_volume) }}'
        prewrite_volume_raw: '{{ state_attr(volume_entity, ''variables'') | default({},
          true) }}'
        prewrite_volume: '{% if prewrite_volume_raw is mapping %}{{ prewrite_volume_raw
          }}{% else %}{}{% endif %}'
        prettify_json_on_fail: '{{ prettify_json_on_fail | default(false) }}'
        label_raw: '{{ label_targets | default('''') }}'
        resolved_label_targets: "{{\n  (label_raw\n    | replace('\\n', ',')\n    |
          regex_findall('[^,]+')\n    | map('trim')\n    | map('lower')\n    | list)\n}}"
        label_index_map: "{{\n  (read_volume.get('_label_index', {}).get('value', {})\n
          \     if read_volume is mapping else {})\n}}"
        resolved_drawers: "{%- set targets = resolved_label_targets if resolved_label_targets
          is sequence else [] -%}\n{%- set idx = label_index_map if label_index_map
          is mapping else {} -%}\n\n{%- set ns = namespace(accum=[]) -%}\n\n{# Build
          one merged list of drawers without using append() #}\n{%- for t in targets
          %}\n  {%- set arr = idx.get(t, []) %}\n\n  {# Normalize arr into clean list
          #}\n  {%- if arr is mapping %}\n    {%- set arr = arr.keys() | list %}\n  {%-
          elif arr is iterable and not arr is string %}\n    {%- set arr = arr | list
          %}\n  {%- elif arr not in [none, ''] %}\n    {%- set arr = [arr] %}\n  {%-
          else %}\n    {%- set arr = [] %}\n  {%- endif %}\n\n  {# Functional merge
          — no append — safe union #}\n  {%- set ns.accum = (ns.accum + arr) | unique
          | list %}\n{%- endfor %}\n{%- if ns.accum | length == 0 -%}\n  {{ [] }}\n{%-
          else -%}\n  {{ ns.accum }}\n{%- endif %}"
        is_label_mode: "{{\n  (resolved_label_targets | length > 0)\n}}"
        current_label_index_raw: "{%- set idx = initial_volume.get('_label_index', {})
          %} {%- set val = idx.get('value') %} {%- if val is mapping %}\n  {{ val }}\n{%-
          elif val is sequence %}\n  {%- set mapped = {} -%}\n  {%- for label in val
          if label is string -%}\n    {%- set mapped = mapped | combine({ label: []
          }) -%}\n  {%- endfor -%}\n  {{ mapped }}\n{%- else %}\n  {} \n{%- endif %}"
        current_label_index: '{%- import ''zenos_ai/library_index.jinja'' as library_index -%}
          {{ library_index.normalize_label_index(current_label_index_raw) }}'
        parsed_value: "{% set _v = raw_value | trim %} {% set error = none %} {% set
          parsed = none %} {% if _v == '' %}\n  {% set error = \"Write failed: Input
          value is blank.\" %}\n{% else %}\n  {% set temp = _v %}\n  {% set try_json
          = false %}\n  {% if temp[:1] in ['{', '['] or temp in ['true', 'false', 'null']
          %}\n    {% set try_json = true %}\n  {% elif temp | regex_match('^-?\\\\d+$')
          %}\n    {% set try_json = true %}\n  {% endif %}\n  {% if try_json %}\n    {%
          set parsed = temp | from_json %}\n    {% if parsed is none %}\n      {% set
          error = \"Write failed: Input value is not valid JSON. Please reformat using
          proper JSON syntax (e.g., escaped quotes, valid brackets).\" %}\n    {% endif
          %}\n  {% else %}\n    {% set js = temp\n      | replace('\\\\', '\\\\\\\\')\n
          \     | replace('\"', '\\\\\"')\n      | replace('\\r', '\\\\r')\n      |
          replace('\\n', '\\\\n')\n      | replace('\\t', '\\\\t')\n    %}\n    {% set
          wrapped = '\"' ~ js ~ '\"' %}\n    {% set parsed = wrapped | from_json %}\n
          \   {% if parsed is none %}\n      {% set error = \"Write failed: Could not
          coerce string to JSON—possibly invalid input or encoding.\" %}\n    {% endif
          %}\n  {% endif %}\n{% endif %} {% if error %}\n  {{ error }}\n{% else %}\n
          \ {{ parsed }}\n{% endif %}"
        parsed_entity_labels: "{% if is_create or is_update %}\n  {% if label_input
          is string %}\n    {% set s = label_input | replace('\\n', ',') %}\n    {{\n
          \     (\n        s\n        | regex_findall('[^,]+')\n        | map('trim')\n
          \       | map('lower')\n        | map('slugify')\n        | select('string')\n
          \       | sort\n        | list\n      )\n    }}\n  {% elif label_input is
          sequence %}\n    {{\n      (\n        label_input\n        | map('trim')\n
          \       | map('lower')\n        | map('slugify')\n        | select('string')\n
          \       | sort\n        | list\n      )\n    }}\n  {% else %}\n    []\n  {%
          endif %}\n{% else %}\n  []\n{% endif %}"
        all_system_labels: "{% if is_create or is_update %}\n  {{ labels() | map('lower')
          | sort | list }}\n{% else %}\n  []\n{% endif %}      "
        dropped_labels: '{{ parsed_entity_labels | reject(''in'', all_system_labels)
          | sort | list }}'
        accepted_entity_labels: '{{ parsed_entity_labels | select(''in'', all_system_labels)
          | sort | list }}'
        updated_label_index: "{% if (is_create | default(false)) or (is_update | default(false))
          %}\n  {%- set vol =\n        (prewrite_volume if prewrite_volume is mapping
          else initial_volume)\n  -%}\n  {%- set current_index = vol.get('_label_index',
          {}).get('value', {}) -%}\n  {%- set current = current_index if current_index
          is mapping else {} -%}\n\n  {%- set drawer_name = key | lower | slugify -%}\n
          \ {%- set new_labels =\n        (accepted_entity_labels\n          | map('string')\n
          \         | map('lower')\n          | map('slugify')\n          | list)\n
          \ -%}\n\n  {%- set acc = namespace(val = dict(current)) -%}\n  {%- for label
          in new_labels %}\n    {%- set entry = acc.val.get(label) %}\n    {%- set existing
          =\n          (entry if entry is iterable and not entry is string else\n           [entry]
          if entry not in [None, ''] else [])\n    -%}\n    {%- set acc.val = acc.val
          | combine({\n          label: (existing + [drawer_name]) | unique | list\n
          \       })\n    -%}\n  {%- endfor %}\n\n  {{ acc.val }}\n{% else %}\n  {}\n{%
          endif %}"
        extended_label_index: "{%- set raw = initial_volume.get('_label_index', {}).get('value')
          -%} {%- set index = {} -%}\n{% if raw is mapping %}\n  {# Full nested label
          index (expected case) #}\n  {% for _label, drawers in raw.items() %}\n    {%-
          set label = _label | lower | slugify -%}\n\n    {# Normalize drawers to a
          clean list #}\n    {%- if drawers is mapping %}\n      {# A dict of drawers
          → copy keys only, normalized #}\n      {%- set clean = drawers.keys() | list
          -%}\n\n    {%- elif drawers is iterable and not drawers is string %}\n      {#
          Could be list, tuple, generator → normalize #}\n      {%- set clean = drawers
          | list -%}\n\n    {%- else %}\n      {# Single string or other scalar #}\n
          \     {%- set clean = [drawers] -%}\n    {%- endif %}\n\n    {# Force all
          drawers to become lowercase-slugified names #}\n    {%- set clean = clean\n
          \                   | map('string')\n                    | map('lower')\n
          \                   | map('slugify')\n                    | list\n     -%}\n\n
          \   {# Remove duplicates, ensure real list #}\n    {%- set clean = clean |
          unique | list -%}\n\n    {%- set index = index | combine({ label: clean })
          -%}\n  {% endfor %}\n\n{% elif raw is iterable and not raw is string %}\n
          \ {# Legacy format: ['label1','label2'] #}\n  {% for _label in raw %}\n    {%-
          set label = _label | lower | slugify -%}\n    {%- set index = index | combine({
          label: ['_unknown_drawer'] }) -%}\n  {% endfor %}\n\n{% else %}\n  {# Fallback:
          rebuild from drawers' meta #}\n  {% for drawer, val in initial_volume.items()
          %}\n    {%- set labels = [] -%}\n    {% if val is mapping and 'meta' in val
          and val.meta is mapping %}\n      {%- set labels = val.meta.get('entity_labels',
          []) -%}\n    {% elif val is mapping and 'entity_labels' in val %}\n      {%-
          set labels = val.get('entity_labels', []) -%}\n    {% endif %}\n\n    {% for
          _label in labels %}\n      {%- set label = _label | lower | slugify -%}\n
          \     {%- set existing = index.get(label, []) -%}\n      {%- set index = index
          | combine({\n            label: (existing + [drawer]) \n                   |
          map('string')\n                   | map('lower')\n                   | map('slugify')\n
          \                  | unique\n                   | list\n          })\n      -%}\n
          \   {% endfor %}\n  {% endfor %}\n{% endif %}\n{{ index }}"
        new_entry: "{% if is_create or is_update %}\n  {% set base = {'value': parsed_value}
          %}\n  {% set with_ts = base | combine({'timestamp': now_iso}) if set_timestamp
          else base %}\n  {% set meta = {} %}\n  {% if accepted_entity_labels | length
          > 0 %}\n    {% set meta = meta | combine({'entity_labels': accepted_entity_labels
          | list}) %}\n  {% endif %}\n  {% if expires_after | trim != '' %}\n    {%
          set meta = meta | combine({'expires_after': expires_after | trim}) %}\n  {%
          endif %}\n  {% if no_autoexpire %}\n    {% set meta = meta | combine({'no_autoexpire':
          true}) %}\n  {% endif %}\n  {% if no_autorecycle %}\n    {% set meta = meta
          | combine({'no_autorecycle': true}) %}\n  {% endif %}\n  {% if drawer_acl
          is mapping and drawer_acl | length > 0 %}\n    {% set meta = meta | combine({'acl':
          drawer_acl}) %}\n  {% endif %}\n  {% if description | trim | length > 0 %}\n
          \   {% set meta = meta | combine({'description': description | trim}) %}\n
          \ {% endif %}\n  {% set full = with_ts | combine({'meta': meta}) if meta |
          length > 0 else with_ts %}\n  {{ full }}\n{% else %}\n  {}\n{% endif %}"
        new_volume: "{% if is_create or is_update %}\n  {% set vol = state_attr(volume_entity,
          'variables') | default(initial_volume, true) %}\n  {{ vol | combine({\n    (key):
          new_entry,\n    '_label_index': {\n      'value': updated_label_index,\n      'timestamp':
          now_iso\n    }\n  }, recursive=true) }}\n{% else %}\n  {{ initial_volume }}\n{%
          endif %}"
        initial_norm: '{{ initial_volume }}
  
          '
        current_norm: "{{\n  (\n    state_attr(volume_entity, 'variables')\n    | default({},
          true)\n  )\n}}\n"
        volume_unmodified: "{{\n  (not protect_write)\n  or\n  (initial_norm == current_norm)\n}}\n"
        cabinet_volumeinfo: "{% set info = initial_volume.get('AI_Cabinet_VolumeInfo',
          {}) %} {% if info is mapping and info.get('value') is mapping %}\n  {{ info.get('value')
          }}\n{% else %}\n  {}\n{% endif %}"
        zen_relationships: "{% set z = initial_volume.get('_zen_relationships', {})
          %} {% if z is mapping and z.get('value') is mapping %}\n  {{ z.get('value')
          }}\n{% else %}\n  {}\n{% endif %}"
        is_create_new: "{{\n  action_type == 'create'\n  and key != ''\n  and not key_exists_initial\n}}"
        is_force_update_new: "{{\n  action_type == 'update'\n  and key != ''\n  and
          not key_exists_initial\n  and force_action\n}}"
        is_force_create_over_existing: "{{\n  action_type == 'create'\n  and key !=
          ''\n  and key_exists_initial\n  and force_action\n}}"
        is_create_path: "{{\n  is_create_new\n  or is_force_update_new\n  or is_force_create_over_existing\n}}"
        is_update_path: "{{\n  is_update and key_exists_initial\n}}"
        is_write_action: "{{\n  action_type in ['create','update','delete','move','copy']\n}}"
        json_parse_failed: "{{\n  (parsed_value is string and parsed_value.startswith('Write
          failed'))\n  or\n  (parsed_value is mapping and (parsed_value.get('error','')
          | string).startswith('Write failed'))\n}}"
        health_blocked: "{{\n  (state_attr(volume_entity, 'health') or {}).get('status')
          == 'error'\n  or (state_attr(volume_entity, 'health') or {}).get('guid_mismatch',
          false)\n  or not (state_attr(volume_entity, 'health') or {}).get('writeable',
          true)\n  or (\n        (state_attr(volume_entity, 'health') or {}).get('storage_warning',
          false)\n        and not force_action\n     )\n}}"
    - choose:
      - conditions:
        - alias: Error - Fatal JSON Parsing
          condition: template
          value_template: "{{\n  (action_type not in ['manifest', 'read', 'delete',
            'move', 'copy', 'help' ])\n  and (\n        (parsed_value is string and
            parsed_value.startswith('Write failed'))\n        or\n        (parsed_value
            is mapping and (parsed_value.get('error','') | string)\n            .startswith('Write
            failed'))\n      )\n}}\n\n\n"
        sequence:
        - action: system_log.write
          data:
            level: error
            message: 'ZenDojoTools FileCabinet: FATAL — JSON parse error, write aborted.
              Key: {{ key }} | Volume: {{ volume_entity }} Parsed Value: {{ parsed_value
              }}
  
              '
        - variables:
            fatal_response: "{{\n  {\n    \"status\": \"error\",\n    \"failure\": \"json_parse_error\",\n
              \   \"volume_entity\": volume_entity,\n    \"key\": key,\n    \"parsed_value\":
              parsed_value\n  } | tojson\n}}"
        - stop: JSON Parse Failure
          response_variable: fatal_response
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ action_type in [''create'',''update'',''delete'',''move'',''copy'']
            }}
  
            '
          alias: Is a 'write' action
        sequence:
        - variables:
            vol_health: '{{ state_attr(volume_entity, ''health'') or {} }}'
            h_status: '{{ vol_health.get(''status'','''') }}'
            h_mismatch: '{{ vol_health.get(''guid_mismatch'', false) }}'
            h_writeable: '{{ vol_health.get(''writeable'', true) }}'
            h_storage_warning: '{{ vol_health.get(''storage_warning'', false) }}'
            health_blocked: "{{\n  (h_status == 'error')\n  or h_mismatch\n  or (not
              h_writeable)\n  or (h_storage_warning and not force_action)\n}}\n"
        - choose:
          - conditions:
            - condition: template
              value_template: '{{ health_blocked }}'
              alias: 'Error: Not Healthy'
            sequence:
            - variables:
                final_response:
                  status: error
                  message: 'Write blocked: Volume not healthy.'
                  health_snapshot:
                    status: '{{ h_status }}'
                    mismatch: '{{ h_mismatch }}'
                    writeable: '{{ h_writeable }}'
                    storage_warning: '{{ h_storage_warning }}'
                    force_action: '{{ force_action }}'
            - stop: Health-blocked write
              response_variable: final_response
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ action_type in [''create'',''update''] and (key == ''''
            or raw_value == '''') }}'
          alias: Error - Create Update, Drawer (Key) or Value Missing
        sequence:
        - variables:
            final_response:
              status: error
              message: For '{{ action_type }}', you must supply both 'key' and 'value'.
        - stop: Missing key/value
          response_variable: final_response
      - conditions:
        - condition: template
          value_template: '{{ action_type == ''delete'' and key == '''' }}'
          alias: Error - Delete, Drawer (Key) Missing
        sequence:
        - variables:
            final_response:
              status: error
              message: For 'delete', you must supply a 'key'.
        - stop: Missing key for delete
          response_variable: final_response
      - conditions:
        - alias: Error - Update, Drawer (Key) does not exist
          condition: template
          value_template: '{{ action_type == ''update'' and not key_exists_initial and
            not force_action }}'
        sequence:
        - variables:
            final_response:
              status: error
              message: 'Cannot update: key ''{{ key }}'' does not exist.'
        - stop: Key not found
          response_variable: final_response
      - conditions:
        - alias: Error — Create, Drawer Exists and Not Force_Action
          condition: template
          value_template: "{{\n  action_type == 'create'\n  and key != ''\n  and key_exists_initial\n
            \ and not force_action\n}}"
        sequence:
        - variables:
            final_response:
              status: error
              message: 'Cannot create: key ''{{ key }}'' exists. Use Update or retry
                with override approval using force_action. (Will be logged)'
        - stop: Drawer Exists and not force_action
          response_variable: final_response
      - conditions:
        - condition: template
          value_template: '{{ action_type == ''help'' }}'
          alias: Help
        sequence:
        - variables:
            final_response:
              status: info
              message: Zen DojoTools File Cabinet Help
              actions:
                manifest: Use MANIFEST function for the Volume Manifest (list all volumes)
                  Errors may silently return Manifest - if you unexpectedly got a manifest...
                  Yeah...
                create: Optional set_timestamp, protect_write, label_input Requires
                  'drawer' and 'value'; drawer must exist; must write WHOLE drawer'
                  at once. AS AN OVERWRITE. 'value' must be valid JSON; will attempt
                  to parse, error returned on failure.
                read: "manifest: >-\n  Set 'volume_entity' to '*'\n  Same as Volume
                  Manifest (all volumes)\nvolume: >-\n  directory: >-\n    Set 'volume_entity'
                  to [your_volume_entity]\n    Set 'drawer' to any of [None, '', '*']\n
                  \   to obtain volume directory\n  content: >-\n    Set 'volume_entity'
                  to [your_volume_entity]\n    set 'drawer' to [your_valid_drawer]\n
                  \ special: >-\n    Use label_targets for filtered read."
                update: Requires 'drawer' and 'value'; drawer must exist; must write
                  WHOLE drawer' at once. 'value' must be valid JSON; will attempt to
                  parse.  With force_action, will silently create drawer. error returned
                  on failure.
                delete: Requires 'drawer'
                copy: "Requires (source) 'drawer' only the first in list will be accepted,
                  all others will be dropped\n  'destination drawer', 'destination cabinet'\noptional
                  'force_action' Attempts to move a drawer from source ot dest.  Must
                  be valid Cabinet, Source and Dest drawer. Use force_action to overwrite
                  destination drawer with action."
                move: Requirements and usage identical to Copy,  will also attempt a
                  delete source after copy.
                help: Returns help
              about:
                version: 4.0.0 RC2
                branch: beta
                manual: "summary: >\n  The Zen DojoTools File Cabinet is your go-to
                  tool for managing data in volumes.\n  Volumes are digital storage
                  units made of drawers that hold organized chunks\n  of information.
                  When using the controller, first locate the correct volume and\n  drawer
                  for your data task. Always maintain data integrity by reading current
                  data\n  before updating to avoid accidental overwrites. Volumes and
                  drawers come\n  with labels, indexes, and metadata applied at the
                  drawer level—these are key\n  to making data searchable and easily
                  manageable. Think of drawers as\n  entities in a many-to-many relationship
                  with labels, allowing flexible,\n  powerful querying across multiple
                  volumes.\n  Decide between read-optimized and write-optimized data
                  structures based on\n  usage.\n  Read-optimized for stable, quickly
                  accessible nested data via dotted\n  notation, and write-optimized
                  for isolated, rapidly changing contexts like\n  game states. Ownership
                  and role distinctions segment data access across\n  multiple volumes,
                  keeping data secure and context-appropriate.\n  The volume index performs
                  table scans across all accessible volumes to\n  find labels and locate
                  data, highlighting the critical importance of\n  thorough labeling.
                  Metadata at the drawer level enriches data with context,\n  enhancing
                  findability and decision-making.\n  With this approach, data stays
                  organized, accessible, and scalable, enabling\n  efficient management
                  for all smart home or AI project needs. Use this guide\n  to keep
                  your data game solid, agile, and Friday-approved.    \nauthor: person.friday
                  date: 6/8/2025"
              defaults:
                protect_write: true
        - stop: Returning help
          response_variable: final_response
      - conditions:
        - alias: Read by Label
          condition: template
          value_template: "{{ \n  (label_targets | default('') | trim | length > 0)\n}}\n"
        sequence:
        - variables:
            always_hide_drawers:
            - AI_Cabinet_VolumeInfo
            read_volume: '{{ state_attr(volume_entity, ''variables'') | default({},
              true) }}'
            vol: '{{ read_volume if read_volume is mapping else {} }}'
            normalized_label_targets: "{{\n  (\n    (label_targets | default('') | replace('\\n',
              ','))\n    | regex_findall('[^,]+')\n    | map('trim')\n    | map('lower')\n
              \   | map('slugify')\n    | list\n  )\n}}"
            label_index: "{{\n  (\n    vol.get('_label_index', {}).get('value', {})\n
              \   if vol is mapping else {}\n  )\n}}"
            resolved_label_drawers: "{# Step 1: detect bad python literal #}\n{% set
              is_python_literal =\n  (label_index is string)\n  and (\"{\" in label_index)\n
              \ and (\"'\" in label_index)\n  and not ('\"' in label_index)\n%}\n\n{#
              Step 2: fix it if needed #}\n{% if is_python_literal %}\n  {% set json_str
              = label_index\n    | replace(\"'\", '\"')\n    | replace(\"None\", \"null\")\n
              \   | replace(\"True\", \"true\")\n    | replace(\"False\", \"false\")\n
              \ %}\n  {% set idx = json_str | from_json %}\n{% elif label_index is string
              %}\n  {% set idx = label_index | from_json %}\n{% else %}\n  {% set idx
              = label_index %}\n{% endif %}\n\n{% set targets = (normalized_label_targets
              | list) %}\n{% set ns = namespace(out=[]) %}\n\n{# Iterate through targets
              #}\n{% for t in targets %}\n  {% set raw_arr = idx[t] | default('__MISS__')
              %}\n\n  {# normalize arr #}\n  {% if raw_arr is mapping %}\n    {% set
              arr = raw_arr.keys() | list %}\n  {% elif raw_arr is iterable and raw_arr
              is not string and raw_arr != '__MISS__' %}\n    {% set arr = raw_arr |
              list %}\n  {% elif raw_arr not in [none, '', '__MISS__'] %}\n    {% set
              arr = [raw_arr] %}\n  {% else %}\n    {% set arr = [] %}\n  {% endif %}\n\n
              \ {# merge #}\n  {% set ns.out = (ns.out + arr) | unique | list %}\n{%
              endfor %}\n\n{{ ns.out }}"
            is_label_mode: '{{ normalized_label_targets | length > 0 }}'
            read_payload: "{% set vol = read_volume if read_volume is mapping else {}
              %}\n{% if vol|length == 0 %}\n  {{ {\"error\": \"Volume attribute missing
              or empty.\"} }}\n{% else %}\n  {% set targets = normalized_label_targets
              %}\n  {% set drawers = resolved_label_drawers %}\n  {% set has_targets
              = targets|length > 0 %}\n  {% if has_targets %}\n    {% set ns = namespace(out={})
              %}\n    {% for d in drawers %}\n      {% if d in vol and d not in always_hide_drawers
              and not (d[:1] in ['_', '.']) %}\n        {% set _d = vol[d] %}\n        {%
              set _desc = _d.get('meta', {}).get('description', '') | trim if _d is
              mapping else '' %}\n        {% set _exp = _d.get('meta', {}).get('expires_after',
              '') | trim if _d is mapping else '' %}\n        {% if _desc | length > 0
              %}\n          {% set _blurb = _desc %}\n        {% else %}\n          {%
              set _val = (_d.get('value', '') if _d is mapping else _d) | string %}\n
              \         {% set _blurb = _val[:120] ~ ('...' if _val | length > 120 else
              '') %}\n        {% endif %}\n        {% if _exp | length > 0 %}\n          {%
              set _blurb = '[exp:' ~ _exp ~ '] ' ~ _blurb %}\n        {% endif %}\n        {%
              set ns.out = ns.out | combine({ d: _blurb }) %}\n      {% endif %}\n    {%
              endfor %}\n    {{\n      {\n        \"mode\": \"label\",\n        \"label_targets\":
              targets,\n        \"resolved_drawers\": drawers,\n        \"count\": ns.out|length,\n
              \       \"drawers\": ns.out,\n        \"note\": \"Label read returns blurbs
              only. Use direct read for full drawer content.\",\n        \"message\": (\n          \"No drawers found for requested labels.\"\n
              \         if ns.out|length == 0\n          else \"OK\"\n        )\n      }
              \n    }}\n  {% else %}\n    {{ {\n      \"error\": \"Label mode requested
              but no labels found.\",\n      \"label_targets\": targets\n    } }}\n
              \ {% endif %}\n{% endif %}"
        - variables:
            final_response:
              status: '{{ ''error'' if (read_payload is string and read_payload[:8]
                == ''{"error"'') else ''success'' }}'
              message: "{% if read_payload is string and read_payload[:8] == '{\"error\"'
                %}\n  There was a problem reading from the volume.\n{% else %}\n  Read
                succeeded.\n{% endif %}"
              result: '{{ read_payload }}'
        - stop: Read complete
          response_variable: final_response
      - conditions:
        - alias: Directory - Read all drawers in volume
          condition: template
          value_template: "{{ action_type == 'read'\n   and ((label_targets | trim)
            == '')\n   and (volume_entity not in ['', '*', None])\n   and (key in ['',
            None, '*']) }}\n"
        sequence:
        - variables:
            ignore_label_prefixes:
            - _
            - .
            always_hide_drawers:
            - AI_Cabinet_VolumeInfo
            read_volume: '{{ state_attr(volume_entity, ''variables'') | default({},
              true) }}'
            raw_drawers: '{% if read_volume is mapping %}{{ read_volume.keys() | list
              }}{% else %}[]{% endif %}'
            read_label_index: "{% if read_volume %}\n  {{ read_volume.get('_label_index',
              {}).get('value', []) }}\n{% else %}\n  []\n{% endif %}"
            read_filtered_manifest: "{%- import 'zenos_ai/library_index.jinja' as library_index
              -%}\n{%- set cabs_json = library_index.parse_index_command('AI Data Storage
              Cabinet') -%}\n{%- set fixed_json = cabs_json | replace(\"['\", '[\"')
              \ | replace(\"']\", '\"]') | replace(\"', '\", '\", \"') | trim %}\n{%-
              set cabs = fixed_json | from_json -%}\n{%- set sensors = states['sensor']
              | map(attribute='entity_id') | list -%}\n{%- set fcabs = intersect(sensors,
              cabs) -%}\n\n{%- set ns = namespace(filtered={}) %}\n{%- for cab_entity
              in fcabs %}\n  {%- set variables = state_attr(cab_entity, 'variables')
              %}\n  {%- if variables and variables.get('AI_Cabinet_VolumeInfo') and
              variables['AI_Cabinet_VolumeInfo'].get('value') %}\n    {%- set cab_id
              = variables['AI_Cabinet_VolumeInfo']['value'].get('id', cab_entity) %}\n
              \   {%- set ns.filtered = ns.filtered | combine({\n      (cab_entity):
              variables['AI_Cabinet_VolumeInfo']['value']\n    }) %}\n  {%- endif %}\n{%-
              endfor %}\n{{ ns.filtered }}"
            parsed_key: '{{ key | default('''', true) | trim | lower }}'
            initial_volume: '{{ read_volume if read_volume is mapping else {} }}'
            read_payload: "\n{# Ensure read_volume is a mapping; else fallback to empty
              dict #}\n{% set safe_read_volume = read_volume if read_volume is mapping
              else {} %}\n\n{% if safe_read_volume | length == 0 %}\n  {{ {'error':
              'Volume attribute missing or empty.'} }}\n{% elif parsed_key in ['', '*']
              %}\n  {%- set raw_drawers = safe_read_volume.keys() | list | default([])
              %}\n    {%- set filtered_drawers_ns = namespace(items=[]) %}\n  {%- for
              d in raw_drawers %}\n    {%- if d not in always_hide_drawers and not (d[:1]
              == '_' or d[:1] == '.') %}\n      {%- set val = safe_read_volume.get(d,
              {}) %}\n      {%- set val_value = val.get('value') if val is mapping else
              {} %}\n      {%- if val is mapping and val_value is mapping and val_value.get('mount_point',
              false) %}\n        {%- set mp_target = (\n            val_value.get('target_entity_id')\n
              \           if val_value.get('target_entity_id')\n            else val_value.get('target_volume_id')\n
              \           if val_value.get('target_volume_id')\n            else '?'\n
              \         ) -%}\n        {%- set drawer_name = d ~ ' [mount:' ~ mp_target
              ~ ']' %}\n      {%- else %}\n        {%- set drawer_name = d %}\n      {%-
              endif %}\n      {%- set filtered_drawers_ns.items = filtered_drawers_ns.items
              + [drawer_name] %}\n    {%- endif %}\n  {%- endfor %}\n  {%- set drawer_list
              = filtered_drawers_ns.items %}\n\n  {{\n    {\n      'drawers': drawer_list,\n
              \     'label_index': read_label_index\n    } | tojson\n  }}\n{% endif
              %}"
        - variables:
            final_response:
              status: '{{ ''error'' if (read_payload is string and read_payload[:8]
                == ''{"error"'') else ''success'' }}'
              message: "{% if read_payload is string and read_payload[:8] == '{\"error\"'
                %}\n  There was a problem reading drawers in the volume.\n{% else %}\n
                \ Directory read succeeded.\n{% endif %}"
              result: '{{ read_payload }}'
        - stop: Volume directory read complete
          response_variable: final_response
      - conditions:
        - alias: Read
          condition: template
          value_template: "{% set is_direct_read =\n     (action_type == 'read')\n     and
            (volume_entity not in [None, '', '*'])\n     and (key not in [None, '',
            '*'])\n%}\n\n{% set has_labels = normalized_label_targets is iterable\n
            \                   and (normalized_label_targets | length) > 0 %}\n\n{%
            set is_label_read =\n     (action_type == 'read')\n     and has_labels\n%}\n\n{{
            is_direct_read or is_label_read }}\n\n"
        sequence:
        - variables:
            ignore_label_prefixes:
            - _
            - .
            always_hide_drawers:
            - AI_Cabinet_VolumeInfo
            read_volume: '{{ state_attr(volume_entity, ''variables'') | default({},
              true) }}'
            parsed_key: '{{ key | default('''', true) | trim | lower }}'
            vol: '{{ read_volume if read_volume is mapping else {} }}'
            label_index: "{{\n  (\n    vol.get('_label_index', {}).get('value', {})\n
              \   if vol is mapping else {}\n  )\n}}"
            read_payload: "{% if vol | length == 0 %}\n  {{ {\"error\": \"Volume attribute
              missing or empty.\"} }}\n{% else %}\n\n  {# --------------------------------------------------\n
              \    CASE 1: DIRECTORY LISTING (\"\", \"*\")\n     --------------------------------------------------
              #}\n  {% if parsed_key in ['', '*'] %}\n    {%- set ns_draw = namespace(drawers=[])
              -%}\n    {%- for d in vol.keys() | list -%}\n      {%- if d not in always_hide_drawers
              and not (d[:1] in ['_', '.']) -%}\n        {%- set ns_draw.drawers = ns_draw.drawers
              + [d] -%}\n      {%- endif -%}\n    {%- endfor -%}\n    {{ {\"drawers\":
              ns_draw.drawers, \"label_index\": label_index} }}\n\n  {# --------------------------------------------------\n
              \    CASE 2: DIRECT KEY READ\n     --------------------------------------------------
              #}\n  {% elif parsed_key in vol %}\n    {% set _d = vol[parsed_key] %}\n    {% set _desc = _d.get('meta', {}).get('description', '') | trim if _d is mapping else '' %}\n    {% set _exp = _d.get('meta', {}).get('expires_after', '') | trim if _d is mapping else '' %}\n    {% if _desc | length > 0 %}\n      {% set _hint_parts = [_desc] %}\n      {% if _exp | length > 0 %}{% set _hint_parts = _hint_parts + ['[exp:' ~ _exp ~ ']'] %}{% endif %}\n      {{ {parsed_key: _d, '_hint': _hint_parts | join(' ')} | tojson }}\n    {% else %}\n      {% set _val = (_d.get('value', '') if _d is mapping else _d) | string %}\n      {% set _trunc = _val[:64] ~ ('...[truncated: add description for full access]' if _val | length > 64 else '') %}\n      {% set _td = _d | combine({'value': _trunc}) if _d is mapping else _trunc %}\n      {% set _exp_note = ' [exp:' ~ _exp ~ ']' if _exp | length > 0 else '' %}\n      {{ {parsed_key: _td, '_hint': '(no description — value truncated to 64 chars)' ~ _exp_note} | tojson }}\n    {% endif %}\n\n  {# --------------------------------------------------\n
              \    CASE 3: NOT FOUND\n     --------------------------------------------------
              #}\n  {% else %}\n    {{ {\"error\": \"Requested drawer not found in volume.\"}
              }}\n  {% endif %}\n\n{% endif %}"
        - variables:
            final_response:
              status: '{{ ''error'' if (read_payload is string and read_payload[:8]
                == ''{"error"'') else ''success'' }}'
              message: "{% if read_payload is string and read_payload[:8] == '{\"error\"'
                %}\n  There was a problem reading from the volume.\n{% else %}\n  Read
                succeeded.\n{% endif %}"
              result: '{{ read_payload }}'
        - stop: Read complete
          response_variable: final_response
      - conditions:
        - alias: Manifest - Read Volume( '', '*' )
          condition: template
          value_template: "  {{\n    action_type == 'manifest'\n    or (\n      action_type
            == 'read'\n      and (label_targets | trim) == ''\n      and (volume_entity
            in ['', '*', None])\n    )\n  }}\n"
        sequence:
        - action: script.zen_dojotools_manifest
          metadata: {}
          data:
            show_hidden_volumes: '{{ show_hidden_volumes }}'
          response_variable: final_response
        - stop: Manifest read complete
          response_variable: final_response
      - conditions:
        - alias: Create (or Update when Key not Exist and Force)
          condition: template
          value_template: "{{\n   is_create_new\n   or is_force_update_new\n   or is_force_create_over_existing\n}}"
        sequence:
        - choose:
          - conditions:
            - condition: template
              value_template: "  {{\n    protect_write\n    and not force_action\n    and
                not volume_unmodified\n  }}"
            sequence:
            - variables:
                final_response:
                  status: error
                  message: 'Protected write blocked: volume was modified. Retry.'
            - stop: Concurrent modification
              response_variable: final_response
        - event: set_variable_legacy
          event_data:
            key: '{{ key }}'
            value: '{{ new_entry.value }}'
            set_timestamp: '{{ set_timestamp }}'
            volume_entity: '{{ volume_entity }}'
        - choose:
          - conditions:
            - condition: template
              value_template: '{{ accepted_entity_labels | length > 0 }}'
              alias: Valid Labels
            sequence:
            - alias: Update the index
              event: set_variable_legacy
              event_data:
                key: _label_index
                value: '{{ updated_label_index }}'
                set_timestamp: true
                volume_entity: '{{ volume_entity }}'
        - alias: Read after Write Verification
          wait_template: "{% set vol = state_attr(volume_entity, 'variables') %}\n{%
            if vol is mapping %}\n  {% set entry = vol.get(key) %}\n  {{ entry is mapping
            }}\n{% else %}\n  false\n{% endif %}"
          timeout: 00:00:05
          continue_on_timeout: true
        - variables:
            verify_volume: '{{ state_attr(volume_entity, ''variables'') | default({},
              true) }}'
            verify_entry: "{% if verify_volume is mapping %}\n  {{ verify_volume.get(key,
              {}) }}\n{% else %}\n  {}\n{% endif %}"
            write_verified: "{{\n  verify_entry is mapping\n  and verify_entry.get('value')
              == new_entry.value\n}}"
        - variables:
            final_response:
              status: '{{ ''success'' if write_verified else ''warning'' }}'
              message: "{% if write_verified %}\n  Created drawer '{{ key }}' (verification
                confirmed).\n{% else %}\n  Created drawer '{{ key }}' (value written
                but verification delayed).\n{% endif %}"
              entry:
                drawer: '{{ key }}'
                value: '{{ new_entry.value }}'
                timestamp: '{{ new_entry.timestamp if new_entry.timestamp is defined
                  else None }}'
              verification:
                confirmed: '{{ write_verified }}'
              warnings: "{% if dropped_labels | length > 0 %}\n  Warning: {{ dropped_labels
                | length }} ignored label(s): {{ dropped_labels }}\n{% else %}\n  None\n{%
                endif %}"
        - stop: Create fired
          response_variable: final_response
      - conditions:
        - alias: Update
          condition: template
          value_template: '{{ action_type == ''update'' and key_exists_initial and not
            is_force_update_new }}
  
            '
        sequence:
        - choose:
          - conditions:
            - alias: 'Error - Concurrent Modification Blocked: Modified'
              condition: template
              value_template: "  {{\n    protect_write\n    and not force_action\n    and
                not volume_unmodified\n  }}\n"
            sequence:
            - variables:
                final_response:
                  status: error
                  message: 'Protected write blocked: volume was modified. Retry.'
            - stop: Concurrent modification
              response_variable: final_response
        - event: set_variable_legacy
          event_data:
            key: '{{ key }}'
            value: '{{ new_entry.value }}'
            set_timestamp: '{{ set_timestamp }}'
            volume_entity: '{{ volume_entity }}'
        - choose:
          - conditions:
            - condition: template
              value_template: '{{ accepted_entity_labels | length > 0 }}'
              alias: Valid Labels
            sequence:
            - alias: Update the Index
              event: set_variable_legacy
              event_data:
                key: _label_index
                value: '{{ updated_label_index }}'
                set_timestamp: true
                volume_entity: '{{ volume_entity }}'
        - alias: Read after Write Verification (update)
          wait_template: "{% set vol = state_attr(volume_entity, 'variables') %}\n{%
            if vol is mapping %}\n  {% set entry = vol.get(key) %}\n  {{ entry is mapping
            }}\n{% else %}\n  false\n{% endif %}"
          timeout: 00:00:05
          continue_on_timeout: true
        - variables:
            verify_volume: '{{ state_attr(volume_entity, ''variables'') | default({},
              true) }}'
            verify_entry: "{% if verify_volume is mapping %}\n  {{ verify_volume.get(key,
              {}) }}\n{% else %}\n  {}\n{% endif %}"
            write_verified: "{{\n  verify_entry is mapping\n  and verify_entry.get('value')
              == new_entry.value\n}}"
        - variables:
            final_response:
              status: '{{ ''success'' if write_verified else ''warning'' }}'
              message: "{% if write_verified %}\n  Updated drawer '{{ key }}' (verification
                confirmed).\n{% else %}\n  Updated drawer '{{ key }}' (value written
                but verification delayed).\n{% endif %}"
              entry:
                drawer: '{{ key }}'
                value: '{{ new_entry.value }}'
                timestamp: '{{ new_entry.timestamp if new_entry.timestamp is defined
                  else None }}'
              verification:
                confirmed: '{{ write_verified }}'
              warnings: "{% if dropped_labels | length > 0 %}\n  Warning: {{ dropped_labels
                | length }} ignored label(s): {{ dropped_labels }}\n{% else %}\n  None\n{%
                endif %}"
        - stop: Update fired
          response_variable: final_response
      - conditions:
        - condition: template
          value_template: '{{ action_type == ''delete'' and key_exists_initial }}'
          alias: Delete
        sequence:
        - event: remove_variable_legacy
          event_data:
            key: '{{ key }}'
            volume_entity: '{{ volume_entity }}'
        - wait_template: '{% set vol = state_attr(volume_entity, ''variables'') | default({},
            true) %} {{ vol is mapping and (key not in vol) }}'
          timeout: 00:00:01
          continue_on_timeout: true
          alias: Read after Delete Verification
        - variables:
            verify_volume: '{{ state_attr(volume_entity, ''variables'') | default({},
              true) }}'
            delete_verified: '{{ verify_volume is mapping and (key not in verify_volume)
              }}'
        - variables:
            _index_src: '{{ state_attr(volume_entity, ''variables'') | default({}, true)
              }}'
            _raw_index: "{% if _index_src is mapping %}\n  {{ _index_src.get('_label_index',
              {}).get('value', {}) }}\n{% else %}\n  {}\n{% endif %}"
            pruned_index: "{% if _raw_index is mapping %}\n  {# Build a cleaned copy
              with `key` removed everywhere #}\n  {% set cleaned = {} %}\n  {% for label,
              drawers in _raw_index.items() %}\n    {% if drawers is mapping %}\n      {#
              Nested form: label -> {sub: [drawers]} #}\n      {% set kept_sub = {}
              %}\n      {% for sub, arr in drawers.items() %}\n        {% set al = arr
              if (arr is iterable and not arr is string) else [arr] %}\n        {% set
              cleaned_arr = al | reject('equalto', key) | list %}\n        {% if cleaned_arr
              | length > 0 %}\n          {% set kept_sub = kept_sub | combine({ sub:
              cleaned_arr }) %}\n        {% endif %}\n      {% endfor %}\n      {% if
              kept_sub | length > 0 %}\n        {% set cleaned = cleaned | combine({
              label: kept_sub }) %}\n      {% endif %}\n    {% elif drawers is iterable
              and not drawers is string %}\n      {# Flat list form: label -> [drawers]
              #}\n      {% set cleaned_list = drawers | reject('equalto', key) | list
              %}\n      {% if cleaned_list | length > 0 %}\n        {% set cleaned =
              cleaned | combine({ label: cleaned_list }) %}\n      {% endif %}\n    {%
              else %}\n      {# Single value fallback #}\n      {% if drawers != key
              %}\n        {% set cleaned = cleaned | combine({ label: [drawers] }) %}\n
              \     {% endif %}\n    {% endif %}\n  {% endfor %}\n  {{ cleaned }}\n{%
              else %}\n  {}\n{% endif %}"
            index_changed: '{{ pruned_index != _raw_index }}'
        - choose:
          - conditions:
            - condition: template
              value_template: '{{ index_changed }}'
              alias: Prune needed
            sequence:
            - event: set_variable_legacy
              event_data:
                key: _label_index
                value: '{{ pruned_index }}'
                set_timestamp: true
                volume_entity: '{{ volume_entity }}'
            - alias: Index prune verification
              wait_template: "{% set vol = state_attr(volume_entity, 'variables') |
                default({}, true) %} {% set raw = vol.get('_label_index', {}).get('value')
                if vol is mapping else {} %} {% set found = false %} {% if raw is mapping
                %}\n  {% for label, drawers in raw.items() %}\n    {% if drawers is
                mapping %}\n      {% for sub, arr in drawers.items() %}\n        {%
                set al = arr if (arr is iterable and not arr is string) else [arr] %}\n
                \       {% if key in al %}{% set found = true %}{% endif %}\n      {%
                endfor %}\n    {% elif drawers is iterable and not drawers is string
                %}\n      {% if key in drawers %}{% set found = true %}{% endif %}\n
                \   {% else %}\n      {% if drawers == key %}{% set found = true %}{%
                endif %}\n    {% endif %}\n  {% endfor %}\n{% endif %} {{ not found
                }}"
              timeout: 00:00:01
              continue_on_timeout: true
            - variables:
                index_pruned_verified: "{% set vol = state_attr(volume_entity, 'variables')
                  | default({}, true) %} {% set raw = vol.get('_label_index', {}).get('value')
                  if vol is mapping else {} %} {% set found = false %} {% if raw is
                  mapping %}\n  {% for label, drawers in raw.items() %}\n    {% if drawers
                  is mapping %}\n      {% for sub, arr in drawers.items() %}\n        {%
                  set al = arr if (arr is iterable and not arr is string) else [arr]
                  %}\n        {% if key in al %}{% set found = true %}{% endif %}\n
                  \     {% endfor %}\n    {% elif drawers is iterable and not drawers
                  is string %}\n      {% if key in drawers %}{% set found = true %}{%
                  endif %}\n    {% else %}\n      {% if drawers == key %}{% set found
                  = true %}{% endif %}\n    {% endif %}\n  {% endfor %}\n{% endif %}
                  {{ not found }}"
        - variables:
            final_response:
              status: '{{ ''success'' if delete_verified else ''warning'' }}'
              index_maintenance:
                pruned: '{{ index_changed }}'
                verified: '{{ index_pruned_verified if index_changed else true }}'
              message: "{% if delete_verified %}\n  Deleted drawer '{{ key }}' (verification
                confirmed).\n{% else %}\n  Delete requested for '{{ key }}' (verification
                not confirmed — key still present or state not yet updated).\n{% endif
                %}"
        - stop: Delete fired
          response_variable: final_response
      - conditions:
        - condition: template
          value_template: '{{ action_type in [''move'', ''copy''] }}'
          alias: Move/Copy Drawer
        sequence:
        - variables:
            dest_cabinet: '{{ destination_cabinet | default('''') }}'
            dest_drawer: '{{ destination_drawer | default('''') | slugify }}'
            dest_volume: '{{ state_attr(dest_cabinet, ''variables'') | default({}, true)
              }}'
            src_drawer_data: '{{ initial_volume.get(key, {}) }}'
            src_drawer_value: '{{ src_drawer_data.get(''value'') if src_drawer_data
              is mapping else src_drawer_data }}'
            can_write_dest: '{{ not protect_write or (state_attr(dest_cabinet, ''variables'').get(dest_drawer)
              is none) or force_action }}'
        - choose:
          - conditions:
            - condition: template
              value_template: '{{ dest_cabinet == '''' or dest_drawer == '''' }}'
            sequence:
            - variables:
                final_response:
                  status: error
                  message: Missing destination_cabinet or destination_drawer.
            - stop: Incomplete destination
              response_variable: final_response
          - conditions:
            - condition: template
              value_template: '{{ not can_write_dest }}'
            sequence:
            - variables:
                final_response:
                  status: error
                  message: Target drawer '{{ dest_drawer }}' already exists in '{{ dest_cabinet
                    }}'. Use force_action to overwrite.
            - stop: Overwrite blocked
              response_variable: final_response
        - event: set_variable_legacy
          event_data:
            key: '{{ dest_drawer }}'
            value: '{{ src_drawer_value }}'
            set_timestamp: true
            volume_entity: '{{ dest_cabinet }}'
        - choose:
          - conditions:
            - condition: template
              value_template: '{{ accepted_entity_labels | length > 0 }}'
              alias: Valid Labels
            sequence:
            - alias: Update the Index
              event: set_variable_legacy
              event_data:
                key: _label_index
                value: '{{ updated_label_index }}'
                set_timestamp: true
                volume_entity: '{{ dest_cabinet }}'
        - wait_template: '{% set vol = state_attr(dest_cabinet, ''variables'') | default({},
            true) %} {{ vol.get(dest_drawer, {}).get(''value'') == src_drawer_value
            }}'
          timeout: 00:00:01
          continue_on_timeout: true
        - variables:
            write_verified: '{% set vol = state_attr(dest_cabinet, ''variables'') |
              default({}, true) %} {{ vol.get(dest_drawer, {}).get(''value'') == src_drawer_value
              }}'
        - choose:
          - conditions:
            - condition: template
              value_template: '{{ action_type == ''move'' and key_exists_initial }}'
              alias: Move - Source Delete Required
            sequence:
            - event: remove_variable_legacy
              event_data:
                key: '{{ key }}'
                volume_entity: '{{ volume_entity }}'
            - wait_template: '{% set vol = state_attr(volume_entity, ''variables'')
                | default({}, true) %} {{ key not in vol }}'
              timeout: 00:00:01
              continue_on_timeout: true
            - variables:
                _raw_index: '{{ initial_volume.get(''_label_index'', {}).get(''value'')
                  | default({}) }}'
                _index_src: '{{ state_attr(volume_entity, ''variables'') | default({},
                  true) }}'
                pruned_index: "{% if _raw_index is mapping %}\n  {# Build a cleaned
                  copy with `key` removed everywhere #}\n  {% set cleaned = {} %}\n
                  \ {% for label, drawers in _raw_index.items() %}\n    {% if drawers
                  is mapping %}\n      {# Nested form: label -> {sub: [drawers]} #}\n
                  \     {% set kept_sub = {} %}\n      {% for sub, arr in drawers.items()
                  %}\n        {% set al = arr if (arr is iterable and not arr is string)
                  else [arr] %}\n        {% set cleaned_arr = al | reject('equalto',
                  key) | list %}\n        {% if cleaned_arr | length > 0 %}\n          {%
                  set kept_sub = kept_sub | combine({ sub: cleaned_arr }) %}\n        {%
                  endif %}\n      {% endfor %}\n      {% if kept_sub | length > 0 %}\n
                  \       {% set cleaned = cleaned | combine({ label: kept_sub }) %}\n
                  \     {% endif %}\n    {% elif drawers is iterable and not drawers
                  is string %}\n      {# Flat list form: label -> [drawers] #}\n      {%
                  set cleaned_list = drawers | reject('equalto', key) | list %}\n      {%
                  if cleaned_list | length > 0 %}\n        {% set cleaned = cleaned
                  | combine({ label: cleaned_list }) %}\n      {% endif %}\n    {% else
                  %}\n      {# Single value fallback #}\n      {% if drawers != key
                  %}\n        {% set cleaned = cleaned | combine({ label: [drawers]
                  }) %}\n      {% endif %}\n    {% endif %}\n  {% endfor %}\n  {{ cleaned
                  }}\n{% else %}\n  {}\n{% endif %}"
                index_changed: '{{ _raw_index != pruned_index }}'
            - choose:
              - conditions:
                - condition: template
                  value_template: '{{ index_changed }}'
                  alias: Prune needed
                sequence:
                - event: set_variable_legacy
                  event_data:
                    key: _label_index
                    value: '{{ pruned_index }}'
                    set_timestamp: true
                    volume_entity: '{{ volume_entity }}'
                - alias: Index prune verification
                  wait_template: "{% set vol = state_attr(volume_entity, 'variables')
                    | default({}, true) %} {% set raw = vol.get('_label_index', {}).get('value')
                    if vol is mapping else {} %} {% set found = false %} {% if raw is
                    mapping %}\n  {% for label, drawers in raw.items() %}\n    {% if
                    drawers is mapping %}\n      {% for sub, arr in drawers.items()
                    %}\n        {% set al = arr if (arr is iterable and not arr is string)
                    else [arr] %}\n        {% if key in al %}{% set found = true %}{%
                    endif %}\n      {% endfor %}\n    {% elif drawers is iterable and
                    not drawers is string %}\n      {% if key in drawers %}{% set found
                    = true %}{% endif %}\n    {% else %}\n      {% if drawers == key
                    %}{% set found = true %}{% endif %}\n    {% endif %}\n  {% endfor
                    %}\n{% endif %} {{ not found }}"
                  timeout: 00:00:01
                  continue_on_timeout: true
                - variables:
                    index_pruned_verified: "{% set vol = state_attr(volume_entity, 'variables')
                      | default({}, true) %} {% set raw = vol.get('_label_index', {}).get('value')
                      if vol is mapping else {} %} {% set found = false %} {% if raw
                      is mapping %}\n  {% for label, drawers in raw.items() %}\n    {%
                      if drawers is mapping %}\n      {% for sub, arr in drawers.items()
                      %}\n        {% set al = arr if (arr is iterable and not arr is
                      string) else [arr] %}\n        {% if key in al %}{% set found
                      = true %}{% endif %}\n      {% endfor %}\n    {% elif drawers
                      is iterable and not drawers is string %}\n      {% if key in drawers
                      %}{% set found = true %}{% endif %}\n    {% else %}\n      {%
                      if drawers == key %}{% set found = true %}{% endif %}\n    {%
                      endif %}\n  {% endfor %}\n{% endif %} {{ not found }}"
        - variables:
            final_response:
              status: '{{ ''success'' if write_verified else ''warning'' }}'
              message: "{% if write_verified %}\n  Drawer '{{ key }}' {{ action_type
                }}d to '{{ dest_drawer }}' in '{{ dest_cabinet }}'.\n{% else %}\n  {{
                action_type | title }} completed but write verification failed or delayed.\n{%
                endif %}"
              verification:
                confirmed: '{{ write_verified }}'
        - stop: Move/Copy complete
          response_variable: final_response
      default:
      - variables:
          final_response:
            status: error
            message: Uncaught Exception. Use 'help' for usage.
      - stop: Invalid parameters
        response_variable: final_response
    alias: Zen DojoTools FileCabinet
    description: "Zen DojoTools FileCabinet (v4.0.0 RC2) 100% More Health, No Bad JSON!
      No more ghost Writes, output mapping, Parser engages on Create / Update to validate
      input.\nCabinetVolumes are The Library's storage. To use ALWAYS pull a Volume
      Manifest 'Manifest' (list of all volumes with rich metadata) FIRST if you do not
      already have it loaded to see what's available. calling the manifest by issuing
      a READ - with None, '', or '*' for 'volume_entity' A directory of a single volume
      (with labels) can be obtained by sending \n  read - valid 'volume_entity' and
      'drawer' with None, '', or '*'\nSUPERPOWER! Combine with The Index - Read by label_targets
      (yes, a list) to scan drawers for subjects. STRONG recommendation to HELP() and
      pull a manifest - READ() immediately.\nIMPORTANT: Read By Label is currently limited
      to ONE cabinet at a time."
    fields:
      action_type:
        description: '''manifest'', ''create'', ''read'', ''update'', ''delete'', ''move'',
          ''copy'', ''help'' (default: help)'
        required: true
        selector:
          select:
            options:
            - manifest
            - create
            - read
            - update
            - delete
            - move
            - copy
            - help
        default: manifest
      volume_entity_id:
        description: Target volume entity_id (NOT guid, must be valid cabinet). Use
          any of [ None, '', '*'] to return manifest.  On move / copy only accepts first
          entry as source.
        required: false
        selector:
          entity:
            multiple: true
            filter:
            - domain: sensor
        name: volume_entity
      key:
        description: Drawer to act on.  Drawer names are slugified so 'My Partner' ==
          'my_partner' (required for create/update/delete; blank or '*' returns all
          values)
        required: false
        selector:
          text:
        name: drawer
      value:
        description: Raw value to store under the drawer (required for create/update)
        required: false
        selector:
          text:
            multiline: true
      set_timestamp:
        description: Boolean. Store ISO timestamp alongside value. Defaults to false.
        required: false
        selector:
          boolean:
        default: false
      label_input:
        description: Optional. A list of label/tags to associate with this drawer (create/update).
          Comma- or newline-separated.
        required: false
        selector:
          text:
            multiline: false
        name: labels
      expires_after:
        description: Optional. ISO 8601 datetime after which the GC system may expire
          this drawer (e.g. 2026-12-31T23:59:59). Stored in meta. Enforcement is handled
          by the GC kata, not the write path.
        required: false
        selector:
          text:
        name: Expires After
      no_autoexpire:
        description: Optional. When true, the GC system will not auto-expire this drawer
          even if expires_after has passed. Useful for pinned drawers.
        required: false
        selector:
          boolean:
        default: false
        name: No Autoexpire
      no_autorecycle:
        description: Optional. When true, the GC system will not recycle (delete) this
          drawer during cleanup passes. Preserves the drawer indefinitely.
        required: false
        selector:
          boolean:
        default: false
        name: No Autorecycle
      acl:
        description: Optional. JSON object defining drawer-level access control. Same
          structure as cabinet-level ACL. Stored in meta for GC / policy enforcement.
        required: false
        selector:
          text:
            multiline: true
        name: Drawer ACL
      description:
        description: Optional. Human-readable description of this drawer (max 255 chars).
          Surfaced by the Inspect tool.
        required: false
        selector:
          text:
            multiline: false
        name: Description
      label_targets:
        description: Optional. When reading, filters the returned data by label(s).
          Accepts list of valid labels, a single label, or '*'. Blank returns all.
        required: false
        selector:
          text:
            multiline: false
      show_hidden_volumes:
        selector:
          boolean:
        name: Show Hidden Volumes
        description: Show Hidden / System Volumes (Usually, this is not recommended,
          only use when you're trying to debug, confirm etc.)  System Drawers are always
          hidden.
        required: true
      start:
        description: Start time in ISO 8601. Used when searching for entities updated
          or changed after... Defaults to no end date [Experimental - currently unused]
        required: false
        selector:
          text:
      end:
        description: End time in ISO 8601. Used when searching for entities updated
          or changed before... Defaults to no end date [Experimental - currently unused]
        required: false
        selector:
          text:
      filter_domain:
        description: Filter result list for entities in this domain Defaults to no end
          date [Experimental - currently unused]
        selector:
          text:
      filter_state_operand:
        description: Filter result list for entities with this operand (must use filter_op)  [Experimental
          - currently unused]
        selector:
          text:
        name: Filter Operand
      filter_op:
        description: Filter entity by entity matching state using this operation with
          filter operand to obtain a filtered result [Experimental - currently unused]
        selector:
          select:
            options:
            - equals
            - contains
            - not
            - above
            - below
            - 'true'
            - 'false'
        name: Filter Operation
      force_action:
        description: Set flag true to pre-confirm certain advanced actions - see documentation
          for details
        required: false
        selector:
          boolean:
        default: false
      destination_cabinet:
        selector:
          entity:
        name: Destination Cabinet
        description: Target Cabinet, REQUIRED for Move / Copy Actions. Must be valid
          cabinet.
      destination_drawer:
        selector:
          text:
        name: Destination Drawer
        description: 'Target Drawer, REQUIRED for Move / Copy Actions. Drawer name will
          be slugified - ''My Partner'' == ''my_partner'' '
    icon: mdi:folder-key
