###############################################################################
# ZenOS-AI DojoTools: Office
# Version: 4.0.0 RC2
#
# Scripts:
#   zen_dojotools_teams    — M365 Teams CRUD (v4.0.0 RC2)
#   zen_dojotools_mail     — M365 Mail CRUD (v4.0.0 RC2)
#   zen_dojotools_todo     — HA Todo domain CRUD (v4.0.0 RC2)
#   zen_dojotools_calendar — HA Calendar domain CRUD (v4.0.0 RC2)
#
# CONSOLIDATED FROM: dojotools_comms.yaml + dojotools_todo_calendar.yaml (2026-03-06)
# notification_router moved to dojotools_utilities.yaml
#
# === UAT PASS — 2026-03-06 ===
# Auditor: Claude (Anthropic, Sonnet 4.6)
# HALMark: 0.9.11-draft — PASS Level 3 (Steward Safe) — no FG hits
# UAT Cases: 2/2 PASS
#
# zen_dojotools_teams:
#   read action → live Teams chat data + status returned ✓
# zen_dojotools_mail:
#   help action → full help payload returned clean ✓
# zen_dojotools_todo + zen_dojotools_calendar:
#   carried from Batch 3 UAT PASS ✓
#
# config check → go; restart → clean ✓
# ==============================
###############################################################################

script:
  zen_dojotools_teams:
    sequence:
    - variables:
        chat_sensor: sensor.homeassistant_chat
        teams_status_sensor: sensor.homeassistant_status
        teams_status: '{{ states(teams_status_sensor) | default('''') }}'
        chat_entity_exists: '{{ states(chat_sensor) not in [''unavailable'', ''unknown'', ''none'', ''''] }}'
        action_type: '{{ action_type | default(''read'') }}'
        chat_data: '{{ state_attr(chat_sensor, ''data'') or {} }}'
        my_chat_id: '{{ states(''input_text.zen_teams_chat_id'') | default('''') | trim }}'
        my_chat_display_name: '{{ states(''input_text.zen_teams_display_name'') | default(''Home Assistant'') | trim }}'
        filtered_chat_data: "{{ chat_data | rejectattr('chat_id','eq', my_chat_id )
          \n             | list\n             | first\n             | default({}) }}"
        partner_chat_id: "{{ chat_data | map(attribute='chat_id')\n             | reject(
          'eq', my_chat_id ) \n             | list\n             | first\n             | default('') }}"
        chat_id: '{{ chat_id | default('''') }}'
        message: '{{ message | default('''') }}'
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ action_type == ''help'' or action_type not in [''send'',''read'',''set'']
            }}'
        sequence:
        - variables:
            help_response: "{{\n  {\n    \"status\": \"info\",\n    \"version\": \"4.0.0 RC2\",\n
              \   \"message\": \"Zen DojoTool for M365 Teams. Use to 'send' a message
              or 'read' for latest chat message. Update/delete not supported.\",\n    \"actions\":
              {\n      \"read\": \"Shows latest messages from a Teams chat, your online
              status and your current chat partner's ID.\",\n      \"send\": \"Send
              message(s). Needs chat_id and items or message.\",\n      \"help\": \"Returns
              this help text.\",\n      \"set\": {\n        \"description\": \"Sets
              Teams Chat Status. These combinations are allowed\",\n        \"expiration\":
              \"The expiration of the app presence session. The value is represented
              in ISO 8601 format for duration.\",\n        \"availability\": [ \"Available\",
              \"Busy\", \"Away\", \"DoNotDisturb\" ],\n        \"activity\": {\n          \"Available\":
              \"Available\",\n          \"InACall\": \"Busy\",\n          \"InAConferenceCall\":
              \"Busy\",\n          \"Away\": \"Away\",\n          \"Presenting\": \"DoNotDisturb\"\n
              \       }\n      },\n    },\n    \"fields\": {\n      \"chat_id\": \"Teams
              chat ID (from Graph API or sensor).\",\n      \"items\": \"List of messages
              to send (create).\",\n      \"message\": \"Message text (create only).\",\n
              \     \"availability\": \"Online Status.\",\n      \"activity\": \"Extended
              reason for status.\",\n      \"expiration\": \"Retain status until (default
              5 min.)\"\n    },\n    \"notes\": [\n      \"Use read to view the latest message.\",\n      \"Update and delete not supported by integration.\"\n    ],\n    \"setup\": {\n      \"input_text.zen_teams_chat_id\": \"Your Teams chat thread ID. To find it: run action_type: read — the response includes partner_chat_id pulled from sensor.homeassistant_chat. Copy that value into input_text.zen_teams_chat_id in HA Helpers. You can also find it in Developer Tools > States under sensor.homeassistant_chat attributes.\"\n    }\n  } | tojson\n}}"
        - stop: Pass response variables back to LLM
          response_variable: help_response
        - set_conversation_response: '{{ help_response }}'
        alias: help
      - conditions:
        - condition: template
          value_template: '{{ action_type == ''read'' and chat_entity_exists }}'
        sequence:
        - variables:
            from_display_name: '{{state_attr(chat_sensor,''from_display_name'') | default('''')
              }}'
            content: '{{state_attr(chat_sensor,''content'') | default('''') }}'
            importance: '{{state_attr(chat_sensor,''importance'') | default('''') }}'
            last_updated: '{{ states[chat_sensor][''last_updated''] |as_datetime | as_local
              | string | default('''') }}'
            last_chat: "{{\n  {\n    \"last_updated\": last_updated,\n    \"from_display_name\":
              from_display_name,\n    \"partner_chat_id\": partner_chat_id | default(''),\n
              \   \"data\": filtered_chat_data | default('{}'),\n    \"content\": content,\n
              \   \"importance\": importance\n  } | tojson\n}}"
            result: "{{\n  {\n    \"status\": \"success\",\n    \"action_type\": \"read\",\n
              \   \"my_chat_display_name\": my_chat_display_name,\n    \"teams_status\":
              teams_status | default(''),\n    \"last_chat\": last_chat | default('{}'),\n
              \ } | tojson\n}}"
        - stop: Pass response variables back to LLM
          response_variable: result
        - set_conversation_response: '{{ result }}'
        alias: read
      - conditions:
        - condition: template
          value_template: '{{ action_type == ''send'' }}'
        sequence:
        - if:
          - condition: template
            value_template: '{{ ( chat_id and ( chat_id != "") and ( chat_id != my_chat_id
              ) ) and ( message and ( message !="" ) ) }}'
          then:
          - data:
              chat_id: '{{ chat_id }}'
              message: '{{ message }}'
              content_type: text
            action: ms365_teams.send_chat_message
            target:
              entity_id: sensor.homeassistant_chat
          - variables:
              send_response: "{{\n  {\n    \"status\": \"success\",\n    \"action_type\":
                \"send\",\n    \"chat_id\": chat_id,\n    \"message\": message\n  }
                | tojson\n}}"
          - stop: Pass response variables back to LLM
            response_variable: send_response
          - set_conversation_response: '{{ send_response }}'
          else:
          - variables:
              error_no_chat_id: "{{\n  {\n    \"status\": \"error\",\n    \"error_message\":
                \"Create / Send requires valid Chat ID that is not your own and Message.\",\n
                \   \"chat_id\": chat_id | default(''),\n    \"message\": message |
                default('')\n  } | tojson\n}}"
          - stop: Pass response variables back to LLM
            response_variable: error_no_chat_id
          - set_conversation_response: '{{ unsupported_response }}'
        alias: send
      - conditions:
        - condition: template
          value_template: '{{ action_type == ''set'' }}'
        sequence:
        - variables:
            availability: '{{ availability | default(''Available'') }}'
            activity: "{%- set test_activity = activity| default('Available') -%}\n{%-
              if availability == 'Available' -%}\n    {%- set test_activity = 'Available'
              -%}\n{%- elif availability == 'Busy' -%}\n  {%- if activity == 'InACall'
              -%}\n    {%- set test_activity = 'InACall' -%}\n  {%- else -%}\n    {%-
              set test_activity = 'InAConferenceCall' -%}\n  {%- endif -%}\n{%- elif
              availability == 'Away' -%}\n    {%- set test_activity = 'Away' -%}\n{%-
              elif availability == 'DoNotDisturb' -%}\n    {%- set test_activity = 'Presenting'
              -%}\n{%- else -%}\n  {%- set test_activity = 'Away' -%}\n{%- endif -%}\n{{test_activity}}"
            expiration: '{{ expiration | default(''PT5M'') }}'
            data: "{\n  \"availability\": \"{{ availability }}\",\n  \"activity\": \"{{
              activity }}\",\n  \"expiration_duration\": \"{{ expiration }}\"\n}"
        - action: ms365_teams.update_user_status
          target:
            entity_id: sensor.homeassistant_status
          data: '{{ data }}'
        - variables:
            result: "{{\n  {\n    \"status\": \"success\",\n    \"action_type\": \"set\",\n
              \   \"availability\": availability,\n    \"activity\": activity,\n    \"expiration\":
              expiration,\n  } | tojson\n}}"
        - stop: Pass response variables back to LLM
          response_variable: result
        - set_conversation_response: '{{ result }}'
        alias: set
      - conditions:
        - condition: template
          value_template: '{{ action_type in [''update'',''delete''] }}'
        sequence:
        - variables:
            unsupported_response: "{{\n  {\n    \"status\": \"error\",\n    \"message\":
              \"Update/delete not supported by Teams integration. Use create (send)
              or read.\"\n  } | tojson\n}}"
        - stop: Pass response variables back to LLM
          response_variable: unsupported_response
        - set_conversation_response: '{{ unsupported_response }}'
        alias: unsupported
    - stop: End of script
      response_variable: send_response
    - set_conversation_response: '{{ send_response }}'
    alias: Zen DojoTools Teams
    description: 'Zen DojoTools Teams (1.1.0)

      for MS365-Teams in Home Assistant.

      Send message to an existing chat thread, read latest message, and help. Use Read
      to get the last chat (in-or-outbound), your current Teams status, and your current
      chat partner''s ID

      Follows Zen DojoTools multitool pattern.  Returns all responses as JSON for LLM
      and automations.

      '
    fields:
      action_type:
        description: '''send'', ''read'', ''set'', ''help'' (Default: read)'
        required: true
        selector:
          select:
            options:
            - read
            - send
            - set
            - help
        default: read
      chat_id:
        description: Outbound Teams Chat ID (For chat_id, use your address book in the
          Dojo or 'partner_chat_id' from read function on this tool...)
        required: false
        selector:
          text:
      message:
        description: Required when Send - Text of the message to send.
        required: false
        selector:
          text:
            multiline: true
      availability:
        selector:
          select:
            options:
            - Available
            - Busy
            - Away
            - DoNotDisturb
        name: Availability
        description: Optional, Used with Set, Teams Availability Status, Defaults to
          'Available' if none provided.
      activity:
        selector:
          select:
            options:
            - Available
            - InACall
            - InAConferenceCall
            - Away
            - Presenting
        name: Activity
        description: Optional, Used with Set, no default, will auto-filter invalid pairings
          with Availability.
      expiration:
        selector:
          text:
        name: expiration
        description: Optional, Used with Set, Define expiration of the presence session.
          Accepts ISO 8601 format for durations. If not provided, a default expiration
          of 5 minutes is applied. Valid duration range is from 5 to 240 minutes (PT5M
          to PT4H).
    icon: mdi:chat-outline

  zen_dojotools_mail:
    sequence:
    - variables:
        action_type: '{{ action_type | default(''help'') }}'
        folder: '{{ folder | default(''Inbox'') }}'
        valid_folders:
        - Inbox
        - Sent Items
        - Deleted Items
        - Junk Email
        - Outbox
        folder_lookup: '{{ folder if folder in valid_folders else ''Inbox'' }}'
        uid: '{{ uid | default('''') }}'
        to: '{{ to | default('''') }}'
        cc: '{{ cc | default('''') }}'
        bcc: '{{ bcc | default('''') }}'
        subject: '{{ subject | default('''') | trim }}'
        body: '{{ body | default('''') | trim }}'
        query: '{{ query | default('''') }}'
        from_filter: '{{ from | default('''') }}'
        importance: '{{ importance | default(''Normal'') }}'
        content_type: '{{ content_type | default(''Text'') }}'
        mail_domain: '{{ states(''input_text.zen_mail_domain'') | default('''') | trim }}'
        my_address: '{{ states(''input_text.zen_mail_sender'') | default('''') | trim }}'
        reply_to: '{{ reply_to | default( my_address ) }}'
        whitelist_ctrl: '{{ states(''input_select.zen_mail_whitelist'') }}'
        whitelist_missing: '{{ states(''input_select.zen_mail_whitelist'') in [''unavailable'', ''unknown'', ''none'', ''''] }}'
        whitelist_off: '{{ whitelist_ctrl == ''OFF'' }}'
        whitelist_is_wildcard: '{{ whitelist_ctrl.startswith(''*@'') }}'
        whitelist_domain: '{{ whitelist_ctrl[2:] if whitelist_is_wildcard else '''' }}'
        reply_to_valid: '{{ reply_to == '''' or whitelist_missing or whitelist_off or (whitelist_is_wildcard and reply_to.endswith(''@'' ~ whitelist_domain)) or reply_to == whitelist_ctrl }}'
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ action_type == ''help'' or action_type not in [''list'',''read'',''create'',''delete'',''restore'',''empty'']
            }}'
        sequence:
        - variables:
            help_data: "{{\n  {\n    \"status\": \"info\",\n    \"message\": \"Welcome
              to DojoTools: MS365 Mail CRUD Controller.\",\n    \"actions\": {\n      \"list\":
              \"List messages from a folder. Defaults to 'Inbox'. Supports filters:
              from, query.\",\n      \"read\": \"Fetch a specific message by UID (requires:
              folder, uid).\",\n      \"create\": \"Send new mail (requires: to, subject,
              body). Optional: cc, bcc, importance, replyTo, contentType.\",\n      \"help\":
              \"Returns this help block.\"\n    },\n    \"fields\": {\n      \"folder\":
              \"Mail folder name (Inbox, Sent Items, Deleted Items, Junk Email, etc).\",\n
              \     \"uid\": \"Unique message ID. Required for read, delete, and restore.\",\n
              \     \"to\": \"Primary recipient email address(es). Required for create.\",\n
              \     \"cc\": \"Carbon copy recipient(s). Optional.\",\n      \"bcc\":
              \"Blind carbon copy recipient(s). Optional.\",\n      \"replyTo\": \"Overrides
              default reply address. Optional.\",\n      \"subject\": \"Message subject
              line. Required for create.\",\n      \"body\": \"Message body content.
              Required for create.\",\n      \"contentType\": \"Body format. Use 'Text'
              or 'HTML'. Default is 'Text'.\",\n      \"importance\": \"Set mail priority.
              Values: Low, Normal, High. Default: Normal.\",\n      \"from\": \"Optional
              filter for sender in list/read.\",\n      \"query\": \"Custom query string
              for message search.\"\n    },\n    \"notes\": [\n      \"To send mail,
              'to', 'subject', and 'body' are required fields.\",\n      \"'create'
              will automatically set 'importance' to 'Normal' if not provided.\",\n
              \     \"UID is required for actions on individual messages.\",\n      \"Help
              block is returned if required fields are missing or unknown fields are
              passed.\",\n      \"This controller does not handle attachments.\"\n    ],\n    \"setup\": {\n      \"input_text.zen_mail_sender\": \"Your HA send-from address (e.g. homeassistant@yourdomain.com). Set in HA Helpers.\",\n      \"input_text.zen_mail_domain\": \"Your email domain for wildcard matching (e.g. yourdomain.com). Set in HA Helpers.\",\n      \"input_select.zen_mail_whitelist\": \"Whitelist mode: OFF = allow all, *@yourdomain.com = domain wildcard, user@yourdomain.com = exact match only. Add options via HA UI. If missing or unavailable, mail sends open with a warning in the response.\"\n    },\n              \   \"examples\": [\n      { \"action_type\": \"list\", \"folder\": \"Inbox\"
              },\n      { \"action_type\": \"read\", \"folder\": \"Inbox\", \"uid\":
              \"AAMkAG...==\" },\n      { \"action_type\": \"create\", \"to\": \"someone@example.com\",
              \"subject\": \"Ping\", \"body\": \"Hello from the dojo.\" },\n      {
              \"action_type\": \"create\", \"to\": [\"a@x.com\"], \"cc\": [\"b@y.com\"],
              \"subject\": \"Team Update\", \"body\": \"<b>Status OK</b>\", \"contentType\":
              \"HTML\", \"importance\": \"High\" },\n    ]\n  } | tojson\n}}"
        - stop: Pass response variables back to LLM
          response_variable: help_data
          enabled: true
        - set_conversation_response: '{{ help_data }}'
        alias: return help for mail CRUD controller
      - conditions:
        - condition: template
          value_template: '{{ action_type == ''list'' }}'
        sequence:
        - variables:
            inbox_sensor: sensor.ms365_inbox
            inbox: "{%- set sensor = expand(inbox_sensor) -%}\n{%- for mailbox in sensor
              -%}\n  {%- for message in mailbox.attributes.data -%}\n    {{\n      {\n
              \       \"subject\": message.subject |default(''),\n        \"received\":
              message.received | as_datetime() | as_local | string | default(''),\n
              \       \"from\": message.sender | default(''),\n        \"to\": message.to
              | default('[]'),\n        \"cc\": message.cc | default('[]'),\n        \"is_read\":
              message.is_read | default(False),\n        \"flag\": message.flag | default('{}'),\n
              \       \"has_attachments\": message.has_attachments | default(False),\n
              \       \"body\": message.body | default('')\n       } | tojson\n    }}\n
              \ {%- endfor -%}\n{%- endfor -%}"
            final_response: "{{\n  {\n    \"status\": \"success\",\n    \"inbox\": inbox\n
              \ } | tojson\n}}"
        - stop: Pass response variables back to LLM
          response_variable: final_response
          enabled: true
        - set_conversation_response: '{{ final_response }}'
        alias: list messages in folder
      - conditions:
        - condition: template
          value_template: '{{ action_type == ''read'' and uid != '''' }}'
        sequence:
        - data:
            folder: '{{ folder_lookup }}'
            uid: '{{ uid }}'
          response_variable: mail_detail
          action: ms365_mail.get_message
        - variables:
            mail: '{{ mail_detail[''message''] if mail_detail is defined and ''message''
              in mail_detail else {} }}'
            attachments_json: "[\n  {%- for a in mail.attachments -%}\n    \"{{ a.filename
              }}\"{% if not loop.last %}, {% endif %}\n  {%- endfor -%}\n]"
            mail_json: "{{\n  {\n    \"uid\": mail.uid,\n    \"subject\": mail.subject,\n
              \   \"from\": mail.sender,\n    \"to\": mail.to,\n    \"cc\": mail.cc,\n
              \   \"bcc\": mail.bcc,\n    \"date\": mail.date,\n    \"body\": mail.body,\n
              \   \"folder\": folder_lookup,\n    \"attachments\": attachments_json,\n
              \   \"has_attachments\": (mail.attachments | length) > 0\n  } | tojson\n}}"
            final_response: "{{\n  {\n    \"status\": \"success\",\n    \"message\":
              \"Read message '\" ~ uid ~ \"' from \" ~ folder_lookup ~ \".\",\n    \"mail\":
              mail_json\n  } | tojson\n}}"
        - stop: Pass response variables back to LLM
          response_variable: final_response
          enabled: true
        - set_conversation_response: '{{ final_response }}'
        alias: read single message
      - conditions:
        - condition: template
          value_template: '{{ action_type == ''create'' and to != '''' and subject !=
            '''' and body != '''' }}'
        sequence:
        - variables:
            to_list: '{{ to.split('','') | map(''trim'') | list }}'
            cc_list: '{{ cc.split('','') | map(''trim'') | list if cc else [] }}'
            bcc_list: '{{ bcc.split('','') | map(''trim'') | list if bcc else [] }}'
            subject: '{{ subject }}'
            body: '{{ body }}'
            importance_norm: '{{ importance | lower | default(''normal'') }}'
            message_is_html: '{{ content_type | lower == ''html'' }}'
            whitelist_ctrl: '{{ whitelist_ctrl | default(''unavailable'') }}'
            whitelist_missing: '{{ whitelist_missing | default(true) }}'
            whitelist_off: '{{ whitelist_off | default(false) }}'
            whitelist_is_wildcard: '{{ whitelist_is_wildcard | default(false) }}'
            whitelist_domain: '{{ whitelist_domain | default('''') }}'
            all_safe: '{{ whitelist_missing or whitelist_off or (whitelist_is_wildcard and (to_list | select(''search'', ''@'' ~ whitelist_domain ~ ''$'') | list | length == to_list | length)) or (not whitelist_is_wildcard and to_list | length == 1 and to_list[0] == whitelist_ctrl) }}'
            mail_data_json: "{{\n  {\n    \"target\": to_list[0] if to_list else \"\",\n
              \   \"sender\": my_address,\n    \"message_is_html\": message_is_html,\n
              \   \"attachments\": [],\n    \"photos\": [],\n    \"zip_attachments\":
              False,\n    \"zip_name\": \"\"\n  }\n  | combine(\n    {\"cc\": cc_list}
              if cc_list else {},\n    {\"bcc\": bcc_list} if bcc_list else {},\n    {\"importance\":
              importance_norm} if importance_norm != \"normal\" else {}\n  )\n  | tojson\n}}"
            mail_data: '{{ mail_data_json | from_json }}'
        - choose:
          - conditions:
            - condition: template
              value_template: '{{ all_safe }}'
            sequence:
            - action: notify.ms365_mail_inbox
              data:
                message: '{{ body }}'
                title: '{{ subject }}'
                data: '{{ mail_data }}'
            - variables:
                final_response: "{{\n  {\n    \"status\": \"success\",\n    \"action_type\": action_type | default(''),\n    \"title\": subject | default(''),\n    \"to\": to_list | default([])\n  } | combine(\n    {\"warning\": \"Whitelist control (input_select.zen_mail_whitelist) is missing or unavailable. Mail sent without enforcement. Configure it in HA Helpers.\"}\n    if whitelist_missing else {}\n  ) | tojson\n}}"
            - stop: Pass response variables back to LLM
              response_variable: final_response
              enabled: true
            - set_conversation_response: '{{ final_response }}'
          default:
          - variables:
              final_response: "{{\n  {\n    \"status\": \"error\",\n    \"message\": \"Mail send blocked: recipient(s) not permitted. Check input_select.zen_mail_whitelist.\"\n  } | tojson\n}}"
          - stop: Pass response variables back to LLM
            response_variable: final_response
            enabled: true
          - set_conversation_response: '{{ final_response }}'
        alias: send mail
      - conditions:
        - condition: template
          value_template: '{{ (action_type in [''read'',''delete'',''restore''] and
            uid == '''') or (action_type == ''create'' and (to == '''' or subject ==
            '''' or body == '''')) }}'
        sequence:
        - variables:
            final_response: "{{\n  {\n    \"status\": \"error\",\n    \"message\": \"Missing
              required field(s) for \" ~ action_type ~ \". See help for usage.\",\n
              \   \"help_hint\": \"Use action_type: help for details.\"\n  } | tojson\n}}"
        - stop: Pass response variables back to LLM
          response_variable: final_response
          enabled: true
        - set_conversation_response: '{{ final_response }}'
        alias: missing required field error
    alias: Zen DojoTools Mail
    description: 'Zen DojoTools Mail (4.0.0 RC2) Home Assistant script for Microsoft
      365 mail Now with 100% more whitelist! List, read, create. Uses folder names (Inbox,
      Sent Items, Deleted Items, Junk Email, Outbox). Actions: ''list'', ''read'', ''create'',
      ''help''. All responses are structured JSON with status, message, and data. Attachments
      are listed (info only, not retrievable).  Help action returns usage, fields, and
      caveats. See help for full details and examples. (locked send to local domain
      @curtisplace.net and selected whitelist addresses.)'
    fields:
      action_type:
        description: '''list'', ''read'', ''create'', ''help'' (default: help)'
        required: true
        selector:
          select:
            options:
            - list
            - read
            - create
            - help
        default: help
      folder:
        description: Target mail folder (e.g. 'Inbox', 'Deleted Items', 'Junk Email',
          'Sent Items', 'Outbox'). Defaults to 'Inbox'.
        required: false
        selector:
          text:
      uid:
        description: Message UID (required for read, delete, restore, update).
        required: false
        selector:
          text:
      subject:
        description: Subject (required for create).
        required: false
        selector:
          text:
            multiline: false
      body:
        description: Email body (required for create).
        required: false
        selector:
          text:
            multiline: true
      to:
        description: Recipient(s) (comma separated, required for create).
        required: false
        selector:
          text:
      cc:
        description: CC recipient(s), comma separated.
        required: false
        selector:
          text:
      bcc:
        description: BCC recipient(s), comma separated.
        required: false
        selector:
          text:
      from:
        description: 'Filter: sender address (for list/read).'
        required: false
        selector:
          text:
      query:
        description: 'Filter: search string for subject/body/sender.'
        required: false
        selector:
          text:
      importance:
        description: 'Optional: Low, Normal, High. Defaults to Normal.'
        required: false
        selector:
          select:
            options:
            - Low
            - Normal
            - High
      content_type:
        description: 'Optional: ''Text'' or ''HTML''. Default is Text.'
        required: false
        selector:
          select:
            options:
            - Text
            - HTML
      reply_to:
        description: Optional reply-to address.
        required: false
        selector:
          text:
    icon: mdi:email

  zen_dojotools_todo:
    alias: Zen DojoTools ToDo
    description: Zen DojoTools ToDo 1.6.3 — unified CRUD controller for Home Assistant's
      `todo.*` domain. Supports create, read, update, and delete actions for any to-do
      list entity. Automatically detects wildcard (`*`) or blank list names to return
      all lists with labels and friendly names. Allows single-item edits and safe bulk
      status updates (e.g., mark multiple tasks completed). Returns structured JSON
      responses suitable for automations or AI workflows, and integrates directly with
      `todo.add_item`, `todo.update_item`, and `todo.remove_item` services. Default
      action_type is `read`.
    sequence:
    - variables:
        action_type: '{{ action_type | default(''read'') }}'
        items: "{%- if items is defined and items is iterable and items|length > 0\
          \ -%}\n  {{ items }}\n{%- else -%}\n  ['']\n{%- endif -%}"
        due_date: '{{ due_date | default('''') }}'
        description: '{{ description | default('''') }}'
        list_name: '{{ list_name | default('''') }}'
        status: '{{ status | default(''needs_action'') }}'
        todo_lists: '{{ states.todo | map(attribute=''entity_id'') | list }}'
        valid_todo_entities: '{{ states.todo | map(attribute=''entity_id'') | map(''lower'')
          | list }}'
        todo_list_entity: "{%- if list_name[0:5] == 'todo.' -%}\n  {{ list_name |\
          \ lower | replace(' ', '_') }}\n{%- else -%}\n  todo.{{ list_name | lower\
          \ | replace(' ', '_') }}\n{%- endif -%}"
        todo_list_entity_exists: '{{ todo_list_entity in valid_todo_entities }}'
        label_targets: "{{\n  (\n    label_targets\n    if label_targets is iterable\
          \ and label_targets is not string\n    else label_targets.splitlines() if\
          \ '\\n' in label_targets\n    else label_targets.split(',')\n  )\n  | map('trim')\
          \ | map('lower') | select('string') | list\n}}"
        label_entities: "{{\n  label_targets | map('label_entities') | sum(start=[])\n\
          \  | select('match', '^todo\\\\.') | unique | list\n}}"
        target_lists: '{{ label_entities if label_entities | length > 0 else [todo_list_entity]
          }}'
        is_list_wildcard: '{{ list_name in ['''', None, ''*''] }}'
        is_items_wildcard: '{{ items is not defined or items|length == 0 or (items|length
          == 1 and items[0] in ['''', None, ''*'']) }}'
        list_query: '{{ is_list_wildcard or action_type not in [''create'',''read'',''update'',''delete'']
          }}'
        todo_lists_data: "[\n{%- for l in states.todo -%}\n  {\n    \"entity_id\"\
          : \"{{ l.entity_id }}\",\n    \"friendly_name\": \"{{ l.attributes.friendly_name\
          \ }}\",\n    \"labels\": [\n      {%- for lid in labels(l.entity_id) -%}\n\
          \        \"{{ label_name(lid) }}\"{% if not loop.last %}, {% endif %}\n \
          \     {%- endfor -%}\n    ]\n  }{% if not loop.last %}, {% endif %}\n{%-\
          \ endfor -%}\n] | tojson | fromjson"
        is_ms365_todo: '{{ todo_list_entity in integration_entities(''ms365'') }}'
        reminder: '{{ reminder | default('''') }}'
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ is_list_wildcard and action_type in [''read'',''list'']
            }}'
        sequence:
        - variables:
            final_response: "{{\n  {\n    \"status\": \"info\",\n    \"message\":\
              \ \"All available to-do lists with labels.\",\n    \"lists\": todo_lists_data\n\
              \  } | tojson\n}}"
        - stop: Pass response variables back to LLM
          response_variable: final_response
        - set_conversation_response: '{{ final_response }}'
        alias: show all lists and labels on wildcard
      - conditions:
        - condition: template
          value_template: '{{ action_type == ''help'' or action_type not in [''create'',''read'',''update'',''delete'']
            }}'
        sequence:
        - variables:
            help_data: "{{\n  {\n    \"status\": \"info\",\n    \"version\": \"4.0.0 RC2\"\
              ,\n    \"message\": \"Zen DojoTools ToDo Help\",\n    \"actions\": {\n\
              \      \"read\": \"Read items from one or more lists or list all with\
              \ wildcard.\",\n      \"create\": \"Create new item(s) in an existing\
              \ list.\",\n      \"update\": \"Update item(s); supports bulk mark-complete.\"\
              ,\n      \"delete\": \"Delete item(s) from a list.\",\n      \"help\"\
              : \"Show this help.\"\n    },\n    \"notes\": [\n      \"Wildcard read\
              \ and bulk update supported.\",\n      \"Complex multi-item edits remain\
              \ restricted to status changes.\"\n    ]\n  } |\n  tojson\n}}"
        - stop: Pass response variables back to LLM
          response_variable: help_data
        - set_conversation_response: '{{ help_data }}'
        alias: return help
      - conditions:
        - condition: template
          value_template: '{{ action_type == ''update'' and todo_list_entity_exists
            }}'
        sequence:
        - choose:
          - conditions:
            - condition: template
              value_template: "{{\n  items | length > 1 and\n  (items | selectattr('status','defined')\
                \ | list | count == items | count)\n}}"
            sequence:
            - repeat:
                for_each: '{{ items }}'
                sequence:
                - variables:
                    bulk_update_data: "{% set itm = repeat.item %} {{ {\n  'item': itm.get('item', itm) if itm\
                      \ is mapping else itm,\n  'status': itm.get('status', 'completed')\n\
                      } }}"
                - data: '{{ bulk_update_data }}'
                  target:
                    entity_id: '{{ todo_list_entity }}'
                  action: todo.update_item
            - variables:
                final_response: "{{\n  {\n    \"status\": \"success\",\n    \"message\"\
                  : \"Updated status for \" ~ (items | length) ~ \" item(s) in list\
                  \ '\" ~ list_name ~ \"'.\",\n    \"list_name\": list_name,\n   \
                  \ \"items\": items\n  } | tojson\n}}"
            - stop: Pass response variables back to LLM
              response_variable: final_response
            - set_conversation_response: '{{ final_response }}'
          - conditions:
            - condition: template
              value_template: "{{\n  items | length > 1 and not\n  (items | selectattr('status','defined')\
                \ | list | count == items | count)\n}}"
            sequence:
            - variables:
                final_response: "{{\n  {\n    \"status\": \"error\",\n    \"message\"\
                  : \"Multiple complex updates not supported. Only bulk status updates\
                  \ allowed.\",\n    \"list_name\": list_name\n  } | tojson\n}}"
            - stop: Pass response variables back to LLM
              response_variable: final_response
            - set_conversation_response: '{{ final_response }}'
          default:
          - variables:
              update_data: "{% set ns = namespace(obj={}) %}\n{% set itm = items[0]\
                \ if items|length > 0 else {} %}\n{% if itm is mapping %}\n  {% set\
                \ ns.obj = dict(ns.obj, item=itm.get('item',''), list_id=list_name)\
                \ %}\n  {% if itm.get('status') %}{% set ns.obj = dict(ns.obj, status=itm.status)\
                \ %}{% elif status %}{% set ns.obj = dict(ns.obj, status=status) %}{%\
                \ endif %}\n{% else %}\n  {% set ns.obj = dict(ns.obj, item=itm, list_id=list_name)\
                \ %}\n  {% if status %}{% set ns.obj = dict(ns.obj, status=status)\
                \ %}{% endif %}\n{% endif %}\n{{ ns.obj if ns.obj is mapping else\
                \ dict() }}"
          - data:
              item: '{{ update_data.get(''item'','''') }}'
              status: '{{ update_data.get(''status'', status) }}'
            target:
              entity_id: '{{ todo_list_entity }}'
            action: todo.update_item
          - variables:
              final_response: "{{\n  {\n    \"status\": \"success\",\n    \"message\"\
                : \"Updated item '\" ~ update_data.get('item','') ~ \"' in list '\"\
                \ ~ list_name ~ \"'.\",\n    \"item\": update_data,\n    \"list_name\"\
                : list_name\n  } | tojson\n}}"
          - stop: Pass response variables back to LLM
            response_variable: final_response
          - set_conversation_response: '{{ final_response }}'
        alias: update (list exists)
      - conditions:
        - condition: template
          value_template: "{{ action_type == 'read'\n   and todo_list_entity_exists\n\
            \   and is_items_wildcard\n   and not is_list_wildcard }}\n"
        sequence:
        - action: todo.get_items
          target:
            entity_id: '{{ todo_list_entity }}'
          response_variable: list_items
        - variables:
            _all_items: '{{ list_items.get(todo_list_entity, {}).get(''items'', [])
              }}'
            items_only: "{% if status in ['needs_action','completed'] %}\n  {{ _all_items\
              \ | selectattr('status','equalto', status) | list }}\n{% else %}\n \
              \ {{ _all_items }}\n{% endif %}"
            final_response: "{{ {\n  \"status\": \"success\",\n  \"message\": \"All\
              \ items for list '\" ~ list_name ~ \"'\",\n  \"list_name\": list_name,\n\
              \  \"count\": items_only | length,\n  \"items\": items_only\n} | tojson\
              \ }}\n"
        - stop: Pass items back to LLM
          response_variable: final_response
        - set_conversation_response: '{{ final_response }}'
        alias: Read List
      - conditions:
        - condition: template
          value_template: '{{ action_type == ''create'' and todo_list_entity_exists and not is_items_wildcard }}'
        sequence:
        - repeat:
            for_each: '{{ items }}'
            sequence:
            - variables:
                item_name: '{{ repeat.item if repeat.item is string else repeat.item.get(''item'', repeat.item) }}'
                item_due: '{{ repeat.item.get(''due_date'', due_date) if repeat.item is mapping else due_date }}'
                item_desc: '{{ repeat.item.get(''description'', description) if repeat.item is mapping else description }}'
                item_reminder: '{{ repeat.item.get(''reminder'', reminder) if repeat.item is mapping else reminder }}'
            - choose:
              - conditions:
                - condition: template
                  value_template: '{{ is_ms365_todo and item_reminder }}'
                sequence:
                - data:
                    subject: '{{ item_name }}'
                    due: '{{ item_due }}'
                    description: '{{ item_desc }}'
                    reminder: '{{ item_reminder }}'
                  target:
                    entity_id: '{{ todo_list_entity }}'
                  action: ms365_todo.new_todo
              default:
              - data: >-
                  {{ {'item': item_name}
                     | combine({'due_date': item_due} if item_due else {})
                     | combine({'description': item_desc} if item_desc else {}) }}
                target:
                  entity_id: '{{ todo_list_entity }}'
                action: todo.add_item
        - variables:
            final_response: "{{\n  {\n    \"status\": \"success\",\n    \"message\": \"Created \" ~ (items | length) ~ \" item(s) in '\" ~ list_name ~ \"'.\",\n    \"list_name\": list_name,\n    \"items\": items\n  } | tojson\n}}"
        - stop: Pass response variables back to LLM
          response_variable: final_response
        - set_conversation_response: '{{ final_response }}'
        alias: create items
      - conditions:
        - condition: template
          value_template: '{{ action_type == ''delete'' and todo_list_entity_exists and not is_items_wildcard }}'
        sequence:
        - repeat:
            for_each: '{{ items }}'
            sequence:
            - variables:
                item_name: '{{ repeat.item if repeat.item is string else repeat.item.get(''item'', repeat.item) }}'
            - data:
                item: '{{ item_name }}'
              target:
                entity_id: '{{ todo_list_entity }}'
              action: todo.remove_item
        - variables:
            final_response: "{{\n  {\n    \"status\": \"success\",\n    \"message\": \"Deleted \" ~ (items | length) ~ \" item(s) from '\" ~ list_name ~ \"'.\",\n    \"list_name\": list_name\n  } | tojson\n}}"
        - stop: Pass response variables back to LLM
          response_variable: final_response
        - set_conversation_response: '{{ final_response }}'
        alias: delete items
    - variables:
        final_response: "{{\n  final_response\n  | default(\n    {\n      \"status\"\
          : \"noop\",\n      \"message\": \"No matching branch produced a response.\"\
          \n    } | tojson\n  )\n}}"
    - stop: Pass context
      response_variable: final_response
    - set_conversation_response: '{{ final_response }}'
    fields:
      action_type:
        description: '''create'', ''read'', ''update'', ''delete'', ''help'' (Default:
          read)'
        selector:
          select:
            options:
            - create
            - read
            - update
            - delete
            - help
        default: read
      list_name:
        description: To-do list name (default '' or '*' = all lists)
        selector:
          text:
      items:
        description: Tasks as strings or objects (`item`, `status`, etc.). Supports
          bulk mark-complete.
        selector:
          text:
            multiple: true
      status:
        selector:
          select:
            options:
            - needs_action
            - completed
        default: needs_action
      label_targets:
        selector:
          text:
            multiple: true
      reminder:
        description: 'MS365 only: reminder datetime (ISO format). Uses ms365_todo.new_todo if set.'
        required: false
        selector:
          text:
    icon: mdi:clipboard-check-multiple

  zen_dojotools_calendar:
    alias: Zen Dojotools Calendar
    description: 'Zen Dojotools Calendar (1.10.3) for Home Assistant. Provides create
      and read support for all calendars. Update and delete are available for calendars
      that return event_ids (see help for locating event_id on supported calendars)
      for any calendar entity. Includes a structured Help function.

      Use ''*'' or '''' as calendar_name to list all calendars. ''start'' and ''end''
      default to today (midnight to midnight next day) if not set. Requires action_type
      and calendar_name for most actions.

      Updates and deletes operate by event_id match ONLY. If you cannot determine event_id,
      offer alternate suggestions you can perform with available toolset.

      Note: Some calendar providers (Google, HA Local, ICS sources) do NOT expose event_id
      on create/read/inspect responses. Update/Delete will be safely blocked in those
      cases. This is expected provider behavior, not a bug.

      See help for tips on locating event_id. Supports targeting calendar entities by
      label.'
    sequence:
    - variables:
        action_type: '{{ action_type | default(''read'') }}'
        calendar_name: '{{ calendar_name | default('''') }}'
        calendar_query: "{{ (calendar_name in ['', None, '*'] and (label_targets |\
          \ length == 0))\n   or action_type == 'list' }}"
        calendar_entity: "{% if calendar_name[0:9] == 'calendar.' %}\n  {{ calendar_name\
          \ | lower | replace(' ', '_') }}\n{% else %}\n  calendar.{{ calendar_name\
          \ | lower | replace(' ', '_') }}\n{% endif %}"
        valid_calendar_entities: '{{ states.calendar | map(attribute=''entity_id'')
          | map(''lower'') | list }}'
        calendar_entity_resolved: "{% if calendar_entity in valid_calendar_entities\
          \ %}\n  {{ calendar_entity }}\n{% else %}\n  {%- set target = '' -%}\n\
          \  {%- for cal in states.calendar -%}\n    {%- set fn = (cal.attributes.friendly_name\
          \ | default('')) | lower -%}\n    {%- if fn == (calendar_name | lower) and\
          \ calendar_name not in ['', None, '*'] -%}\n      {%- set target = cal.entity_id\
          \ | lower -%}\n    {%- endif -%}\n  {%- endfor -%}\n  {{ target }}\n{%\
          \ endif %}"
        calendar_entity_exists: '{{ calendar_entity_resolved in valid_calendar_entities
          }}'
        is_ms365_cal: '{{ calendar_entity_resolved in integration_entities(''ms365'') }}'
        start: "{% set raw = start if start is defined else now().replace(hour=0,\
          \ minute=0, second=0) %} {% if raw is string %}\n  {% set dt = as_datetime(raw)\
          \ if 'T' in raw else strptime(raw, \"%Y-%m-%d\") %}\n{% else %}\n  {% set\
          \ dt = raw %}\n{% endif %} {{ dt | as_local | as_timestamp | timestamp_custom(\"\
          %Y-%m-%dT%H:%M:%S%:z\", false) }}"
        end: "{% set raw = end if end is defined else (now().replace(hour=0, minute=0,\
          \ second=0) + timedelta(days=1)) %} {% if raw is string %}\n  {% set dt\
          \ = as_datetime(raw) if 'T' in raw else strptime(raw, \"%Y-%m-%d\") %}\n\
          {% else %}\n  {% set dt = raw %}\n{% endif %} {{ dt | as_local | as_timestamp\
          \ | timestamp_custom(\"%Y-%m-%dT%H:%M:%S%:z\", false) }}"
        event_id: '{{ event_id | default('''') }}'
        label_targets: "{{\n  (\n    label_targets|default('')\n    if label_targets\
          \ is iterable and label_targets is not string\n    else (label_targets|default('')).splitlines()\
          \ if '\\n' in (label_targets|default(''))\n    else (label_targets|default('')).split(',')\n\
          \  )\n  | map('trim')\n  | map('lower')\n  | select('string')\n  | reject('equalto',\
          \ '')\n  | list\n}}"
        label_target_entities: "{{\n  label_targets\n  | map('label_entities')\n\
          \  | sum(start=[])\n  | select('match', '^calendar\\\\.')\n  | unique\n\
          \  | list\n}}"
        target_calendars: "{% if label_target_entities %}\n  {{ label_target_entities\
          \ }}\n{% elif calendar_entity_exists %}\n  [ \"{{ calendar_entity_resolved\
          \ }}\" ]\n{% else %}\n  []\n{% endif %}"
        target_is_multi: '{{ (label_target_entities | count > 0) }}'
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ action_type in [''create'',''update'',''delete''] and
            target_is_multi }}'
        sequence:
        - variables:
            final_response: "{{\n  {\n    \"status\": \"error\",\n    \"message\"\
              : \"Multiple calendars match the query. Please specify a single calendar\
              \ for this action.\"\n  } | tojson\n}}"
        - stop:
          response_variable: final_response
        - set_conversation_response: '{{ final_response }}'
        alias: multiple targets error
      - conditions:
        - condition: template
          value_template: '{{ action_type == ''read'' and label_targets | length >
            0 and target_calendars | length == 0 }}'
        sequence:
        - variables:
            final_response: "{{\n  {\n    \"status\": \"error\",\n    \"message\"\
              : \"No calendars found for labels: \" ~ (label_targets | join(', '))\
              \ ~ \".\"\n  } | tojson\n}}"
        - stop:
          response_variable: final_response
        - set_conversation_response: '{{ final_response }}'
        alias: no calendar for label error
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ action_type == ''help'' }}'
        sequence:
        - variables:
            help_data: "{{\n  {\n    \"status\": \"info\",\n    \"message\": \"This\
              \ is the Zen Dojotools Calendar Help function.\",\n    \"actions\": {\n\
              \      \"read\": \"Reads events from a given calendar. Requires 'calendar_name'.\
              \ Optional: 'start', 'end'.\",\n      \"inspect\": \"Advanced read using\
              \ the system inspect tool; shows event_id if provider supports it.\"\
              ,\n      \"create\": \"Creates a new event. Requires 'calendar_name'\
              \ and 'summary'.\",\n      \"delete\": \"Deletes by event_id ONLY. Provider\
              \ must expose event_id.\",\n      \"update\": \"Updates by event_id\
              \ ONLY. Provider must expose event_id.\",\n      \"help\": \"Returns\
              \ this help response.\"\n    },\n    \"defaults\": {\n      \"start\"\
              : \"Defaults to today at 00:00 local time.\",\n      \"end\": \"Defaults\
              \ to tomorrow at 00:00 local time.\",\n      \"timestamp_normalization\"\
              : \"Calendar providers return timestamps in varying formats (UTC or local\
              \ offset). Normalize externally during UAT.\"\n    },\n    \"notes\"\
              : [\n      \"Use '*' or blank for 'calendar_name' to list all calendars.\"\
              ,\n      \"Deletes/updates operate ONLY by event_id. No summary matching.\"\
              ,\n      \"If your read does not return event_id, inspect the entity_id\
              \ directly.\",\n      \"If multiple events match, update/delete is blocked.\"\
              ,\n      \"Some providers (Google, HA Local, ICS) do not expose event_id;\
              \ update/delete will be safely blocked.\",\n      \"Label targeting\
              \ aggregates events across all matching entities.\"\n    ]\n  } | tojson\n\
              }}"
        - stop:
          response_variable: help_data
        - set_conversation_response: '{{ help_data }}'
        alias: Return help
      - conditions:
        - condition: template
          value_template: '{{ not calendar_entity_exists and calendar_name not in
            ['''', None, ''*''] }}'
        sequence:
        - variables:
            final_response: "{{\n  {\n    \"status\": \"error\",\n    \"message\"\
              : \"No valid calendar entity_id found for '{{ calendar_name }}'. Provide\
              \ a valid entity_id or use '*' to list calendars.\"\n  } | tojson\n\
              }}"
        - stop:
          response_variable: final_response
        - set_conversation_response: '{{ final_response }}'
        alias: invalid entity_id error
      - conditions:
        - condition: template
          value_template: '{{ action_type == ''create'' and (label_targets | length
            == 0) and (calendar_name in ['''', None, ''*''] or not calendar_entity_exists)
            }}'
        sequence:
        - variables:
            final_response: "{{\n  {\n    \"status\": \"error\",\n    \"message\"\
              : \"Create requires a single explicit calendar target (entity_id or label).\"\
              \n  } | tojson\n}}"
        - stop:
          response_variable: final_response
        - set_conversation_response: '{{ final_response }}'
        alias: create requires explicit target
      - conditions:
        - condition: template
          value_template: "{{ calendar_query\n   or (action_type in ['read','update']\n\
            \       and not calendar_entity_exists\n       and (label_targets | length\
            \ == 0)) }}\n"
        sequence:
        - variables:
            cal_list: "[\n{%- for cal in states.calendar -%}\n  {\n    \"entity_id\"\
              : \"{{ cal.entity_id }}\",\n    \"friendly_name\": \"{{ cal.attributes.friendly_name\
              \ | default('') }}\",\n    \"state\": \"{{ cal.state }}\",\n    \"labels\"\
              : [{% for lid in labels(cal.entity_id) %}\"{{ label_name(lid) }}\"{%\
              \ if not loop.last %}, {% endif %}{% endfor %}],\n    \"start_time\"\
              : \"{{ cal.attributes.start_time | default('') }}\",\n    \"end_time\"\
              : \"{{ cal.attributes.end_time | default('') }}\",\n    \"location\"\
              : \"{{ cal.attributes.location | default('') }}\",\n    \"description\"\
              : \"{{ cal.attributes.description | default('') }}\"\n  }{% if not\
              \ loop.last %}, {% endif %}\n{%- endfor -%}\n]"
            final_response: "{{\n  {\n    \"status\": \"success\",\n    \"message\"\
              : \"Listed all available calendars.\",\n    \"calendars\": cal_list\n\
              \  } | tojson\n}}"
        - stop:
          response_variable: final_response
        - set_conversation_response: '{{ final_response }}'
        alias: return available calendars
      - conditions:
        - condition: template
          value_template: '{{ action_type == ''read'' and target_calendars | length
            > 0 }}'
        sequence:
        - variables:
            all_event_results: []
        - repeat:
            for_each: '{{ target_calendars }}'
            sequence:
            - data:
                start_date_time: '{{ start }}'
                end_date_time: '{{ end }}'
              response_variable: read_events
              action: calendar.get_events
              target:
                entity_id: '{{ repeat.item }}'
            - variables:
                events: '{{ read_events[repeat.item][''events''] if read_events[repeat.item]
                  is defined else [] }}'
                event_list: "[\n  {%- for event in events -%}\n    {\n      \"summary\"\
                  : \"{{ event.summary }}\",\n      \"start\": \"{{ event.start }}\"\
                  ,\n      \"end\": \"{{ event.end }}\",\n      \"event_id\": \"{{\
                  \ event.event_id | default('') }}\",\n      \"description\": \"\
                  {{ event.description | default('') }}\",\n      \"location\": \"\
                  {{ event.location | default('') }}\",\n      \"all_day\": \"{{ event.all_day\
                  \ | default(false) }}\",\n      \"created\": \"{{ event.created\
                  \ | default('') }}\",\n      \"updated\": \"{{ event.updated | default('')\
                  \ }}\"\n    }{% if not loop.last %}, {% endif %}\n  {%- endfor -%}\n\
                  ]"
                one_result: "{\n  \"calendar_entity\": \"{{ repeat.item }}\",\n \
                  \ \"event_count\": {{ events | length }},\n  \"events\": {{ event_list\
                  \ }}\n}"
            - variables:
                all_event_results: '{{ all_event_results + [one_result] }}'
        - variables:
            final_response: "{{\n  {\n    \"status\": \"success\",\n    \"message\"\
              : \"Aggregated events from \" ~ (target_calendars | length) ~ \" calendars.\"\
              ,\n    \"results\": all_event_results,\n    \"note\": \"Use 'inspect'\
              \ to locate event_id(s). Providers may return timestamps in UTC or offset;\
              \ normalize externally during UAT.\"\n  }\n}}\n"
        - stop:
          response_variable: final_response
        - set_conversation_response: '{{ final_response }}'
        alias: read events from calendar
      - conditions:
        - condition: template
          value_template: "{{ action_type == 'inspect'\n   and not target_is_multi\n\
            \   and (calendar_entity_exists or label_target_entities | length == 1)\
            \ }}\n"
        sequence:
        - variables:
            calendar_entity_list: "{% set ce = calendar_entity_resolved | default(none)\
              \ %} {% if ce %}\n  [\"{{ ce }}\"]\n{% else %}\n  []\n{% endif %}"
        - action: script.dojotools_zen_inspect
          data:
            entity_id: '{{ calendar_entity_list }}'
            timeout: 30
          response_variable: inspect_response
        - variables:
            final_response: '{{ inspect_response }}'
        - stop:
          response_variable: final_response
        - set_conversation_response: '{{ final_response }}'
        alias: inspect calendar
      - conditions:
        - condition: template
          value_template: "{{ action_type == 'create'\n   and not target_is_multi\n\
            \   and (calendar_entity_exists or label_target_entities | length == 1)\
            \ }}\n"
        sequence:
        - choose:
          - conditions:
            - condition: template
              value_template: '{{ start < end }}'
            sequence:
            - choose:
              - conditions:
                - condition: template
                  value_template: '{{ is_ms365_cal }}'
                sequence:
                - variables:
                    ms365_create_data: "{% set is_all_day = not 'T' in start and not\
                      \ 'T' in end %}\n{% set d = {'subject': summary | default('Untitled\
                      \ Event')} %}\n{% if is_all_day %}\n  {% set d = dict(d, start=start.split('T')[0],\
                      \ end=end.split('T')[0]) %}\n{% else %}\n  {% set d = dict(d,\
                      \ start=start, end=end) %}\n{% endif %}\n{% if description %}{%\
                      \ set d = dict(d, body=description) %}{% endif %}\n{% if location\
                      \ %}{% set d = dict(d, location=location) %}{% endif %}\n{% if\
                      \ attendees %}\n  {% set ns = namespace(al=[]) %}\n  {% for a\
                      \ in attendees.split(',') | map('trim') %}\n    {% set ns.al =\
                      \ ns.al + [{'email': a, 'type': 'Required'}] %}\n  {% endfor\
                      \ %}\n  {% set d = dict(d, attendees=ns.al) %}\n{% endif %}\n\
                      {{ d }}"
                - data: '{{ ms365_create_data }}'
                  target:
                    entity_id: '{{ calendar_entity_resolved if calendar_entity_exists else label_target_entities[0] }}'
                  action: ms365_calendar.create_calendar_event
                - variables:
                    final_response: "{{\n  {\n    \"status\": \"success\",\n    \"message\"\
                      : \"Created MS365 event '\" ~ ms365_create_data.subject ~ \"'\
                      .\",\n    \"event\": ms365_create_data\n  } | tojson\n}}"
                - stop:
                  response_variable: final_response
                - set_conversation_response: '{{ final_response }}'
            - variables:
                create_data: "{% set is_all_day = not 'T' in start and not 'T' in\
                  \ end %} {% set d = {\n  'summary': summary | default(\"Untitled Event\")\n\
                  } %} {% if is_all_day %}\n\
                  \  {% set d = dict(d,\n    start_date=start.split('T')[0],\n   \
                  \ end_date=end.split('T')[0]\n  ) %}\n{% else %}\n  {% set d = dict(d,\n\
                  \    start_date_time=start,\n    end_date_time=end\n  ) %}\n{% endif\
                  \ %} {% if description %}\n  {% set d = dict(d, description=description)\
                  \ %}\n{% endif %} {% if location %}\n  {% set d = dict(d, location=location)\
                  \ %}\n{% endif %} {% if attendees %}\n  {% set attendee_list = attendees.split(',')\
                  \ | map('trim') | list %}\n  {% set d = dict(d, attendees=attendee_list)\
                  \ %}\n{% endif %} {{ d }}"
            - data: '{{ create_data }}'
              target:
                entity_id: '{{ calendar_entity_resolved if calendar_entity_exists else label_target_entities[0] }}'
              action: calendar.create_event
            - variables:
                final_response: "{{\n  {\n    \"status\": \"success\",\n    \"message\"\
                  : \"Created calendar event '\" ~ create_data.summary ~ \"' on calendar\
                  \ '\" ~ (\n      (label_target_entities[0] if (label_target_entities\
                  \ | length > 0) else calendar_entity_resolved)\n    ) ~ \"'.\",\n\
                  \    \"event\": create_data\n  } | tojson\n}}"
            - stop:
              response_variable: final_response
            - set_conversation_response: '{{ final_response }}'
          - conditions:
            - condition: template
              value_template: '{{ start >= end }}'
            sequence:
            - variables:
                final_response: "{{\n  {\n    \"status\": \"error\",\n    \"message\"\
                  : \"Invalid date range: start must be before end. Got start='\" ~\
                  \ start ~ \"', end='\" ~ end ~ \"'.\"\n  } | tojson\n}}"
            - stop:
              response_variable: final_response
            - set_conversation_response: '{{ final_response }}'
        alias: create calendar event
      - conditions:
        - condition: template
          value_template: "{{ action_type == 'update'\n   and not target_is_multi\n\
            \   and (calendar_entity_exists or label_target_entities | length == 1)\
            \ }}\n"
        sequence:
        - choose:
          - conditions:
            - condition: template
              value_template: '{{ is_ms365_cal and event_id }}'
            sequence:
            - variables:
                ms365_modify_data: "{% set is_all_day = not 'T' in start and not 'T'\
                  \ in end %}\n{% set d = {'event_id': event_id, 'subject': summary\
                  \ | default('Untitled Event')} %}\n{% if is_all_day %}\n  {% set\
                  \ d = dict(d, start=start.split('T')[0], end=end.split('T')[0])\
                  \ %}\n{% else %}\n  {% set d = dict(d, start=start, end=end) %}\n\
                  {% endif %}\n{% if description %}{% set d = dict(d, body=description)\
                  \ %}{% endif %}\n{% if location %}{% set d = dict(d, location=location)\
                  \ %}{% endif %}\n{{ d }}"
            - data: '{{ ms365_modify_data }}'
              target:
                entity_id: '{{ calendar_entity_resolved }}'
              action: ms365_calendar.modify_calendar_event
            - variables:
                final_response: "{{\n  {\n    \"status\": \"success\",\n    \"message\"\
                  : \"Updated MS365 event '\" ~ ms365_modify_data.subject ~ \"'.\"\
                  ,\n    \"event\": ms365_modify_data\n  } | tojson\n}}"
            - stop: Pass response variables back to LLM
              response_variable: final_response
            - set_conversation_response: '{{ final_response }}'
        - variables:
            delete_data: "{{\n  {\n    'entity_id': (calendar_entity_resolved if calendar_entity_exists\
              \ else label_target_entities[0]),\n    'summary': summary,\n    'event_id':\
              \ event_id,\n    'start_date_time': start,\n    'end_date_time': end\n\
              \  }\n}}\n"
        - action: script.zen_dojotools_calendar
          data:
            action_type: delete
            event_id: '{{ event_id }}'
            calendar_name: '{{ calendar_entity_resolved }}'
          response_variable: zen_delete_response
        - choose:
          - conditions:
            - condition: template
              value_template: '{{ zen_delete_response.status == ''error'' }}'
            sequence:
            - variables:
                final_response: '{{ zen_delete_response }}'
            - stop:
              response_variable: final_response
          - conditions:
            - condition: template
              value_template: '{{ zen_delete_response.status == ''not_found'' }}'
            sequence:
            - variables:
                warn_msg: No existing event matched. Creating new event.
          - conditions:
            - condition: template
              value_template: '{{ zen_delete_response.status == ''success'' }}'
            sequence:
            - variables:
                warn_msg: ''
        - variables:
            create_data: "{% set is_all_day = not 'T' in start and not 'T' in end\
              \ %} {% set d = {\n  'summary': summary | default(\"Untitled Event\")\n\
              } %} {% if is_all_day %}\n  {% set d = dict(d,\n    start_date=start.split('T')[0],\n\
              \    end_date=end.split('T')[0]\n  ) %}\n{% else %}\n  {% set d = dict(d,\n\
              \    start_date_time=start,\n    end_date_time=end\n  ) %}\n{% endif\
              \ %} {% if description %}\n  {% set d = dict(d, description=description)\
              \ %}\n{% endif %} {% if location %}\n  {% set d = dict(d, location=location)\
              \ %}\n{% endif %} {% if attendees %}\n  {% set attendee_list = attendees.split(',')\
              \ | map('trim') | list %}\n  {% set d = dict(d, attendees=attendee_list)\
              \ %}\n{% endif %} {{ d }}"
        - data: '{{ create_data }}'
          target:
            entity_id: '{{ calendar_entity_resolved if calendar_entity_exists else label_target_entities[0] }}'
          action: calendar.create_event
        - variables:
            final_response: "{{\n  {\n    \"status\": \"success\",\n    \"message\"\
              : \"Updated event via delete+create on calendar '\" ~ (\n      (label_target_entities[0]\
              \ if (label_target_entities | length > 0) else calendar_entity_resolved)\n\
              \    ) ~ \"'. \" ~ (warn_msg | default(\"\")),\n    \"event\": create_data\n\
              \  } | tojson\n}}"
        - stop: Pass response variables back to LLM
          response_variable: final_response
        - set_conversation_response: '{{ final_response }}'
        alias: update calendar event
      - conditions:
        - condition: template
          value_template: "{{ action_type == 'delete'\n   and not target_is_multi\n\
            \   and (calendar_entity_exists or label_target_entities | length == 1)\
            \ }}\n"
        sequence:
        - variables:
            SUPPORTED_FEATURES:
              calendar:
                name: CalendarEntityFeature
                enum:
                  CREATE_EVENT: 1
                  DELETE_EVENT: 2
                  UPDATE_EVENT: 4
            calendar_features: '{{ state_attr(calendar_entity_resolved, ''supported_features'')
              | int(0) }}'
            supports_delete: '{% set want = SUPPORTED_FEATURES.calendar.enum.DELETE_EVENT
              %} {% set have = calendar_features | int | bitwise_and(want) %} {{ have
              == want }}

              '
        - choose:
          - conditions:
            - condition: template
              value_template: '{{ not supports_delete }}'
            sequence:
            - action: script.dojotools_zen_inspect
              data:
                entity_id:
                - '{{ calendar_entity_resolved }}'
              response_variable: inspect_response
            - variables:
                final_response: "{{\n  {\n    \"status\": \"error\",\n    \"message\"\
                  : \"Delete requires a calendar entity that supports delete.\",\n\
                  \    \"inspect\": inspect_response | default({})\n  } | tojson\n\
                  }}"
            - stop:
              response_variable: final_response
            - set_conversation_response: '{{ final_response }}'
          - conditions:
            - condition: template
              value_template: '{{ event_id is not defined or not event_id }}'
            sequence:
            - action: script.dojotools_zen_inspect
              data:
                entity_id:
                - '{{ calendar_entity_resolved }}'
              response_variable: inspect_response
            - variables:
                final_response: "{{\n  {\n    \"status\": \"error\",\n    \"message\"\
                  : \"Delete/update requires 'event_id'. The calendar provider did\
                  \ not expose an event_id for this event. This is an expected provider\
                  \ limitation; operation safely blocked.\",\n    \"inspect\": inspect_response\
                  \ | default({})\n  } | tojson\n}}"
            - stop:
              response_variable: final_response
            - set_conversation_response: '{{ final_response }}'
          - conditions: []
            sequence:
            - choose:
              - conditions:
                - condition: template
                  value_template: '{{ is_ms365_cal }}'
                sequence:
                - action: ms365_calendar.remove_calendar_event
                  data:
                    event_id: '{{ event_id }}'
                  target:
                    entity_id: '{{ calendar_entity_resolved }}'
              default:
              - action: calendar.delete_event
                data:
                  event_id: '{{ event_id }}'
                target:
                  entity_id: '{{ calendar_entity_resolved }}'
            - variables:
                final_response: "{{\n  {\n    \"status\": \"delete triggered\",\n\
                  \    \"message\": \"Deleted calendar event '\" ~ event_id ~ \"'.\
                  \ If no event was found, this was a no-op.\",\n    \"entity_id\"\
                  : calendar_entity_resolved,\n    \"event_id\": event_id\n  } | tojson\n\
                  }}"
            - stop:
              response_variable: final_response
            - set_conversation_response: '{{ final_response }}'
        alias: delete event from calendar
    fields:
      action_type:
        selector:
          select:
            options:
            - create
            - read
            - inspect
            - update
            - delete
            - help
        default: help
      calendar_name:
        selector:
          text:
        required: false
      summary:
        selector:
          text:
        required: false
      description:
        selector:
          text:
            multiline: true
        required: false
      start:
        selector:
          text:
        required: false
      end:
        selector:
          text:
        required: false
      location:
        selector:
          text:
        required: false
      attendees:
        selector:
          text:
            multiline: true
        required: false
      label_targets:
        selector:
          text:
            multiple: true
            multiline: true
        required: false
      event_id:
        selector:
          text:
        required: false
    icon: mdi:calendar
    mode: parallel

###############################################################################
# SETUP HELPERS
#
# Configure these in HA after install (Settings > Helpers, or Developer Tools)
#
# zen_teams_chat_id      — Your MS Teams chat thread ID
#                          (from Graph API or sensor.homeassistant_chat)
#
# zen_teams_display_name — Your display name as seen in Teams (e.g. "Home Assistant")
#
# zen_mail_sender     — Your HA send-from address (e.g. homeassistant@yourdomain.com)
#
# zen_mail_domain     — Your email domain (e.g. yourdomain.com)
#                       Used for wildcard whitelist matching (*@yourdomain.com)
#
# zen_mail_whitelist  — Whitelist mode. Options:
#                         OFF               → no whitelist check, all recipients allowed
#                         *@yourdomain.com  → allow any address in your domain
#                         user@domain.com   → exact address match only
#                       If unavailable/unknown: fails OPEN (all allowed) with a warning
#                       in the response. Add more options via HA UI as needed.
###############################################################################

input_text:
  zen_teams_chat_id:
    name: "Zen Teams Chat ID"
    max: 255
    mode: text
    icon: mdi:microsoft-teams

  zen_teams_display_name:
    name: "Zen Teams Display Name"
    max: 100
    mode: text
    icon: mdi:microsoft-teams

  zen_mail_sender:
    name: "Zen Mail Sender Address"
    max: 255
    mode: text
    icon: mdi:email-outline

  zen_mail_domain:
    name: "Zen Mail Domain"
    max: 100
    mode: text
    icon: mdi:at

input_select:
  zen_mail_whitelist:
    name: "Zen Mail Whitelist"
    options:
      - "OFF"
      - "*@yourdomain.com"
      - "user@yourdomain.com"
    initial: "OFF"
    icon: mdi:email-lock
