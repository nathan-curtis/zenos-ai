###############################################################################
# ZenOS-AI DojoTools: Manifest
# Version: 4.0.0 RC2
#
# Scripts:
#   zen_dojotools_manifest — Runtime health and volume manifest (v4.0.0 RC2)
#
# MIGRATED FROM: scripts.yaml (2026-03-06)
#
# FG-14 FIXED: 3x boolean: {} selectors stripped on migration
#
# === UAT PASS — 2026-03-06 ===
# Auditor: Claude (Anthropic, Sonnet 4.6)
# HALMark: 0.9.11-draft — PASS Level 3 (Steward Safe) — no remaining FG hits
# UAT Cases: 1/1 PASS
#
# zen_dojotools_manifest:
#   read action → 10 volumes returned, all healthy, full metadata clean ✓
#
# config check → go; script reload → clean ✓
# ==============================
###############################################################################

script:
  zen_dojotools_manifest:
    alias: Zen DojoTools Manifest
    description: 'Zen DojoTools Manifest (4.0.0 RC2) Sandbox Safe! Runtime-only health,
      zero persistent health storage. Authoritative manifest  scanner for AI_Cabinet
      volumes. Extracts users, metadata, context, capacity, access flags, ACLs, drawers.
      Writes ONLY the compiled manifest to the Zen Default Household cabinet.
  
      '
    icon: mdi:home-map-marker
    fields:
      show_hidden:
        selector:
          boolean:
        name: show hidden
        description: Include hidden/system volumes in results?
      extended:
        selector:
          boolean:
        name: Extended
        description: 'Return full metadata (context, labels, timestamps, ACLs, drawer
          index, health detail). Default: compact (entity_id, friendly_name, id, drawer
          count, capacity %, status, writeable).'
        default: false
    sequence:
    - variables:
        zen_default_house_cab: "{{ expand(label_entities('Zen Default Household Cabinet'))\n
          \ | selectattr('domain','eq','sensor')\n  | map(attribute='entity_id')\n  |
          list\n  | first\n  | default() }}"
        manifest_key: zen_library_manifest
        read_hidden: '{{ show_hidden | default(false) }}'
        read_extended: '{{ extended | default(false) }}'
        hide_labels:
        - hidden_volume
        - read_only_volume
        - system_volume
        - hidden_cabinet
        - read_only_cabinet
        - system_cabinet
        exempt_labels:
        - internal
        - hidden
        - system
        ignore_label_prefixes:
        - _
        - .
        always_hide_drawers:
        - AI_Cabinet_VolumeInfo
        max_chars: 131072
        warn_threshold: 0.8
        controller_schema: 1
        manifest: "{% macro compute_health(info, pct_chars, writeable, readable) %}\n
          \ {%- set expected_guid = info.get('id') %}\n  {%- set actual_guid   = info.get('id')
          %}\n  {%- set guid_mismatch = (expected_guid != actual_guid) %}\n  {%- set
          storage_warning = (pct_chars >= (warn_threshold * 100)) %}\n\n  {%- set status
          = 'ready' %}\n  {%- if guid_mismatch %}\n    {%- set status = 'error' %}\n
          \ {%- elif storage_warning %}\n    {%- set status = 'warning' %}\n  {%- endif
          %}\n\n  {\n    \"status\": \"{{ status }}\",\n    \"guid_mismatch\": {{ guid_mismatch
          | tojson }},\n    \"storage_warning\": {{ storage_warning | tojson }},\n    \"writeable\":
          {{ writeable | tojson }},\n    \"readable\": {{ readable | tojson }}\n  }\n{%
          endmacro %}\n\n{% macro build_drawer_index(vars) %}\n  {% if vars is mapping\n
          \       and vars.get('_label_index') is mapping\n        and vars['_label_index'].get('value')
          is defined %}\n    {{ vars['_label_index']['value'] | tojson }}\n  {% else
          %}\n    {{ {} | tojson }}\n  {% endif %}\n{% endmacro %}\n\n{% macro acls_by_category(info)
          %}\n  {%- set raw_acls = info.get('acls', {}) %}\n  {%- set ns = namespace(by_cat={},
          nested=[]) %}\n\n  {%- for category, entries in raw_acls.items() if entries
          is sequence %}\n    \n    {%- set ns.nested = [] -%}\n\n    {%- set direct
          \ = entries | selectattr('entity_guid','defined') | map(attribute='entity_guid')
          | list %}\n    {%- set family  = entries | selectattr('family_guid','defined')
          | map(attribute='family_guid') | list %}\n\n    {%- for entry in entries if
          entry is mapping %}\n      {%- for k,v in entry.items() if v is mapping %}\n
          \       {%- if 'entity_guid' in v %}{%- set ns.nested = ns.nested + [v.entity_guid]
          -%}{%- endif %}\n        {%- if 'family_guid' in v %}{%- set ns.nested = ns.nested
          + [v.family_guid] -%}{%- endif %}\n        {%- if 'household_guid' in v %}{%-
          set ns.nested = ns.nested + [v.household_guid] -%}{%- endif %}\n      {%-
          endfor %}\n    {%- endfor %}\n\n    {%- set merged = (direct + family + ns.nested)
          | reject('none') | unique | list %}\n\n    {%- if merged | length > 0 %}\n
          \     {%- set ns.by_cat = ns.by_cat | combine({ category: merged }) %}\n    {%-
          endif %}\n  {%- endfor %}\n\n  {{ ns.by_cat | tojson }}\n{% endmacro %}\n\n{%-
          set result = namespace(data={}) %}\n\n{%- for ent in states.sensor | map(attribute='entity_id')
          | list %}\n  {%- set vars = state_attr(ent, 'variables') %}\n\n  {%- if vars
          is mapping and (vars.get('AI_Cabinet_VolumeInfo') is not none) %}\n    {%-
          set info = vars.AI_Cabinet_VolumeInfo.value %}\n    {%- set st = states[ent]
          %}\n    {%- set friendly = st.attributes.friendly_name | default(ent) %}\n
          \   {%- set lc = st.last_changed.isoformat() %}\n    {%- set lu = st.last_updated.isoformat()
          %}\n    {%- set volume_labels = labels(ent) | default([]) %}\n\n    {%- set
          skip_hidden =\n      (not read_hidden)\n      and (hide_labels | select('in',
          volume_labels) | list | count > 0)\n      and (volume_labels | select('in',
          exempt_labels) | list | count == 0)\n    %}\n    {%- if skip_hidden %}\n      {%-
          continue %}\n    {%- endif %}\n\n    {%- set raw_drawers = vars.keys() | list
          %}\n    {%- set ns = namespace(drawers=[]) %}\n    \n    {%- for d in raw_drawers
          %}\n      {%- if d not in always_hide_drawers\n            and not d.startswith('_')\n
          \           and not d.startswith('.') %}\n        {%- set val = vars.get(d,
          {}) %}\n        {%- set val_value = val.get('value') if val is mapping else
          {} %}\n    \n        {%- if val is mapping and val_value is mapping and val_value.get('mount_point',
          false) %}\n          {%- set ns.drawers = ns.drawers + [\n            d ~
          ' [mount:' ~ (\n              val_value.get('target_entity_id')\n              if
          val_value.get('target_entity_id')\n              else val_value.get('target_volume_id')\n
          \             if val_value.get('target_volume_id')\n              else '?'\n
          \           ) ~ ']'\n          ] %}\n        {%- else %}\n          {%- set
          ns.drawers = ns.drawers + [d] %}\n        {%- endif %}\n      {%- endif %}\n
          \   {%- endfor %}\n    \n    {%- set drawers = ns.drawers | sort %}\n\n    {%-
          set raw_json = vars | tojson %}\n    {%- set char_count = raw_json | length
          %}\n    {%- set pct_chars = (char_count / max_chars * 100) | round(1) %}\n
          \   {%- set storage_warning = pct_chars >= (warn_threshold * 100) %}\n\n    {%-
          set flags = info.get('flags', {}) %}\n    {%- set writeable = (not flags.get('read_only',
          false))\n                        and (info.get('schema_version', 0) | float
          <= controller_schema)\n                        and not storage_warning %}\n
          \   {%- set readable = (not storage_warning) %}\n\n    {%- set drawer_index
          = build_drawer_index(vars) | trim | from_json %}\n    {%- set acls_obj = acls_by_category(info)
          | from_json %}\n\n    {%- set health_obj =\n      compute_health(info, pct_chars,
          writeable, readable) | from_json\n    %}\n\n    {%- if read_extended %}\n      {%- set rec = {\n        'entity_id': ent,\n        'friendly_name': friendly,\n        'context': vars.get('_context', {}),\n        'metadata': {\n          'id': info.get('id'),\n          'schema_version': info.get('schema_version'),\n          'labels': volume_labels | sort,\n          'timestamps': { 'last_changed': lc, 'last_updated': lu }\n        },\n        'stats': { 'drawer_count': drawers | count },\n        'capacity': {\n          'chars_used': char_count, 'chars_max': max_chars,\n          'percent_used': pct_chars, 'warning': storage_warning\n        },\n        'access': { 'writeable': writeable, 'readable': readable },\n        'drawer_index': drawer_index,\n        'acls_by_category': acls_obj,\n        'health': health_obj\n      } %}\n    {%- else %}\n      {%- set rec = {\n        'entity_id': ent,\n        'friendly_name': friendly,\n        'id': info.get('id'),\n        'drawers': drawers | count,\n        'capacity': pct_chars | string + '%',\n        'status': health_obj.get('status', 'unknown'),\n        'writeable': writeable\n      } %}\n    {%- endif %}\n\n    {%- set result.data = result.data | combine({ ent: rec }) %}\n  {%- endif %}\n{%- endfor %}\n\n{{ result.data }}"
    - event: set_variable_legacy
      event_data:
        key: '{{ manifest_key }}'
        value: '{{ manifest }}'
        set_timestamp: true
        volume_entity: '{{ zen_default_house_cab }}'
    - alias: Return Manifest Data
      stop: Pass variable to response
      response_variable: manifest
    - set_conversation_response: '{{ manifest }}'
  system_tools_stamp_default_family_cabinet:
    sequence:
    - variables:
        new_guid: "{{ '%04x%04x-%04x-%04x-%04x-%04x%04x%04x' | format(\n    range(0,
          65536) | random,\n    range(0, 65536) | random,\n    range(0, 65536) | random,\n
          \   range(0, 65536) | random,\n    range(0, 65536) | random,\n    range(0,
          65536) | random,\n    range(0, 65536) | random,\n    range(0, 65536) | random\n
          \ ) }}"
    - alias: Stamp AI_Cabinet_VolumeInfo
      event: set_variable_zenos_default_family_cabinet
      event_data:
        key: AI_Cabinet_VolumeInfo
        value:
          id: '{{ new_guid }}'
          friendly_name: ZenOS Default Family Cabinet
          name: ZenOS Default Family Cabinet
          description: Primary storage for household family data, lore, and member
            links.
          validation: ALLYOURBASEAREBELONGTOUS
          flags:
            system: false
            hidden: false
            read_only: false
            dojo: false
            kata: false
            history: false
            user: false
            family: true
            secure_mode: false
          owner: {}
          acls:
            owner: []
            partner: []
            family: []
            public: []
          entity_labels:
          - ai
          - zen
          - cabinet
          - volumeinfo
          - family
        set_timestamp: true
    - alias: Stamp _context
      event: set_variable_zenos_default_family_cabinet
      event_data:
        key: _context
        value:
          what_is_this: The Family Cabinet — primary storage for household family
            data, lore, and links to family members.
          why_is_it_here: Root for family-scoped data. Owner is Head of Household.
          usage_policy:
          - Prefer modifying in place unless scale or security requires a new drawer
            or volume.
          - Cross-link by label and purpose. Leave breadcrumbs if data is authoritative
            elsewhere.
          - Store static data in deep nested JSON; store dynamic data in wide drawers
            for fast seeks and less risky writes.
          - Summarize or prune as needed.
          - Family members are linked from here — store member-specific data in their
            own cabinet if accessible.
          growth_logic:
            on_split: Request a new subcabinet only if a drawer outgrows space or
              requires special access.
            split_triggers:
            - Exceeds index or storage limits.
            - New security domain.
            - Needs its own schedule or routine.
        set_timestamp: true
    alias: 'System - Tools: Stamp Default Family Cabinet'
    description: Stamp AI_Cabinet_VolumeInfo for the default family cabinet with
      a fresh UUID. No PII — configure owner/ACLs after stamping.
    icon: mdi:dresser-outline
    fields: {}
  dojotools_zen_inspect:
    alias: Zen DojoTools Inspect
    mode: parallel
    description: Inspect (4.0.0 RC2). Deep dive on one or more entities. Attributes
      are key-scanned for safety. Cabinet sensors expose header metadata only; use cabinet
      tools for full volume access.
    fields:
      entity_id:
        required: true
        selector:
          entity:
            multiple: true
      extended:
        required: false
        default: false
        selector:
          boolean:
        description: Light device/integration forensics.
      infer:
        required: false
        selector:
          boolean:
        description: Reserved for future local inference.
      timeout:
        selector:
          number:
            min: 30
            max: 300
            step: 0.25
        name: Timeout
        default: 60
        required: false
    sequence:
    - variables:
        entity_list: "{% if entity_id is iterable and (entity_id is not string) %}\n
          \ {{ entity_id }}\n{% else %}\n  [{{ entity_id }}]\n{% endif %}"
        extended_mode: '{{ extended | default(false) }}'
        infer_mode: '{{ infer | default(false) }}'
        timeout_s: '{{ timeout | default(60) }}'
        results: []
    - repeat:
        for_each: '{{ entity_list }}'
        sequence:
        - variables:
            current_entity: '{{ repeat.item | string }}'
            state_obj: '{% set s = states[current_entity] %}
  
              {{ s if s is not none else none }}'
            has_state_obj: '{{ state_obj is not none }}'
            domain: "{% set dot = current_entity.find('.') %}\n{% if dot > 0 %}\n  {{
              current_entity[:dot] }}\n{% else %}\n  unknown\n{% endif %}"
            friendly_name: "{{ state_attr(current_entity, 'friendly_name')\n   | default(current_entity)
              }}"
            state_str: '{{ states(current_entity) if has_state_obj else ''unknown''
              }}'
            last_changed: "{% if has_state_obj %}\n  {{ as_timestamp(state_obj.last_changed,
              default=0)\n       | timestamp_local }}\n{% else %} {{ '' }} {% endif
              %}"
            last_updated: "{% if has_state_obj %}\n  {{ as_timestamp(state_obj.last_updated,
              default=0)\n       | timestamp_local }}\n{% else %} {{ '' }} {% endif
              %}"
            labels_raw: '{{ labels(current_entity) | default([]) }}'
            safe_labels: "{% if labels_raw is iterable and (labels_raw is not string)
              %}\n  {{ labels_raw | list }}\n{% else %} [] {% endif %}"
            attrs_raw: "{% set s = states[current_entity] %} {% if s is not none and
              s.attributes is mapping %}\n  {{ s.attributes }}\n{% else %}\n  {}\n{%
              endif %}"
            has_attrs: '{% set s = states[current_entity] %} {{ s is not none and s.attributes
              is mapping }}'
            attrs_is_stringified: '{{ attrs_raw is string }}'
            cabinet_header: "{% set raw = attrs_raw %}\n{% if raw is mapping %}\n  {%
              set vars = raw.get('variables') %}\n  {% if vars is mapping %}\n    {%
              set cab = vars.get('AI_Cabinet_VolumeInfo') %}\n    {% if cab is mapping
              and cab.get('value') is mapping %}\n      {{ cab.get('value') }}\n    {%
              else %} {} {% endif %}\n  {% else %} {} {% endif %}\n{% else %} {} {%
              endif %}"
            cabinet_signature: "{% if cabinet_header is mapping %}\n  {{ cabinet_header.get('validation','')
              | string }}\n{% else %}\n  ''\n{% endif %}"
            is_cabinet_sensor: "{{\n  domain == 'sensor'\n  and cabinet_header is mapping\n
              \ and cabinet_signature == 'ALLYOURBASEAREBELONGTOUS'\n}}"
            cabinet_guid: "{% if is_cabinet_sensor and cabinet_header.get('id') %}\n
              \ {{ cabinet_header.get('id') }}\n{% else %} '' {% endif %}"
            cabinet_uninitialized: '{{ is_cabinet_sensor and not cabinet_header.get(''id'')
              }}'
            volume_result: "{% if is_cabinet_sensor %}\n  {{ {\n    \"is_cabinet\":
              true,\n    \"id\": cabinet_header.get(\"id\"),\n    \"version\": cabinet_header.get(\"version\"),\n
              \   \"friendly_name\": cabinet_header.get(\"friendly_name\"),\n    \"name\":
              cabinet_header.get(\"name\"),\n    \"description\": cabinet_header.get(\"description\"),\n
              \   \"validation\": cabinet_signature,\n    \"flags\": (\n      cabinet_header.get(\"flags\")\n
              \     if cabinet_header.get(\"flags\") is mapping\n      else {}\n    ),\n
              \   \"uninitialized\": cabinet_uninitialized\n  } }}\n{% else %}\n  {{
              {\"is_cabinet\": false} }}\n{% endif %}"
            stat_class: "{{ state_attr(current_entity,'state_class')\n   | default('',
              true) | string }}"
            stat_uom: "{{ state_attr(current_entity,'unit_of_measurement')\n   | default('',
              true) | string }}"
            stats_eligible: "{{ stat_class in ['measurement','total','total_increasing']\n
              \  and stat_uom != '' }}"
            stats_reason: "{% if not has_state_obj %}\n  Entity not found.\n{% elif
              stats_eligible %}\n  Eligible based on state_class and unit_of_measurement.\n{%
              elif stat_class == '' and stat_uom == '' %}\n  Missing state_class and
              unit_of_measurement.\n{% elif stat_class == '' %}\n  Missing state_class.\n{%
              elif stat_uom == '' %}\n  Missing unit_of_measurement.\n{% else %}\n  Unsupported
              state_class for statistics.\n{% endif %}"
            statistics_result: "{{ {\n  \"eligible\": stats_eligible,\n  \"reason\":
              stats_reason\n} }}"
            extended_block: "{% if extended_mode %}\n  {% set dev_id = state_attr(current_entity,
              'device_id') %}\n  {% set dev = dev_id if dev_id is not none else none
              %}\n  {% set area = dev and device_attr(dev, 'area_id') or none %}\n  {%
              set identifiers = dev and device_attr(dev, 'identifiers') or none %}\n\n
              \ {{ {\n    \"device_id\": dev,\n    \"area_id\": area,\n    \"identifiers\":
              identifiers\n  } }}\n{% else %}\n  {}\n{% endif %}"
            safe_attributes: "{% if is_cabinet_sensor %}\n  {\n    \"notice\": \"Attributes
              suppressed for cabinet sensor. Use FileCabinet tools for full volume access.\"\n
              \ }\n{% else %}\n  {# --- ORIGINAL SANITIZER BLOCK (UNCHANGED) --- #}\n\n
              \ {% if attrs_is_stringified %}\n    {# --- FALLBACK MODE: Home Assistant
              stringified the dict --- #}\n    {% set s = states[current_entity] %}\n
              \   {% set ns = namespace(out={}) %}\n\n    {% if s is not none %}\n      {%
              for k in s.attributes.keys() %}\n        {% set v = state_attr(current_entity,
              k) %}\n        {% if v is string or v is number or v is boolean %}\n          {%
              set ns.out = ns.out | combine({k: v}, recursive=true) %}\n        {% elif
              v is mapping %}\n          {% set ns.out = ns.out | combine({k: v}, recursive=true)
              %}\n        {% elif v is sequence and (v is not string) %}\n          {%
              set ns.out = ns.out | combine({k: v}, recursive=true) %}\n        {% else
              %}\n          {% set ns.out = ns.out | combine({k: v|string}, recursive=true)
              %}\n        {% endif %}\n      {% endfor %}\n    {% endif %}\n\n    {{
              ns.out }}\n\n  {% else %}\n    {# --- NORMAL MODE --- #}\n    {% set raw
              = attrs_raw %}\n    {% set ns = namespace(out={}) %}\n\n    {% if raw
              is mapping %}\n      {% for k, v in raw.items() %}\n        {% if v is
              string or v is number or v is boolean %}\n          {% set ns.out = ns.out
              | combine({k: v}, recursive=true) %}\n        {% elif v is mapping %}\n
              \         {% set ns.out = ns.out | combine({k: v}, recursive=true) %}\n
              \       {% elif v is sequence and (v is not string) %}\n          {% set
              ns.out = ns.out | combine({k: v}, recursive=true) %}\n        {% else
              %}\n          {% set ns.out = ns.out | combine({k: v|string}, recursive=true)
              %}\n        {% endif %}\n      {% endfor %}\n    {% endif %}\n\n    {{
              ns.out }}\n  {% endif %}\n{% endif %}"
            entity_result: "{{ {\n  \"entity_id\": current_entity,\n  \"friendly_name\":
              friendly_name,\n  \"domain\": domain,\n  \"state\": state_str,\n  \"last_changed\":
              last_changed,\n  \"last_updated\": last_updated,\n  \"labels\": safe_labels,\n
              \ \"attributes\": safe_attributes,\n  \"volume\": volume_result,\n  \"statistics\":
              statistics_result,\n  \"extended\": extended_block,\n} }}"
            results: '{{ (results + [entity_result]) | list }}'
    - variables:
        inspect_result:
          results: '{{ results }}'
          inputs:
            entity_id: '{{ entity_list }}'
            extended: '{{ extended_mode }}'
            infer: '{{ infer_mode }}'
            timeout: '{{ timeout_s }}'
          error:
    - stop: Inspect complete
      response_variable: inspect_result
