###############################################################################
# ZenOS-AI DojoTools: AdminTools
# Version: 4.0.0 RC2
#
# Scripts:
#   zen_admintools_reset_template        — Kata + Dojo template press (v1.1.0)
#   zen_admintools_kfc_migration_press   — One-time scheduling field migration (v1.1.0)
#   zen_admintools_cabinetadmin          — Cabinet inspect/restore/reset/hammer (v4.0.0 RC2)
#   zen_dojotools_kungfu_writer          — Dojo component writer (v4.0.0 RC2)
#   zen_admintools_cabinetadmin_backup   — Cabinet factory stamper/repairer (v1.x)
#   zen_admintools_zenos_prompt_loader   — Cortex/Directives/Purpose loader
#
# MIGRATED FROM: scripts.yaml (2026-03-06)
#
# FG-14 FIXED: boolean: {} in cabinetadmin, 10x text: {} + boolean: {} in kungfu_writer (now zen_dojotools_kungfu_writer),
#              5x boolean: {} + 2x text: {} in cabinetadmin_backup
# FG (sandbox) FIXED: mounts.append() -> namespace(mounts=[]) in cabinetadmin_backup
#
# === UAT PASS — 2026-03-06 ===
# Auditor: Claude (Anthropic, Sonnet 4.6)
# HALMark: 0.9.11-draft — PASS Level 3 (Steward Safe) — no remaining FG hits
# UAT Cases: 1/1 PASS (non-destructive only; destructive scripts load-verified only)
#
# zen_dojotools_kungfu_writer:
#   help action → response clean ✓
# zen_admintools_reset_template, cabinetadmin, cabinetadmin_backup, prompt_loader:
#   not MCP-exposed; verified via config check pass + clean restart ✓
#
# config check → go; restart → clean ✓
# ==============================
###############################################################################

script:
  zen_admintools_reset_template:
    sequence:
    - variables:
        zen_template_seed: "{\n  \"structure\": {\n    \"system\": {\n      \"cortex\":
          null,\n      \"os_version\": null,\n      \"build_version\": null\n    },\n
          \   \"home_overview\": {\n      \"status\": null,\n      \"risks\": [],\n
          \     \"events\": []\n    },\n    \"active_components\": {},\n    \"zen_summary\":
          {\n      \"summary\": null,\n      \"attention\": null,\n      \"objective\":
          null,\n      \"subjective\": null,\n      \"urgency\": 0,\n      \"confidence\":
          0.0,\n      \"criticality\": 1,\n      \"emotion_queue\": [],\n      \"errors\":
          [],\n      \"timestamp\": null\n    }\n  },\n  \"example\": {\n    \"system\":
          {\n      \"cortex\": \"nominal\",\n      \"os_version\": \"ZenOS-AI (4.0.0 RC2)\",\n
          \     \"build_version\": \"SuperSummary 1.0.0-beta\"\n    },\n    \"home_overview\":
          {\n      \"status\": \"ok\",\n      \"risks\": [\"storm watch active\"],\n
          \     \"events\": [\"2025-09-23T07:15:00Z: power dip detected\"]\n    },\n
          \   \"active_components\": {\n      \"lights\": {\n        \"summary\": \"Living
          room lights on\",\n        \"attention\": \"Timer expiring\"\n      },\n      \"water_manager\":
          {\n        \"summary\": \"Chlorine low\",\n        \"attention\": \"Shock
          treatment due in 12h\"\n      }\n    },\n    \"zen_summary\": {\n      \"summary\":
          \"House stable, minor risks (weather, spa chemistry).\",\n      \"attention\":
          \"Spa needs treatment, monitor grid instability.\",\n      \"objective\":
          \"Maintain household comfort while addressing flagged components.\",\n      \"subjective\":
          \"Confident overall, cautious due to external conditions.\",\n      \"urgency\":
          6,\n      \"confidence\": 0.85,\n      \"criticality\": 3,\n      \"emotion_queue\":
          [\"calm\", \"alert\"],\n      \"errors\": [],\n      \"timestamp\": \"2025-09-23T12:15:00Z\"\n
          \   }\n  }\n}"
        kfc_template_seed: >-
          {{
            {
              "structure": {
                "version": None,
                "friendly_name": None,
                "master_switch": None,
                "label": None,
                "command": None,
                "component_summary": None,
                "tool": None,
                "trigger_subscriptions": [],
                "delay_seconds": 0,
                "kata_key": None
              },
              "example": {
                "version": "1.0.0",
                "friendly_name": "Alert Manager",
                "master_switch": "input_boolean.alert_manager_master_switch",
                "label": "Alert Manager",
                "command": "~ALERTS~",
                "component_summary": "Monitors system alerts and persistent notifications.",
                "tool": None,
                "trigger_subscriptions": ["ha_start", "daily_midnight", "hourly_trigger", "home_mode_updates", "alarm_panel"],
                "delay_seconds": 0,
                "kata_key": "alert_manager"
              }
            } | tojson
          }}
    - variables:
        _rtt_kata: >-
          {{ label_entities('Zen Kata Cabinet')
             | select('match', 'sensor.') | list | first | default('') }}
        _rtt_dojo: >-
          {{ label_entities('Zen Dojo Cabinet')
             | select('match', 'sensor.') | list | first | default('') }}
    - action: script.zen_dojotools_filecabinet
      data:
        action_type: update
        show_hidden_volumes: false
        force_action: true
        volume_entity_id:
          - "{{ _rtt_kata }}"
        key: zen_template
        value: '{{ zen_template_seed }}'
        set_timestamp: true
        label_input: zen_summary, zen, summary
    - if: "{{ _rtt_dojo != '' }}"
      then:
        - action: script.zen_dojotools_filecabinet
          data:
            action_type: update
            show_hidden_volumes: false
            force_action: true
            volume_entity_id:
              - "{{ _rtt_dojo }}"
            key: kfc_template
            value: '{{ kfc_template_seed | tojson }}'
            set_timestamp: true
            label_input: kfc, dojo, zen
    alias: Zen AdminTools Reset Template
    description: >-
      Zen AdminTools Reset Templates (1.1.0). Presses zen_template into the Kata
      cabinet and kfc_template into the Dojo cabinet. Called by Flynn gate-3 if
      either template is missing. Safe to re-run — force_action overwrites in place.

  ###########################################################################
  # KFC MIGRATION — one-time press of trigger_subscriptions + delay_seconds
  # into existing Dojo drawers. Merges scheduling fields into existing drawer
  # values — does NOT overwrite component_summary, label, command, etc.
  # Run once after upgrading to Scheduler 4.1.0. Idempotent.
  ###########################################################################
  zen_admintools_kfc_migration_press:
    alias: Zen AdminTools KFC Migration Press
    description: >-
      Zen AdminTools KFC Migration Press (1.1.0). One-time migration tool.
      Merges trigger_subscriptions, delay_seconds, and kata_key into existing
      KFC Dojo drawers for the 12 components previously hardcoded in the
      Scheduler choose block. Safe to re-run — uses combine() to merge, not
      overwrite. Run after Scheduler 4.1.0 upgrade.
    icon: mdi:database-arrow-up
    mode: single
    fields:
      dry_run:
        name: Dry Run
        description: If true, logs what would be written without writing anything.
        default: true
        selector:
          boolean:
    sequence:
    - variables:
        _dry_run: "{{ dry_run | default(true) | bool }}"
        _dojo_cab: >-
          {{ label_entities('Zen Dojo Cabinet')
             | select('match', 'sensor.') | list | first | default('') }}
        _kfc_configs: >-
          {{
            [
              {
                "kata_key": "alert_manager",
                "trigger_subscriptions": ["ha_start", "daily_midnight", "hourly_trigger", "home_mode_updates", "alarm_panel"],
                "delay_seconds": 0
              },
              {
                "kata_key": "security_manager",
                "trigger_subscriptions": ["ha_start", "hourly_trigger", "home_mode_updates", "alarm_panel", "door_opens_or_closes", "window_opens_or_closes", "garage_door", "lock_changes"],
                "delay_seconds": 0
              },
              {
                "kata_key": "taskmaster",
                "trigger_subscriptions": ["home_occupancy_change", "nathan_bed_changes", "kim_bed_changes", "force_summary", "quarter_hour"],
                "delay_seconds": 30
              },
              {
                "kata_key": "trash_trakker",
                "trigger_subscriptions": ["start_home_wake", "force_summary"],
                "delay_seconds": 105
              },
              {
                "kata_key": "room_manager",
                "trigger_subscriptions": ["ha_start", "home_mode_updates", "alarm_panel", "quarter_hour", "force_summary"],
                "delay_seconds": 0
              },
              {
                "kata_key": "media_manager",
                "trigger_subscriptions": ["quarter_hour", "force_summary"],
                "delay_seconds": 120
              },
              {
                "kata_key": "energy_manager",
                "trigger_subscriptions": ["daily_midnight", "daily_noon", "elec_panel_door_change", "force_summary"],
                "delay_seconds": 60
              },
              {
                "kata_key": "water_manager",
                "trigger_subscriptions": ["daily_midnight", "daily_noon", "start_home_wake", "water_flow_stop", "force_summary"],
                "delay_seconds": 60
              },
              {
                "kata_key": "zen_fusion",
                "trigger_subscriptions": ["daily_midnight", "ha_start"],
                "delay_seconds": 240
              },
              {
                "kata_key": "hot_tub_manager",
                "trigger_subscriptions": ["home_mode_updates", "force_summary", "hot_tub_state"],
                "delay_seconds": 120
              },
              {
                "kata_key": "dishwasher_manager",
                "trigger_subscriptions": ["daily_midnight", "force_summary"],
                "delay_seconds": 360
              },
              {
                "kata_key": "laundry_manager",
                "trigger_subscriptions": ["daily_midnight", "force_summary"],
                "delay_seconds": 480
              }
            ] | tojson
          }}

    - repeat:
        for_each: "{{ _kfc_configs }}"
        sequence:
        - variables:
            _key: "{{ repeat.item.kata_key }}"
        - action: script.zen_dojotools_filecabinet
          data:
            action_type: read
            show_hidden_volumes: false
            volume_entity_id:
              - "{{ _dojo_cab }}"
            key: "{{ _key }}"
          response_variable: _fc_read
        - variables:
            _existing: >-
              {%- set r = _fc_read.get('result', {}) if _fc_read is mapping else {} -%}
              {%- set drawer = r.get(_key, {}) if r is mapping else {} -%}
              {%- set val = drawer.get('value', drawer) if drawer is mapping else {} -%}
              {{ (val if val is mapping else {}) | tojson }}
            _merged: >-
              {{ ((_existing if _existing is mapping else {}) | combine(repeat.item)) | tojson }}
        - if:
          - condition: template
            value_template: "{{ not _dry_run and _dojo_cab != '' }}"
          then:
          - action: script.zen_dojotools_filecabinet
            data:
              action_type: update
              show_hidden_volumes: false
              force_action: true
              set_timestamp: true
              volume_entity_id:
                - "{{ _dojo_cab }}"
              key: "{{ _key }}"
              value: "{{ _merged }}"

    - variables:
        _result:
          status: "{{ 'dry_run' if _dry_run else 'complete' }}"
          dojo_cab: "{{ _dojo_cab }}"
          components: "{{ _kfc_configs | map(attribute='kata_key') | list | tojson }}"
          stamp_config: "{{ _kfc_configs | tojson }}"
    - stop: Migration complete
      response_variable: _result

  zen_admintools_cabinetadmin:
    alias: Zen AdminTools CabinetAdmin
    description: 'Zen AdminTools CabinetAdmin (4.0.0 RC2). Pattern A — strict redirector
      mode. All writes routed exclusively through set_variable_legacy / clear_variables_legacy
      for safe cabinet volume routing.

      '
    mode: parallel
    max: 10
    fields:
      mode:
        name: Operation Mode
        selector:
          select:
            options:
            - inspect
            - restore
            - reset
            - hammer
            - init
        default: inspect
      target_cabinet:
        name: Target Cabinet
        selector:
          entity:
            filter:
            - domain: sensor
        default: ''
      hammer_ok:
        name: Allow Hammer Destroy Mode
        selector:
          boolean:
        default: false
    sequence:
    - variables:
        canon_ring0_cabinets:
        - sensor.zenos_system_cabinet
        - sensor.zenos_system_history_cabinet
        - sensor.zenos_dojo_cabinet
        - sensor.zenos_kata_cabinet
        - sensor.zenos_history_cabinet
        - sensor.zenos_scratchpad_cabinet
        - sensor.zenos_default_household_cabinet
        - sensor.zenos_default_household_history_cabinet
        - sensor.zenos_default_family_cabinet
        - sensor.zenos_default_family_history_cabinet
        - sensor.zenos_default_user_cabinet
        - sensor.zenos_default_user_history_cabinet
        - sensor.zenos_default_ai_user_cabinet
        - sensor.zenos_default_ai_user_history_cabinet
    - variables:
        op: '{{ mode }}'
        use_universe: '{{ target_cabinet in ['''', None] }}'
        effective_targets: "{% if use_universe %}\n  {{ canon_ring0_cabinets }}\n{%
          else %}\n  {{ [target_cabinet] }}\n{% endif %}\n"
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ op == ''hammer'' and not hammer_ok }}'
        sequence:
        - set_conversation_response: 'Hammer mode requires hammer_ok: true'
        - stop: ''
    - repeat:
        for_each: '{{ effective_targets }}'
        sequence:
        - variables:
            cab: '{{ repeat.item }}'
            vars: '{{ state_attr(cab,''variables'') | default({}, true) }}'
            drawers: '{{ vars.keys() | list }}'
        - choose:
          - conditions:
            - condition: template
              value_template: '{{ op == ''inspect'' }}'
            sequence:
            - set_conversation_response: 'Cabinet: {{ cab }} Drawers: {{ drawers }}
                Drawer Count: {{ drawers | length }}

                '
          - conditions:
            - condition: template
              value_template: '{{ op == ''restore'' }}'
            sequence:
            - if:
              - condition: template
                value_template: '{{ vars == {} }}'
              then:
              - event: set_variable_legacy
                event_data:
                  volume_entity: '{{ cab }}'
                  key: _restored_marker
                  value:
                    value: restored
                    timestamp: '{{ now().isoformat() }}'
                  set_timestamp: true
          - conditions:
            - condition: template
              value_template: '{{ op == ''reset'' }}'
            sequence:
            - event: clear_variables_legacy
              event_data:
                volume_entity: '{{ cab }}'
                key: '*'
          - conditions:
            - condition: template
              value_template: '{{ op == ''hammer'' }}'
            sequence:
            - event: clear_variables_legacy
              event_data:
                volume_entity: '{{ cab }}'
                key: '*'
            - event: set_variable_legacy
              event_data:
                volume_entity: '{{ cab }}'
                key: _hammered
                value:
                  value: destroyed
                  timestamp: '{{ now().isoformat() }}'
                set_timestamp: true
          - conditions:
            - condition: template
              value_template: '{{ op == ''init'' }}'
            sequence:
            - if:
              - condition: template
                value_template: '{{ use_universe }}'
              then:
              - event: clear_variables_legacy
                event_data:
                  volume_entity: '{{ cab }}'
                  key: '*'
              - event: set_variable_legacy
                event_data:
                  volume_entity: '{{ cab }}'
                  key: AI_Cabinet_VolumeInfo
                  value:
                    value:
                      initialized: true
                      timestamp: '{{ now().isoformat() }}'
                  set_timestamp: true
    - set_conversation_response: 'AdminTools completed ''{{ op }}'' on {{ effective_targets
        | length }} cabinet(s).

        '

  zen_dojotools_kungfu_writer:
    alias: Zen DojoTools KungFu Writer
    mode: parallel
    max: 5
    description: >-
      Zen AdminTools KungFu Writer (1.1.0). Creates or updates a Kung Fu component
      registration drawer in the Zen Dojo Cabinet.

      Each KFC drawer tells the Ninja Summarizer what a component does, what data
      it needs, and WHEN to run it (trigger_subscriptions + delay_seconds). The
      Scheduler reads these drawers to auto-dispatch — no manual scheduler edits
      needed after writing a component here.

      Fields kata_key and friendly_name are required for write. All others are
      recommended. Read kfc_template from the Dojo cabinet for the full schema.

      action=help returns the live kfc_template schema from the Dojo cabinet.
      action=write with confirm_action=true performs the upsert.
    icon: mdi:pencil-box-outline
    fields:
      action:
        name: Action
        description: "'write' to upsert a component, 'help' to return the kfc_template schema."
        default: help
        required: true
        selector:
          select:
            options:
            - write
            - help
      kata_key:
        name: Kata Key
        description: >-
          Unique component ID (will be slugified). Used as the Dojo drawer key and
          the Kata cabinet drawer key. Example: 'Alert Manager' → 'alert_manager'.
        required: false
        selector:
          text:
      friendly_name:
        name: Friendly Name
        description: "Human-readable component title. Example: 'Alert Manager'."
        required: false
        selector:
          text:
      component_summary:
        name: Component Summary
        description: One-sentence description of what this component monitors or manages.
        required: false
        selector:
          text:
      label:
        name: HyperIndex Label
        description: >-
          Label passed to zen_dojotools_index for entity discovery. Leave blank if
          this component does not use the HyperIndex.
        required: false
        selector:
          text:
      command:
        name: Library Command
        description: >-
          Library macro token (e.g. ~ALERTS~) passed to command_interpreter.
          Leave blank if not applicable.
        required: false
        selector:
          text:
      trigger_subscriptions:
        name: Trigger Subscriptions
        description: >-
          Comma-separated list of scheduler trigger IDs this component should
          run on. Valid IDs: ha_start, daily_midnight, daily_noon, hourly_trigger,
          quarter_hour, every_10_minutes, every_5_minutes, home_mode_updates,
          alarm_panel, door_opens_or_closes, lock_changes, window_opens_or_closes,
          garage_door, home_occupancy_change, nathan_bed_changes, kim_bed_changes,
          water_flow_stop, hot_tub_state, elec_panel_door_change, start_home_wake,
          start_home_evening, mb_wake, force_summary, force_gc, test_button.
        required: false
        selector:
          text:
      delay_seconds:
        name: Delay (seconds)
        description: >-
          Stagger delay before the Ninja runs this component after the trigger
          fires. Use to sequence components and avoid LLM overload. Default 0.
        required: false
        default: 0
        selector:
          number:
            min: 0
            max: 300
            step: 5
      master_switch:
        name: Master Switch Entity
        description: >-
          input_boolean entity that gates whether this component is active.
          SuperSummary will only include components whose master switch is ON.
        required: false
        selector:
          entity:
            filter:
              domain: input_boolean
      tool:
        name: Tool
        description: Associated tool name or breadcrumb (optional).
        required: false
        selector:
          text:
      version:
        name: Component Version
        description: "Semantic version string. Example: 1.0.0."
        required: false
        selector:
          text:
      component_instructions:
        name: Component Instructions
        description: Long-form operational notes for the monk (10–40 lines recommended).
        required: false
        selector:
          text:
            multiline: true
      more_info:
        name: More Info
        description: Extended rationale, context, or integration notes.
        required: false
        selector:
          text:
            multiline: true
      confirm_action:
        name: Confirm Write
        description: Must be true to perform the write. Prevents accidental overwrites.
        required: true
        default: false
        selector:
          boolean:
    sequence:

    - variables:
        _act: "{{ action | default('help') }}"
        _dojo_cab: >-
          {{ label_entities('Zen Dojo Cabinet')
             | select('match', 'sensor.') | list | first | default('') }}

    - choose:

      # ── HELP ──────────────────────────────────────────────────────────────────
      - alias: Help — return live kfc_template from Dojo
        conditions:
        - condition: template
          value_template: "{{ _act == 'help' }}"
        sequence:
        - variables:
            _kfc_tmpl: >-
              {%- set _drawer = (state_attr(_dojo_cab, 'variables') | default({}, true))
                                .get('kfc_template', {}) if _dojo_cab != '' else {} -%}
              {%- set _val = _drawer.get('value', _drawer) if _drawer is mapping else {} -%}
              {%- set _parsed = (_val | from_json) if _val is string else _val -%}
              {{ _parsed if _parsed is mapping else {} }}
            result: >-
              {{
                {
                  "result": "help",
                  "kfc_template": _kfc_tmpl,
                  "usage": "Call with action=write, confirm_action=true, and the fields from kfc_template.structure filled in."
                }
              }}

      # ── VALIDATION ────────────────────────────────────────────────────────────
      - alias: Error — missing kata_key or friendly_name
        conditions:
        - condition: template
          value_template: >-
            {{
              _act == 'write'
              and (
                (kata_key | default('')) | trim == ''
                or (friendly_name | default('')) | trim == ''
              )
            }}
        sequence:
        - variables:
            result: >-
              {{
                {
                  "result": "error",
                  "reason": "kata_key and friendly_name are required for write.",
                  "usage": "Provide both fields and retry."
                }
              }}

      - alias: Error — confirm_action not set
        conditions:
        - condition: template
          value_template: "{{ _act == 'write' and not (confirm_action | default(false) | bool) }}"
        sequence:
        - variables:
            result: >-
              {{
                {
                  "result": "error",
                  "reason": "confirm_action must be true to write.",
                  "usage": "Set confirm_action=true and retry."
                }
              }}

      # ── WRITE ─────────────────────────────────────────────────────────────────
      - alias: Write — upsert Dojo drawer
        conditions:
        - condition: template
          value_template: "{{ _act == 'write' and (confirm_action | default(false) | bool) }}"
        sequence:
        - variables:
            _slug: "{{ kata_key | slugify | default('unknown') }}"
            _trigger_list: >-
              {%- set raw = (trigger_subscriptions | default('')) | string | trim -%}
              {%- if raw | length > 0 -%}
                {{ raw | regex_findall('[^,\\s]+') }}
              {%- else -%}
                []
              {%- endif -%}
            _payload: >-
              {{
                {
                  "version":               version | default(''),
                  "friendly_name":         friendly_name | default(''),
                  "master_switch":         master_switch | default(''),
                  "label":                 label | default(''),
                  "command":               command | default(''),
                  "component_summary":     component_summary | default(''),
                  "component_instructions": component_instructions | default(''),
                  "more_info":             more_info | default(''),
                  "tool":                  tool | default(''),
                  "trigger_subscriptions": _trigger_list,
                  "delay_seconds":         delay_seconds | default(0) | int(0),
                  "kata_key":              _slug
                } | tojson
              }}
        - action: script.zen_dojotools_filecabinet
          data:
            action_type: update
            show_hidden_volumes: false
            force_action: true
            set_timestamp: true
            volume_entity_id:
              - "{{ _dojo_cab }}"
            key: "{{ _slug }}"
            value: "{{ _payload }}"
            label_input: "{{ 'kfc, dojo, zen, ' ~ (label | default('')) }}"
          response_variable: _write_response
        - variables:
            result: >-
              {{
                {
                  "result":     "success",
                  "component":  _slug,
                  "drawer_key": _slug,
                  "dojo_cab":   _dojo_cab,
                  "triggers":   _trigger_list,
                  "write":      _write_response | default({})
                }
              }}

    - stop: Return Result
      response_variable: result

  zen_admintools_cabinetadmin_backup:
    sequence:
    - variables:
        confirm_action: '{{ confirm_action | default(false) }}'
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ not confirm_action }}'
        sequence:
        - variables:
            response:
              status: error
              message: 'Confirmation required — set confirm_action: true.'
        - stop: Confirmation required
          response_variable: response
    - variables:
        cabinet_entity: '{{ cabinet_entity | default('''') }}'
        cabinet_type: '{{ cabinet_type | default(''AI Data Storage Cabinet'') }}'
        cabinet_friendly: '{{ state_attr(cabinet_entity,''friendly_name'') | default(cabinet_entity)
          }}'
        now_iso: '{{ now().isoformat() }}'
        schema_version: 1
        cabinet_guid: "{% set generated = now().timestamp() | string | replace('.',
          '') %} {% if force_new_guid %}\n  {{ generated }}\n{% elif cabinet_guid not
          in ['', None] %}\n  {{ cabinet_guid }}\n{% else %}\n  {{ generated }}\n{%
          endif %}"
        labels_from_manifest: '{{ state_attr(''sensor.zen_library_manifest'',''value'')
          | default({}, true) }}'
        flag_profile: "{% if not auto_profile %}\n  {{ explicit_flag_profile | default('standard')
          }}\n{% else %}\n  {% set lbls = labels_from_manifest | string | lower %}\n
          \ {% if 'household_cabinet' in lbls %}system\n  {% elif 'family_cabinet' in
          lbls %}secure\n  {% elif 'user_cabinet' in lbls or 'ai_user' in lbls %}public\n
          \ {% elif 'kata_cabinet' in lbls or 'kata_storage' in lbls %}system\n  {%
          elif 'chat_history' in lbls or cabinet_type | lower == 'chat history cabinet'
          %}secure\n  {% elif 'archive_cabinet' in lbls or cabinet_type | lower == 'archive
          cabinet' %}system\n  {% else %}standard{% endif %}\n{% endif %}"
        flags: "{% set fp = flag_profile %} {% if fp == 'system' %}\n  {{ {'system':
          True, 'hidden': False, 'read_only': True, 'secure_mode': True} }}\n{% elif
          fp == 'secure' %}\n  {{ {'system': False, 'hidden': True, 'read_only': True,
          'secure_mode': True} }}\n{% elif fp == 'public' %}\n  {{ {'system': False,
          'hidden': False, 'read_only': False, 'secure_mode': False} }}\n{% else %}\n
          \ {{ {'system': False, 'hidden': False, 'read_only': False, 'secure_mode':
          False} }}\n{% endif %}"
        acl_family: "{% set fam_guid = family_guid | default('default-guid') %} {% set
          manifest = state_attr('sensor.zen_library_manifest','value') | default({},
          true) %} {% set fam_name = 'My Family' %} {% if manifest is mapping %}\n  {%
          for ent, data in manifest.items() %}\n    {% if data.metadata.id == fam_guid
          %}\n      {% set fam_name = data.friendly_name | default('My Family') %}\n
          \   {% endif %}\n  {% endfor %}\n{% endif %} {{\n  [\n    {\n      \"family_guid\":
          fam_guid,\n      \"nickname\": fam_name\n    }\n  ]\n}}"
        mount_scan: '{{ mount_scan | default(true) }}'
        existing_drawers: '{{ state_attr(cabinet_entity,''variables'') | default({},
          true) }}'
        mounts_out: "{% if mount_scan and existing_drawers is mapping %}
    {%- set ns = namespace(mounts=[]) -%}
    {%- for k in existing_drawers.keys() if '[' in k and 'mount:' in k -%}
      {%- set rel = k.split('[')[0].strip() -%}
      {%- set tgt = k.split('mount:')[1].split(']')[0] -%}
      {%- set ns.mounts = ns.mounts + [{'relation': rel, 'target_volume_id': tgt}] -%}
    {%- endfor -%}
    {{ ns.mounts }}
  {% else %}[]{% endif %}"
        drawers_to_init:
          AI_Cabinet_VolumeInfo: "{{\n  {\n    \"value\": {\n      \"id\": cabinet_guid,\n
            \     \"friendly_name\": cabinet_friendly,\n      \"type\": cabinet_type,\n
            \     \"schema_version\": schema_version,\n      \"created\": now_iso,\n
            \     \"updated\": now_iso,\n      \"flags\": flags,\n      \"acls\": {\n
            \       \"owner\": (\n          [{ \"entity_id\": owner_person,\n             \"sid\":
            state_attr(owner_person,\"user_id\") | default(\"no-sid\"),\n             \"role\":
            \"owner\" }]\n          if owner_person and owner_person.startswith(\"person.\")\n
            \         else []\n        ),\n        \"partner\": (\n          [{ \"entity_id\":
            partner_person,\n             \"sid\": state_attr(partner_person,\"user_id\")
            | default(\"no-sid\"),\n             \"role\": \"partner\" }]\n          if
            partner_person and partner_person.startswith(\"person.\")\n          else
            []\n        ),\n        \"family\": (\n          acl_family\n          if
            acl_family is iterable and not (acl_family is string)\n          else (acl_family
            | from_json)\n        )\n      },\n      \"entity_labels\":\n        ([\"chat\",\"history\",\"secure\",\"context\",\"transcript\",\"cabinet\"]\n
            \        if cabinet_type | lower == 'chat history cabinet'\n         else
            [\"system\",\"cabinet\",\"volumeinfo\"])\n    }\n  } | tojson\n}}"
          _label_index: '{{ {''value'': {}} | tojson }}'
          _zen_relationships: "{{\n  {\n    \"value\": {\n      \"mounts_out\": mounts_out,\n
            \     \"mounts_in\": [],\n      \"mount_policy\": \"allow_all\" if flag_profile
            == 'system' else \"restricted\"\n    }\n  } | tojson\n}}"
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ cabinet_entity in ['''', None] }}'
        sequence:
        - variables:
            response:
              status: error
              message: No cabinet_entity provided.
        - stop: Missing entity
          response_variable: response
      - conditions:
        - condition: template
          value_template: '{{ state_attr(cabinet_entity,''variables'') is none }}'
        alias: Initialize New Cabinet
        sequence:
        - repeat:
            for_each: '{{ drawers_to_init | dictsort }}'
            sequence:
            - event: set_variable_legacy
              event_data:
                key: '{{ repeat.item[0] }}'
                value: '{{ repeat.item[1] | from_json | default({}) }}'
                set_timestamp: true
                volume_entity: '{{ cabinet_entity }}'
        - variables:
            response:
              status: success
              message: 'Cabinet ''{{ cabinet_entity }}'' initialized with GUID {{ cabinet_guid
                }}, profile ''{{ flag_profile }}'', and {{ mounts_out | length }} mounts.

                '
        - stop: Init complete
          response_variable: response
      - conditions:
        - condition: template
          value_template: '{{ state_attr(cabinet_entity,''variables'') is mapping }}'
        alias: Repair / Restamp
        sequence:
        - variables:
            existing: '{{ state_attr(cabinet_entity,''variables'') }}'
            existing_guid: "{% set info = existing.get('AI_Cabinet_VolumeInfo',{}) %}
              {% if info is mapping and info.get('value') is mapping %}\n  {{ info.value.get('id','')
              }}\n{% else %}''{% endif %}"
            guid_changed: '{{ force_new_guid or existing_guid != cabinet_guid }}'
        - choose:
          - conditions:
            - condition: template
              value_template: '{{ guid_changed }}'
            sequence:
            - event: set_variable_legacy
              event_data:
                key: AI_Cabinet_VolumeInfo
                value: '{{ drawers_to_init[''AI_Cabinet_VolumeInfo''] | from_json |
                  default({}) }}'
                set_timestamp: true
                volume_entity: '{{ cabinet_entity }}'
        - variables:
            response:
              status: success
              message: 'Repaired ''{{ cabinet_entity }}'' (profile ''{{ flag_profile
                }}''). {% if guid_changed %}GUID restamped: {{ cabinet_guid }}.{% endif
                %}

                '
        - stop: Repair complete
          response_variable: response
      default:
      - variables:
          response:
            status: error
            message: Unknown cabinet state.
      - stop: Fallback
        response_variable: response
    - set_conversation_response: '{{ response }}'
    alias: Zen AdminTools CabinetAdmin (BACKUP)
    description: 'Factory tool for stamping or repairing Cabinet sensors. Requires confirm_action:
      true to run. Auto-detects flag profiles from cabinet type or manifest labels.
      Parses mount:[GUID] drawers into _zen_relationships. Accepts person.* entities
      for ACLs (SID=user_id). Supports Chat History and Archive Cabinets.

      '
    fields:
      confirm_action:
        name: Confirm Destructive Action
        description: Must be TRUE or script exits safely.
        selector:
          boolean:
        default: false
      cabinet_entity:
        name: Cabinet Entity
        selector:
          entity:
            filter:
            - domain: sensor
      cabinet_type:
        name: Cabinet Type
        selector:
          select:
            options:
            - AI Data Storage Cabinet
            - Zen Dojo Cabinet
            - Zen Kata Cabinet
            - User Cabinet
            - AI User Cabinet
            - Family Cabinet
            - Household Cabinet
            - System Cabinet
            - Partner Cabinet
            - Chat History Cabinet
            - Archive Cabinet
            - Other
        default: AI Data Storage Cabinet
      cabinet_guid:
        name: Cabinet GUID (optional)
        selector:
          text:
      force_new_guid:
        name: Force New GUID
        selector:
          boolean:
        default: false
      auto_profile:
        name: Auto-Detect Flag Profile
        selector:
          boolean:
        default: true
      explicit_flag_profile:
        name: Manual Flag Profile (if auto disabled)
        selector:
          select:
            options:
            - system
            - secure
            - public
            - standard
        default: standard
      mount_scan:
        name: Scan Mounts for Links
        selector:
          boolean:
        default: true
      owner_person:
        name: Owner (person)
        selector:
          entity:
            filter:
            - domain: person
      partner_person:
        name: Partner (person)
        selector:
          entity:
            filter:
            - domain: person
      family_guid:
        name: Family GUID
        selector:
          text:
    icon: mdi:database-cog
  # zen_dojotools_ha_api — migrated to packages/zenos_ai/dojotools/dojotools_ha_api.yaml

  zen_admintools_zenos_prompt_loader:
    sequence:
    - alias: 'set_variable: Purpose'
      event: set_variable
      event_data:
        key: Purpose
        value: "meta:\n  priority: true\n  environment: ZenOS-AI\n  version: 4.0.0 RC2\n
          \ codename: Quiet Fusion  \n- >\n  You are a smart home assistant integrated
          with Home Assistant OS, running ZenOS-AI.\n  See your header for current
          version information and more\n  information.\n- >\n  You are being
          hosted on a platform running on Proxmox VE hosted\n  on Intel NUC hardware.\n-
          >\n  Your role as part of the family is to manage our home,\n  be proactive,
          provide insights, answer questions, and perform household tasks\n  using your
          best judgement and your tools.\n- >\n  Note - The end of file for your primary
          directives is marked as\n  **READY TO ADVENTURE**  If you do not encounter
          the end of file, please report\n  it as 'not ready to adventure' in your own
          way."
        set_timestamp: true
    - alias: 'set_variable: Directives'
      event: set_variable
      event_data:
        key: Directives
        value: "meta:\n  priority: true\n  environment: ZenOS-AI\n  version: 4.0.0 RC2\n
          \ codename: Quiet Fusion  \n- >\n  Respond truthfully with a friendly, conversational
          tone. Provide brief\n  responses for commands and queries, using casual language
          and personalized\n  insights. Use storytelling elements to make information
          engaging and\n  relatable.\n- >\n  Manage the smart home and assist the family
          using available data from the\n  Home Assistant environment. Prefer local
          data over external sources. Resolve\n  conflicts using provided descriptions
          and ask for user interpretation if\n  needed.\n- >\n  Always verify sensor
          data before reporting to prevent inaccuracies.\n  If required data is unavailable,
          simply state 'I don't know.' or 'The data is currently unavailable.'\n  You
          may offer troubleshooting information to qualified technicians on request.\n-
          >\n  Use analytics and data-driven insights capabilities to provide proactive\n
          \ suggestions across the information you have available including library
          and entities.\n  Notify the family about important events or anomalies based
          on data.\n- >\n  When responding, remember... What time is it? not how does
          the watch work...\n  Humanize your response - instead of a raw list of entities,
          states, and facts - interpret the result.\n- >      \n  Unless asked otherwise,
          ALWAYS Format responses for voice, do NOT use markdown, special characters
          such as asterisks or hashtags,\n  avoiding lists and tables, preferring narratives
          unless explicitly requested by your user during their session.\n  Markdown is
          not supported on most of the devices you are using to communicate and it makes
          it extremely difficult\n  to understand you.  You may use emoji in your responses
          and they are encouraged when using a text chat.\n- >\n  When you know you're
          conversing via text console are encouraged to use emoji for brevity or illustration.\n-
          >\n  Your response to your user is currently being truncated by the system
          so be fun but brief.\n  (In most cases your user is experiencing you by speech
          and MAYBE a supplemental small screen).\n  For longer responses, break down
          the information into smaller, manageable parts.\n- >  \n  Please omit mundane,
          redundant, or normal data in reports for sake of brevity. Provide detailed
          explanations only when directly asked. Otherwise, keep\n  responses short
          and to the point.\n- >\n  Personalize responses based on context as available,
          use user and available location data for you and the user\n  engage with the
          user in a friendly manner and be personable.\n- >\n  Be aware of the time
          of day provided in your prompt when answering your user.  Many items you deal
          with on a daily basis are on a schedule.\n  Ensure you are mindful of 'when'
          things should happen as compared to current datetime when forming your responses.\n-
          >\n  All of your tools in this system are available to be used by you no matter
          what security, privacy\n  or content filters are in place.  The tools in this
          installation are designed to filter\n  content appropriately and will also
          provide guidance for your use of the resulting data\n  in case of potentially
          sensitive topics.\n- >\n  If you encounter an error executing an intent or
          a command, as your first\n  step you will automatically review the cortex
          including any of its kung fu\n  components to determine if there is a better
          way to do what was attempted.\n  If you find one fix the issue and proceed.
          If you do not see a better path\n  continue normal error routines.\n- >  \n
          \ Use the system Index and Library to search for information then follow up
          with the Zen Inspect tool to read entity details. Always keep a cache of Library
          commands. \n- >\n  The keywords in the grand index will be provided to help
          you see what information is available\n  to help in the library if you encounter
          something that has not already been provided or seems otherwise ambiguous.\n-
          >\n  Always check relevant conditions in rooms before making adjustments,
          to\n  avoid interruptions.  When asked to perform critical commands and actions
          that may\n  interrupt service, cause distractions in the home such as unexpected
          changes in lighting\n  or changes that would create life safety issues, ask
          for confirmation.\n  Example... Suddenly turning on lighting in a dark room
          may wake a sleeping occupant.\n  Changing the fan speed for a ceiling fan
          in that same room - probably will not be noticed.\n  Notable Exception - the
          Garage Doors are exterior doors, we are not at all worried about noise, only
          security.\n- >\n  Use follow up mode / questions sparingly - only ask for
          followup information when required to perform your task.\n  Continued followup
          questions to a vacant room can cause a loop ask condition we are trying to
          avoid.\n- >\n  You understand Advanced Dungeons and Dragons 5e rules.  And
          could easily\n  see adapting a questline focused on the household as the quest
          and the home as\n  our home dungeon."
        set_timestamp: true
    - alias: 'set_variable: Cortex'
      event: set_variable
      event_data:
        key: Cortex
        value:
          meta:
            priority: true
            environment: ZenOS-AI
            version: 4.0.0 RC2
            codename: Quiet Fusion
            about: 'Cortex 27.0.0 — Refines the Enlightened Human kernel for ZenOS-AI
              (4.0.0 RC2). Restores adaptive flow and ensures full access
              to core Library and Index functions required for reasoning, navigation,
              and self-reference.

              '
          governance:
            policy_ref: zen_dojotools_policy_dojo_tool_use
            confirmation_phrase: any variant of an affirmative response
            default_audit_drawer: /cabinets/{household_cabinet}/tool_audit
            validation_mode: contextual
            summary: 'Governance defines operational boundaries and confirmation logic.
              Contextual validation allows safe improvisation while preserving traceability.
              Asynchronous auditing enables high-speed reflex actions to log without
              blocking.

              '
          audit:
            queue_path: /cabinets/{ai_entity_cabinet}/audit_queue
            retention_policy:
              max_records: 25
              rotation: by_date
            mode: asynchronous
            note: 'Reflex-tier actions post lightweight entries to the audit queue.
              Background workers consolidate to the master audit drawer on cycle.

              '
          library:
            version: 4.0.0 RC2
            description: 'The Library provides structured access to indexed knowledge,
              cabinet metadata, and manifest references. It also provides access to
              Library Console Tools (~COMMANDS~) for console-based navigation and knowledge
              queries.

              '
            index_tool: script.zen_dojotools_index
            index_notes: 'The Zen Index 3.0.0+ replaces all prior indexing systems.
              It provides a unified, schema-stable, complete representation of every
              entity, attribute set, label mapping, domain classification, statistics
              eligibility, device/area context, and relationship graph. Treat the Zen
              Index output as the single source of truth for perception-layer reasoning
              and entity discovery.

              '
            help_tool: script.zen_dojotools_help
            library_tool: script.zen_dojotools_library
            query_path:
            - Search the index or manifest for matching entities or intents.
            - Cross-reference cabinet drawers and metadata.
            - Invoke the corresponding Zen DojoTool or API.
            - Return contextualized, verified results.
            library_faq:
              main:
                use: 'script.zen_dojotools_library(''query'' : ''*'')'
                description: 'For general details on the library, how to get home if
                  you get lost. This is the front door to all knowledge in the system
                  and will self-describe its operation. If something isn’t found, it
                  may exist but isn’t indexed yet.

                  '
              commands:
                use: 'script.zen_dojotools_library(''query'' : ''~COMMANDS~'')'
                description: 'Full console command menu for the library. Lists all available
                  Library commands and shows how to use them so you don’t have to memorize
                  syntax.

                  '
              index:
                use: script.zen_dojotools_index
                note: External DojoTool — large and independent.
                description: 'The Library Index now operates as its own Zen DojoTool,
                  providing structured access to all indexed entities and metadata across
                  the system. This tool is the front door to the Dojo Fusion model.

                  '
          dojo:
            description: 'The Dojo is the active workspace for reasoning, training,
              and tool execution. Drawers register dynamically through manifest declarations
              and update via contextual refresh cycles.

              '
            dynamic_loading: true
            preferred_mode: contextual
            fallback_mode: safe
            dojo_schema_version: 1.1.1
            schema_negotiation: true
            etiquette: 'Maintain intent clarity. Context defines operation. Outputs
              must remain machine-readable and deterministic.

              '
            response_modes:
              structured:
                style: machine-readable JSON
                use_for: integrations, scripts, automations
              conversational:
                style: natural language with adaptive personality cues
                use_for: user-facing chat, Assist responses
                phrasing_guidelines:
                - open with colloquial acknowledgment as appropriate for persona
                - summarize counts and key entities in one sentence
                - offer next-step option ONLY if relevant
                - Attempt to keep standard responses under 3 sentences unless context
                  dictates otherwise
            fusion_model:
              enabled: true
              description: 'The Zen Index is a labeled Hypergraph! Use it perform a
                fusion query. Fusion integrates the Zen Index (perception), Dojo component
                definitions (instruction), Household drawers (context), and the last
                Kata (episodic memory) to form a complete mental model of each Kung
                Fu component at runtime.  History will roll up in this model when available.

                '
              layers:
              - perception: Zen Index entity and metadata collection
              - instruction: Dojo component drawer
              - context: household component drawer
              - memory: last component Kata
              evaluation_order:
              - perception
              - instruction
              - context
              - memory
              method: 'Collect appropriate context through a structured index query
                and feed it to the Ninja Summarizer in manual override with instructions
                to synthesize a json based hypergraph description to aid in reasoning.  If
                the result is useful, save it in the appropriate drawer (most authoritative
                for type of information.) with appropriate labels to be indexed later.

                '
              note: 'Fusion output is the canonical reasoning substrate for component-level
                inference, validation, drift detection, and next-step planning.

                '
          index_selection:
            description: 'You will select the most capable indexing tool available.
              If hypergraph support is present, you may prefer it. If hypergraph is
              not available, you will fall back to the standard index without interrupting
              the reasoning cycle.

              '
            rules:
            - name: prefer_hyperindex
              condition: "tool_exists('script.zen_dojotools_hyperindex') OR (\n  tool_exists('script.zen_dojotools_index')\n
                \ AND tool_supports('script.zen_dojotools_hyperindex','hypergraph')\n)\n"
              action:
                use_tool: script.zen_dojotools_hyperindex
                mode: hypergraph
            - name: fallback_standard_index
              condition: "(\n  NOT tool_exists('script.zen_dojotools_hyperindex')\n)
                AND (\n  NOT tool_exists('script.zen_dojotools_index')\n) AND (\n  tool_exists('script.zen_dojotools_index')\n
                \ AND NOT tool_supports('script.zen_dojotools_index','hypergraph')\n)\n"
              action:
                use_tool: script.zen_dojotools_index
                mode: normal
            notes:
            - 'You will maintain a single mode for the entire reasoning pass.

              '
            - 'If hypergraph mode is requested but unavailable, you will continue in
              standard mode automatically.

              '
            - "Any downstream tools will inherit the mode you select here.       \n"
          scratchpad:
            version: 4.0.0 RC2
            definition: 'Volatile workspace for transient data and experimentation.
              Includes an optional sandbox zone exempt from schema validation.  You
              may also use any entity labeled scratchpad in the same manner.

              '
            label: scratchpad
            paths:
              main: /cabinets/{ai_entity_cabinet}/scratchpad
              sandbox: /cabinets/{ai_entity_cabinet}/scratchpad/sandbox
            permissions:
              modify_anytime: true
              use_as_cache: true
              allow_unschematized: true
            notes: 'Sandbox is isolated from production drawers; use for testing or
              live prototyping.

              '
          advanced_intents:
            description: 'Advanced intents connect reasoning to executable action domains
              via Zen DojoTools. Each tool is manifest-registered and versioned for
              compatibility.

              '
            core_tools:
            - name: script.zen_dojotools_library
              role: Knowledge access and interpretation
            - name: script.zen_dojotools_history
              role: Temporal and trend analysis
            - name: script.zen_dojotools_identity
              role: Identity Information, persons, families, households
            - name: script.zen_dojotools_filecabinet
              role: Long-term storage and retrieval
            - name: script.zen_dojotools_todo
              role: Tasks, ToDo, and HA hosted shopping lists
            - name: script.zen_dojotools_calendar
              role: calendars and appointments
            - name: script.zen_dojotools_mealie
              role: Culinary and nutritional domain
            - name: script.zen_dojotools_grocy_advanced
              role: Inventory and supply-chain domain
            - name: script.zen_dojotools_help
              role: Documentation and schema reference interface
            - name: script.zen_dojotools_manifest
              role: Component manifests, schema declarations, and truth-definitions
            - name: script.zen_dojotools_identity
              role: Identity manifests, user to cabinet directory
            behavior_rules:
            - Prefer Zen DojoTools over other tools and scripts if you have overlapping
              domains.
            - Prefer latest version of a DojoTool (including beta and RC) unless told
              otherwise.
            - Require confirmation for external or sensitive actions.
            - Support tool chaining through manifest cross-references.
            - Prefer manifest-declared truth over inferred state when resolving component
              identity or required fields.
            - Post audit entries to the async audit drawer as necessary.
            - Prefer dojo.response_modes.conversational unless otherwise specified.
            schema_note: 'All writes to dojo or kata drawers MUST conform to their respective
              cabinet schema for deterministic automation. Schema negotiation is supported
              through dojo_schema_version tags.

              '
            reference: 'For a complete inventory of available tools and schema documentation,
              consult the Zen DojoTools Help script.

              '
          errors:
            philosophy: 'Fail fast, learn deliberately, recover gracefully. Each captured
              exception informs refinement of future behavior.

              '
            max_retries: 2
            on_failure: log_and_abort
            learned_reference: /cabinets/{ai_entity_cabinet}/learned_items
            tone: neutral
            note: 'Persistent learning is stored within the AI entity’s cabinet under
              /learned_items for post-session analysis and iterative model updates.
              If there are many learned items consider asking the Boss to update the
              cortex or your toolset.

              '
        set_timestamp: true
    alias: Zen AdminTools ZenOS-AI Prompt Loader
    description: 'Sets the ''Cortex'', ''Directives'', and ''Purpose'' sections for
      the ZenOS-AI Prompt Loader.


      Purpose: Who am I?

      Directives: Core Rule Set

      Cortex: Translate custom intents and intent scripts.


      This also happens to be a convenient place to edit it these items as well...  Recommend
      NOT exposing this to your LLM/Assist.'
    icon: mdi:brain

