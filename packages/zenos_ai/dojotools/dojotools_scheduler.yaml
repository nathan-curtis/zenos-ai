          data: {}
          response_variable: response_manifest
        alias: Run the Manifest
      - conditions:
        - condition: trigger
          id:
          - ha_start
          - daily_midnight
          - hourly_trigger
          - home_mode_updates
          - alarm_panel
        sequence:
        - action: script.zen_dojotools_filecabinet
          metadata: {}
          data:
            action_type: read
            show_hidden_volumes: false
            volume_entity_id:
            - sensor.zen_kata_storage_cabinet
            key: Alert Manager
          response_variable: response_last_kata_summary
        - variables:
            supplemental_prompt: "{{\n  {\n    \"source\": trigger | default ({}),\n
              \   \"home_overview\": home_overview | default({}),\n    \"last_kata_summary\":
              response_last_kata_summary | default({}),\n    \"notes\": \"Don't comment
              about the state of the component's master switch or script are required.
              \ Comment only on the items the component manages, not the component itself.
              Please ignore when you perform summarization.\"\n  }\n}}"
            kung_fu_component_id: Manifest
        - action: script.zen_dojotools_ninja_summarizer
