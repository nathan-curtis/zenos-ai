###############################################################################
# ZenOS-AI DojoTools: Scheduler
# Version: 4.1.0
#
# Automations:
#   Zen DojoTools Scheduler — time/event orchestrator for the Dojo system
#
# MIGRATED FROM: automations.yaml (2026-03-05)
# REFACTORED (4.1.0, 2026-03-10):
#   - Ninja Summarizer dispatch is now Dojo-driven (loop replaces 10 hardcoded
#     choose branches). Components register trigger_subscriptions + delay_seconds
#     in their Dojo drawer via zen_dojotools_kungfu_writer.
#   - Manifest, SuperSummary, FileCabinet GC remain as explicit choose branches.
#   - Custom triggers: add a zen_event trigger to the stem (5 lines), subscribe
#     from the KFC drawer — no choose branch needed.
#
# DEPENDS ON:
#   script.zen_dojotools_inspect      (dojotools_index.yaml)
#   script.zen_dojotools_ninja_summarizer (dojotools_summarizers.yaml)
#   Zen Dojo Cabinet                  (label: Zen Dojo Cabinet)
#   Zen Kata Cabinet                  (label: Zen Kata Cabinet)
###############################################################################

automation:

  - id: '1758324323797'
    alias: Zen DojoTools Scheduler
    description: >-
      Zen DojoTools Scheduler (4.1.0). Handles activation of time, custom event,
      and state event triggers for the ZenOS-AI system. Ninja Summarizer dispatch
      is Dojo-driven — add trigger_subscriptions to a KFC drawer to subscribe.
      Manifest, SuperSummary, and FileCabinet GC remain explicit branches.
    triggers:
    - trigger: time
      at: 00:00:00
      weekday:
      - sat
      - fri
      - thu
      - wed
      - tue
      - mon
      - sun
      id: daily_midnight
    - trigger: time_pattern
      minutes: /15
      id: quarter_hour
    - trigger: homeassistant
      event: start
      id: ha_start
    - trigger: time_pattern
      hours: /1
      id: hourly_trigger
    - trigger: state
      entity_id:
      - sensor.zen_home_mode
      not_from:
      - unavailable
      - unknown
      to:
      id: home_mode_updates
    - alias: When zone.home count changes
      trigger: state
      entity_id:
      - zone.home
      id: home_occupancy_change
      to:
      not_from:
      - unknown
      - unavailable
    - trigger: state
      entity_id:
      - alarm_control_panel.home_alarm
      to:
      not_from:
      - unknown
      - unavailable
      id: alarm_panel
    - trigger: persistent_notification
      update_type:
      - added
      - removed
      - updated
      notification_id: persistent_notification_updated
      id: persistent_notification
    - trigger: state
      entity_id:
      - group.all_doors
      not_to:
      - unknown
      - unavailable
      not_from:
      - unknown
      - unavailable
      id: door_opens_or_closes
    - trigger: state
      entity_id:
      - group.all_locks
      not_to:
      - unknown
      - unavailable
      not_from:
      - unknown
      - unavailable
      id: lock_changes
    - trigger: state
      entity_id:
      - input_select.master_bedroom_occupancy
      from: Asleep
      to:
      - Occupied
      - Engaged
      - Hold
      - Vacant
      id: mb_wake
    - trigger: state
      entity_id:
      - input_select.zen_home_mode
      to: Home-Wake
      id: start_home_wake
    - trigger: state
      entity_id:
      - input_select.zen_home_mode
      to: Home-Evening
      id: start_home_evening
    - trigger: time
      at: '12:00:00'
      weekday:
      - sat
      - fri
      - thu
      - wed
      - tue
      - mon
      - sun
      id: daily_noon
    - trigger: state
      entity_id:
      - group.all_windows
      not_to:
      - unknown
      - unavailable
      not_from:
      - unknown
      - unavailable
      id: window_opens_or_closes
    - trigger: state
      entity_id:
      - group.garage_doors
      not_to:
      - unknown
      - unavailable
      not_from:
      - unknown
      - unavailable
      id: garage_door
    - trigger: time_pattern
      minutes: /10
      id: every_10_minutes
      enabled: true
    - trigger: time_pattern
      minutes: /5
      id: every_5_minutes
      enabled: true
    - trigger: state
      entity_id:
      - input_button.test_ninja_summary
      to:
      not_from:
      - unavailable
      - unknown
      alias: Test Ninja Summary Button Pressed
      id: test_button
    - trigger: state
      entity_id:
      - binary_sensor.withings_nathan_in_bed
      to:
      not_from:
      - unknown
      - unavailable
      id: nathan_bed_changes
    - trigger: state
      entity_id:
      - binary_sensor.withings_kim_in_bed
      to:
      not_from:
      - unknown
      - unavailable
      id: kim_bed_changes
    - trigger: state
      entity_id:
      - sensor.droplet_f65c_flow_rate
      id: water_flow_stop
      to: '0'
      not_from:
      - unknown
      - unavailable
      for:
        hours: 0
        minutes: 2
        seconds: 0
    - trigger: state
      entity_id:
      - switch.hot_tub_main_power
      - switch.calderaspas_hot_tub_active
      - sensor.calderaspas_hot_tub_iq_ph
      - sensor.calderaspas_hot_tub_iq_chlorine
      - sensor.calderaspas_hot_tub_iq_orp
      for:
        hours: 0
        minutes: 0
        seconds: 5
      not_from:
      - unavailable
      - unknown
      id: hot_tub_state
      alias: When Hot Tub has a meaningful state change
    - trigger: state
      entity_id:
      - binary_sensor.span_main_panel_door_state
      - binary_sensor.span_sub_panel_door_state
      for:
        hours: 0
        minutes: 0
        seconds: 30
      id: elec_panel_door_change
      not_from:
      - unknown
      - unavailable
      not_to:
      - unknown
      - unavailable
    - trigger: event
      event_type: zen_event
      id: force_summary
      event_data:
        event:
          kind: summary_force
      alias: 'Zen Event: Force Summary (component)'
    - trigger: event
      event_type: zen_event
      id: force_gc
      event_data:
        event:
          kind: gc_force
      alias: 'Zen Event: Force FileCabinet GC'
    conditions:
    - condition: template
      value_template: '{%-set governor = (states(''input_number.ninja_governor'')) |
        int(0) %}

        {%-set triggered= state_attr(''automation.zen_dojotools_scheduler'',''last_triggered'')
        | as_datetime %}

        {%-set next = (triggered | as_datetime) + timedelta( minutes = governor ) %}

        {%-set allowed = now() | as_datetime > next | as_datetime %}

        {{ allowed }}'
      enabled: false
    actions:

    # ── Pre-fetch home overview ──────────────────────────────────────────────
    - action: script.zen_dojotools_inspect
      metadata: {}
      data:
        entity_id:
        - sensor.home_overview
        timeout: 30
      response_variable: home_overview

    # ── Extract zen_event component (for targeted force_summary) ────────────
    - variables:
        zen_event_component: >-
          {%- set ev   = trigger.get('event') if trigger is mapping else None -%}
          {%- set data = ev.get('data') if ev is mapping else None -%}
          {%- set comp = data.get('event', {}).get('component') if data is mapping else None -%}
          {{ comp | default('') }}

    # ── Explicit non-Ninja branches ──────────────────────────────────────────
    - choose:

      - conditions:
        - alias: Triggers for the Manifest
          condition: trigger
          id:
          - ha_start
          - daily_midnight
        sequence:
        - action: script.zen_dojotools_manifest
          metadata: {}
          data: {}
          response_variable: response_manifest
        alias: Run the Manifest

      - conditions:
        - condition: trigger
          id:
          - daily_midnight
          - daily_noon
          - ha_start
          - every_10_minutes
          - force_summary
        sequence:
        - variables:
            supplemental_prompt: >-
              {{
                {
                  "source": {"id": trigger.id | default(''), "platform": trigger.platform | default('')},
                  "home_overview": home_overview | default({}),
                  "notes": "Don't comment about the state of the component's master switch or script. Comment only on the items the component manages. Please ignore when you perform summarization."
                } | tojson
              }}
        - action: script.zen_dojotools_supersummary
          metadata: {}
          data:
            post_to_kata_cabinet: true
            supplemental_prompt: '{{ supplemental_prompt }}'
          response_variable: response_zen_summary
        alias: Zen Summary

      - conditions:
        - condition: trigger
          id:
          - daily_midnight
          - quarter_hour
          - force_gc
        sequence:
        - action: script.zen_dojotools_filecabinet_gc
          metadata: {}
          data:
            dry_run: false
          response_variable: response_filecabinet_gc
        alias: FileCabinet GC

    # ── Dojo-driven Ninja Summarizer dispatch ────────────────────────────────
    # Reads all KFC drawers from the Dojo cabinet. Filters to those whose
    # trigger_subscriptions include the current trigger.id. For force_summary
    # with a zen_event_component set, only that component runs.
    # delay_seconds is skipped for force_summary (urgent path).
    - variables:
        _dojo_cab: >-
          {{ label_entities('Zen Dojo Cabinet')
             | select('match', 'sensor.') | list | first | default('') }}
        _kata_cab: >-
          {{ label_entities('Zen Kata Cabinet')
             | select('match', 'sensor.') | list | first | default('') }}
        _force_component: "{{ zen_event_component | default('') | slugify }}"
        _protected: "['AI_Cabinet_VolumeInfo', 'kfc_template', 'zen_library_manifest', '_context']"
        _subscribers: >-
          {%- set dojo_vars = state_attr(_dojo_cab, 'variables') | default({}, true) -%}
          {%- set trig_id   = trigger.id | default('') -%}
          {%- set force_c   = zen_event_component | default('') | slugify -%}
          {%- set protected = ['AI_Cabinet_VolumeInfo', 'kfc_template', 'zen_library_manifest', '_context'] -%}
          {%- set ns = namespace(subs=[]) -%}
          {%- for key, drawer in dojo_vars.items() -%}
            {%- if not key.startswith('_') and key not in protected -%}
              {%- set val = drawer.get('value', drawer) if drawer is mapping else {} -%}
              {%- if val is mapping -%}
                {%- set sub_list  = val.get('trigger_subscriptions', []) -%}
                {%- set subscribed = trig_id in sub_list -%}
                {%- set targeted   = force_c == '' or force_c == key -%}
                {%- if subscribed and targeted -%}
                  {%- set ns.subs = ns.subs + [val | combine({'_drawer_key': key})] -%}
                {%- endif -%}
              {%- endif -%}
            {%- endif -%}
          {%- endfor -%}
          {{ ns.subs | sort(attribute='delay_seconds') }}

    - repeat:
        for_each: "{{ _subscribers }}"
        sequence:
        - if:
          - condition: template
            value_template: >-
              {{ trigger.id != 'force_summary'
                 and (repeat.item.delay_seconds | default(0) | int(0)) > 0 }}
          then:
          - delay:
              seconds: "{{ repeat.item.delay_seconds | default(0) | int(0) }}"
        - action: script.zen_dojotools_filecabinet
          metadata: {}
          data:
            action_type: read
            show_hidden_volumes: false
            volume_entity_id:
            - "{{ _kata_cab }}"
            key: "{{ repeat.item.kata_key | default(repeat.item._drawer_key) }}"
          response_variable: _iter_last_kata
        - variables:
            _iter_prompt: >-
              {{
                {
                  "source":            {"id": trigger.id | default(''), "platform": trigger.platform | default('')},
                  "home_overview":     home_overview | default({}),
                  "last_kata_summary": _iter_last_kata | default({})
                } | tojson
              }}
        - action: script.zen_dojotools_ninja_summarizer
          metadata: {}
          data:
            kung_fu_component_id: "{{ repeat.item.kata_key | default(repeat.item._drawer_key) }}"
            post_to_kata_cabinet: true
            supplemental_prompt: '{{ _iter_prompt }}'
          response_variable: _iter_ninja_response

    # ── Write scheduler heartbeat to Kata ───────────────────────────────────
    - variables:
        trigger_entity_id: >-
          {%- if 'from_state' in trigger and trigger.from_state -%}
            {{ trigger.from_state.entity_id }}
          {%- elif 'to_state' in trigger and trigger.to_state -%}
            {{ trigger.to_state.entity_id }}
          {%- elif 'entity_id' in trigger -%}
            {{ trigger.entity_id }}
          {%- else -%}
            ''
          {%- endif -%}
        this_trigger: >-
          {{
            {
              "id":        trigger.id | default('unknown'),
              "platform":  trigger.platform | default('manual'),
              "entity_id": trigger_entity_id
            }
          }}
        final_response: >-
          {{
            {
              "status":    "success",
              "trigger":   this_trigger | default({}),
              "dispatched": _subscribers | default([]) | map(attribute='kata_key') | list
            } | tojson
          }}
    - action: script.zen_dojotools_filecabinet
      metadata: {}
      data:
        action_type: update
        set_timestamp: true
        show_hidden_volumes: false
        force_action: true
        volume_entity_id:
        - "{{ _kata_cab }}"
        key: zen_scheduler
        value: '{{ final_response }}'
    mode: queued
    max: 5
