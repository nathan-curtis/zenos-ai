###############################################################################
# ZenOS-AI DojoTools: Scheduler
# Version: 4.0.0 RC2
#
# Automations:
#   Zen DojoTools Scheduler — time/event orchestrator for the Dojo system
#
# MIGRATED FROM: automations.yaml (2026-03-05)
#
# DEPENDS ON:
#   script.zen_dojotools_inspect  (dojotools_index.yaml)
###############################################################################

automation:

  - id: '1758324323797'
    alias: Zen DojoTools Scheduler
    description: Zen DojoTools Scheduler (4.0.0 RC2) Handles activation of
      time, custom event and state event triggers for the ZenOS-AI System Use system
      triggers as defined or build your own named trigger Then tag each summarizer block
      with the appropriate triggers for resummary.
    triggers:
    - trigger: time
      at: 00:00:00
      weekday:
      - sat
      - fri
      - thu
      - wed
      - tue
      - mon
      - sun
      id: daily_midnight
    - trigger: time_pattern
      minutes: /15
      id: quarter_hour
    - trigger: homeassistant
      event: start
      id: ha_start
    - trigger: time_pattern
      hours: /1
      id: hourly_trigger
    - trigger: state
      entity_id:
      - sensor.home_mode
      not_from:
      - unavailable
      - unknown
      to:
      id: home_mode_updates
    - alias: When zone.home count changes
      trigger: state
      entity_id:
      - zone.home
      id: home_occupancy_change
      to:
      not_from:
      - unknown
      - unavailable
    - trigger: state
      entity_id:
      - alarm_control_panel.home_alarm
      to:
      not_from:
      - unknown
      - unavailable
      id: alarm_panel
    - trigger: persistent_notification
      update_type:
      - added
      - removed
      - updated
      notification_id: persistent_notification_updated
      id: persistent_notification
    - trigger: state
      entity_id:
      - group.all_doors
      not_to:
      - unknown
      - unavailable
      not_from:
      - unknown
      - unavailable
      id: door_opens_or_closes
    - trigger: state
      entity_id:
      - group.all_locks
      not_to:
      - unknown
      - unavailable
      not_from:
      - unknown
      - unavailable
      id: lock_changes
    - trigger: state
      entity_id:
      - input_select.master_bedroom_occupancy
      from: Asleep
      to:
      - Occupied
      - Engaged
      - Hold
      - Vacant
      id: mb_wake
    - trigger: state
      entity_id:
      - input_select.home_mode
      to: Home-Wake
      id: start_home_wake
    - trigger: state
      entity_id:
      - input_select.home_mode
      to: Home-Evening
      id: start_home_evening
    - trigger: time
      at: '12:00:00'
      weekday:
      - sat
      - fri
      - thu
      - wed
      - tue
      - mon
      - sun
      id: daily_noon
    - trigger: state
      entity_id:
      - group.all_windows
      not_to:
      - unknown
      - unavailable
      not_from:
      - unknown
      - unavailable
      id: window_opens_or_closes
    - trigger: state
      entity_id:
      - group.garage_doors
      not_to:
      - unknown
      - unavailable
      not_from:
      - unknown
      - unavailable
      id: garage_door
    - trigger: time_pattern
      minutes: /10
      id: every_10_minutes
      enabled: true
    - trigger: time_pattern
      minutes: /5
      id: every_5_minutes
      enabled: true
    - trigger: state
      entity_id:
      - input_button.test_ninja_summary
      to:
      not_from:
      - unavailable
      - unknown
      alias: Test Ninja Summary Button Pressed
      id: test_button
    - trigger: state
      entity_id:
      - binary_sensor.withings_nathan_in_bed
      to:
      not_from:
      - unknown
      - unavailable
      id: nathan_bed_changes
    - trigger: state
      entity_id:
      - binary_sensor.withings_kim_in_bed
      to:
      not_from:
      - unknown
      - unavailable
      id: kim_bed_changes
    - trigger: state
      entity_id:
      - sensor.droplet_f65c_flow_rate
      id: water_flow_stop
      to: '0'
      not_from:
      - unknown
      - unavailable
      for:
        hours: 0
        minutes: 2
        seconds: 0
    - trigger: state
      entity_id:
      - switch.hot_tub_main_power
      - switch.calderaspas_hot_tub_active
      - sensor.calderaspas_hot_tub_iq_ph
      - sensor.calderaspas_hot_tub_iq_chlorine
      - sensor.calderaspas_hot_tub_iq_orp
      for:
        hours: 0
        minutes: 0
        seconds: 5
      not_from:
      - unavailable
      - unknown
      id: hot_tub_state
      alias: When Hot Tub has a meaningful state change
    - trigger: state
      entity_id:
      - binary_sensor.span_main_panel_door_state
      - binary_sensor.span_sub_panel_door_state
      for:
        hours: 0
        minutes: 0
        seconds: 30
      id: elec_panel_door_change
      not_from:
      - unknown
      - unavailable
      not_to:
      - unknown
      - unavailable
    - trigger: event
      event_type: zen_event
      id: force_summary
      event_data:
        event:
          kind: summary_force
      alias: 'Zen Event: Force Summary (component) '
    - trigger: event
      event_type: zen_event
      id: force_gc
      event_data:
        event:
          kind: gc_force
      alias: 'Zen Event: Force FileCabinet GC'
    conditions:
    - condition: template
      value_template: '{%-set governor = (states(''input_number.ninja_governor'')) |
        int(0) %}
  
        {%-set triggered= state_attr(''automation.zen_dojotools_scheduler'',''last_triggered'')
        | as_datetime %}
  
        {%-set next = (triggered | as_datetime) + timedelta( minutes = governor ) %}
  
        {%-set allowed = now() | as_datetime > next | as_datetime %}
  
        {{ allowed }}'
      enabled: false
    actions:
    - action: script.zen_dojotools_inspect
      metadata: {}
      data:
        entity_id:
        - sensor.home_overview
        timeout: 30
      response_variable: home_overview
    - variables:
        zen_event_component: '{% set ev = trigger.get(''event'') if trigger is mapping
          else None %} {% set data = ev.get(''data'') if ev is mapping else None %}
          {% set comp = data.get(''event'', {}).get(''component'') if data is mapping
          else None %} {{ comp | default('''') }}'
        kung_fu_component: '{{ zen_event_component | default('''') }}'
    - choose:
      - conditions:
        - alias: Triggers for the Manifest
          condition: trigger
          id:
          - ha_start
          - daily_midnight
        sequence:
        - action: script.zen_dojotools_manifest
