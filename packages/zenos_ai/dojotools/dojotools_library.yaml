script:
  zen_dojotools_library:
    alias: Zen DojoTools Library
    description: 'The Library 2.0 — Friday''s unified system utility runner. Accepts
      a tool name and structured JSON input_data payload. Handles core utility functions
      like hashing, randomness, and die rolls. This script is DojoTools-compliant and
      supports universal tool dispatching. (Library works, other functions incoming)

      '
    fields:
      tool:
        name: Tool
        description: The function or utility to invoke, use Library Command ~COMMANDS~
          syntax for query when using 'library' tool
        selector:
          select:
            options:
            - library
            - hash_md5
            - slugify
        required: true
        default: library
      query:
        name: Library Query / Input
        description: Text Input / Library Query 1.0 Command Syntax ~COMMANDS~
        selector:
          text:
            multiline: false
    sequence:
    - variables:
        tool_call: '{{ tool | lower }}'
        result: []
    - choose:
      - conditions:
        - alias: LIBRARY 2.0
          condition: template
          value_template: '{{ tool_call == ''library_2'' }}'
        sequence:
        - variables:
            result: '{%- import ''command_interpreter_2.jinja'' as command_interpreter
              %}

              {{ command_interpreter.interpreter( query ) }}

              '
        - stop: Return Variable {{ result }}
          response_variable: result
      - conditions:
        - alias: LIBRARY
          condition: template
          value_template: '{{ tool_call == ''library'' }}'
        sequence:
        - variables:
            result: "{%- import 'command_interpreter.jinja' as command_interpreter
              %} {{\n  {\n    \"query\": query,\n    \"output\": command_interpreter.interpreter(\
              \ query )\n  }\n}}\n"
        - stop: Return Variable {{ result }}
          response_variable: result
      - conditions:
        - condition: template
          value_template: '{{ tool_call == ''hash_md5'' }}'
          alias: HASH_MD5
        sequence:
        - variables:
            result: "{%- import 'command_interpreter.jinja' as command_interpreter
              %} {{\n  {\n    \"tool\": 'md5',\n    \"query\": query,\n    \"output\"\
              :  query | md5 | default('')\n  }\n}}\n"
        - stop: Return Variable {{ result }}
          response_variable: result
      - conditions:
        - condition: template
          value_template: '{{ tool_call == ''slugify'' }}'
          alias: SLUGIFY
        sequence:
        - variables:
            result: "{%- import 'command_interpreter.jinja' as command_interpreter
              %} {{\n  {\n    \"tool\": 'slugify',\n    \"query\": query,\n    \"output\"\
              :  query | slugify() | default('')\n  }\n}}\n"
        - stop: Return Variable {{ result }}
          response_variable: result
    - stop: Return Variable {{ result }}
      response_variable: result
    - set_conversation_response: '{{ result }}'
    mode: parallel
    icon: mdi:desktop-classic
