###############################################################################
# ZenOS-AI DojoTools: Index Cluster
# Version: 4.0.0 RC2
#
# Scripts:
#   zen_dojotools_query   — ZQ-1 entity filter/query engine
#   zen_dojotools_inspect — Entity expansion and drawer resolution
#   zen_dojotools_index   — Universal HyperGraph set-logic engine (with
#                           label_index drawer merge patch)
#
# Automations:
#   DojoTools Zen Index Event Handler — async index_command event loop
#
# MIGRATED FROM: scripts.yaml + automations.yaml (2026-03-05)
#
# REPLACES:
#   zen_dojotools_hyperindex (experimental branch, retired)
#   dojotools_zen_index / dojotools_zen_index_backup (pre-RC1 legacy)
#
# NOTE: zen_dojotools_inspect is also called by dojotools_scheduler.yaml
###############################################################################

script:

  zen_dojotools_query:
    alias: Zen DojoTools Query
    description: "Zen DojoTools Query “ZQ-1” (4.0.0 RC2)\nQuery is a deterministic entity
      selector. It takes a starting list of entity_ids (or an empty/null list) and runs
      them through a series of filters—domain, labels, areas, device_id, device_class,
      states, numeric ranges, regex, and semantic shortcuts. Each filter narrows the
      set; results are always a clean JSON array of entity_ids.\nCore behavior: - If
      you supply target_entities, Query filters ONLY that list. - If target_entities
      is empty/null AND the filter includes a domain,\n  Query auto-builds the starter
      set from states[domain].\n- If target_entities is empty/null AND no domain is
      provided, the\n  result will be an empty set.\n\nTherefore you must provide a
      target_entities list or include a domain in the filter and leave target_entities
      empty.\n"
    icon: mdi:filter-cog
    mode: single
    fields:
      mode:
        name: Mode
        description: help = JSON spec, query = run filter
        selector:
          select:
            options:
            - help
            - query
        default: help
      log_result:
        name: Log Result
        description: Write filter + baselist + result to logbook
        selector:
          boolean:
        default: false
      emit_event:
        name: Emit Zen Event
        description: Emit structured zen_event via DojoTools Event Emitter
        selector:
          boolean:
        default: false
      target_entities:
        name: Target Entities
        selector:
          entity:
            multiple: true
        description: Optional starter list of entities to be filtered. If omitted starts
          from all ents of domain in filter.
      filter_json:
        selector:
          text:
            multiline: true
        default: '{} '
        description: 'Optional filter_json json dict containing a valid ZenQuery filter
          dictionary - MUST see help for schema and use. Default {} '
    sequence:
    - alias: Show Help
      choose:
      - conditions:
        - condition: template
          value_template: '{{ mode == ''help'' }}'
        sequence:
        - variables:
            help_json: "{{\n  {\n    \"tool\": \"Zen DojoTools Query (ZQ-1)\",\n    \"version\":
              \"4.0.0 RC2\",\n    \"overview\":\n      \"ZQ-1 is a deterministic, multi-stage
              entity filtering engine designed for Home Assistant. It consumes flexible
              JSON filter definitions and produces a fully evaluated list of entity_ids.
              Every filter acts conjunctively (logical AND), meaning each stage narrows
              the working set. All logic is safe, non-throwing, and predictable.\",\n\n
              \   \"philosophy\":\n      \"The goal of ZQ-1 is to give Friday and the
              Monastery a *primitive* that behaves like a database WHERE clause: consistent,
              strict, explicit, and composable. ZQ-1 never guesses. It never expands
              implicitly except for the domain auto-build rule. Every transformation
              of the entity set is transparent, repeatable, and explainable.\",\n\n
              \   \"input_behavior\": {\n      \"accepted_inputs\":\n        \"• null\\n•
              a single entity_id string\\n• a list of entity_ids\\n• any iterables (converted
              to list)\\n• a JSON object describing filter parameters\",\n      \"normalization_rules\":\n
              \       \"• null → []\\n• string → [string]\\n• iterable → list(iterable)\\n•
              non-iterable scalar → []\",\n      \"initialization_pipeline\":\n        \"1.
              Normalize entity_list\\n2. If empty AND domain is provided → auto-expand
              from states[domain]\\n3. Begin sequential filtering through each configured
              step\"\n    },\n\n    \"fields\": {\n      \"domain\":\n        \"Restrict
              or auto-build the set. If entity_list is empty, ZQ-1 takes all entities
              from states[domain]. If entity_list is non-empty, ZQ-1 filters them to
              retain only those whose entity_id starts with domain+'.'\",\n\n      \"label\":\n
              \       \"Intersect the working set with label_entities(label). Input
              is slugified for safety. Label filtering is PURE intersection.\",\n\n
              \     \"area\":\n        \"Intersect the working set with all entity_ids
              located in the given area. ZQ-1 slugifies name, resolves area_id(), then
              calls area_entities().\",\n\n      \"device_id\":\n        \"Intersect
              the working set with all entities attached to the specified device. Slugify
              → resolve device_id() → device_entities().\",\n\n      \"device_class\":\n
              \       \"Keep entities whose 'device_class' attribute matches the provided
              string.\",\n\n      \"state_equals\":\n        \"Keep only entities whose
              state value exactly matches this string.\",\n\n      \"include_states\":\n
              \       \"Allow only entities whose state is in this list.\",\n\n      \"exclude_states\":\n
              \       \"Reject entities whose state is in this list.\",\n\n      \"numeric_above\":\n
              \       \"Keep only entities whose state cleanly converts to float() AND
              whose value is strictly > this threshold.\",\n\n      \"numeric_below\":\n
              \       \"Keep only entities whose numeric state is strictly < this threshold.\",\n\n
              \     \"regex\":\n        \"Apply Home Assistant’s `is regex()` test to
              the STATE STRING. Matching entities survive. Non-string or non-matching
              entities are dropped.\",\n\n      \"shortcuts\": {\n        \"numeric\":\n
              \         \"Quick include-only-numeric. Equivalent to: float(state) is
              valid.\",\n        \"stats\":\n          \"Keep only entities that publish
              'state_class'. Useful for energy, utility, trend, Riemann sensors.\",\n
              \       \"temp\":\n          \"Keep device_class=='temperature'.\",\n
              \       \"humidity\":\n          \"Keep device_class=='humidity'.\",\n
              \       \"power\":\n          \"Keep device_class=='power'.\",\n        \"energy\":\n
              \         \"Keep device_class=='energy'.\",\n        \"water\":\n          \"Keep
              device_class=='moisture'.\",\n        \"binary\":\n          \"Retain
              only entity_ids beginning with 'binary_sensor.'.\",\n        \"stats_eligible\":\n
              \         \"Keep only entities that are:\\n\"\n          \"  • numeric\\n\"\n
              \         \"  • have state_class\\n\"\n          \"  • have unit_of_measurement\\n\"\n
              \         \"  • are NOT disabled (disabled_by == none)\\n\"\n          \"This
              approximates HA’s long-term statistics eligibility.\"\n      },\n\n      \"sort\":
              {\n        \"by\": \n          \"Sort key — 'entity_id', 'state', or 'name'.\\n\"\n
              \         \"'name' refers to friendly_name.\",\n        \"order\":\n          \"'asc'
              or 'desc'. Defaults to ascending.\"\n      }\n    },\n\n    \"filter_execution_model\":\n
              \     \"Each block is executed in order. Each block rewrites pipe.ids.
              No block expands or adds new items except domain auto-build. Shortcuts
              are applied AFTER all explicit filters, meaning shortcuts enforce late-stage
              narrowing logic. If multiple shortcuts are enabled, all must match (logical
              AND).\",\n\n    \"error_handling\":\n      \"• Invalid float() conversion
              → skip\\n• Missing attributes → skip\\n• regex against non-string → skip\\n•
              Unknown area/device/label → silently drop all matches (intersection with
              empty)\\n• Everything is safe and deterministic\\nZQ-1 never throws template
              exceptions.\",\n\n    \"return_value\":\n      \"Always returns a JSON
              array (string) of final entity_ids.\",\n\n    \"examples\": {\n      \"find_all_lights_on\":\n
              \       \"{'domain':'light', 'state_equals':'on'}\",\n\n      \"living_room_motion_binary_sensors\":\n
              \       \"{'area':'living room', 'shortcuts':{'binary': true}}\",\n\n
              \     \"high_temperature\":\n        \"{'shortcuts':{'temp': true}, 'numeric_above':
              78}\",\n\n      \"washing_machine_power_spike\":\n        \"{'label':'laundry',
              'shortcuts':{'power': true}, 'numeric_above': 500}\",\n\n      \"all_stats_eligible_in_kitchen\":\n
              \       \"{'area':'kitchen', 'shortcuts':{'stats_eligible': true}}\",\n\n
              \     \"regex_match_for_heating_modes\":\n        \"{'domain':'climate',
              'regex':'heat|on|aux'}\"\n    },\n\n    \"usage_instructions\":\n      \"1.
              Create a JSON object describing desired filters.\\n\"\n      \"2. Call
              ZQ-1 with:\\n\"\n      \"     zen_filter(<filter_json>, <entity_list>)\\n\"\n
              \     \"3. Provide null for <entity_list> to auto-build from domain or
              start empty.\\n\"\n      \"4. Use shortcuts to reduce complexity — they
              are optimized primitives.\\n\"\n      \"5. After receiving output, treat
              it as an authoritative filtered list.\\n\"\n      \"6. ZQ-1 is stable
              and idempotent — running it twice with the same input produces the same
              output.\\n\"\n      \"7. ZQ-1 does not read historical state. All decisions
              are based on CURRENT states and attributes.\"\n  }\n  | tojson\n}}\n"
        - stop: Return help JSON
          response_variable: help_json
    - variables:
        _raw_filter: '{{ filter_json | default(''{}'') }}'
        parsed_filter: "{% if _raw_filter is mapping %}\n  {{ _raw_filter }}\n{% else
          %}\n  {% set text = _raw_filter | trim %}\n  {% if text | length == 0 %}\n
          \   {}\n  {% else %}\n    {{ text | from_json(default={}) }}\n  {% endif %}\n{%
          endif %}"
        filter_domain: '{{ parsed_filter.get(''domain'') }}'
    - variables:
        auto_base_list: "{% if (target_entities | count == 0) and filter_domain %}\n
          \ {{ states[filter_domain] | map(attribute='entity_id') | list }}\n{% else
          %}\n  {{ target_entities | list }}\n{% endif %}"
    - variables:
        result: '{% import ''zen_query.jinja'' as zen %} {{ zen.zen_filter(filter_json,
          auto_base_list) }}'
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ log_result }}'
        sequence:
        - data:
            name: ZQ-1 FILTER
            message: '{{ filter_json }}'
          action: logbook.log
        - data:
            name: ZQ-1 BASESET
            message: "{% if target_entities | count == 0 and filter_domain %}\n  Auto-built
              base list from domain '{{ filter_domain }}':\n  {{ auto_base_list }}\n{%
              else %}\n  Provided target entities:\n  {{ auto_base_list }}\n{% endif
              %}\n"
          action: logbook.log
        - data:
            name: ZQ-1 RESULT
            message: '{{ result }}'
          action: logbook.log
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ emit_event }}'
        sequence:
        - data:
            component: dojo_query
            severity: info
            kind: query
            summary: ZQ-1 filter applied
            metadata:
              filter: '{{ parsed_filter }}'
              baselist_count: '{{ auto_base_list | count }}'
              result_count: '{{ result | from_json | count }}'
              domain: '{{ filter_domain }}'
          action: script.zen_dojotools_event_emitter
    - variables:
        final:
          status: ok
          domain: '{{ filter_domain }}'
          baselist: '{{ auto_base_list }}'
          result: '{{ result }}'
    - stop: Return query result
      response_variable: final

  zen_dojotools_inspect:
    sequence:
    - variables:
        entity_list: "{% if entity_id is iterable and (entity_id is not string) %}\n
          \ {{ entity_id }}\n{% else %}\n  [{{ entity_id }}]\n{% endif %}"
        extended_mode: '{{ extended | default(false) }}'
        infer_mode: '{{ infer | default(false) }}'
        timeout_s: '{{ timeout | default(60) }}'
        results: []
    - repeat:
        for_each: '{{ entity_list }}'
        sequence:
        - variables:
            current_entity: '{{ repeat.item | string }}'
            state_obj: '{% set s = states[current_entity] %}
  
              {{ s if s is not none else none }}'
            has_state_obj: '{{ state_obj is not none }}'
            domain: "{% set dot = current_entity.find('.') %}\n{% if dot > 0 %}\n  {{
              current_entity[:dot] }}\n{% else %}\n  unknown\n{% endif %}"
            friendly_name: "{{ state_attr(current_entity, 'friendly_name')\n   | default(current_entity)
              }}"
            state_str: '{{ states(current_entity) if has_state_obj else ''unknown''
              }}'
            last_changed: "{% if has_state_obj %}\n  {{ as_timestamp(state_obj.last_changed,
              default=0)\n       | timestamp_local }}\n{% else %} {{ '' }} {% endif
              %}"
            last_updated: "{% if has_state_obj %}\n  {{ as_timestamp(state_obj.last_updated,
              default=0)\n       | timestamp_local }}\n{% else %} {{ '' }} {% endif
              %}"
            labels_raw: '{{ labels(current_entity) | default([]) }}'
            safe_labels: "{% if labels_raw is iterable and (labels_raw is not string)
              %}\n  {{ labels_raw | list }}\n{% else %} [] {% endif %}"
            attrs_raw: "{% set s = states[current_entity] %} {% if s is not none and
              s.attributes is mapping %}\n  {{ s.attributes }}\n{% else %}\n  {}\n{%
              endif %}"
            has_attrs: '{% set s = states[current_entity] %} {{ s is not none and s.attributes
              is mapping }}'
            attrs_is_stringified: '{{ attrs_raw is string }}'
            cabinet_header: "{% set raw = attrs_raw %}\n{% if raw is mapping %}\n  {%
              set vars = raw.get('variables') %}\n  {% if vars is mapping %}\n    {%
              set cab = vars.get('AI_Cabinet_VolumeInfo') %}\n    {% if cab is mapping
              and cab.get('value') is mapping %}\n      {{ cab.get('value') }}\n    {%
              else %} {} {% endif %}\n  {% else %} {} {% endif %}\n{% else %} {} {%
              endif %}"
            cabinet_signature: "{% if cabinet_header is mapping %}\n  {{ cabinet_header.get('validation','')
              | string }}\n{% else %}\n  ''\n{% endif %}"
            is_cabinet_sensor: "{{\n  domain == 'sensor'\n  and cabinet_header is mapping\n
              \ and cabinet_signature == 'ALLYOURBASEAREBELONGTOUS'\n}}"
            cabinet_guid: "{% if is_cabinet_sensor and cabinet_header.get('id') %}\n
              \ {{ cabinet_header.get('id') }}\n{% else %} '' {% endif %}"
            cabinet_uninitialized: '{{ is_cabinet_sensor and not cabinet_header.get(''id'')
              }}'
            volume_result: "{% if is_cabinet_sensor %}\n  {{ {\n    \"is_cabinet\":
              true,\n    \"id\": cabinet_header.get(\"id\"),\n    \"version\": cabinet_header.get(\"version\"),\n
              \   \"friendly_name\": cabinet_header.get(\"friendly_name\"),\n    \"name\":
              cabinet_header.get(\"name\"),\n    \"description\": cabinet_header.get(\"description\"),\n
              \   \"validation\": cabinet_signature,\n    \"flags\": (\n      cabinet_header.get(\"flags\")\n
              \     if cabinet_header.get(\"flags\") is mapping\n      else {}\n    ),\n
              \   \"uninitialized\": cabinet_uninitialized\n  } }}\n{% else %}\n  {{
              {\"is_cabinet\": false} }}\n{% endif %}"
            stat_class: "{{ state_attr(current_entity,'state_class')\n   | default('',
              true) | string }}"
            stat_uom: "{{ state_attr(current_entity,'unit_of_measurement')\n   | default('',
              true) | string }}"
            stats_eligible: "{{ stat_class in ['measurement','total','total_increasing']\n
              \  and stat_uom != '' }}"
            stats_reason: "{% if not has_state_obj %}\n  Entity not found.\n{% elif
              stats_eligible %}\n  Eligible based on state_class and unit_of_measurement.\n{%
              elif stat_class == '' and stat_uom == '' %}\n  Missing state_class and
              unit_of_measurement.\n{% elif stat_class == '' %}\n  Missing state_class.\n{%
              elif stat_uom == '' %}\n  Missing unit_of_measurement.\n{% else %}\n  Unsupported
              state_class for statistics.\n{% endif %}"
            statistics_result: "{{ {\n  \"eligible\": stats_eligible,\n  \"reason\":
              stats_reason\n} }}"
            extended_block: "{% if extended_mode %}\n  {% set dev_id = state_attr(current_entity,
              'device_id') %}\n  {% set dev = dev_id if dev_id is not none else none
              %}\n  {% set area = dev and device_attr(dev, 'area_id') or none %}\n  {%
              set identifiers = dev and device_attr(dev, 'identifiers') or none %}\n\n
              \ {{ {\n    \"device_id\": dev,\n    \"area_id\": area,\n    \"identifiers\":
              identifiers\n  } }}\n{% else %}\n  {}\n{% endif %}"
            safe_attributes: "{% if is_cabinet_sensor %}\n  {\n    \"notice\": \"Attributes
              suppressed for cabinet sensor. Use FileCabinet tools for full volume access.\"\n
              \ }\n{% else %}\n  {# --- ORIGINAL SANITIZER BLOCK (UNCHANGED) --- #}\n\n
              \ {% if attrs_is_stringified %}\n    {# --- FALLBACK MODE: Home Assistant
              stringified the dict --- #}\n    {% set s = states[current_entity] %}\n
              \   {% set ns = namespace(out={}) %}\n\n    {% if s is not none %}\n      {%
              for k in s.attributes.keys() %}\n        {% set v = state_attr(current_entity,
              k) %}\n        {% if v is string or v is number or v is boolean %}\n          {%
              set ns.out = ns.out | combine({k: v}, recursive=true) %}\n        {% elif
              v is mapping %}\n          {% set ns.out = ns.out | combine({k: v}, recursive=true)
              %}\n        {% elif v is sequence and (v is not string) %}\n          {%
              set ns.out = ns.out | combine({k: v}, recursive=true) %}\n        {% else
              %}\n          {% set ns.out = ns.out | combine({k: v|string}, recursive=true)
              %}\n        {% endif %}\n      {% endfor %}\n    {% endif %}\n\n    {{
              ns.out }}\n\n  {% else %}\n    {# --- NORMAL MODE --- #}\n    {% set raw
              = attrs_raw %}\n    {% set ns = namespace(out={}) %}\n\n    {% if raw
              is mapping %}\n      {% for k, v in raw.items() %}\n        {% if v is
              string or v is number or v is boolean %}\n          {% set ns.out = ns.out
              | combine({k: v}, recursive=true) %}\n        {% elif v is mapping %}\n
              \         {% set ns.out = ns.out | combine({k: v}, recursive=true) %}\n
              \       {% elif v is sequence and (v is not string) %}\n          {% set
              ns.out = ns.out | combine({k: v}, recursive=true) %}\n        {% else
              %}\n          {% set ns.out = ns.out | combine({k: v|string}, recursive=true)
              %}\n        {% endif %}\n      {% endfor %}\n    {% endif %}\n\n    {{
              ns.out }}\n  {% endif %}\n{% endif %}"
            entity_result: "{{ {\n  \"entity_id\": current_entity,\n  \"friendly_name\":
              friendly_name,\n  \"domain\": domain,\n  \"state\": state_str,\n  \"last_changed\":
              last_changed,\n  \"last_updated\": last_updated,\n  \"labels\": safe_labels,\n
              \ \"attributes\": safe_attributes,\n  \"volume\": volume_result,\n  \"statistics\":
              statistics_result,\n  \"extended\": extended_block,\n} }}"
            results: '{{ (results + [entity_result]) | list }}'
    - variables:
        inspect_result:
          results: '{{ results }}'
          inputs:
            entity_id: '{{ entity_list }}'
            extended: '{{ extended_mode }}'
            infer: '{{ infer_mode }}'
            timeout: '{{ timeout_s }}'
          error:
    - stop: Inspect complete
      response_variable: inspect_result
    alias: Zen DojoTOOLS Inspect
    mode: parallel
    description: Inspect (4.0.0 RC2). Deep dive on one or more entities. Attributes
      are key-scanned for safety. Cabinet sensors expose header metadata only; use cabinet
      tools for full volume access.
    fields:
      entity_id:
        required: true
        selector:
          entity:
            multiple: true
      extended:
        required: false
        default: false
        selector:
          boolean:
        description: Light device/integration forensics.
      infer:
        required: false
        selector:
          boolean:
        description: Reserved for future local inference.
      timeout:
        selector:
          number:
            min: 30
            max: 300
            step: 0.25
        name: Timeout
        default: 60
        required: false
    icon: mdi:magnify

  zen_dojotools_index:
    sequence:
    - alias: Show Help
      choose:
      - conditions:
        - condition: template
          value_template: '{{ mode == ''help'' }}'
        sequence:
        - action: script.zen_dojotools_query
          metadata: {}
          data:
            mode: help
            filter_json: '{} '
          response_variable: zen_query_help
        - variables:
            query_help: '{{ zen_query_help | default({}) | tojson }}'
            help_json: "{{\n  {\n    \"tool\": \"Zen DojoTools Index\",\n    \"version\":
              \"4.0.0 RC2\",\n    \"intent\": \"High-resolution reasoning. Convert
              arbitrary entity + label sets into a unified hypergraph suitable for fusion,
              summarization, planning, and contextual inference.\",\n    \"you_should_use_this_tool_when\":
              [\n      \"You need to combine labels, entities, or both into a logical
              result set.\",\n      \"You need a graph view (nodes/edges/adjacency)
              rather than a flat list.\",\n      \"You are preparing input for a summarizer,
              fusion model, or kata update.\",\n      \"You need deterministic state
              discovery that respects Home Assistant labels, drawers, areas, and metadata.\",\n
              \     \"You want to invert, intersect, union, or difference two sets safely.\",\n
              \     \"You need to pre-filter results via a ZenQuery filter_json block.\"\n
              \   ],\n    \"core_behavior\": {\n      \"pipeline_order\": \"Collect
              and Join >> ZQ1 Filter >> Hypergraph Generation >> Expansion with Inspect.\",\n
              \     \"join_logic\": \"Computes op1 (entities_1 or label_1) and op2 (entities_2
              or label_2), evaluates them with operator AND/OR/NOT/XOR/*.\",\n      \"zq1_filtering\":
              \"If filter_json is provided, results are passed through ZenQuery before
              expansion.\",\n      \"graph_mode\": \"If mode='hypergraph', the final
              result emits nodes, edges, and adjacency groups instead of or in addition
              to simple lists.\",\n      \"expansion\": \"If expand_entities=true, details
              are populated via Zen Inspect.\"\n    },\n    \"modes\": {\n      \"normal\":
              \"Outputs lists suitable for standard Dojo operations.\",\n      \"hypergraph\":
              \"Outputs {nodes, edges, expanded}. Use this for fusion, summarizers,
              drift detection, intent resolution, and reasoning.\"\n    },\n    \"inputs\":
              {\n      \"entities_1\": \"List of entity_ids.\",\n      \"label_1\":
              \"Single label or text token resolved by label_entities().\",\n      \"entities_2\":
              \"Second entity list.\",\n      \"label_2\": \"Second label or token.\",\n
              \     \"operator\": \"AND | OR | NOT | XOR | * (full label graph).\",\n
              \     \"expand_entities\": \"true/false — expands metadata, drawers, attributes.\",\n
              \     \"filter_json\": \"Optional dict following ZenQuery schema.\",\n
              \     \"mode\": \"normal | hypergraph\",\n      \"timeout\": \"Indexer
              callback timeout in seconds.\"\n    },\n    \"filter_json\": {\n      \"overview\":
              \"ZenQuery-style dict applied after primary set resolution. Ideal for
              trimming results before fusion.\",\n      \"query_help\": query_help,\n
              \     \"simple_examples\": {\n        \"domain\": {\"domain\": \"light\"},\n
              \       \"state\": {\"state\": \"on\"},\n        \"label\": {\"label\":
              \"kitchen\"}\n      },\n      \"compound_examples\": {\n        \"domain_and_label\":
              {\"domain\": \"sensor\", \"label\": \"environment\"},\n        \"state_exclusion\":
              {\"state_not\": [\"unknown\", \"unavailable\"]},\n        \"threshold\":
              {\"state_op\": \">\", \"state_value\": 50}\n      },\n      \"advanced_examples\":
              {\n        \"graph_edge_focus\": {\"edge_label\": \"hvac\"},\n        \"multi_filter\":
              {\"domain\": \"switch\", \"label\": \"office\", \"state\": \"on\"}\n      }\n
              \   },\n    \"hypergraph_output\": {\n      \"nodes\": \"The entity_ids
              that survived set logic and filtering.\",\n      \"edges\": \"All labels
              associated across all surviving entities.\",\n      \"adjacency\": \"Cross-product
              of entities and labels.\",\n      \"expanded\": \"Optional deep detail
              block (attributes, drawers, related labels).\"\n    },\n    \"full_output_structure\":
              {\n      \"result.simple\": \"Flat entity list.\",\n      \"result.expanded\":
              \"If requested, detailed entity metadata.\",\n      \"result.adjacent_labels\":
              \"Labels connected to the result set.\",\n      \"result.index\": \"Structured
              mapping of entity → labels.\",\n      \"result.drawers\": \"Drawer matches
              tied to entities.\",\n      \"result.drawer_adjacent_labels\": \"Labels
              found inside drawers.\",\n      \"result.hypergraph\": \"Graph object
              when mode='hypergraph'.\",\n      \"inputs\": \"Echo of inputs for audit
              & reasoning.\",\n      \"operator\": \"Operator used.\",\n      \"error\":
              \"Timeout or other error info.\"\n    },\n    \"usage_examples\": {\n
              \     \"Example 1 — All lights in the office\": {\n        \"label_1\":
              \"office\",\n        \"filter_json\": {\"domain\": \"light\"}\n      },\n
              \     \"Example 2 — HVAC related sensors, hypergraph mode\": {\n        \"label_1\":
              \"hvac\",\n        \"mode\": \"hypergraph\",\n        \"expand_entities\":
              true\n      },\n      \"Example 3 — Lights AND Switches in two rooms\":
              {\n        \"label_1\": \"kitchen\",\n        \"label_2\": \"living_room\",\n
              \       \"operator\": \"OR\",\n        \"filter_json\": {\"domain\": [\"light\",\"switch\"]}\n
              \     },\n      \"Example 4 — All entities with environmental data > 60\":
              {\n        \"label_1\": \"environment\",\n        \"filter_json\": {\"state_op\":
              \">\", \"state_value\": 60}\n      },\n      \"Example 5 — Build a root
              graph for Summarizer or Fusion\": {\n        \"label_1\": \"climate\",\n
              \       \"expand_entities\": true,\n        \"mode\": \"hypergraph\"\n
              \     }\n    },\n    \"best_practices\": [\n      \"Use (Hyper)Index before
              any fusion or summarization to avoid bloated context.\",\n      \"Prefer
              labels as the primary driver, entities only when needed.\",\n      \"Use
              expand_entities sparingly — hypergraph mode is already powerful.\",\n
              \     \"Use filter_json to reduce post-processing load.\",\n      \"Use
              operator '*' with no labels to get a system-wide label graph.\"\n    ],\n
              \   \"warnings\": [\n      \"Expanded entity blocks can get large; avoid
              unless required.\",\n      \"Hypergraph mode produces more data — summarizers
              should prune aggressively.\",\n      \"If filter_json is malformed, it
              defaults to an empty filter.\"\n    ],\n    \"ai_user_guidance\": [\n
              \     \"Use 'mode': 'help' at any time to retrieve the full JSON schema.\",\n
              \     \"Use (Hyper)Index as your first step when reasoning about groups
              of devices.\",\n      \"Use hypergraph mode to understand relationships,
              not just lists.\",\n      \"Use filter_json to stay efficient and avoid
              overwhelming context.\",\n      \"Before writing a kata or fusion output,
              get a fresh HyperIndex snapshot.\",\n      \"If a result is empty unexpectedly,
              re-run in normal mode to debug.\"\n    ]\n  }\n}}\n"
        - stop: Return help JSON
          response_variable: help_json
    - variables:
        operator: '{{ operator | default(''AND'') }}'
        _raw_filter: '{{ filter_json | default(''{}'') }}'
        parsed_filter: "{%- set txt = (_raw_filter | string | trim) -%}\n{%- if _raw_filter
          is mapping -%}\n  {{ _raw_filter }}\n{%- elif txt == '' -%}\n  {}\n{%- else
          -%}\n  {%- set parsed = txt | from_json -%}\n  {{ parsed if parsed is mapping
          else {} }}\n{%- endif -%}"
        has_filter: "{% if parsed_filter is mapping and parsed_filter | length > 0 %}\n
          \ true\n{% else %}\n  false\n{% endif %}"
    - variables:
        mode: '{{ mode | default(''normal'') }}'
        is_index_command: '{{ index_command is defined and index_command | length >
          0 }}'
        correlation_id: "{% if is_index_command %}\n  {{ now().isoformat() ~ '-' ~ (range(1000)
          | random) }}\n{% else %} '' {% endif %}"
        timeout_seconds: '{{ timeout | default(2) }}'
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ is_index_command }}'
        sequence:
        - event: zen_indexer_request
          event_data:
            index_command: '{{ index_command }}'
            correlation_id: '{{ correlation_id }}'
        - wait_for_trigger:
          - trigger: event
            event_type: zen_index_response
            event_data:
              correlation_id: '{{ correlation_id }}'
          timeout:
            seconds: '{{ timeout_seconds }}'
        - choose:
          - conditions:
            - condition: template
              value_template: '{{ wait.trigger is defined and wait.trigger is not none
                }}'
            sequence:
            - variables:
                simple: '{{ wait.trigger.event.data.response.result.simple | default([])
                  }}'
                index_timeout: false
          - conditions: []
            sequence:
            - variables:
                simple: []
                index_timeout: true
                timeout_error_msg: Indexer call timeout {{ timeout_seconds }}s
    - variables:
        index_command: ''
        op1: "{% set ents = simple if (simple is defined and simple) else [] %} {% if
          ents | length == 0 %}\n  {% set ents = entities_1 | default([]) %}\n  {% if
          ents | length == 0 and label_1 %}\n    {{ label_entities(label_1) }}\n  {%
          else %}\n    {{ ents }}\n  {% endif %}\n{% else %}\n  {{ ents }}\n{% endif
          %}"
        op2: "{% set ents = entities_2 | default([]) %} {% if ents | length == 0 and
          label_2 %}\n  {{ label_entities(label_2) }}\n{% else %}\n  {{ ents }}\n{%
          endif %}"
        op1_empty: '{{ op1 | length == 0 }}'
        op2_empty: '{{ op2 | length == 0 }}'
        setop: '{{ operator | default(''AND'') | upper }}'
    - variables:
        entities_base: "{% if not op1_empty and op2_empty %}\n  {{ op1 }}\n{% elif not
          op2_empty and op1_empty %}\n  {{ op2 }}\n{% elif not op1_empty and not op2_empty
          %}\n  {% if setop == 'AND' %}\n    {{ op1 | intersect(op2) }}\n  {% elif setop
          == 'OR' %}\n    {{ (op1 + op2) | unique | list }}\n  {% elif setop == 'NOT'
          %}\n    {{ op1 | difference(op2) }}\n  {% elif setop == 'XOR' %}\n    {{ op1
          | symmetric_difference(op2) }}\n  {% else %}\n    {{ (op1 + op2) | unique
          | list }}\n  {% endif %}\n{% else %}\n  []\n{% endif %}"
    - alias: 'Zen Query: Filter entities_base if filter passed'
      if:
      - condition: template
        value_template: '{{ has_filter }}'
        alias: 'Has Filter: filter_json exists and is mapping'
      then:
      - action: script.zen_dojotools_query
        metadata: {}
        data:
          mode: query
          filter_json: '{{ filter_json | default(''{}'') }}'
          target_entities: '{{ entities_base }}'
        response_variable: response_zen_query
      - variables:
          response_entities: '{{ response_zen_query.baselist | default([]) }}'
          fallback_entities_base: '{{ entities_base | default([]) }}'
          strict_mode: '{{ strict | default(false) }}'
          entities_base: "{% if strict_mode %}\n  {{ response_entities }}\n{% else %}\n
            \ {{ response_entities if response_entities else fallback_entities_base
            }}\n{% endif %}"
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ expand_entities }}'
          alias: Expand = true
        sequence:
        - action: script.zen_dojotools_inspect
          data:
            entity_id: '{{ entities_base | list }}'
          response_variable: response
        - variables:
            expanded_entities: '{{ response.results | default([]) }}'
            matched_drawers: '{{ response.drawers | default(''[]'') }}'
            matched_drawer_labels: '{{ response.adjacent_labels | default(''[]'') }}'
      - conditions: []
        sequence:
        - variables:
            expanded_entities: '{{ entities_base }}'
            matched_drawers: '[]'
            matched_drawer_labels: '[]'
        alias: Expand = false
      alias: 'Prepare [ Expand ] Result Set '
    - variables:
        _label_idx_drawers: "{%- set cab = label_entities('Zen Dojo Cabinet') | first
          | default('') -%}\n{%- set idx = (state_attr(cab, 'variables') or {}).get('_label_index',
          {}).get('value', {}) if cab else {} -%}\n{%- set idx = idx if idx is mapping
          else {} -%}\n{%- set ns = namespace(out=[]) -%}\n{%- for lbl in [label_1
          | default(''), label_2 | default('')] if lbl | length > 0 -%}\n  {%- set
          ns.out = ns.out + (idx.get(lbl, []) | list) -%}\n{%- endfor -%}\n{{ ns.out
          | unique | list }}"
        matched_drawers: "{%- set ex = matched_drawers if (matched_drawers is sequence
          and matched_drawers is not string) else [] -%}\n{{ (ex | list + _label_idx_drawers)
          | unique | list }}"
    - variables:
        adjacent_labels: "{%- set ns = namespace(labels=[]) -%} {%- for e in entities_base
          -%}\n  {%- set ns.labels = ns.labels + (labels(e) | list) -%}\n{%- endfor
          -%} {{ ns.labels | unique | list | sort }}"
        result_index: "{% if op1_empty and op2_empty %}\n  {{ labels() | list | sort
          }}\n{% else %}\n  {% set ns = namespace(idx=[]) %}\n  {% for e in entities_base
          %}\n    {% set ns.idx = ns.idx + [[ e, (labels(e) | list) ]] %}\n  {% endfor
          %}\n  {{ ns.idx }}\n{% endif %}"
    - variables:
        hypergraph: "{% if mode == 'hypergraph' %}\n  {\n    \"nodes\": {{ entities_base
          | tojson }},\n    \"edges\": {{ adjacent_labels | tojson }},\n    \"expanded\":
          {{ expanded_entities | tojson }}\n  }\n{% else %}\n  {}\n{% endif %}"
    - variables:
        label_entity_logic_result_raw: "{{\n  {\n    \"result\": {\n      \"simple\":
          entities_base | default([]) | list,\n      \"expanded\": expanded_entities
          | default({}),\n      \"adjacent_labels\": adjacent_labels | default([]) |
          list,\n      \"index\": result_index | default([]),\n      \"drawers\": matched_drawers
          | default([]) | list,\n      \"drawer_adjacent_labels\": matched_drawer_labels
          | default([]) | list,\n      \"hypergraph\": hypergraph | default({})\n    },\n
          \   \"inputs\": {\n      \"mode\": mode | default('normal'),\n      \"entities_1\":
          entities_1 | default([]) | list,\n      \"label_1\": label_1 | default(''),\n
          \     \"entities_2\": entities_2 | default([]) | list,\n      \"label_2\":
          label_2 | default(''),\n      \"strict\": strict | default(false),\n      \"expand_entities\":
          expand_entities | default(false)\n      \n    },\n    \"operator\": \"*\"
          if (op1_empty and op2_empty) else setop,\n    \"error\": timeout_error_msg
          | default(None)\n  }\n  | tojson\n}}"
        label_entity_logic_result: '{{ label_entity_logic_result_raw | from_json | default({})
          }}'
    - stop: Zen DojoTools Index Complete
      response_variable: label_entity_logic_result
    alias: Zen DojoTools Index
    description: 'Zen DojoTools (Hyper)Index (4.0.0 RC2). Universal HyperGraph Index
      for entity and label reasoning.
  
      Merges labels, entities, drawers, and metadata into a unified, deterministic result
      set. It accepts two input sets (entities or labels), applies logical operators
      (AND/OR/NOT/XOR/*), and resolves the final list using the Zen label graph. Optional
      filtering via filter_json prunes results before expansion.
  
      When expand_entities=true, the tool uses Zen Inspect to fetch attributes, drawers,
      and related labels. Hypergraph mode outputs a structured graph (nodes, edges,
      adjacency, expanded) ideal for fusion, summarizers, drift checks, and reasoning
      tasks.
  
      All outputs return as a stable JSON dictionary containing simple lists, expanded
      details, label adjacency, index mappings, drawer results, and any errors. Designed
      for fast, predictable chaining across Friday’s perception and reasoning pipelines.
  
      Strongly recommended: run this tool with mode: help to view the full, structured
      specification and complete filter_json (ZQ-1) schema.
  
      '
    fields:
      mode:
        selector:
          select:
            options:
            - normal
            - hypergraph
            - help
        default: normal
        description: Index mode. Required, normal (default) - lightweight traditional
          index, hypergraph adds nodes, edges and adjacency, help - usage details incl
          zq1 syntax.
      index_command:
        name: Zen Index Command
        description: Structured query string for parser. Overrides all other fields.
          Prefer discrete fields to the index command. Currently does not pass through
          filter input - use filter_json.
        required: false
        selector:
          text:
      entities_1:
        name: Entities 1
        description: one of Entities 1 or Label 1 must be passed.
        required: false
        selector:
          entity:
            multiple: true
      label_1:
        description: one of Label 1 or Entities 1 must be passed.
        name: Label 1
        required: false
        selector:
          text:
      entities_2:
        name: Entities 2
        required: false
        selector:
          entity:
            multiple: true
      label_2:
        name: Label 2
        required: false
        selector:
          text:
      operator:
        name: Set Operator
        description: Boolean set operator - Default AND if not provided.
        required: false
        default: AND
        selector:
          select:
            options:
            - AND
            - OR
            - NOT
            - XOR
      timeout:
        name: Timeout
        required: false
        default: 2
        selector:
          number:
            min: 0
            max: 5
            step: 0.25
      filter_json:
        selector:
          text:
            multiline: true
        default: '{} '
        description: Optional filter_json json dict containing a valid ZenQuery filter
          dictionary - MUST see zen_query help for ZQ1 schema and use. Default {}
      strict:
        selector:
          boolean:
        description: ‘If true, ZQ1’s output is taken as authoritative even when empty.
          No fallback to the original entity set. Use this for reasoning tasks where
          an empty set is semantically meaningful.

          ‘
        required: false
        default: false
      expand_entities:
        name: Expand Results
        required: false
        default: false
        selector:
          boolean:
    mode: parallel
    max: 10
    icon: mdi:graphql


automation:

  - id: '1749771199185'
    alias: DojoTools Zen Index Event Handler
    description: 'Event Listener (4.0.0 RC2) to recurse index calls.  REQUIRES DojoTOOLS
      Zen Index (2.0.0 or greater)
  
      '
    triggers:
    - event_type: zen_indexer_request
      trigger: event
    actions:
    - variables:
        max_depth: 3
        index_command: '{{ trigger.event.data.index_command | default(''{}'', true)
          }}'
        correlation_id: '{{ trigger.event.data.correlation_id }}'
        depth: '{{ trigger.event.data.depth if ''depth'' in trigger.event.data else
          1 }}'
        is_mapping: "{% set cmd = index_command | trim %}\n{% if cmd.startswith('{')
          %}\n  {{ (cmd | from_json) is mapping }}\n{% else %}\n  false\n{% endif %}"
        parsed_cmd: "{% set reserved = ['AND','OR','XOR','NOT'] %} {% set true_tokens
          = ['true','t','y','yes','on','1'] %} {% set false_tokens = ['false','f','n','no','off','0']
          %} {% set raw = index_command | string | trim %} {% set is_json = raw.lstrip().startswith('{')
          %}\n{%- if is_json %}\n  {{ raw }}\n{%- elif raw == \"\" or raw == \"*\" %}\n
          \ { \"label_1\": \"*\", \"operator\": \"AND\", \"expand_entities\": false
          }\n{%- else %}\n  {% set tokens = raw.split() %}\n  {% set exp = false %}\n
          \ {% if tokens[-1] | lower in true_tokens %}\n    {% set exp = true %}\n    {%
          set tokens = tokens[:-1] %}\n  {% elif tokens[-1] | lower in false_tokens
          %}\n    {% set tokens = tokens[:-1] %}\n  {% endif %}\n\n  {% set op_index
          = namespace(idx = none) %}\n  {% for i in range(tokens | length) %}\n    {%
          if tokens[i] | upper in reserved %}\n      {% set op_index.idx = i %}\n      {%
          break %}\n    {% endif %}\n  {% endfor %}\n\n  {% if op_index.idx is not none
          %}\n    {% set label_1 = tokens[:op_index.idx] | join(\" \") | trim(\"'\\\"\")
          %}\n    {% set op = tokens[op_index.idx] | upper %}\n    {% set label_2 =
          tokens[op_index.idx+1:] | join(\" \") | trim(\"'\\\"\") %}\n  {% else %}\n
          \   {% set label_1 = tokens | join(\" \") | trim(\"'\\\"\") %}\n    {% set
          op = \"AND\" %}\n    {% set label_2 = \"\" %}\n  {% endif %}\n\n  {\n    \"label_1\":
          \"{{ label_1 }}\",\n    \"label_2\": \"{{ label_2 }}\",\n    \"operator\":
          \"{{ op }}\",\n    \"expand_entities\": {{ exp }}\n  }\n{%- endif %}\n"
        needs_recursion: "{{\n  parsed_cmd.index_1 is defined or\n  parsed_cmd.index_2
          is defined\n}}"
        child_commands: "{% set out = [] %}\n{% if parsed_cmd.index_1 is defined %}\n
          \ {% set out = out + [ parsed_cmd.index_1 ] %}\n{% endif %}\n{% if parsed_cmd.index_2
          is defined %}\n  {% set out = out + [ parsed_cmd.index_2 ] %}\n{% endif %}\n{{
          out }}"
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ needs_recursion and depth < max_depth }}'
        sequence:
        - variables:
            resolved_children: []
        - repeat:
            for_each: '{{ child_commands }}'
            sequence:
            - event: zen_indexer_request
              event_data:
                index_command: '{{ repeat.item | tojson }}'
                depth: '{{ depth + 1 }}'
                correlation_id: '{{ correlation_id ~ ''_c'' ~ repeat.index }}'
            - wait_for_trigger:
              - trigger: event
                event_type: zen_index_response
                event_data:
                  correlation_id: '{{ correlation_id ~ ''_c'' ~ repeat.index }}'
              timeout: 3
            - variables:
                resolved_children: '{{ resolved_children + [ wait.trigger.event.data.response
                  ] }}
  
                  '
        - variables:
            parsed_cmd: "{{\n  parsed_cmd\n  | combine({\n      \"index_1\": resolved_children[0].result.simple\n
              \       if parsed_cmd.index_1 is defined else none\n    })\n  | combine({\n
              \     \"index_2\": resolved_children[1].result.simple\n        if parsed_cmd.index_2
              is defined else none\n    })\n}}"
    - alias: Dispatch Zen Index Command
      data:
        entities_1: '{{ entities_1 }}'
        label_1: '{{ parsed_cmd.label_1 }}'
        entities_2: '{{ entities_2 }}'
        label_2: '{{ parsed_cmd.label_2 }}'
        operator: '{{ parsed_cmd.operator }}'
        expand_entities: '{{ parsed_cmd.expand_entities }}'
      response_variable: zen_index_response
      action: script.zen_dojotools_index
    - alias: Return Result
      event: zen_index_response
      event_data:
        correlation_id: '{{ correlation_id }}'
        response: '{{ zen_index_response }}'
    mode: queued
