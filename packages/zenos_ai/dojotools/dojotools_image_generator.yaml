###############################################################################
# ZenOS-AI: Image Generator
# Version: 1.3.0
#
# Components:
#   zen_dojotools_generate_image  — DojoTool: DALL-E via ai_task.generate_image
#   image.zen_image_canvas        — Persistent slot: main display
#   image.zen_image_portrait      — Persistent slot: AI portrait
#   image.zen_image_wallpaper     — Persistent slot: wallpaper/background
#   image.zen_image_id_pic        — Persistent slot: identity/selfie
#   image.zen_image_dashboard_snap — Persistent slot: dashboard snapshot
#   image.zen_image_home_state    — Persistent slot: home state visualization
#
# Slot architecture:
#   - input_text.zen_image_slot_<name> stores media_source_id (survives restart)
#   - State-based image entities read from input_text — always current, stable
#   - Script writes to the named slot after generation
#   - zen_event fired for any real-time listeners
###############################################################################

input_text:
  zenos_image_task:
    name: ZenOS Image Task Entity
    max: 255
    icon: mdi:image-auto-adjust

  zen_image_slot_canvas:
    name: "ZenOS Image Slot: Canvas"
    max: 255
    icon: mdi:image-frame

  zen_image_slot_portrait:
    name: "ZenOS Image Slot: Portrait"
    max: 255
    icon: mdi:face-recognition

  zen_image_slot_wallpaper:
    name: "ZenOS Image Slot: Wallpaper"
    max: 255
    icon: mdi:wallpaper

  zen_image_slot_id_pic:
    name: "ZenOS Image Slot: ID Pic"
    max: 255
    icon: mdi:account-box

  zen_image_slot_dashboard_snap:
    name: "ZenOS Image Slot: Dashboard Snap"
    max: 255
    icon: mdi:view-dashboard

  zen_image_slot_home_state:
    name: "ZenOS Image Slot: Home State"
    max: 255
    icon: mdi:home-heart

script:
  zen_dojotools_generate_image:
    alias: Zen DojoTools Generate Image
    mode: parallel
    description: >-
      Generate an image using ai_task.generate_image and write it to a named
      display slot. Slots: canvas (default), portrait, wallpaper, id_pic,
      dashboard_snap, home_state. Each slot maps to a persistent image entity
      (image.zen_image_<slot>) that survives restarts. If no slot is given,
      image goes to canvas. Result always includes slot so caller knows where
      it landed. Fires zen_event (kind: image_generated). (v1.3.0)
    fields:
      image_prompt:
        name: Image Prompt
        description: >-
          Descriptive prompt for image generation. Be specific about subject,
          style, lighting, and composition.
        required: true
        selector:
          text:
            multiline: true
      slot:
        name: Display Slot
        description: "Named display slot to write the image to. Default: canvas"
        required: false
        selector:
          select:
            options:
              - canvas
              - portrait
              - wallpaper
              - id_pic
              - dashboard_snap
              - home_state
            custom_value: false
      entity_id:
        name: AI Task Entity
        description: >-
          Optional. Specific ai_task entity to use. Defaults to
          input_text.zenos_image_task, then HA preferred entity.
        required: false
        selector:
          entity:
            domain: ai_task

    sequence:
      - variables:
          _prompt: "{{ image_prompt | trim }}"
          _slot: "{{ slot | default('canvas') | trim }}"
          _stored: >-
            {% set s = states('input_text.zenos_image_task') %}
            {{ s if s not in ['unknown', 'unavailable', 'none', ''] else '' }}
          _entity: >-
            {% set e = entity_id | default('') | trim %}
            {{ e if e not in ['unknown', 'unavailable', 'none', ''] else _stored }}

      # Only branch differs on entity_id — _response accessible after block
      - choose:
          - conditions: "{{ _entity != '' }}"
            sequence:
              - action: ai_task.generate_image
                data:
                  task_name: "{{ _slot }}"
                  instructions: "{{ _prompt }}"
                  entity_id: "{{ _entity }}"
                response_variable: _response
        default:
          - action: ai_task.generate_image
            data:
              task_name: "{{ _slot }}"
              instructions: "{{ _prompt }}"
            response_variable: _response

      # Write media_source_id to the named slot (persists across restarts)
      - action: input_text.set_value
        target:
          entity_id: "input_text.zen_image_slot_{{ _slot }}"
        data:
          value: "{{ _response.media_source_id | default('') }}"

      # Fire zen_event for any real-time listeners
      - event: zen_event
        event_data:
          event:
            kind: image_generated
            slot: "{{ _slot }}"
            url: "{{ _response.url | default('') }}"
            media_source_id: "{{ _response.media_source_id | default('') }}"
            revised_prompt: "{{ _response.revised_prompt | default('') }}"
            model: "{{ _response.model | default('') }}"
            width: "{{ _response.width | default(0) }}"
            height: "{{ _response.height | default(0) }}"
            prompt: "{{ _prompt }}"
            timestamp: "{{ now().isoformat() }}"

      - variables:
          final_response:
            status: "{{ 'success' if _response.media_source_id | default('') != '' else 'error' }}"
            message: >-
              {{ 'Image written to slot: ' ~ _slot ~ '.'
                 if _response.media_source_id | default('') != ''
                 else 'No media_source_id returned.' }}
            result:
              slot: "{{ _slot }}"
              url: "{{ _response.url | default('') }}"
              media_source_id: "{{ _response.media_source_id | default('') }}"
              revised_prompt: "{{ _response.revised_prompt | default('') }}"
              model: "{{ _response.model | default('') }}"
              width: "{{ _response.width | default(0) }}"
              height: "{{ _response.height | default(0) }}"
              prompt: "{{ _prompt }}"

      - stop: Image generation complete
        response_variable: final_response

template:
  # State-based image entities — read from input_text slots, persist across restarts
  - image:
      - name: "Zen Image Canvas"
        unique_id: zen_image_canvas
        url: >-
          {% set ms = states('input_text.zen_image_slot_canvas') %}
          {{ "http://localhost:8123/ms," ~ (ms | urlencode()) if ms not in ['', 'unknown', 'unavailable'] else '' }}

      - name: "Zen Image Portrait"
        unique_id: zen_image_portrait
        url: >-
          {% set ms = states('input_text.zen_image_slot_portrait') %}
          {{ "http://localhost:8123/ms," ~ (ms | urlencode()) if ms not in ['', 'unknown', 'unavailable'] else '' }}

      - name: "Zen Image Wallpaper"
        unique_id: zen_image_wallpaper
        url: >-
          {% set ms = states('input_text.zen_image_slot_wallpaper') %}
          {{ "http://localhost:8123/ms," ~ (ms | urlencode()) if ms not in ['', 'unknown', 'unavailable'] else '' }}

      - name: "Zen Image ID Pic"
        unique_id: zen_image_id_pic
        url: >-
          {% set ms = states('input_text.zen_image_slot_id_pic') %}
          {{ "http://localhost:8123/ms," ~ (ms | urlencode()) if ms not in ['', 'unknown', 'unavailable'] else '' }}

      - name: "Zen Image Dashboard Snap"
        unique_id: zen_image_dashboard_snap
        url: >-
          {% set ms = states('input_text.zen_image_slot_dashboard_snap') %}
          {{ "http://localhost:8123/ms," ~ (ms | urlencode()) if ms not in ['', 'unknown', 'unavailable'] else '' }}

      - name: "Zen Image Home State"
        unique_id: zen_image_home_state
        url: >-
          {% set ms = states('input_text.zen_image_slot_home_state') %}
          {{ "http://localhost:8123/ms," ~ (ms | urlencode()) if ms not in ['', 'unknown', 'unavailable'] else '' }}
