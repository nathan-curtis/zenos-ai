script:
  zen_dojotools_spa_manager:
    alias: Zen DojoTools Spa Manager
    description: 'Use for authoritative hot tub information and maintenance instructions.  Accepts
      raw chemistry inputs from spa test strip (8-in-1 subset), evaluates values for
      a 360-gallon saltwater spa, and returns JSON containing each chemical, the input
      value, the target range, and a recommendation. Use with no inputs to return basic
      spa info, current chemical readings if available,  instructions, settings, controls,
      logs, and target ranges.  Go here first for ''what''s the spa / hot tub'' general
      status as a system. (v.2.1.0)

      '
    fields:
      salt_ppm:
        name: Salt (ppm)
        selector:
          number:
            min: 0
            max: 5000
            unit_of_measurement: ppm
            mode: box
        default:
      free_chlorine_ppm:
        name: Free Chlorine (ppm)
        selector:
          number:
            min: 0
            max: 10
            unit_of_measurement: ppm
            mode: box
        default:
      ph:
        name: pH Level
        selector:
          number:
            min: 6
            max: 9
            step: 0.1
            mode: box
        default:
      alkalinity_ppm:
        name: Alkalinity (ppm)
        selector:
          number:
            min: 0
            max: 300
            unit_of_measurement: ppm
            mode: box
        default:
      hardness_ppm:
        name: Calcium Hardness (ppm)
        selector:
          number:
            min: 0
            max: 500
            unit_of_measurement: ppm
            mode: box
        default:
    sequence:
    - variables:
        salt_ppm: '{{ salt_ppm | default(none) }}'
        free_chlorine_ppm: '{{ free_chlorine_ppm | default(none) }}'
        ph: '{{ ph | default(none) }}'
        alkalinity_ppm: '{{ alkalinity_ppm | default(none) }}'
        hardness_ppm: '{{ ph | default(none) }}'
        hot_tub_ents: '{{ label_entities(''hot_tub'') }}'
        spa_records: "{%- set filter_ents = states\n  | selectattr('entity_id','match','^(calendar|todo)\\\\.')\n
          \ | map(attribute='entity_id') | list -%}\n{%- set targets = intersect(hot_tub_ents,filter_ents)
          -%}\n{{ targets | tojson }}"
        spa_esp_interface: "{%- set temp_ents= label_entities('temperature')-%}\n{%-
          set hot_tub_ents = label_entities('hot_tub') -%}\n{%- set hot_tub_current_temp_sensor
          =  intersect(hot_tub_ents,temp_ents) | list | first -%}\n{%- if has_value(hot_tub_current_temp_sensor)-%}\n
          \ {{\n    {\n    \"hot_tub_entities\": device_entities(device_id(hot_tub_current_temp_sensor))
          | default([]),\n    \"config_entry_id\": config_entry_id(hot_tub_current_temp_sensor)
          | default(''),\n    \"domain\": config_entry_attr(config_entry_id(hot_tub_current_temp_sensor),
          'domain') | default(''),\n    \"title\": config_entry_attr(config_entry_id(hot_tub_current_temp_sensor),
          'title') | default(''),\n    \"state\": config_entry_attr(config_entry_id(hot_tub_current_temp_sensor),
          'state') | string | default(''),\n    \"source\": config_entry_attr(config_entry_id(hot_tub_current_temp_sensor),
          'source') | default(''),\n    \"disabled_by\": config_entry_attr(config_entry_id(hot_tub_current_temp_sensor),
          'disabled_by')| default('')\n    } | tojson\n  }}\n{%- else -%}\n  {{\n    {\n
          \   \"hot_tub_entities\": device_entities(device_id(hot_tub_current_temp_sensor))
          | default([]),\n    \"config_entry_id\": config_entry_id(hot_tub_current_temp_sensor)
          | default(''),\n    \"domain\": config_entry_attr(config_entry_id(hot_tub_current_temp_sensor),
          'domain') | default(''),\n    \"title\": config_entry_attr(config_entry_id(hot_tub_current_temp_sensor),
          'title') | default(''),\n    \"state\": config_entry_attr(config_entry_id(hot_tub_current_temp_sensor),
          'state') | string | default(''),\n    \"source\": config_entry_attr(config_entry_id(hot_tub_current_temp_sensor),
          'source') | default(''),\n    \"disabled_by\": config_entry_attr(config_entry_id(hot_tub_current_temp_sensor),
          'disabled_by')| default('')\n    } | tojson\n  }}\n{%- endif -%}"
        spa_info: "{{\n  {\n    \"labels\": [ \"Hot Tub\", \"Hot Tub Chemicals\", \"Hot
          Tub Manager\" ],\n    \"spa_records\": spa_records,\n    \"spa_esp_interface\":
          spa_esp_interface,\n    \"manufacturer\": \"Watkins\",\n    \"brand\": \"Caldera
          Spas\",\n    \"model\": \"Utopia\",\n    \"trim\": \"Florence\",\n    \"seats\":
          6,\n    \"target_temp\": 102,\n    \"temp_units\": \"F\",\n    \"water_volume\":
          360,\n    \"water_units\": \"Gal\",\n    \"dry_weight\": 872,\n    \"filled_weight\":
          4925,\n    \"pump_levels\": 2,\n    \"jet_count\": 46,\n    \"jets\": [\n
          \     { \"type\": \"Euro\", \"count\": 32, \"description\": \"Small directional
          jets for focused pressure; general back/leg targeting.\" },\n      { \"type\":
          \"VersaSsage\", \"count\": 4, \"description\": \"Broad, adjustable coverage
          for upper/mid back.\" },\n      { \"type\": \"AdaptaSsage\", \"count\": 4,
          \"description\": \"Rotating streams for rhythmic, pulsating massage (great
          for lumbar).\" },\n      { \"type\": \"Euro-Pulse\", \"count\": 2, \"description\":
          \"Pulsating directional jets; kneading effect for smaller muscle groups.\"
          },\n      { \"type\": \"OrbiSsage\", \"count\": 2, \"description\": \"Spinning,
          orbiting stream; wider soothing coverage (mid/upper back).\" },\n      { \"type\":
          \"Euphoria\", \"count\": 2, \"description\": \"Large, deep-tissue footwell
          jets shared across seats.\" },\n      { \"type\": \"Atlas Neck Massage System\",
          \"count\": 1, \"description\": \"Neck/shoulder pillow with dedicated jets
          for cervical/trap relief.\" }\n    ],\n    \"seat_map\": {\n      \"assumptions\":
          {\n        \"origin\": \"Digital console baseline; moving clockwise; filter
          corner is SE and labeled Seat 1.\",\n        \"note\": \"Caldera does not
          publish a seat-by-seat jet diagram for Florence; mapping below is inferred
          from typical Utopia layouts and jet mix. Validate on-site.\"\n      },\n      \"inferred\":
          true,\n      \"seats\": [\n        { \"seat_id\": 1, \"position_clockface\":
          \"NE corner (by filter)\", \"role\": \"Cool-down / Entry\", \"specialty\":
          \"Lower-intensity spot with minimal back jets; good for temperature transition.\",
          \"jets_populated\": [ { \"type\": \"Euro\", \"estimated_count\": 2 } ], \"notes\":
          \"Closest to filter bay and steps; fewer jets for a gentler seat. Beware the
          Waterfall\" },\n        { \"seat_id\": 2, \"position_clockface\": \"SE corner\",
          \"role\": \"Neck & shoulder therapy (primary)\", \"specialty\": \"Cervical/trap
          relief via pillow jets + focused upper-back support.\", \"jets_populated\":
          [ { \"type\": \"Atlas Neck Massage System\", \"estimated_count\": 1 }, { \"type\":
          \"Euro-Pulse\", \"estimated_count\": 1 }, { \"type\": \"Euro\", \"estimated_count\":
          3 } ], \"notes\": \"This is the signature Atlas seat; adjust pillow height
          for precise neck alignment.\" },\n        { \"seat_id\": 3, \"position_clockface\":
          \"SW Corner\", \"role\": \"Lumbar rhythm (deep relax)\", \"specialty\": \"Rotational
          lumbar massage with rhythmic pulses; full-back blend.\", \"jets_populated\":
          [ { \"type\": \"AdaptaSsage\", \"estimated_count\": 2 }, { \"type\": \"Euro\",
          \"estimated_count\": 4 } ], \"notes\": \"Ideal for lower-back decompression
          after long standing or lifting days.\" },\n        { \"seat_id\": 4, \"position_clockface\":
          \"West/SW side\", \"role\": \"Lower-back + hips\", \"specialty\": \"Rotational
          lumbar and hip line; targeted precision on flanks.\", \"jets_populated\":
          [ { \"type\": \"AdaptaSsage\", \"estimated_count\": 2 }, { \"type\": \"Euro\",
          \"estimated_count\": 4 } ], \"notes\": \"Pairs well with footwell jets for
          a legs+hips combo session.\" },\n        { \"seat_id\": 5, \"position_clockface\":
          \"NW corner\", \"role\": \"Wide-coverage massage\", \"specialty\": \"Swirling,
          orbiting streams across mid/upper back with supplemental precision jets.\",
          \"jets_populated\": [ { \"type\": \"OrbiSsage\", \"estimated_count\": 1 },
          { \"type\": \"VersaSsage\", \"estimated_count\": 1 }, { \"type\": \"Euro\",
          \"estimated_count\": 3 } ], \"notes\": \"Good all-rounder; easy to modulate
          from soothing to assertive.\" }\n      ],\n      \"shared\": [\n        {
          \"zone\": \"Footwell\", \"specialty\": \"Deep-tissue foot and leg revival;
          blast quads/calves by bracing feet.\", \"jets_populated\": [ { \"type\": \"Euphoria\",
          \"estimated_count\": 2 } ], \"notes\": \"Angle soles or calves at the plume;
          multiple seats can ‘claim’ an Euphoria.\" }\n      ]\n    },\n    \"chemistry\":
          \"saltwater\",\n    \"salt_generator\": \"FreshWater IQ 2020 / FreshWater
          Salt System\",\n    \"type\": \"Cartridge\",\n    \"cartridge_lifetime\":
          \"4 months\",\n    \"heater\": \"EnergyPro Titanium 4,000W\",\n    \"electrical\":
          \"230V / (20A, 30A) GFCI\",\n    \"esphome_connected\": has_value(\"sensor.calderaspas_hot_tub_current_temperature\")
          | default(false),\n    \"spa_data\": spa_esp_interface | default({}),\n    \"measurement_mode\":
          \"auto\",\n    \"measurement_cadence\": \"daily\",\n    \"calibration_cadence\":
          \"monthly\",\n    \"more_info\": \"Consult 'hot_tub_manager' drawer in the
          Dojo for detailed instructions.\"\n  }\n}}"
        salt_result: "{{\n  {\n    \"chemical\": \"salt\",\n    \"product\": \"Freshwater
          Spa Salt\",\n    \"provided\": salt_ppm,\n    \"measured\": states(\"sensor.calderaspas_hot_tub_iq_salt\")
          | default(\"\"),\n    \"target_min\": 1500,\n    \"target_max\": 2250,\n    \"recommendation\":
          (\n      \"Provide measurement to check salt levels.\"\n      if salt_ppm
          is none else\n      \"Add approximately \" ~ ((2250 - salt_ppm) / 250) | round(1)
          ~ \" cup(s) of spa salt to the filter. Run the jets on high for 5 minutes,
          then retest. Sneak up on it.\"\n      if salt_ppm < 2250 else\n      \"Salt
          is too high. Drain and refill partially.\"\n      if salt_ppm > 2750 else\n
          \     \"Salt level is ideal.\"\n    )\n  }\n}}"
        chlorine_result: "{{\n  {\n    \"chemical\": \"free_chlorine\",\n    \"provided\":
          free_chlorine_ppm,\n    \"measured\": {\n      \"chlorine\": states(\"sensor.calderaspas_hot_tub_iq_chlorine\")
          | default(\"\"),\n      \"ORP\": states(\"sensor.calderaspas_hot_tub_iq_orp\")
          | default(\"\")\n    },        \n    \"target_min\": 1,\n    \"target_max\":
          3,\n    \"recommendation\": (\n      \"Provide measurement to check.\"\n      if
          free_chlorine_ppm is none else\n      \"Add 1 cap of chlorine sanitizer to
          the skimmer filter housing with jets on high.\"\n      if free_chlorine_ppm
          < 1 else\n      \"Chlorine too high. Leave cover open for 15 minutes and retest.\"\n
          \     if free_chlorine_ppm > 3 else\n      \"Chlorine is ideal.\"\n    )\n
          \ }\n}}"
        ph_result: "{{\n  {\n    \"chemical\": \"ph\",\n    \"provided\": ph,\n    \"measured\":
          states(\"sensor.calderaspas_hot_tub_iq_ph\") | default(\"\"),\n    \"target_min\":
          7.2,\n    \"target_max\": 7.8,\n    \"recommendation\": (\n      \"Provide
          measurement to check.\"\n      if ph is none else\n      \"Add ~\" ~ ((7.2
          - ph) / 0.2) | round(0, 'ceil') ~ \" tbsp pH Increaser sodium carbonate.  Do
          not adjust for 48h after TA correction.\"\n      if ph < 7.2 else\n      \"Lower
          pH with dry acid (pH Down).\"\n      if ph > 7.8 else\n      \"pH is ideal.\"\n
          \   )\n  }\n}}"
        alk_result: "{{\n  {\n    \"chemical\": \"alkalinity\",\n    \"provided\": alkalinity_ppm,\n
          \   \"target_min\": 80,\n    \"target_max\": 120,\n    \"recommendation\":
          (\n      \"Provide measurement to check.\"\n      if alkalinity_ppm is none
          else\n      \"Add ~\" ~ ((80 - alkalinity_ppm) / 10) | round(0, 'ceil') ~
          \" tbsp baking soda to raise to 80 ppm.\"\n      if alkalinity_ppm < 80 else\n
          \     \"Reduce TA using dry acid (pH Down) or partial drain.\"\n      if alkalinity_ppm
          > 120 else\n      \"Alkalinity is ideal.\"\n    )\n  }\n}}"
        hardness_result: "{{\n  {\n    \"chemical\": \"hardness\",\n    \"provided\":
          hardness_ppm,\n    \"target_min\": 50,\n    \"target_max\": 150,\n    \"recommendation\":
          (\n      \"Provide measurement to check.\"\n      if hardness_ppm is none
          else\n      \"Use Vanishing Act XL pillow. Retest in 24h.\"\n      if hardness_ppm
          > 150 else\n      \"Calcium too low. Add hardness increaser.\"\n      if hardness_ppm
          < 50 else\n      \"Hardness is acceptable.\"\n    )\n  }\n}}"
        full_result: "{{\n  {\n    \"spa_info\": spa_info | default({}),\n    \"salt\":
          salt_result | default({}),\n    \"chlorine\": chlorine_result | default({}),\n
          \   \"ph\": ph_result | default({}),\n    \"alkalinity\": alk_result | default({}),\n
          \   \"hardness\": hardness_result | default({})\n  }\n}}"
    - stop: Pass Variable
      response_variable: full_result
    - set_conversation_response: '{{ full_result }}'
    mode: single
    icon: mdi:hot-tub
