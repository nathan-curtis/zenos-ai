###############################################################################
# ZenOS-AI DojoTools: History
# Version: 4.0.0 RC2
#
# Scripts:
#   zen_dojotools_history — Recorder statistics query engine (v4.0.0 RC2)
#
# MIGRATED FROM: scripts.yaml (2026-03-06)
#
# FG-14 FIXED: datetime: {}, object: {}, text: {} selectors stripped on migration
# BUG FIXED: msgs.append() → namespace() accumulator (Jinja sandbox violation)
# BUG FIXED: statistic_ids unguarded in query_payload → LoggingUndefined on help
#
# === UAT PASS — 2026-03-06 ===
# Auditor: Claude (Anthropic, Sonnet 4.6)
# HALMark: 0.9.11-draft — PASS Level 3 (Steward Safe) — no remaining FG hits
# UAT Cases: 3/3 PASS
#
# zen_dojotools_history:
#   help action → full help payload returned, errors list correct ✓
#   read action → 6-day daily energy delta (main_panel) returned clean ✓
#   error path → statistic_ids missing flagged correctly in errors list ✓
#
# config check → go; script reload → clean ✓
# ==============================
###############################################################################

script:
  zen_dojotools_history:
    sequence:
    - variables:
        error_msgs: "{%- set ns = namespace(msgs=[]) -%}\n{%- if statistic_ids is not defined or statistic_ids
          is none or statistic_ids == '' or statistic_ids == [] -%}\n  {%- set ns.msgs = ns.msgs + [\"Missing
          required field: statistic_ids\"] -%}\n{%- endif -%}\n{%- if action_type ==
          'read' and (types is not defined or types is none or types == '' or types
          == []) -%}\n  {%- set ns.msgs = ns.msgs + [\"Missing required field: types\"] -%}\n{%-
          endif -%}\n{{ ns.msgs }}"
        error_flag: '{{ error_msgs|count > 0 }}'
        query_payload: "{% set q = {\"statistic_ids\": statistic_ids | default([])} %} {% set q =
          q | combine(\n  start_time is defined and start_time != None and {\"start_time\":
          start_time} or {},\n  end_time is defined and end_time != None and {\"end_time\":
          end_time} or {},\n  period is defined and period != None and {\"period\":
          period} or {},\n  types is defined and types and {\"types\": types} or {},\n
          \ units is defined and units and {\"units\": units} or {},\n  recursive=True\n)
          %} {{ q | to_json }}"
        help_sample_outdoor: sensor.home_thermostat_outdoor_temperature
        help_sample_main_panel_consumption: sensor.main_panel_daily_consumption
        help_text:
          help: true
          action: read
          version: 4.0.0 RC2
          description: '`Zen DojoTools History` provides a structured interface for
            querying long-term statistics from Home Assistant''s Recorder database.
            It supports time-bucketed statistical queries, not raw event logs.
  
            '
          errors: '{{ error_msgs if error_flag else none }}'
          usage_notes:
          - Use 'read' to access long-term statistics stored by Home Assistant's Recorder.
          - Only sensors with a valid `state_class` and `unit_of_measurement` are supported.
          - Valid `state_class` values: • `measurement` • `total` • `total_increasing`
          - Most energy, temperature, water, and environmental sensors qualify.
          - Use `change` with `state_class: total_increasing` sensors (e.g., energy
              meters) to calculate usage.
          - Use `mean`, `min`, `max`, or `state` for measuring conditions over time.
          - Set `period` to group values into 5min, hourly, daily, weekly, or monthly
            bins. USE the largest period available for your data unless asked to prevent
            overflow conditions. Input tokens are not unlimited
          - This tool does **not** return raw states or events — use the `logbook` or
            `history` integration for that.
          - Ensure the target sensor has statistics enabled in Recorder settings.
          - If data is missing, verify `unit_of_measurement`, `state_class`, and enable
            statistics recording.
          - Timestamps are interpreted as UTC ISO-8601. Local timezones are accounted
            for in grouping.
          fields_reference:
            required_fields:
            - statistic_ids
            optional_fields:
            - start_time
            - end_time
            - period
            - types
            - units
            - context
            start_time: ISO 8601 timestamp (UTC) for the beginning of the query window.
            end_time: ISO 8601 timestamp (UTC) for the end of the query window.
            period: 'Time grouping for statistics aggregation. Options: `5minute`, `hour`,
              `day`, `week`, `month`.'
            types: 'Statistical operations to retrieve: - `mean` = average over time
              - `sum` = total over period - `min` / `max` = lowest or highest value
              - `state` = value at end of period - `change` = delta between start and
              end (best for cumulative sensors)'
            units: 'Optional unit conversion map, e.g. `{ "Wh": "kWh" }`. Useful for
              energy or water sensors.
  
              '
            context: Optional string to include in logs/traces for debugging or review.
          cheat_sheet:
            description: 'Common usage patterns to help frame useful queries against
              your Recorder statistics.
  
              '
            example_use_cases:
            - id: daily_temp_summary
              description: 'Get average daily outdoor temperature over a given time
                period.
  
                '
              statistic_ids: sensor.home_thermostat_outdoor_temperature
              start_time: '2025-06-01T00:00:00'
              end_time: '2025-06-08T00:00:00'
              period: day
              types:
              - mean
            - id: daily_energy_usage
              description: 'Retrieve daily energy usage from a total_increasing energy
                sensor. Uses `change` and converts from Wh to kWh.
  
                '
              statistic_ids: sensor.main_panel_daily_consumption
              start_time: '2025-04-01T00:00:00'
              period: day
              types:
              - change
              units:
                Wh: kWh
            notes:
            - 'Sensors without statistics support will return no results. Not all sensors
              qualify.
  
              '
            - 'This is an analytical tool, not an audit trail. For full event history,
              see the `logbook` or `history` integrations.
  
              '
            - 'Use `change` for daily delta on sensors like utility meters or rainfall
              counters.
  
              '
            - 'Use `mean` or `state` for environmental tracking like humidity or ambient
              temperature.
  
              '
            source:
            - https://www.home-assistant.io/integrations/recorder/#statistics
            - https://www.home-assistant.io/integrations/statistics/
    - choose:
      - conditions:
        - alias: ERROR - Required fields missing
          condition: template
          value_template: '{{ action_type == ''read'' and error_flag }}'
        sequence:
        - variables:
            history_result: '{{ help_text }}'
        - stop: 'Read error: Required fields missing'
          response_variable: history_result
      - conditions:
        - condition: template
          value_template: '{{ action_type == ''read'' }}'
          alias: READ
        sequence:
        - action: recorder.get_statistics
          data: '{{ query_payload }}'
          response_variable: history_result
        - stop: Read complete
          response_variable: history_result
      - conditions:
        - condition: template
          value_template: '{{ action_type == ''create'' }}'
          alias: CREATE
        sequence:
        - variables:
            history_result:
              error: true
              code: H-0001
              reason: Temporal Paradox
              detail: You cannot create history. You are not the Doctor.
        - stop: Create complete
          response_variable: history_result
      - conditions:
        - condition: template
          value_template: '{{ action_type == ''delete'' }}'
          alias: DELETE
        sequence:
        - variables:
            history_result:
              error: true
              code: H-0002
              reason: Redaction Denied
              detail: This isn’t a reality show. You don’t get to delete the past.
        - stop: Delete complete
          response_variable: history_result
      - conditions:
        - condition: template
          value_template: '{{ action_type == ''update'' }}'
          alias: UPDATE
        sequence:
        - variables:
            history_result:
              error: true
              code: H-0003
              reason: Zen Violation
              detail: 'You cannot rewrite history. You can, however, learn from it.
                See: https://www.goodreads.com/quotes/tag/change
  
                '
        - stop: Update complete
          response_variable: history_result
      - conditions:
        - condition: template
          value_template: '{{ action_type == ''help'' }}'
          alias: HELP
        sequence:
        - variables:
            history_result: '{{help_text}}'
        - stop: Help complete
          response_variable: history_result
    alias: Zen DojoTools History
    mode: parallel
    fields:
      action_type:
        name: CRUD Action
        required: true
        default: help
        selector:
          select:
            options:
            - read
            - create
            - update
            - delete
            - help
      statistic_ids:
        description: List of sensor/statistic IDs to query
        selector:
          entity:
            multiple: true
        required: true
      start_time:
        description: ISO 8601 UTC timestamp
        selector:
          datetime:
      end_time:
        description: ISO 8601 UTC timestamp
        selector:
          datetime:
      period:
        description: Time grouping (5minute, hour, day, week, month) CAUTION small interval
          may overflow.
        default: hour
        selector:
          select:
            options:
            - 5minute
            - hour
            - day
            - week
            - month
      types:
        description: List of statistical types to return (mean, sum, etc.)
        selector:
          select:
            multiple: true
            options:
            - change
            - last_reset
            - max
            - mean
            - min
            - state
            - sum
        name: types
      units:
        description: 'Optional unit conversion map (e.g. {"energy": "kWh"}); use if
          you need an output conversion such as Wh to kWh...'
        selector:
          object:
      context:
        description: Optional label for trace/logging
        selector:
          text:
    description: "Zen DojoTools History (4.0.0 RC2)\nHistory Stats for Homeassistant.\nUses
      recorder.get_statistics for current entity stats.\nCRITICAL:\n  Read HELP for
      detailed use, including information on targeting.\n  Read HELP - cheat_sheet for
      detailed use instructions and examples."
    icon: mdi:feather
