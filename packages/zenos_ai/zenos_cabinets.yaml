###############################################################################
#  ZENOS-AI — RING-0 CABINET PACKAGE
#  File: zenos_cabinets.yaml
#  Version: 4.0.1
#
#  14 canonical Ring-0 Cabinets for ZenOS-AI.
#  - Fully depersonalized
#  - zenos_ namespace
#  - Deterministic unique_ids
#  - Attribute write guard: blocks set_variable if proposed JSON exceeds
#    16,384 bytes (HA recorder hard limit — see FG-21). remove_variable and
#    clear_variables always execute regardless of cabinet size.
#
#  CHANGELOG
#  v1.2.0  2026-03-11  CANONICAL NAMING FIX — unique_ids, event types, and all
#                      entity ID references for Dojo, Kata, History, and
#                      Scratchpad cabinets corrected to match display names
#                      (zenos_dojo_cabinet, not zenos_zen_dojo_cabinet).
#                      BREAKING for installs that completed Flynn gate-3 on the
#                      old IDs — revert to pre-cabinet-rename-fix tag if needed.
#                      This is the canonical naming going forward.
#  v1.1.0  2026-02-28  Restored attribute size guard on all 14 cabinet write
#                      paths (ref FG-21). Blocked writes log a clear error via
#                      logbook. remove/clear always pass through.
#  v1.0.0  (baseline)  14-cabinet package. No write guard.
###############################################################################

template:

  ###########################################################################
  # 1. SYSTEM CABINETS (6)
  ###########################################################################

  - trigger:
      - trigger: event
        event_type: set_variable_zenos_system_cabinet
      - trigger: event
        event_type: remove_variable_zenos_system_cabinet
      - trigger: event
        event_type: clear_variables_zenos_system_cabinet
    action:
      - if: "{{ this.attributes.get('log_events', true) }}"
        then:
          - action: logbook.log
            data:
              name: "{{ trigger.event.event_type }}"
              message: >
                {{ trigger.event.data.key | default('-') }}
                {% if trigger.event.event_type.startswith('set_variable') -%}
                  : {{ trigger.event.data.value | default('not defined!') }}
                {%- endif %}
      - if: >
          {% set current = this.attributes.get('variables', {}) %}
          {% set evt = trigger.event.event_type %}
          {% set key = trigger.event.data.key %}
          {% set val = trigger.event.data.value %}
          {% if evt.startswith('set_variable') and key is defined and val is defined %}
            {% set value = val.isoformat() if val is datetime else val %}
            {% set use_ts = trigger.event.data.get('set_timestamp', this.attributes.get('default_timestamp', false)) %}
            {% if use_ts %}
              {% set new = { key: { 'value': value, 'timestamp': now().isoformat() } } %}
            {% else %}
              {% set new = { key: value } %}
            {% endif %}
            {{ dict(current, **new) | tojson | length > 131072 }}
          {% else %}
            false
          {% endif %}
        then:
          - action: logbook.log
            data:
              name: "{{ this.name }} — WRITE BLOCKED"
              message: >
                Cabinet full ({{ this.attributes.get('variables', {}) | tojson | length }}/131072 bytes).
                Key '{{ trigger.event.data.key }}' was NOT written.
                Delete or move keys out before writing more.
    sensor:
      - name: "ZenOS System Cabinet"
        unique_id: zenos_system_cabinet
        icon: mdi:file-cabinet
        state: Variables
        attributes:
          default_timestamp: true
          log_events: false
          variables: >
            {% set current = this.attributes.get('variables', {}) %}
            {% set evt = trigger.event.event_type %}
            {% set key = trigger.event.data.key %}
            {% set val = trigger.event.data.value %}
            {% set use_ts = trigger.event.data.get('set_timestamp', this.attributes.get('default_timestamp', false)) %}
            {% if evt.startswith('set_variable') and key is defined and val is defined %}
              {% set value = val.isoformat() if val is datetime else val %}
              {% if use_ts %}
                {% set new = { key: { 'value': value, 'timestamp': now().isoformat() } } %}
              {% else %}
                {% set new = { key: value } %}
              {% endif %}
              {% set proposed = dict(current, **new) %}
              {{ current if proposed | tojson | length > 131072 else proposed }}
            {% elif evt.startswith('remove_variable') and key is defined %}
              {{ dict(current.items() | rejectattr('0', 'eq', key)) }}
            {% elif evt.startswith('clear_variables') %}
              {{ {} }}
            {% else %}
              {{ current }}
            {% endif %}

