template:

# Home Overview Sensor
  - sensor:
      - unique_id: 5b2eb0cc-7e8e-4ede-862a-b32b9d9ece31
        name: "Home Overview"
        state: "{{ 'home' if (states('zone.home') | int(0) > 0) else 'not_home' }}"
        attributes:
          current_time: "{{ now() }}"
          home_mode: "{{ states('input_select.home_mode') }}"
          security_mode: "{{ states('alarm_control_panel.home_alarm') }}"
          guest_mode: "{{ states('input_boolean.guest_mode') }}"
          entertainment_mode: "{{ states('input_boolean.entertaining') }}"
          vacation_mode: "{{ states('calendar.vacation_mode') }}"
          quiet_hours: "{{ states('binary_sensor.quiet_hours') }}"
          work_hours: "{{ states('binary_sensor.work_hours') }}"
          voice_satellite_info: "{{ states('sensor.voice_satellite_info') }}"
          rooms: >-
            {% set occupancy_timer_list = label_entities('Occupancy') | select('match', 'sensor\\..+_occupancy_timer') | list | sort -%}
            {% set ns = namespace(result={}) -%}
            {% for occupancy_timer in occupancy_timer_list -%}
              {% set room_name = state_attr(occupancy_timer, 'friendly_name')
                                   | replace(' Occupancy Timer','')
                                   | default('') -%}
              {% set room_state_entity_id = occupancy_timer
                                   | replace('sensor.','input_select.')
                                   | replace('_occupancy_timer','_occupancy')
                                   | default('') -%}
              {% set ns.result = dict(ns.result, **{
                room_name: {
                  "room_timer_entity_id": occupancy_timer,
                  "room_state_entity_id": room_state_entity_id,
                  "room_state": states(room_state_entity_id),
                  "timer_remaining": states(occupancy_timer),
                  "occupants": "TBD",
                  "media": "TBD"
                }
              }) -%}
            {% endfor -%}
            {{ ns.result | tojson }}
        icon: mdi:account