

###############################################################################
# ZEN HEALTH — Canon Health Validator
# Version 4.0.0 RC2
# Required slots: strict 1:1. Optional slots: 0..N allowed.
#
#   Validates the presence and health of all Zen labels against a canonical
#   list. Uses Home Assistant slugify (underscores) and the labels() index
#   as ground truth.
#
#   Validates the presence and health of all Zen cabinets against defaults
#   and the canonical list.
###############################################################################


input_text:
  zenos_selected_cabinet:
    name: Zenos Selected Cabinet
    icon: mdi:archive
    initial: ""

template:
  - sensor:
      - name: Zen Label Health
        unique_id: zen_label_health
        device_class: enum
        availability: "true"

        #######################################################################
        # STATE
        #######################################################################
        state: >-
          {% set required = [
            'Zen Cabinet',
            'Zen System Cabinet',
            'Zen Dojo Cabinet',
            'Zen Kata Cabinet',
            'Zen Default Household',
            'Zen Default Family',
            'Zen Default User Cabinet',
            'Zen Default AI User Cabinet',
            'Zen History Cabinet',
            'Zen Index Cabinet'
          ] %}
          {# Optional (not health-gated):
             Instance: Zen Household, Zen Family, Zen User, Zen AI User
             Instance cabinets: Zen User Cabinet, Zen AI User Cabinet
             System: Zen Squirrel, Zen Fusion, Zen Health #}

          {% set required_ids = required | map('slugify') | list %}
          {% set label_index = labels() %}

          {% set ns = namespace(
              missing = [],
              unassigned = [],
              unhealthy = []
          ) %}

          {% for lid in required_ids %}

            {# ----------------------------- #}
            {# 1. Missing label entirely     #}
            {# ----------------------------- #}
            {% if lid not in label_index %}
              {% set ns.missing = ns.missing + [lid] %}
            {% else %}
              {% set ents = label_entities(lid) or [] %}

              {# -------------------------------- #}
              {# 2. Unassigned: exists, 0 entities #}
              {# -------------------------------- #}
              {% if ents | count == 0 %}
                {% set ns.unassigned = ns.unassigned + [lid] %}
              {% else %}

                {# ---------------------------------------- #}
                {# 3. Unhealthy: one or more ents unavailable #}
                {# ---------------------------------------- #}
                {% set bad = ents
                    | selectattr('state','in',['unavailable', 'unknown'])
                    | list %}
                {% if bad | count > 0 %}
                  {% set ns.unhealthy = ns.unhealthy + [lid] %}
                {% endif %}

              {% endif %}
            {% endif %}

          {% endfor %}

          {# ----------------------------- #}
          {# PRIORITY: missing > unhealthy > unassigned > ok #}
          {# ----------------------------- #}

          {% if ns.missing | count > 0 %}
            critical
          {% elif ns.unhealthy | count > 0 %}
            error
          {% elif ns.unassigned | count > 0 %}
            warn
          {% else %}
            ok
          {% endif %}

        #######################################################################
        # ATTRIBUTES
        #######################################################################
        attributes:

          required_labels: >-
            Zen Cabinet, Zen System Cabinet, Zen Dojo Cabinet, Zen Kata Cabinet,
            Zen Default Household, Zen Default Family,
            Zen Default User Cabinet, Zen Default AI User Cabinet,
            Zen History Cabinet, Zen Index Cabinet

          existing_label_ids: >-
            {% set required = [
              'Zen Cabinet','Zen System Cabinet','Zen Dojo Cabinet','Zen Kata Cabinet',
              'Zen Default Household','Zen Default Family',
              'Zen Default User Cabinet','Zen Default AI User Cabinet',
              'Zen History Cabinet','Zen Index Cabinet'
            ] %}
            {% set required_ids = required | map('slugify') | list %}
            {% set label_index = labels() %}
            {% set ns = namespace(ex=[]) %}
            {% for lid in required_ids %}
              {% if lid in label_index %}
                {% set ns.ex = ns.ex + [lid] %}
              {% endif %}
            {% endfor %}
            {{ ns.ex | join(', ') if ns.ex else 'none' }}

          missing_label_ids: >-
            {% set required = [
              'Zen Cabinet','Zen System Cabinet','Zen Dojo Cabinet','Zen Kata Cabinet',
              'Zen Default Household','Zen Default Family',
              'Zen Default User Cabinet','Zen Default AI User Cabinet',
              'Zen History Cabinet','Zen Index Cabinet'
            ] %}
            {% set required_ids = required | map('slugify') | list %}
            {% set label_index = labels() %}
            {% set ns = namespace(miss=[]) %}
            {% for lid in required_ids %}
              {% if lid not in label_index %}
                {% set ns.miss = ns.miss + [lid] %}
              {% endif %}
            {% endfor %}
            {{ ns.miss | join(', ') if ns.miss else 'none' }}

          #######################################################################
          # BROKEN / UNASSIGNED / UNHEALTHY LABEL IDS
          #######################################################################

          unassigned_label_ids: >-
            {% set required = [
              'Zen Cabinet','Zen System Cabinet','Zen Dojo Cabinet','Zen Kata Cabinet',
              'Zen Default Household','Zen Default Family',
              'Zen Default User Cabinet','Zen Default AI User Cabinet',
              'Zen History Cabinet','Zen Index Cabinet'
            ] %}
            {% set required_ids = required | map('slugify') | list %}
            {% set label_index = labels() %}
            {% set ns = namespace(unassigned=[]) %}

            {% for lid in required_ids %}
              {% if lid in label_index %}
                {% set ents = label_entities(lid) or [] %}
                {% if ents | count == 0 %}
                  {% set ns.unassigned = ns.unassigned + [lid] %}
                {% endif %}
              {% endif %}
            {% endfor %}

            {{ ns.unassigned | join(', ') if ns.unassigned else 'none' }}

          unhealthy_label_ids: >-
            {% set required = [
              'Zen Cabinet','Zen System Cabinet','Zen Dojo Cabinet','Zen Kata Cabinet',
              'Zen Default Household','Zen Default Family',
              'Zen Default User Cabinet','Zen Default AI User Cabinet',
              'Zen History Cabinet','Zen Index Cabinet'
            ] %}
            {% set required_ids = required | map('slugify') | list %}
            {% set label_index = labels() %}
            {% set ns = namespace(unhealthy=[]) %}

            {% for lid in required_ids %}
              {% if lid in label_index %}
                {% set ents = label_entities(lid) or [] %}
                {% if ents | count > 0 %}
                  {% set bad = ents | selectattr('state','in',['unknown','unavailable']) | list %}
                  {% if bad | count > 0 %}
                    {% set ns.unhealthy = ns.unhealthy + [lid] %}
                  {% endif %}
                {% endif %}
              {% endif %}
            {% endfor %}

            {{ ns.unhealthy | join(', ') if ns.unhealthy else 'none' }}

          healthy_label_ids: >-
            {% set required = [
              'Zen Cabinet','Zen System Cabinet','Zen Dojo Cabinet','Zen Kata Cabinet',
              'Zen Default Household','Zen Default Family',
              'Zen Default User Cabinet','Zen Default AI User Cabinet',
              'Zen History Cabinet','Zen Index Cabinet'
            ] %}
            {% set required_ids = required | map('slugify') | list %}
            {% set label_index = labels() %}
            {% set ns = namespace(ok=[]) %}
            {% for lid in required_ids %}
              {% if lid in label_index %}
                {% set ents = label_entities(lid) or [] %}
                {% if ents | count > 0 %}
                  {% set bad = ents | selectattr('state','in',['unavailable','unknown']) | list %}
                  {% if bad | count == 0 %}
                    {% set ns.ok = ns.ok + [lid] %}
                  {% endif %}
                {% endif %}
              {% endif %}
            {% endfor %}
            {{ ns.ok | join(', ') if ns.ok else 'none' }}

          timestamp: "{{ now().isoformat() }}"

  - sensor:
      - name: Zen Cabinet Health
        unique_id: zen_cabinet_health
        device_class: enum
        availability: "true"

        #######################################################################
        # STATE
        #######################################################################
        state: >-
          {% set required = [
            'system','dojo','kata',
            'default_household','default_family',
            'default_user','default_ai_user'
          ] %}

          {% set optional = [
            'household','family','user','ai_user',
            'history','index'
          ] %}

          {% set slot_to_label = {
            'system':'Zen System Cabinet',
            'dojo':'Zen Dojo Cabinet',
            'kata':'Zen Kata Cabinet',
            'household':'Zen Household Cabinet',
            'default_household':'Zen Default Household Cabinet',
            'family':'Zen Family Cabinet',
            'default_family':'Zen Default Family Cabinet',
            'user':'Zen User Cabinet',
            'default_user':'Zen Default User Cabinet',
            'ai_user':'Zen AI User Cabinet',
            'default_ai_user':'Zen Default AI User Cabinet',
            'history':'Zen History Cabinet',
            'index':'Zen Index Cabinet'
          } %}

          {% set parent_slug = 'Zen Cabinet' | slugify %}
          {% set all_cabs = label_entities(parent_slug) | list %}
          {% set label_index = labels() %}

          {% set ns = namespace(
            missing_req = [],
            unassigned_req = [],
            invalid_req = [],
            unhealthy_req = [],
            unhealthy_opt = []
          ) %}

          {# REQUIRED SLOTS: strict 1:1, label + cabinet health enforced #}
          {% for slot in required %}
            {% set label_slug = slot_to_label[slot] | slugify %}
            {% set label_exists = label_slug in label_index %}
            {% set ents = intersect(all_cabs, label_entities(label_slug) or []) | list %}
            {% set bad = ents | selectattr('state','in',['unavailable','unknown']) | list %}

            {% if not label_exists %}
              {% set ns.missing_req = ns.missing_req + [slot] %}
            {% elif ents | count == 0 %}
              {% set ns.unassigned_req = ns.unassigned_req + [slot] %}
            {% elif ents | count > 1 %}
              {% set ns.invalid_req = ns.invalid_req + [slot] %}
            {% elif bad | count > 0 %}
              {% set ns.unhealthy_req = ns.unhealthy_req + [slot] %}
            {% endif %}
          {% endfor %}

          {# OPTIONAL SLOTS: 0..N allowed, only health tracked #}
          {% for slot in optional %}
            {% set label_slug = slot_to_label[slot] | slugify %}
            {% set ents = intersect(all_cabs, label_entities(label_slug) or []) | list %}
            {% if ents | count > 0 %}
              {% set bad = ents | selectattr('state','in',['unavailable','unknown']) | list %}
              {% if bad | count > 0 %}
                {% set ns.unhealthy_opt = ns.unhealthy_opt + [slot] %}
              {% endif %}
            {% endif %}
          {% endfor %}

          {# Priority (labels-aligned):
             missing required  -> critical
             invalid required  -> error
             unhealthy required-> error
             unassigned required -> warn
             unhealthy optional  -> warn
             else -> ok
          #}
          {% if ns.missing_req | count > 0 %}
            critical
          {% elif ns.invalid_req | count > 0 %}
            error
          {% elif ns.unhealthy_req | count > 0 %}
            error
          {% elif ns.unassigned_req | count > 0 %}
            warn
          {% elif ns.unhealthy_opt | count > 0 %}
            warn
          {% else %}
            ok
          {% endif %}

        #######################################################################
        # ATTRIBUTES
        #######################################################################
        attributes:

          #####################################################################
          # LABEL HEALTH PASS-THROUGH
          #####################################################################
          label_health: >-
            {% set e = 'sensor.zen_label_health' %}
            {% set exists = states[e] is not none %}
            {% set st = states(e) %}
            {% set valid = exists and st not in ['unknown','unavailable', none] %}

            {% if valid and st == 'ok' %}
              ok
            {% else %}
              {{
                {
                  'state': (st if valid else None),
                  'more_detail': (states[e].entity_id if valid else {})
                }
              }}
            {% endif %}

          #####################################################################
          # REQUIRED + OPTIONAL
          #####################################################################
          required_cabinets: >-
            {{ [
              'system','dojo','kata',
              'default_household','default_family',
              'default_user','default_ai_user'
            ] }}

          optional_cabinets: >-
            {{ [
              'household','family','user','ai_user',
              'history','index'
            ] }}

          #####################################################################
          # EXISTING CABINETS (BY SLOT)
          #####################################################################
          existing_cabinets: >-
            {% set slots = [
              'system','dojo','kata',
              'household','default_household',
              'family','default_family',
              'user','default_user',
              'ai_user','default_ai_user',
              'history','index'
            ] %}
            {% set slot_to_label = {
              'system':'Zen System Cabinet',
              'dojo':'Zen Dojo Cabinet',
              'kata':'Zen Kata Cabinet',
              'household':'Zen Household Cabinet',
              'default_household':'Zen Default Household Cabinet',
              'family':'Zen Family Cabinet',
              'default_family':'Zen Default Family Cabinet',
              'user':'Zen User Cabinet',
              'default_user':'Zen Default User Cabinet',
              'ai_user':'Zen AI User Cabinet',
              'default_ai_user':'Zen Default AI User Cabinet',
              'history':'Zen History Cabinet',
              'index':'Zen Index Cabinet'
            } %}
            {% set all_cabs = label_entities('Zen Cabinet' | slugify) | list %}
            {% set ns = namespace(found=[]) %}

            {% for slot in slots %}
              {% set label_slug = slot_to_label[slot] | slugify %}
              {% set ents = intersect(all_cabs, label_entities(label_slug) or []) | list %}
              {% if ents | count > 0 %}
                {% set ns.found = ns.found + [slot] %}
              {% endif %}
            {% endfor %}

            {{ ns.found | join(', ') if ns.found else 'none' }}

          #####################################################################
          # MISSING REQUIRED CABINETS (LABEL OR ASSIGNMENT)
          #####################################################################
          missing_cabinets: >-
            {% set required = [
              'system','dojo','kata',
              'default_household','default_family',
              'default_user','default_ai_user'
            ] %}
            {% set slot_to_label = {
              'system':'Zen System Cabinet',
              'dojo':'Zen Dojo Cabinet',
              'kata':'Zen Kata Cabinet',
              'default_household':'Zen Default Household Cabinet',
              'default_family':'Zen Default Family Cabinet',
              'default_user':'Zen Default User Cabinet',
              'default_ai_user':'Zen Default AI User Cabinet'
            } %}
            {% set parent_slug = 'Zen Cabinet' | slugify %}
            {% set all_cabs = label_entities(parent_slug) | list %}
            {% set label_index = labels() %}
            {% set ns = namespace(miss=[]) %}

            {% for slot in required %}
              {% set label_slug = slot_to_label[slot] | slugify %}
              {% set label_exists = label_slug in label_index %}
              {% set ents = intersect(all_cabs, label_entities(label_slug) or []) | list %}
              {% if not label_exists or ents | count == 0 %}
                {% set ns.miss = ns.miss + [slot] %}
              {% endif %}
            {% endfor %}

            {{ ns.miss | join(', ') if ns.miss else 'none' }}

          #####################################################################
          # INVALID MULTIPLES (REQUIRED ONLY)
          #####################################################################
          invalid_multiples: >-
            {% set required = [
              'system','dojo','kata',
              'default_household','default_family',
              'default_user','default_ai_user'
            ] %}
            {% set slot_to_label = {
              'system':'Zen System Cabinet',
              'dojo':'Zen Dojo Cabinet',
              'kata':'Zen Kata Cabinet',
              'default_household':'Zen Default Household Cabinet',
              'default_family':'Zen Default Family Cabinet',
              'default_user':'Zen Default User Cabinet',
              'default_ai_user':'Zen Default AI User Cabinet'
            } %}
            {% set parent_slug = 'Zen Cabinet' | slugify %}
            {% set all_cabs = label_entities(parent_slug) | list %}
            {% set ns = namespace(dupe=[]) %}

            {% for slot in required %}
              {% set label_slug = slot_to_label[slot] | slugify %}
              {% set ents = intersect(all_cabs, label_entities(label_slug) or []) | list %}
              {% if ents | count > 1 %}
                {% set ns.dupe = ns.dupe + [slot] %}
              {% endif %}
            {% endfor %}

            {{ ns.dupe | join(', ') if ns.dupe else 'none' }}

          #####################################################################
          # SLOT ENTITIES (FULL MAP)
          #####################################################################
          slot_entities: >-
            {% set slots = [
              'system','dojo','kata',
              'household','default_household',
              'family','default_family',
              'user','default_user',
              'ai_user','default_ai_user',
              'history','index'
            ] %}
            {% set slot_to_label = {
              'system':'Zen System Cabinet',
              'dojo':'Zen Dojo Cabinet',
              'kata':'Zen Kata Cabinet',
              'household':'Zen Household Cabinet',
              'default_household':'Zen Default Household Cabinet',
              'family':'Zen Family Cabinet',
              'default_family':'Zen Default Family Cabinet',
              'user':'Zen User Cabinet',
              'default_user':'Zen Default User Cabinet',
              'ai_user':'Zen AI User Cabinet',
              'default_ai_user':'Zen Default AI User Cabinet',
              'history':'Zen History Cabinet',
              'index':'Zen Index Cabinet'
            } %}
            {% set all_cabs = label_entities('Zen Cabinet' | slugify) | list %}
            {% set ns = namespace(m={}) %}

            {% for slot in slots %}
              {% set label_slug = slot_to_label[slot] | slugify %}
              {% set ents = intersect(all_cabs, label_entities(label_slug) or []) | list %}
              {% set ns.m = ns.m | combine({ slot: ents }) %}
            {% endfor %}

            {{ ns.m | tojson }}

          #####################################################################
          # RESOLVER SUGGESTIONS (BY SLOT)
          #####################################################################
          resolver_suggestions: >-
            {% set required = [
              'system','dojo','kata',
              'default_household','default_family',
              'default_user','default_ai_user'
            ] %}
            {% set optional = [
              'household','family','user','ai_user',
              'history','index'
            ] %}
            {% set slot_to_label = {
              'system':'Zen System Cabinet',
              'dojo':'Zen Dojo Cabinet',
              'kata':'Zen Kata Cabinet',
              'household':'Zen Household Cabinet',
              'default_household':'Zen Default Household Cabinet',
              'family':'Zen Family Cabinet',
              'default_family':'Zen Default Family Cabinet',
              'user':'Zen User Cabinet',
              'default_user':'Zen Default User Cabinet',
              'ai_user':'Zen AI User Cabinet',
              'default_ai_user':'Zen Default AI User Cabinet',
              'history':'Zen History Cabinet',
              'index':'Zen Index Cabinet'
            } %}
            {% set parent_slug = 'Zen Cabinet' | slugify %}
            {% set all_cabs = label_entities(parent_slug) | list %}
            {% set label_index = labels() %}
            {% set ns = namespace(s={}) %}

            {% for slot in required + optional %}
              {% set label_slug = slot_to_label[slot] | slugify %}
              {% set label_exists = label_slug in label_index %}
              {% set ents = intersect(all_cabs, label_entities(label_slug) or []) | list %}
              {% set bad = ents | selectattr('state','in',['unavailable','unknown']) | list %}

              {% if not label_exists and slot in required %}
                {% set ns.s = ns.s | combine({ slot: "Missing required label: " ~ label_slug }) %}
              {% elif not label_exists and slot in optional %}
                {% set ns.s = ns.s | combine({ slot: "Optional label missing (OK): " ~ label_slug }) %}
              {% elif slot in required and ents | count == 0 %}
                {% set ns.s = ns.s | combine({ slot: "Required label present but no cabinet has it" }) %}
              {% elif slot in required and ents | count > 1 %}
                {% set ns.s = ns.s | combine({ slot: "Multiple cabinets claim this slot: " ~ (ents | join(', ')) }) %}
              {% elif bad | count > 0 %}
                {% set bad_ids = bad | map(attribute='entity_id') | list %}
                {% set ns.s = ns.s | combine({ slot: "Unhealthy cabinet(s): " ~ (bad_ids | join(', ')) }) %}
              {% else %}
                {% set ns.s = ns.s | combine({ slot: "OK" }) %}
              {% endif %}
            {% endfor %}

            {{ ns.s | tojson }}

          #####################################################################
          # SLOT → LABEL MAPPING (single source of truth for Flynn)
          #####################################################################
          slot_to_label: >-
            {{ {
              'system':'Zen System Cabinet',
              'dojo':'Zen Dojo Cabinet',
              'kata':'Zen Kata Cabinet',
              'household':'Zen Household Cabinet',
              'default_household':'Zen Default Household Cabinet',
              'family':'Zen Family Cabinet',
              'default_family':'Zen Default Family Cabinet',
              'user':'Zen User Cabinet',
              'default_user':'Zen Default User Cabinet',
              'ai_user':'Zen AI User Cabinet',
              'default_ai_user':'Zen Default AI User Cabinet',
              'history':'Zen History Cabinet',
              'index':'Zen Index Cabinet'
            } | tojson }}

          #####################################################################
          # SLOT → DEFAULT ENTITY (canonical package entity IDs for Flynn)
          #####################################################################
          slot_to_default_entity: >-
            {{ {
              'system':'sensor.zenos_system_cabinet',
              'dojo':'sensor.zenos_zen_dojo_cabinet',
              'kata':'sensor.zenos_zen_kata_cabinet',
              'default_household':'sensor.zenos_default_household_cabinet',
              'default_family':'sensor.zenos_default_family_cabinet',
              'default_user':'sensor.zenos_default_user_cabinet',
              'default_ai_user':'sensor.zenos_default_ai_user_cabinet',
              'history':'sensor.zenos_zen_history_cabinet',
              'index':'sensor.zenos_zen_scratchpad_cabinet'
            } | tojson }}

          timestamp: "{{ now().isoformat() }}"

  - select:
      - name: "ZenOS Cabinet Slot Selector"
        unique_id: zenos_cabinet_selector
        icon: mdi:file-cabinet-multiple

        state: >
          {{ states('input_text.zenos_selected_cabinet') }}

        options: >
          {# Get full cabinet health object #}
          {% set health = state_attr('sensor.zen_cabinet_health', 'slot_entities') | default({}, true) %}
          {% set missing = state_attr('sensor.zen_cabinet_health', 'missing_cabinets') | default([], true) %}
          {% set invalid = state_attr('sensor.zen_cabinet_health', 'invalid_multiples') | default([], true) %}
          {% set unhealthy_opt = state_attr('sensor.zen_cabinet_health', 'unhealthy_opt') | default([], true) %}
          {% set unhealthy_req = state_attr('sensor.zen_cabinet_health', 'unhealthy_req') | default([], true) %}

          {% set opts = [] %}

          {# 1) VALID cabinet slots — exactly one entity & healthy #}
          {% for slot, ents in health.items() %}
            {% if ents | count == 1 %}
              {% set ent = ents[0] %}
              {% if states(ent) not in ['unknown','unavailable', None] %}
                {% set opts = opts + [ent] %}
              {% endif %}
            {% endif %}
          {% endfor %}

          {# 2) EXPOSE missing required slots #}
          {% for slot in missing %}
            {% set opts = opts + ['slot:' ~ slot ~ ' (missing)'] %}
          {% endfor %}

          {# 3) EXPOSE invalid multiples #}
          {% for slot in invalid %}
            {% set opts = opts + ['slot:' ~ slot ~ ' (invalid: multiple)'] %}
          {% endfor %}

          {# 4) EXPOSE unhealthy slots #}
          {% for slot in unhealthy_req + unhealthy_opt %}
            {% set opts = opts + ['slot:' ~ slot ~ ' (unhealthy)'] %}
          {% endfor %}

          {{ opts }}

        select_option:
          - event: custom_template_select
            event_data:
              target: "zen_cabinet_slot"
              value: "{{ option }}"

  ###########################################################################
  # FLYNN SYSTEM READY — derived binary sensor (read-only, not user-editable)
  # True when all three health gates are green.
  ###########################################################################
  - binary_sensor:
      - name: Flynn System Ready
        unique_id: flynn_system_ready
        state: >-
          {{ states('sensor.zen_label_health') == 'ok'
             and states('sensor.zen_cabinet_health') == 'ok'
             and states('sensor.zen_monastery_health') == 'ok' }}
        icon: "{{ 'mdi:check-circle' if this.state == 'on' else 'mdi:alert-circle' }}"