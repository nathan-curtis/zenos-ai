###############################################################################
# ZenOS-AI — System Health Helpers
# Version 4.0.0 RC2
#
# Label and cabinet health sensors migrated to dedicated files:
#   zenos_label_health.yaml   — sensor.zen_label_health
#   zenos_cabinet_health.yaml — sensor.zen_cabinet_health
#
# Remaining:
#   input_text.zenos_selected_cabinet — cabinet slot selection helper
#   select.zenos_cabinet_selector     — UI cabinet slot picker
#   binary_sensor.flynn_system_ready  — true when all 3 health gates green
###############################################################################


input_text:
  zenos_selected_cabinet:
    name: Zenos Selected Cabinet
    icon: mdi:archive
    initial: ""

template:
  - select:
      - name: "ZenOS Cabinet Slot Selector"
        unique_id: zenos_cabinet_selector
        icon: mdi:file-cabinet-multiple

        state: >
          {{ states('input_text.zenos_selected_cabinet') }}

        options: >
          {# Get full cabinet health object #}
          {% set health = state_attr('sensor.zen_cabinet_health', 'slot_entities') | default({}, true) %}
          {% set missing = state_attr('sensor.zen_cabinet_health', 'missing_cabinets') | default([], true) %}
          {% set invalid = state_attr('sensor.zen_cabinet_health', 'invalid_multiples') | default([], true) %}
          {% set unhealthy_opt = state_attr('sensor.zen_cabinet_health', 'unhealthy_opt') | default([], true) %}
          {% set unhealthy_req = state_attr('sensor.zen_cabinet_health', 'unhealthy_req') | default([], true) %}

          {% set opts = [] %}

          {# 1) VALID cabinet slots — exactly one entity & healthy #}
          {% for slot, ents in health.items() %}
            {% if ents | count == 1 %}
              {% set ent = ents[0] %}
              {% if states(ent) not in ['unknown','unavailable', None] %}
                {% set opts = opts + [ent] %}
              {% endif %}
            {% endif %}
          {% endfor %}

          {# 2) EXPOSE missing required slots #}
          {% for slot in missing %}
            {% set opts = opts + ['slot:' ~ slot ~ ' (missing)'] %}
          {% endfor %}

          {# 3) EXPOSE invalid multiples #}
          {% for slot in invalid %}
            {% set opts = opts + ['slot:' ~ slot ~ ' (invalid: multiple)'] %}
          {% endfor %}

          {# 4) EXPOSE unhealthy slots #}
          {% for slot in unhealthy_req + unhealthy_opt %}
            {% set opts = opts + ['slot:' ~ slot ~ ' (unhealthy)'] %}
          {% endfor %}

          {{ opts }}

        select_option:
          - event: custom_template_select
            event_data:
              target: "zen_cabinet_slot"
              value: "{{ option }}"

  ###########################################################################
  # FLYNN SYSTEM READY — derived binary sensor (read-only, not user-editable)
  # True when all three health gates are green.
  ###########################################################################
  - binary_sensor:
      - name: Flynn System Ready
        unique_id: flynn_system_ready
        state: >-
          {{ states('sensor.zen_label_health') == 'ok'
             and states('sensor.zen_cabinet_health') == 'ok'
             and states('sensor.zen_monastery_health') == 'ok' }}
        icon: "{{ 'mdi:check-circle' if this.state == 'on' else 'mdi:alert-circle' }}"
