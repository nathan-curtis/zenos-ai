###############################################################################
# ZenOS-AI — Label Health
# Version 4.0.0 RC2
#
# sensor.zen_label_health
#   Validates the presence and health of all Zen labels against a canonical
#   list. Uses Home Assistant slugify (underscores) and the labels() index
#   as ground truth.
#   State: critical | error | warn | ok
#     critical = one or more required labels missing from index
#     error    = one or more required labels have unavailable/unknown entities
#     warn     = one or more required labels exist but have 0 assigned entities
#     ok       = all required labels present and healthy
#
# MIGRATED FROM: zenos_system_health.yaml
###############################################################################

template:
  # Force periodic re-check as no longer listening to any entity
  # @todo - we could use a flynn script state here (last_triggered) to ease off a bit
  - trigger:
      - trigger: time_pattern
        minutes: /1
    sensor:
      - name: Zen Label Health
        unique_id: zen_label_health
        device_class: enum
        availability: "true"

        #######################################################################
        # STATE
        #######################################################################
        state: >
          {%- import 'zenos_ai/zenos_health.jinja' as HEALTH -%}
          {{ HEALTH.zen_label_health_state() }}

        #######################################################################
        # ATTRIBUTES
        #######################################################################
        attributes:

          # ALWAYS stored as a list, not CSV
          required_labels: >
              {%- import 'zenos_ai/zenos_health.jinja' as HEALTH -%}
              {{- HEALTH.required_labels() | from_json([]) -}}

          # ALWAYS stored as a list, not CSV
          existing_label_ids: >
            {%- import 'zenos_ai/zenos_health.jinja' as HEALTH -%}
            {{- HEALTH.existing_label_ids() | from_json([]) -}}

          missing_label_ids: >
            {%- import 'zenos_ai/zenos_health.jinja' as HEALTH -%}
            {{- HEALTH.missing_label_ids() | from_json([]) -}}

          #######################################################################
          # BROKEN / UNASSIGNED / UNHEALTHY LABEL IDS
          #######################################################################

          unassigned_label_ids: >
            {%- import 'zenos_ai/zenos_health.jinja' as HEALTH -%}
            {{- HEALTH.unassigned_label_ids() | from_json([]) -}}

          unhealthy_label_ids: >
            {%- import 'zenos_ai/zenos_health.jinja' as HEALTH -%}
            {{- HEALTH.unhealthy_label_ids() | from_json([]) -}}

          healthy_label_ids: >
            {%- import 'zenos_ai/zenos_health.jinja' as HEALTH -%}
            {{- HEALTH.healthy_label_ids() | from_json([]) -}}

          # Removed this makes it way to chatty and triggers far too many script runs
          # timestamp: "{{ now().isoformat() }}"
