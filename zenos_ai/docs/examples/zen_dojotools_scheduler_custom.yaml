###############################################################################
# ZenOS-AI: Custom Hardware Trigger Scheduler — Example
#
# Use this file as a starting point to add hardware-specific triggers to
# ZenOS-AI without modifying core files.
#
# HOW TO USE:
#   1. Copy this file to:
#        <ha_config>/packages/zenos_ai/zen_dojotools_scheduler_custom.yaml
#   2. Replace the placeholder entity IDs under each trigger with your own.
#      Remove any trigger blocks for hardware you don't have.
#   3. Add the trigger IDs you want to use to the `trigger_subscriptions`
#      list in each component's Dojo drawer (via zen_dojotools_kungfu_writer).
#   4. Add this file to your local .gitignore — it contains your entity IDs
#      and should never be committed to a shared repo.
#
# HOW IT WORKS:
#   This automation uses the same Dojo-driven dispatch loop as the core
#   scheduler. When a trigger fires, ZenOS reads every KFC drawer and
#   dispatches the Ninja Summarizer for any component whose
#   `trigger_subscriptions` list includes the fired trigger's ID.
#   No choose branches. No hardcoded component names.
#
# TRIGGER IDs (set these in trigger_subscriptions in your KFC drawer):
#   alarm_panel           — security/alarm state changes
#   mb_wake               — master bedroom occupancy change (Asleep → *)
#   nathan_bed_changes    — occupant 1 in-bed sensor
#   kim_bed_changes       — occupant 2 in-bed sensor
#   water_flow_stop       — water flow drops to zero
#   hot_tub_state         — spa/hot tub state change
#   elec_panel_door_change — electrical panel door open/close
#   test_button           — manual test trigger
#
# You can rename any trigger ID — just make sure it matches what your
# components declare in trigger_subscriptions.
###############################################################################

automation:

  - id: 'REPLACE_WITH_UNIQUE_ID'   # generate one at: https://www.unixtimestamp.com/
    alias: Zen Custom Hardware Scheduler
    description: >-
      Local hardware trigger extension for ZenOS-AI. Uses the Dojo-driven
      dispatch loop — components subscribe via trigger_subscriptions in their
      KFC drawer. Do not commit this file to a shared repo.
    triggers:

    # -- Alarm / Security panel --------------------------------------------------
    - trigger: state
      entity_id:
      - alarm_control_panel.your_alarm_entity   # REPLACE
      to:
      not_from:
      - unknown
      - unavailable
      id: alarm_panel

    # -- Bedroom occupancy (wake trigger) ----------------------------------------
    - trigger: state
      entity_id:
      - input_select.your_bedroom_occupancy     # REPLACE
      from: Asleep
      to:
      - Occupied
      - Engaged
      - Hold
      - Vacant
      id: mb_wake

    # -- In-bed sensors ----------------------------------------------------------
    - trigger: state
      entity_id:
      - binary_sensor.your_bed_sensor_1         # REPLACE
      to:
      not_from:
      - unknown
      - unavailable
      id: nathan_bed_changes

    - trigger: state
      entity_id:
      - binary_sensor.your_bed_sensor_2         # REPLACE
      to:
      not_from:
      - unknown
      - unavailable
      id: kim_bed_changes

    # -- Water flow --------------------------------------------------------------
    - trigger: state
      entity_id:
      - sensor.your_water_flow_sensor           # REPLACE
      id: water_flow_stop
      to: '0'
      not_from:
      - unknown
      - unavailable
      for:
        hours: 0
        minutes: 2
        seconds: 0

    # -- Spa / hot tub -----------------------------------------------------------
    - trigger: state
      entity_id:
      - switch.your_hot_tub_power               # REPLACE — add more entities as needed
      for:
        hours: 0
        minutes: 0
        seconds: 5
      not_from:
      - unavailable
      - unknown
      id: hot_tub_state
      alias: Hot tub meaningful state change

    # -- Electrical panel door ---------------------------------------------------
    - trigger: state
      entity_id:
      - binary_sensor.your_panel_door_sensor    # REPLACE — add sub-panel if applicable
      for:
        hours: 0
        minutes: 0
        seconds: 30
      id: elec_panel_door_change
      not_from:
      - unknown
      - unavailable
      not_to:
      - unknown
      - unavailable

    # -- Manual test button ------------------------------------------------------
    - trigger: state
      entity_id:
      - input_button.your_test_button           # REPLACE
      to:
      not_from:
      - unavailable
      - unknown
      alias: Manual test trigger
      id: test_button

    actions:

    # ── Pre-fetch home overview ──────────────────────────────────────────────
    - action: script.zen_dojotools_inspect
      metadata: {}
      data:
        entity_id:
        - sensor.home_overview
        timeout: 30
      response_variable: home_overview

    # ── zen_event component extraction (unused for hardware triggers) ────────
    - variables:
        zen_event_component: >-
          {%- set ev   = trigger.get('event') if trigger is mapping else None -%}
          {%- set data = ev.get('data') if ev is mapping else None -%}
          {%- set comp = data.get('event', {}).get('component') if data is mapping else None -%}
          {{ comp | default('') }}

    # ── Dojo-driven Ninja Summarizer dispatch ────────────────────────────────
    - variables:
        _dojo_cab: >-
          {{ label_entities('Zen Dojo Cabinet')
             | select('match', 'sensor.') | list | first | default('') }}
        _kata_cab: >-
          {{ label_entities('Zen Kata Cabinet')
             | select('match', 'sensor.') | list | first | default('') }}
        _force_component: "{{ zen_event_component | default('') | slugify }}"
        _protected: "['AI_Cabinet_VolumeInfo', 'kfc_template', 'zen_library_manifest', '_context']"
        _subscribers: >-
          {%- set dojo_vars = state_attr(_dojo_cab, 'variables') | default({}, true) -%}
          {%- set trig_id   = trigger.id | default('') -%}
          {%- set force_c   = zen_event_component | default('') | slugify -%}
          {%- set protected = ['AI_Cabinet_VolumeInfo', 'kfc_template', 'zen_library_manifest', '_context'] -%}
          {%- set ns = namespace(subs=[]) -%}
          {%- for key, drawer in dojo_vars.items() -%}
            {%- if not key.startswith('_') and key not in protected -%}
              {%- set val = drawer.get('value', drawer) if drawer is mapping else {} -%}
              {%- if val is mapping -%}
                {%- set sub_list  = val.get('trigger_subscriptions', []) -%}
                {%- set subscribed = trig_id in sub_list -%}
                {%- set targeted   = force_c == '' or force_c == key -%}
                {%- if subscribed and targeted -%}
                  {%- set ns.subs = ns.subs + [val | combine({'_drawer_key': key})] -%}
                {%- endif -%}
              {%- endif -%}
            {%- endif -%}
          {%- endfor -%}
          {{ ns.subs | sort(attribute='delay_seconds') }}

    - repeat:
        for_each: "{{ _subscribers }}"
        sequence:
        - if:
          - condition: template
            value_template: >-
              {{ (repeat.item.delay_seconds | default(0) | int(0)) > 0 }}
          then:
          - delay:
              seconds: "{{ repeat.item.delay_seconds | default(0) | int(0) }}"
        - action: script.zen_dojotools_filecabinet
          metadata: {}
          data:
            action_type: read
            show_hidden_volumes: false
            volume_entity_id:
            - "{{ _kata_cab }}"
            key: "{{ repeat.item.kata_key | default(repeat.item._drawer_key) }}"
          response_variable: _iter_last_kata
        - variables:
            _iter_prompt: >-
              {{
                {
                  "source":            {"id": trigger.id | default(''), "platform": trigger.platform | default('')},
                  "home_overview":     home_overview | default({}),
                  "last_kata_summary": _iter_last_kata | default({})
                } | tojson
              }}
        - action: script.zen_dojotools_ninja_summarizer
          metadata: {}
          data:
            kung_fu_component_id: "{{ repeat.item.kata_key | default(repeat.item._drawer_key) }}"
            post_to_kata_cabinet: true
            supplemental_prompt: '{{ _iter_prompt }}'
          response_variable: _iter_ninja_response

    # ── Write heartbeat to Kata ──────────────────────────────────────────────
    - variables:
        trigger_entity_id: >-
          {%- if 'from_state' in trigger and trigger.from_state -%}
            {{ trigger.from_state.entity_id }}
          {%- elif 'to_state' in trigger and trigger.to_state -%}
            {{ trigger.to_state.entity_id }}
          {%- elif 'entity_id' in trigger -%}
            {{ trigger.entity_id }}
          {%- else -%}
            ''
          {%- endif -%}
        this_trigger: >-
          {{
            {
              "id":        trigger.id | default('unknown'),
              "platform":  trigger.platform | default('manual'),
              "entity_id": trigger_entity_id
            }
          }}
        final_response: >-
          {{
            {
              "status":    "success",
              "trigger":   this_trigger | default({}),
              "dispatched": _subscribers | default([]) | map(attribute='kata_key') | list
            } | tojson
          }}
    - action: script.zen_dojotools_filecabinet
      metadata: {}
      data:
        action_type: update
        set_timestamp: true
        show_hidden_volumes: false
        force_action: true
        volume_entity_id:
        - "{{ _kata_cab }}"
        key: zen_scheduler_custom
        value: '{{ final_response }}'
    mode: queued
    max: 5
